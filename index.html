{type:"mc",q:"Wat is een CHECK constraint in SQL?",o:["Een type primary key","Een constraint die een conditie oplegt aan de waarden in een kolom — bijv. leeftijd > 0","Een type index","Een type foreign key"],c:[1],h:"CHECK = validatieregel op kolomniveau. Bijv. CHECK (prijs > 0) verbiedt negatieve prijzen."},
{type:"open",q:"Welk SQL-sleutelwoord gebruik je om een waarde te vervangen als deze NULL is?",ans:["coalesce","ifnull","isnull"],h:"In MySQL heet het IFNULL(waarde, vervanging). In standaard SQL is het COALESCE."},
{type:"mc",q:"Wat is een natural join?",o:["Een join op basis van alle gelijknamige kolommen","Een join waarbij MySQL automatisch de kolommen koppelt met dezelfde naam in beide tabellen","Een type self join","Een type cross join"],c:[1],h:"Natural join = impliciete join conditie op basis van gelijknamige kolommen. Praktisch zelden aangeraden."},
{type:"mc",q:"Wat is het verschil tussen UNION en UNION ALL?",o:["Ze zijn identiek","UNION verwijdert duplicaten; UNION ALL behoudt alle rijen inclusief duplicaten — UNION ALL is sneller","UNION ALL verwijdert duplicaten","UNION is voor verschillende tabellen; UNION ALL voor dezelfde"],c:[1],h:"UNION = sorteert en dedupliceert (langzamer). UNION ALL = alles, sneller. Kies bewust."},
{type:"mc",q:"Wat is een correlated subquery?",o:["Een subquery in FROM","Een subquery die afhankelijk is van de buitenste query — wordt voor elke rij van de buitenste query opnieuw uitgevoerd","Een scalaire subquery","Een subquery in SELECT"],c:[1],h:"Correlated = gekoppeld aan de buitenste query. Langzaam maar soms noodzakelijk."},
{type:"mc",q:"Wat is een niet-correlated subquery?",o:["Een subquery die afhankelijk is van de buitenste query","Een subquery die onafhankelijk is en eenmalig uitgevoerd wordt — het resultaat wordt gebruikt door de buitenste query","Een type join","Een type view"],c:[1],h:"Niet-correlated = eenmalig uitvoeren, resultaat hergebruiken. Efficiënter dan correlated subquery."},
{type:"mc",q:"Wat doet de EXISTS operator in SQL?",o:["Controleert of een waarde in een lijst staat","Geeft TRUE als de subquery minstens één rij terugggeeft — gebruikt voor efficiënte bestaanscontrole","Vergelijkt twee waarden","Telt rijen"],c:[1],h:"EXISTS = bestaat er een match? Stopt bij de eerste gevonden rij — efficiënter dan COUNT(*) > 0."},
{type:"mc",q:"Wat is het verschil tussen EXISTS en IN bij subqueries?",o:["Ze zijn identiek","EXISTS stopt bij de eerste match (efficiënt bij grote datasets); IN evalueert de volledige lijst","IN is altijd sneller","EXISTS is enkel voor JOIN-vervanging"],c:[1],h:"EXISTS = stop bij eerste match. IN = evalueer alles. Bij grote datasets is EXISTS vaak sneller."},
{type:"mc",q:"Wat is een recursive CTE (Common Table Expression)?",o:["Een type view","Een tijdelijke resultatenset die naar zichzelf kan verwijzen — nuttig voor het doorlopen van hiërarchische data zoals organisatiestructuren","Een type stored procedure","Een type trigger"],c:[1],h:"Recursive CTE = doorloop hiërarchieën. Bijv. alle onderliggende managers van een directeur."},
{type:"mc",q:"Wat is EXPLAIN in MySQL?",o:["Documenteert een query","Toont het uitvoeringsplan van een query — hoe MySQL de query zal uitvoeren, welke indexen gebruikt worden","Voert een query simulatief uit","Optimaliseert een query automatisch"],c:[1],h:"EXPLAIN = inzicht in query performance. Toont of indexen gebruikt worden en hoeveel rijen gescand worden."},
{type:"mc",q:"Wat is een primary key constraint met meerdere kolommen (samengestelde PK)?",o:["Meerdere primary keys in één tabel","Een primary key bestaande uit twee of meer kolommen waarvan de combinatie uniek is","Bestaat niet in SQL","Een type composite index"],c:[1],h:"Samengestelde PK = uniekheid over meerdere kolommen. Bijv. (studentnr, cursuscode) in een inschrijvingstabel."},
{type:"mc",q:"Wat is een functionele afhankelijkheid in normalisatie?",o:["Een type foreign key","Een relatie waarbij kolom A de waarde van kolom B uniek bepaalt (A → B) — de basis van normalisatietheorie","Een type check constraint","Een type join"],c:[1],h:"A → B = als je A kent, ken je B. Bijv. studentnr → naam (studentnummer bepaalt de naam)."},
{type:"mc",q:"Wat zijn insertion anomalies in een denormalized database?",o:["Fouten bij INSERT-syntax","Situaties waarbij je geen nieuw record kan toevoegen zonder ook onnodige andere data toe te voegen","Conflicten tussen transacties","Type conversiefouten bij INSERT"],c:[1],h:"Insert anomalie = bijv. je kunt een nieuwe cursus pas toevoegen als er al een student is ingeschreven."},
{type:"mc",q:"Wat zijn deletion anomalies?",o:["Fouten bij DELETE-syntax","Situaties waarbij het verwijderen van één record onbedoeld ook andere nuttige informatie verwijdert","Transactiefouten","Type conflicten"],c:[1],h:"Delete anomalie = bijv. als de laatste student van een cursus weg is, verdwijnt ook de cursusinformatie."},
{type:"mc",q:"Wat is het verschil tussen OLTP en OLAP databases?",o:["Ze zijn identiek","OLTP = Online Transaction Processing (veel kleine transacties); OLAP = Online Analytical Processing (grote complexe analyses)","OLAP is sneller voor transacties","OLTP is beter voor analyses"],c:[1],h:"OLTP = webshop. OLAP = business intelligence. Andere workloads, andere architecturen."},
{type:"mc",q:"Wat is een data warehouse?",o:["Een type back-up","Een centrale opslagplaats voor geïntegreerde data uit meerdere bronnen, geoptimaliseerd voor analyse en rapportage (OLAP)","Een type NAS","Een type database voor transacties"],c:[1],h:"Data warehouse = centrale analytische database. Geïntegreerd vanuit meerdere bronnen voor BI."},
{type:"mc",q:"Wat is denormalisatie en wanneer past je het toe?",o:["Normalisatie ongedaan maken","Bewust redundantie introduceren in een database om queryperestaties te verbeteren — performance vs. integriteit trade-off","Een fout in het datamodel","Altijd een goede praktijk"],c:[1],h:"Denormalisatie = join vermijden door data samen te zetten. Sneller lezen, complexer schrijven."},
{type:"mc",q:"Wat is het doel van een samengestelde index?",o:["Een index op een primaire sleutel","Een index op meerdere kolommen samen — nuttig voor queries die op die combinatie filteren of sorteren","Een type primary key","Een type foreign key"],c:[1],h:"Samengestelde index = optimaliseer queries op meerdere kolommen tegelijk. Volgorde van kolommen in index telt!"},
{type:"mc",q:"Wat is SQL injection en hoe voorkom je het in MySQL?",o:["Een type databasefout","Een aanval waarbij kwaadaardige SQL-code wordt ingevoerd via gebruikersinput — voorkomen via prepared statements/parameterized queries","Een type constraint-fout","Een type syntaxisfout"],c:[1],h:"SQL injection via prepared statements voorkomen: de database behandelt input dan als data, nooit als code."},
{type:"mc",q:"Wat is een prepared statement?",o:["Een SQL-statement in een bestand","Een voor-gecompileerd SQL-statement met placeholders voor parameters — veilig tegen SQL injection en efficiënter bij herhaalde uitvoering","Een type view","Een type stored procedure"],c:[1],h:"Prepared statements = veiligheid + performance. Eenmalig compileren, meerdere keren uitvoeren."},
{type:"mc",q:"Wat is InnoDB in MySQL?",o:["Een type query-optimizer","De standaard storage engine van MySQL die transacties, foreign keys en row-level locking ondersteunt","Een type index","Een type replicatiesysteem"],c:[1],h:"InnoDB = ACID-compliant storage engine. Ondersteunt transacties en referentiële integriteit via FK's."},
{type:"mc",q:"Wat zijn ACID-eigenschappen van een database?",o:["Automatisch, Consequent, Inconsistent, Duurzaam","Atomiciteit, Consistentie, Isolatie, Duurzaamheid — garanties voor betrouwbare transacties","Authenticiteit, Confidentialiteit, Integriteit, Duurzaamheid","Asynchroon, Compleet, Integraal, Direct"],c:[1],h:"ACID = fundamenteel voor transacties. Alles of niets, consistent eindresultaat, geïsoleerd, permanent."},
{type:"mc",q:"Wat is atomiciteit (Atomicity) in ACID?",o:["Elke query is een atoom","Alle operaties in een transactie worden volledig uitgevoerd, of helemaal niet — geen halve transacties","Transacties zijn klein","Transacties zijn snel"],c:[1],h:"Atomiciteit = alles of niets. Overboeking geslaagd maar bijschrijving mislukt? Rollback van de afschrijving."},
{type:"mc",q:"Wat is isolatie (Isolation) in ACID?",o:["Tabellen zijn gescheiden","Gelijktijdige transacties beïnvloeden elkaar niet — elke transactie werkt alsof ze de enige is","Databases zijn geïsoleerd van het netwerk","Gebruikers zijn geïsoleerd"],c:[1],h:"Isolatie = concurrent veilig. Twee mensen die tegelijk hetzelfde saldo bijwerken — geen conflicten."},
{type:"mc",q:"Wat is duurzaamheid (Durability) in ACID?",o:["Data wordt regelmatig geback-upt","Eenmaal gecommit, blijft een transactie bewaard zelfs bij systeemstoringen","Data wordt versleuteld","Transacties duren lang"],c:[1],h:"Durability = gecommit = permanent. Stroom valt weg na COMMIT? Data is er nog bij herstart."},
{type:"mc",q:"Wat is een database normalization anomaly?",o:["Een syntaxisfout in SQL","Een probleem met data-integriteit bij INSERT, UPDATE of DELETE veroorzaakt door redundante data in een niet-genormaliseerde tabel","Een type constraint-fout","Een type index-fout"],c:[1],h:"Anomalieën = problemen door redundantie. Normalisatie elimineert ze door data correct te verdelen."},
{type:"mc",q:"Wat is een 'candidate key' in normalisatie?",o:["Een alternatieve vreemde sleutel","Een kolom of combinatie die de tabel uniek identificeert en als primary key zou kunnen dienen — minimaal en uniek","Een type surrogate key","Een type samengestelde sleutel"],c:[1],h:"Candidate key = mogelijke primary key. Er kunnen meerdere zijn; je kiest er één als PK."},
{type:"mc",q:"Wat is een 'alternate key'?",o:["Een back-up van de primary key","Een candidate key die NIET als primary key gekozen is maar wel uniek en minimaal is","Een type vreemde sleutel","Een type samengestelde sleutel"],c:[1],h:"Alternate key = de kandidaat die niet gewonnen heeft. Wordt typisch als UNIQUE constraint geïmplementeerd."},
{type:"mc",q:"Wat is een 'superkey' in relationele theorie?",o:["Een primary key met extra kolommen","Een set kolommen die rijen uniek identificeert — niet noodzakelijk minimaal (kan extra kolommen bevatten)","Een type samengestelde sleutel","Een type vreemde sleutel"],c:[1],h:"Superkey = uniek, maar niet per se minimaal. Een candidate key is een minimale superkey."},
{type:"mc",q:"Wat is het verschil tussen een 'hard delete' en een 'soft delete'?",o:["Ze zijn identiek","Hard delete = rij verwijderd uit database; soft delete = rij gemarkeerd als verwijderd (bijv. deleted_at kolom) maar fysiek aanwezig","Soft delete is sneller","Hard delete is veiliger"],c:[1],h:"Soft delete = logisch verwijderd, fysiek bewaard. Nuttig voor audit trails en ongedaan maken."},
{type:"mc",q:"Wat is een 'star schema' in een data warehouse?",o:["Een type normalisatieschema","Een denormalized schema met een centrale feitentabel omringd door dimensietabellen — geoptimaliseerd voor analytische queries","Een type ER-diagram","Een type indexstructuur"],c:[1],h:"Star schema = één centrale fact table + meerdere dimension tables. Snel voor analytical queries."},
{type:"mc",q:"Wat zijn window functions in SQL?",o:["Functies voor GUI-vensters","Functies die berekeningen uitvoeren over een reeks rijen gerelateerd aan de huidige rij zonder ze te groeperen — bijv. ROW_NUMBER(), RANK()","Een type aggregatiefunctie","Een type subquery"],c:[1],h:"Window functions = aggregaties zonder GROUP BY. Behoud alle rijen én voeg afgeleide waarden toe."},
{type:"mc",q:"Wat doet ROW_NUMBER() als window function?",o:["Telt het aantal rijen","Wijst een uniek, oplopend volgnummer toe aan elke rij binnen een partitie op basis van de ORDER BY","Geeft de rang met gelijke waarden hetzelfde nummer","Geeft de rijposities in de originele tabel"],c:[1],h:"ROW_NUMBER() = 1,2,3,4... altijd uniek, ook bij gelijke waarden."},
{type:"mc",q:"Wat is het verschil tussen RANK() en DENSE_RANK()?",o:["Ze zijn identiek","RANK() laat gaten bij gelijke waarden (1,1,3); DENSE_RANK() laat geen gaten (1,1,2)","DENSE_RANK laat gaten","RANK is altijd opeenvolgend"],c:[1],h:"RANK: gelijke waarden = zelfde rang, volgende rang slaat gat over. DENSE_RANK: geen gaten."},
{type:"mc",q:"Wat is een lateral join (LATERAL)?",o:["Een type cross join","Een join waarbij de rechterkant van de join een subquery is die de kolommen van de linkerkant mag refereren — zoals een correlated subquery als join","Een type self join","Een type full outer join"],c:[1],h:"LATERAL join = krachtig voor per-rij subqueries die de buitenste rij mogen zien."},
{type:"mc",q:"Wat is het doel van de CASE WHEN expressie in SQL?",o:["Een type filter","Conditionele logica in een query — geeft verschillende waarden terug op basis van condities (if-then-else in SQL)","Een type aggregatie","Een type join"],c:[1],h:"CASE WHEN ... THEN ... ELSE ... END = if-else in SQL. Nuttig voor categorisering en transformaties."},
{type:"mc",q:"Wat is een 'materialized view'?",o:["Een standaard view","Een view waarvan het resultaat fysiek opgeslagen wordt — sneller om op te vragen maar moet periodiek vernieuwd worden","Een type index","Een type tabel"],c:[1],h:"Materialized view = gecachte view-resultaten. Sneller lezen, vereist vernieuwing bij data-wijzigingen."},
{type:"mc",q:"Wat is database sharding?",o:["Een type back-up","Het horizontaal verdelen van een database over meerdere servers op basis van een sharding key — voor horizontale schaalbaarheid","Een type replicatie","Een type partitionering"],c:[1],h:"Sharding = deel de data op over meerdere servers. Elke server heeft een subset van de data."},
{type:"mc",q:"Wat is database replicatie?",o:["Het kopiëren van tabellen","Het synchroniseren van data tussen meerdere databaseservers voor beschikbaarheid en leesprestaties","Een type back-up","Een type sharding"],c:[1],h:"Replicatie = kopieën bijhouden. Master-slave: schrijven naar master, lezen van slaves."},
{type:"mc",q:"Wat is een 'deadlock' in databases?",o:["Een database die vastloopt","Een situatie waarbij twee transacties elkaar blokkeren — elke transactie wacht op een resource die de andere bezit","Een type time-out","Een type syntax-fout"],c:[1],h:"Deadlock = A wacht op B, B wacht op A. De database detecteert dit en annuleert één transactie."},
{type:"mc",q:"Wat is 'query optimization' in MySQL?",o:["Het handmatig herschrijven van queries","Het automatisch bepalen van het meest efficiënte uitvoeringsplan door de query optimizer — indexgebruik, join-volgorde, etc.","Een type stored procedure","Een type view"],c:[1],h:"MySQL optimizer kiest het beste plan. EXPLAIN toont wat de optimizer besloten heeft."},
{type:"mc",q:"Wat is een 'covering index'?",o:["Een index die alle tabelkolommen bevat","Een index die alle kolommen bevat die de query nodig heeft zodat de query uitvoerbaar is zonder de tabel zelf te raadplegen","Een type primary key","Een type samengestelde index"],c:[1],h:"Covering index = geen table lookup nodig. Query vindt alles in de index — maximale snelheid."},
{type:"mc",q:"Wat is het verschil tussen '=' en 'LIKE' in SQL?",o:["Ze zijn identiek","'=' vergelijkt exacte waarden; 'LIKE' vergelijkt patronen met wildcards (% voor alles, _ voor één teken)","LIKE is sneller","'=' ondersteunt wildcards"],c:[1],h:"LIKE 'Jan%' = begint met Jan. LIKE '%an%' = bevat 'an'. '=' vergelijkt exact."},
{type:"mc",q:"Wat is MySQL Workbench?",o:["Een type database-engine","Een grafische tool voor het ontwerpen, beheren en querien van MySQL-databases","Een type index","Een type replicatietool"],c:[1],h:"MySQL Workbench = GUI voor MySQL. ER-diagrammen maken, queries uitvoeren, servers beheren."},
{type:"mc",q:"Wat is een 'schema migration'?",o:["Het verplaatsen van een database","Een gecontroleerde wijziging van de databasestructuur (schema) via versie-beheerde scripts — bijv. een nieuwe kolom toevoegen","Een type back-up","Een type replicatie"],c:[1],h:"Schema migration = versie-beheer voor je database. Net als git voor code, maar voor database-structuur."},
{type:"mc",q:"Wat is het verschil tussen een database 'user' en een 'role' in MySQL?",o:["Ze zijn identiek","User = individueel account met credentials; Role = set van privileges die aan meerdere users kan worden toegewezen","Role heeft credentials; User niet","Users zijn read-only; Roles hebben schrijfrechten"],c:[1],h:"Roles = groep van privileges. Wijs de rol 'readonly' toe aan 10 users i.p.v. per user configureren."},
{type:"mc",q:"Wat doet GRANT in MySQL?",o:["Geeft een gebruiker een tabel","Geeft een gebruiker specifieke privileges op een database, tabel of kolom","Verwijdert privileges","Maakt een gebruiker aan"],c:[1],h:"GRANT SELECT, INSERT ON db.* TO 'user'@'host'; = geef die user die rechten op die database."},
{type:"mc",q:"Wat doet REVOKE in MySQL?",o:["Geeft privileges","Verwijdert eerder gegeven privileges van een gebruiker","Verwijdert een gebruiker","Maakt een back-up"],c:[1],h:"REVOKE = tegenovergestelde van GRANT. Neem rechten weg van een gebruiker."},
{type:"mc",q:"Wat is het doel van het 'FLUSH PRIVILEGES' commando?",o:["Wist alle data uit de database","Herlaaidt de privilege-tabellen zodat nieuwe GRANT/REVOKE wijzigingen onmiddellijk actief zijn","Wist de query cache","Herstelt de database"],c:[1],h:"FLUSH PRIVILEGES = herlaad de rechten. Nodig na manuele wijzigingen in de mysql.user tabel."},
{type:"mc",q:"Wat is het verschil tussen een lokale en een remote MySQL-gebruiker?",o:["Ze zijn identiek","Lokaal: 'user'@'localhost' — enkel lokale verbindingen; Remote: 'user'@'%' of 'user'@'IP' — netwerktoegang toegestaan","Remote gebruikers hebben meer rechten","Lokale gebruikers kunnen niet inloggen"],c:[1],h:"MySQL-users zijn host-specifiek. @'localhost' = enkel lokaal. @'%' = van overal. Beperk dit voor beveiliging."},
{type:"mc",q:"Wat is een database dump?",o:["Een type back-up van de server","Een export van de databasestructuur en/of data als SQL-commando's — nuttig voor back-up en migratie","Een type query","Een type replicatie"],c:[1],h:"mysqldump = standaard tool voor MySQL back-up. Genereert CREATE en INSERT statements."},
{type:"open",q:"Welk MySQL-commando gebruik je om te zien welke databases beschikbaar zijn?",ans:["show databases","show databases;"],h:"Het toont alle databases waartoe je toegang hebt."},
{type:"mc",q:"Wat is het doel van 'USE database_naam' in MySQL?",o:["Maakt een nieuwe database","Selecteert de actieve database zodat volgende queries op die database werken","Verwijdert een database","Maakt een back-up"],c:[1],h:"USE = actieve database instellen. Zonder USE moet je elke keer de databasenaam specificeren."},
{type:"mc",q:"Wat is de purpose van 'DESCRIBE tabel' in MySQL?",o:["Beschrijft de inhoud van de tabel","Toont de structuur van een tabel: kolomnamen, datatypes, NULL-mogelijkheid, sleutels en defaults","Telt het aantal rijen","Toont de indexen"],c:[1],h:"DESCRIBE (of DESC) = structuurinspectie. Handig om snel te zien hoe een tabel gebouwd is."},
{type:"mc",q:"Wat doet 'SHOW CREATE TABLE tabel'?",o:["Toont de tabelinhoud","Toont het volledige CREATE TABLE statement inclusief constraints, indexen en opties — nuttig voor back-up en documentatie","Maakt een kopie van de tabel","Toont de tabelstatistieken"],c:[1],h:"SHOW CREATE TABLE = de volledige definitie. Inclusief alle FK's, indexen en engine-instellingen."},
{type:"mc",q:"Wat is het verschil tussen een numerieke en een tekst-sortering in SQL?",o:["Er is geen verschil","Numeriek: 1 < 2 < 10; Lexicografisch: '1' < '10' < '2' — tekst vergelijkt karakter voor karakter","Tekst sortering is altijd numeriek","Numerieke sortering werkt op tekst"],c:[1],h:"Sla getallen op als INT, niet als VARCHAR. Anders sorteert '10' voor '2' lexicografisch."},
{type:"mc",q:"Wat is het doel van de IN operator in SQL?",o:["Controleert of een waarde in een bereik valt","Controleert of een waarde overeenkomt met één van de opgegeven waarden in een lijst","Voegt waarden samen","Telt waarden"],c:[1],h:"WHERE land IN ('België', 'Nederland', 'Duitsland') = efficiënter dan drie OR-condities."},
{type:"mc",q:"Wat doet BETWEEN in SQL?",o:["Berekent het verschil tussen twee waarden","Filtert rijen waarbij een waarde binnen een inclusief bereik valt (a BETWEEN x AND y = a >= x AND a <= y)","Vergelijkt twee tabellen","Combineert twee condities"],c:[1],h:"BETWEEN is inclusief: BETWEEN 10 AND 20 geeft ook 10 en 20 terug."},
{type:"mc",q:"Wat is een partitioned table in MySQL?",o:["Een tabel verdeeld over meerdere servers","Een tabel opgedeeld in partities op basis van een partitiekey — verbetert queryprestaties en beheerbaarheid bij grote datasets","Een type sharding","Een type view"],c:[1],h:"Partitionering = data verdelen binnen één server. Bijv. partitioneer op jaar voor historische data."},
{type:"mc",q:"Wat is het verschil tussen CHAR en BINARY in MySQL?",o:["Ze zijn identiek","CHAR vergelijkt hoofdletterongevoelig (afhankelijk van collation); BINARY vergelijkt byte-voor-byte, dus hoofdlettergevoelig","BINARY is voor grote teksten","CHAR is voor binaire data"],c:[1],h:"BINARY = case-sensitive vergelijking. CHAR = afhankelijk van collation (typisch case-insensitive)."},
{type:"mc",q:"Wat is een temporal table in SQL (systeem-tijdsperiode)?",o:["Een tabel voor tijdelijke data","Een tabel die automatisch de geldigheidsperiode van rijen bijhoudt — queries op een specifiek tijdstip tonen de data zoals ze toen was","Een type tijdelijke tabel","Een type view"],c:[1],h:"Temporal tables = tijdreisende queries. SELECT as of '2024-01-01' toont de staat op die datum."},
{type:"mc",q:"Wat is een 'sparse index' in databases?",o:["Een index met weinig kolommen","Een index die niet voor elke rij een entry heeft maar enkel voor rijen die de geïndexeerde conditie voldoen — gebruikt in sommige NoSQL-systemen","Een type primary key","Een type samengestelde index"],c:[1],h:"Sparse index = selectief. Enkel items in de index voor rijen die aan een bepaalde voorwaarde voldoen."},
{type:"mc",q:"Wat is referentiële integriteitsactie ON DELETE CASCADE?",o:["Verbiedt verwijdering als er gerelateerde rijen zijn","Verwijdert automatisch alle gerelateerde rijen via foreign key als de gerefereerde rij verwijderd wordt","Zet de foreign key op NULL","Geeft een foutmelding"],c:[1],h:"CASCADE = verwijdering doorpropageren. Verwijder klant → verwijder automatisch al zijn bestellingen."},
{type:"mc",q:"Wat is de ON UPDATE SET NULL referentiële actie?",o:["Verhindert updates","Zet de foreign key kolom op NULL als het gerefereerde record geüpdated wordt","Propageert de update","Geeft een foutmelding bij update"],c:[1],h:"SET NULL = ontkoppelen bij update. De foreign key kolom wordt NULL als de gerefereerde sleutel wijzigt."},
{type:"mc",q:"Wat is het verschil tussen een INNER JOIN en een NATURAL JOIN?",o:["Ze zijn identiek","INNER JOIN vereist een expliciete ON-conditie; NATURAL JOIN joinst automatisch op gelijknamige kolommen — NATURAL JOIN is impliciet en riskant","NATURAL JOIN is veiliger","INNER JOIN is impliciet"],c:[1],h:"NATURAL JOIN is handig maar gevaarlijk bij schema-wijzigingen. Expliciete ON-conditie is robuuster."},
{type:"mc",q:"Wat is een 'cursor' in een stored procedure?",o:["Een type index","Een database-object dat rij-voor-rij door een resultatenset itereert — nuttig voor complexe rij-per-rij verwerking in stored procedures","Een type view","Een type trigger"],c:[1],h:"Cursor = iterator voor query-resultaten. Gebruik het alleen wanneer SET-gebaseerde operaties niet volstaan."},
{type:"mc",q:"Wat is het verschil tussen MyISAM en InnoDB in MySQL?",o:["Ze zijn identiek","MyISAM: geen transacties, geen FK's, sneller voor read-heavy; InnoDB: ACID-transacties, FK's, row-level locking","InnoDB is verouderd","MyISAM is de standaard engine"],c:[1],h:"InnoDB = standaard aanbevolen. MyISAM = legacy, gebruikt voor specifieke read-only workloads."},
{type:"mc",q:"Wat is een 'query cache' in MySQL?",o:["Een type index","Een cache die resultaten van identieke SELECT-queries bijhoudt zodat ze niet opnieuw berekend moeten worden","Een type replicatie","Een type back-up"],c:[1],h:"Query cache = snel hergebruik. Verwijderd in MySQL 8.0 omdat het bij schrijfintensieve workloads een bottleneck werd."},
{type:"mc",q:"Wat is een 'stored function' in MySQL?",o:["Hetzelfde als een stored procedure","Een herbruikbare functie die een waarde teruggeeft en gebruikt kan worden in SQL-expressies — tegenstelling van procedure die side-effects heeft","Een type trigger","Een type view"],c:[1],h:"Stored function = geeft waarde terug, bruikbaar in SELECT. Stored procedure = voert acties uit."},
{type:"mc",q:"Wat doet het MySQL commando SHOW INDEX FROM tabel?",o:["Toont de tabelinhoud","Toont alle indexen op een tabel met hun type, kolommen en uniciteitsconstraint","Maakt een nieuwe index aan","Verwijdert indexen"],c:[1],h:"SHOW INDEX = inventariseer indexen. Nuttig voor query-optimalisatie en het vinden van redundante indexen."},
{type:"mc",q:"Wat is een 'virtual column' of 'generated column' in MySQL?",o:["Een type view-kolom","Een kolom waarvan de waarde automatisch berekend wordt uit andere kolommen — STORED of VIRTUAL","Een type foreign key","Een type trigger"],c:[1],h:"Generated column = berekende waarde. VIRTUAL = berekend on-the-fly; STORED = fysiek opgeslagen."},
{type:"mc",q:"Wat is het verschil tussen TRUNCATE en DELETE zonder WHERE?",o:["Ze zijn identiek","TRUNCATE is sneller (reset auto_increment, minimale logging); DELETE zonder WHERE verwijdert rij voor rij met volledige logging","DELETE is sneller","TRUNCATE kan niet in een transactie"],c:[1],h:"TRUNCATE = atomische reset, niet rollback-baar. DELETE = trager maar transactioneel en trigerend."},
{type:"mc",q:"Wat is een 'pivot query' in SQL?",o:["Een type join","Een query die rijen omzet naar kolommen — data herstructureren van lange naar brede formaat","Een type subquery","Een type aggregatie"],c:[1],h:"Pivot = draai de data. Rijen per maand → kolommen per maand in één rij per jaar."},
{type:"mc",q:"Wat is het doel van 'transaction isolation levels'?",o:["Transacties versleutelen","Bepalen hoe zichtbaar ongemaakte wijzigingen van andere transacties zijn — balans tussen consistentie en concurrency","Transacties versnellen","Transacties back-uppen"],c:[1],h:"Isolation levels: READ UNCOMMITTED, READ COMMITTED, REPEATABLE READ (standaard MySQL), SERIALIZABLE."},
];

window.QUESTIONS_routering = [
{type:"mc",q:"Op welke OSI-laag werkt een switch?",o:["Laag 1 (Physical)","Laag 2 (Data Link)","Laag 3 (Network)","Laag 4 (Transport)"],c:[1],h:"Switches werken op MAC-adressen — dat is de Data Link laag."},
{type:"mc",q:"Wat is een CAM-table (Content Addressable Memory)?",o:["Een tabel met IP-adressen en poortnummers","Een tabel die MAC-adressen koppelt aan switch-poorten","Een routeringstabel","Een ARP-tabel"],c:[1],h:"De CAM-table = het 'geheugen' van de switch: welk MAC-adres zit achter welke poort?"},
{type:"mc",q:"Hoe leert een switch welk MAC-adres achter welke poort zit?",o:["Via een manuele configuratie","Via dynamic MAC address learning: de switch leest het bron-MAC-adres van elk inkomend frame","Via SNMP","Via ARP broadcasts"],c:[1],h:"De switch 'leert' door passief naar het source MAC van elk inkomend frame te kijken."},
{type:"mc",q:"Wat doet een switch als het destination MAC-adres NIET in de CAM-table staat?",o:["Het frame wordt weggegooid","Het frame wordt geflooded naar alle poorten behalve de inkomende poort (unicast flooding)","Het frame wordt teruggestuurd naar de afzender","De switch vraagt een ARP-request"],c:[1],h:"Unknown MAC = flood. De switch stuurt het frame naar alle poorten om de bestemming te vinden."},
{type:"mc",q:"Wat is het verschil tussen een switch en een hub?",o:["Ze zijn identiek","Een hub stuurt frames naar ALLE poorten; een switch stuurt frames alleen naar de juiste poort op basis van MAC-adres","Een switch werkt op laag 3; een hub op laag 2","Een hub is sneller dan een switch"],c:[1],h:"Switch = intelligent (MAC-gebaseerd). Hub = dom (broadcast naar iedereen)."},
{type:"mc",q:"Wat is een collision domain?",o:["Een netwerksegment waar broadcasts worden uitgewisseld","Een netwerksegment waar slechts één apparaat tegelijk data kan sturen (botsingen mogelijk)","Een VLAN-domein","Een routeringsdomein"],c:[1],h:"Hubs creëren één collision domain. Elke switch-poort is een apart collision domain."},
{type:"mc",q:"Wat is een broadcast domain?",o:["Een netwerksegment waar MAC-adressen worden gedeeld","Een logisch netwerksegment waarbij alle apparaten elkaars broadcasts ontvangen","Een type VLAN","Een subnet"],c:[1],h:"Broadcasts gaan naar het hele broadcast domain. Routers en VLANs begrenzen broadcast domains."},
{type:"multi",q:"Welke bewerkingen voert een switch uit bij het ontvangen van een frame? (meerdere antwoorden)",o:["Ingress: frame binnenkomt op poort","Source MAC leren en in CAM-table opslaan","Destination MAC opzoeken in CAM-table","Forwarding beslissing nemen","Frame doorsturen of flooden"],c:[0,1,2,3,4],h:"Het volledige switching-proces bestaat uit deze vijf stappen."},
{type:"mc",q:"Wat is store-and-forward switching?",o:["De switch stuurt het frame door na de eerste paar bytes","De switch ontvangt het volledige frame, controleert op fouten (FCS), en stuurt het dan door","De switch buffert frames oneindig","De switch stuurt frames terug bij fouten"],c:[1],h:"Store-and-forward = ontvang volledig → controleer → doorstuur. Betrouwbaarder maar iets trager."},
{type:"mc",q:"Wat is cut-through switching?",o:["De switch wacht op het volledige frame","De switch begint met doorsturen na het lezen van het destination MAC-adres — sneller maar geen foutcontrole","De switch verwerpt kleine frames","De switch gebruikt buffers voor alle frames"],c:[1],h:"Cut-through = begin meteen. Sneller, maar defecte frames worden toch doorgestuurd."},
{type:"mc",q:"Wat is een half-duplex verbinding?",o:["Gelijktijdig verzenden en ontvangen mogelijk","Verzenden of ontvangen, maar niet tegelijk — vergelijkbaar met een walkietalkie","Een verbinding met dubbele bandbreedte","Een verbinding zonder foutcorrectie"],c:[1],h:"Half-duplex = beurtelings communiceren. Full-duplex = tegelijk in beide richtingen."},
{type:"mc",q:"Wat is een trunk-poort op een switch?",o:["Een poort voor servers","Een poort die verkeer van meerdere VLANs draagt via 802.1Q tagging","Een poort die één specifiek VLAN draagt","Een uplink naar het internet"],c:[1],h:"Trunk = meerdere VLANs over één fysieke link. De VLAN-tag identificeert welk VLAN elk frame bij hoort."},
{type:"mc",q:"Wat is een VLAN?",o:["Een fysiek gescheiden netwerk","Een logisch gescheiden netwerk op één of meerdere switches — apparaten in hetzelfde VLAN communiceren alsof ze op hetzelfde fysieke netwerk zitten","Een type routeringsprotocol","Een beveiligingsgroep"],c:[1],h:"VLAN = logische scheiding zonder fysieke bekabeling te wijzigen."},
{type:"multi",q:"Welke voordelen bieden VLANs? (meerdere antwoorden)",o:["Beveiliging: verkeer van verschillende groepen gescheiden","Verminderd broadcast-verkeer per VLAN","Flexibiliteit: gebruikers logisch indelen onafhankelijk van fysieke locatie","Automatische encryptie van verkeer","Vereenvoudiging van netwerkbeheer"],c:[0,1,2,4],h:"VLANs versleutelen NIET automatisch verkeer — dat is een andere beveiligingsmaatregel."},
{type:"mc",q:"Wat is het verschil tussen een access-poort en een trunk-poort?",o:["Ze zijn identiek","Access-poort = één VLAN (voor eindapparaten); trunk-poort = meerdere VLANs (voor verbindingen tussen switches)","Trunk-poort = één VLAN; access-poort = meerdere VLANs","Access-poort is voor uplinks; trunk voor servers"],c:[1],h:"Access = één VLAN voor eindgebruikersapparaten. Trunk = meerdere VLANs voor interswitch links."},
{type:"open",q:"Welke IEEE-standaard wordt gebruikt voor VLAN-tagging op trunk-poorten?",ans:["802.1q","ieee 802.1q","dot1q"],h:"De standaard begint met '802.1' en wordt ook 'dot1Q' genoemd."},
{type:"mc",q:"Wat is het 'native VLAN' op een trunk-poort?",o:["Het enige VLAN dat de trunk-poort mag gebruiken","Het VLAN waarvan frames NIET worden getagged op de trunk-verbinding — typisch VLAN 1","Het management VLAN","Het VLAN met de hoogste prioriteit"],c:[1],h:"Native VLAN = ongetagged verkeer. Beide kanten van de trunk moeten hetzelfde native VLAN hebben."},
{type:"mc",q:"Wat is inter-VLAN routing?",o:["Routing tussen twee switches","Het routeren van verkeer tussen twee of meer VLANs via een router of Layer 3 switch","Het uitwisselen van VLAN-informatie tussen switches","Het automatisch aanmaken van VLANs"],c:[1],h:"VLANs zijn gescheiden — ze kunnen niet direct communiceren. Een router of L3-switch overbrugt VLANs."},
{type:"mc",q:"Wat is een 'router-on-a-stick' configuratie?",o:["Een router met één netwerkkabel","Inter-VLAN routing via één fysieke router-interface met meerdere sub-interfaces (één per VLAN)","Een router die enkel als switch werkt","Een router met VLAN-ondersteuning op alle poorten"],c:[1],h:"Één fysieke interface, meerdere logische sub-interfaces — elk voor een ander VLAN. Efficiënt maar één bottleneck."},
{type:"mc",q:"Wat is een Layer 3 switch?",o:["Een switch met meer poorten","Een switch met ingebouwde routeringsfunctionaliteit die zowel op laag 2 (MAC) als laag 3 (IP) kan werken","Een switch die enkel op laag 3 werkt","Een router vermomd als switch"],c:[1],h:"L3 switch = switch + router. Kan inter-VLAN routing uitvoeren zonder aparte router."},
{type:"mc",q:"Wat is VTP (VLAN Trunking Protocol)?",o:["Een protocol voor VLAN-tagging","Een Cisco-protocol dat VLAN-informatie automatisch distribueert tussen switches in een VTP-domein","Een protocol voor inter-VLAN routing","Een standaard voor trunk-configuratie"],c:[1],h:"VTP = automatische VLAN-distributie. Configureer VLANs op de server, alle clients volgen automatisch."},
{type:"multi",q:"Welke VTP-modes bestaan er? (meerdere antwoorden)",o:["Server","Client","Transparent","Off","Master"],c:[0,1,2,3],h:"De vier officiële VTP-modes. 'Master' bestaat niet in VTP."},
{type:"mc",q:"Wat is een VLAN voor voice-verkeer (voice VLAN)?",o:["Een VLAN zonder QoS","Een speciaal VLAN voor VoIP-telefoons met hogere prioriteit (QoS) voor lagere latency","Een VLAN voor management-verkeer","Een VLAN voor draadloze apparaten"],c:[1],h:"VoIP is latency-gevoelig — een apart voice VLAN met QoS garandeert spraakkwaliteit."},
{type:"mc",q:"Wat is het doel van STP (Spanning Tree Protocol)?",o:["VLANs configureren op switches","Lussen in het netwerk voorkomen door redundante paden te blokkeren terwijl redundantie behouden blijft","Verkeer routeren tussen VLANs","MAC-adressen leren"],c:[1],h:"Lussen = broadcast storms. STP blokkeert redundante paden maar houdt ze als backup beschikbaar."},
{type:"mc",q:"Wat is een Root Bridge?",o:["De switch met de meeste poorten","De switch die gekozen wordt als centraal referentiepunt van de spanning tree","De switch verbonden met het internet","De switch met het meeste verkeer"],c:[1],h:"De Root Bridge is het 'hart' van de spanning tree — alle paden worden vanuit hier berekend."},
{type:"mc",q:"Hoe wordt de Root Bridge gekozen?",o:["De switch met de meeste poorten","De switch met de laagste Bridge ID (prioriteit + MAC-adres)","De switch met de meeste verbindingen","Manueel geconfigureerd door de beheerder"],c:[1],h:"Bridge ID = prioriteit (default 32768) + MAC-adres. Laagste = wint. Pas prioriteit aan om te sturen."},
{type:"open",q:"Hoe heet de STP-poorttoestand waarbij een poort actief forwardt maar geen paden naar de root heeft?",ans:["designated port","designated","designated poort"],h:"Niet de root port, maar de poort die op het segment de beste weg naar de root heeft."},
{type:"multi",q:"Welke STP-poorttoestanden zijn er in classiek STP? (meerdere antwoorden)",o:["Blocking","Listening","Learning","Forwarding","Disabled"],c:[0,1,2,3,4],h:"Alle vijf zijn officiële STP-poorttoestanden."},
{type:"mc",q:"Wat is RSTP (Rapid STP)?",o:["Een verouderde versie van STP","Een verbeterde versie van STP (802.1w) met snellere convergentie — seconden in plaats van 30-50 seconden","Een Cisco-proprietary versie van STP","Een protocol voor VLAN-tagging"],c:[1],h:"Rapid = snel. RSTP convergeert in seconden, klassiek STP duurt 30-50 seconden."},
{type:"mc",q:"Wat is PortFast in STP?",o:["Een feature die de STP-convergentie versnelt voor alle poorten","Een Cisco-feature die de STP-wachttijd (Listening/Learning) overslaat voor poorten verbonden met eindapparaten","Een type root bridge configuratie","Een feature om trunk-poorten te detecteren"],c:[1],h:"PortFast = direct in Forwarding voor access-poorten. Nooit op trunk-poorten — dat veroorzaakt lussen!"},
{type:"mc",q:"Wat is BPDU Guard?",o:["Beschermt BPDU-pakketten tegen afluisteren","Schakelt een PortFast-poort uit als er een BPDU binnenkomt (wat een switch aangeeft) — beschermt tegen onbedoelde lussen","Versnelt STP-convergentie","Een type VLAN-beveiliging"],c:[1],h:"Een BPDU op een PortFast-poort = iemand heeft een switch aangesloten. BPDU Guard schakelt de poort uit."},
{type:"mc",q:"Wat is PVST+ (Per-VLAN Spanning Tree Plus)?",o:["Eén STP-instantie voor alle VLANs","Een Cisco-variant waarbij per VLAN een aparte STP-instantie draait — meer controle over paden per VLAN","Een verouderde STP-versie","Een versie van STP voor laag 3 switches"],c:[1],h:"PVST+ = één spanning tree per VLAN. Je kunt per VLAN load-balancing doen over redundante links."},
{type:"mc",q:"Wat is een broadcast storm?",o:["Een periode van hoog broadcast-verkeer tijdens een piekuur","Een exponentieel toenemende hoeveelheid broadcasts door een netwerkluus — kan een netwerk volledig platleggen","Een type DDoS-aanval","Een fout in een routeringsprotocol"],c:[1],h:"Lus + broadcast = A stuurt naar B, B forwardt naar A, A forwardt naar B... eindeloos. STP voorkomt dit."},
{type:"mc",q:"Wat is DHCP?",o:["Domain Host Configuration Protocol","Dynamic Host Configuration Protocol — wijst automatisch IP-adressen en netwerkconfiguratie toe aan clients","Een type DNS-server","Een routeringsprotocol"],c:[1],h:"DHCP = automatische IP-configuratie. Geen manuele instelling nodig op clients."},
{type:"mc",q:"Welke informatie verstrekt een DHCP-server aan een client? (meerdere aanwezig)",o:["IP-adres","Subnetmasker","Default gateway","DNS-server","Naam van de netwerknbeheerder"],c:[0],h:"DHCP verstrekt: IP-adres, subnetmasker, default gateway, DNS-servers en soms meer (NTP, domain name)."},
{type:"multi",q:"Welke vier stappen omvat het DHCP-process (DORA)? (meerdere antwoorden)",o:["Discover","Offer","Request","Acknowledge","Confirm","Negotiate"],c:[0,1,2,3],h:"DORA = Discover, Offer, Request, Acknowledge. De vier stappen van DHCP-onderhandeling."},
{type:"mc",q:"Wat is een DHCP lease?",o:["Een contract met de DHCP-leverancier","De tijdsduur gedurende welke een client een IP-adres mag gebruiken","Een type IP-adres","Een DHCP-pool"],c:[1],h:"Na het verstrijken van de lease vraagt de client vernieuwing — of het adres wordt vrijgegeven."},
{type:"mc",q:"Wat is een DHCP-scope?",o:["Een type VLAN","De pool van IP-adressen die de DHCP-server kan uitdelen","De maximale duur van een lease","Een firewall-regel voor DHCP-verkeer"],c:[1],h:"Scope = pool. Je definieert het bereik (range) van adressen die de server mag toewijzen."},
{type:"mc",q:"Wat is een DHCP reservation?",o:["Een scope waarvoor DHCP uitgeschakeld is","Een vaste IP-adrestoewijzing aan een specifiek MAC-adres — het apparaat krijgt altijd hetzelfde IP","Een back-up van de DHCP-database","Een type VLAN-toewijzing via DHCP"],c:[1],h:"Reservation = statisch IP via DHCP op basis van MAC-adres. Beste van beide werelden."},
{type:"mc",q:"Wat is een DHCP relay agent?",o:["Een back-up DHCP-server","Een component op een router/switch die DHCP-broadcasts omzet naar unicast en doorstuurt naar een DHCP-server in een ander netwerksegment","Een type DHCP-client","Een DHCP-monitoring tool"],c:[1],h:"DHCP gebruikt broadcasts — broadcasts oversteken geen routers. Relay agent lost dit op."},
{type:"open",q:"Op welke UDP-poorten communiceert DHCP?",ans:["67 en 68","67, 68","68 en 67","udp 67 en 68"],h:"De server luistert op één poort, de client op een andere — beide zijn onder 100."},
{type:"mc",q:"Wat is DHCP snooping?",o:["Een aanvalstechniek op DHCP","Een beveiligingsfunctie op switches die valse DHCP-servers blokkeert door poorten te classificeren als trusted of untrusted","Een type DHCP-scope","Een monitoringfunctie voor DHCP-leases"],c:[1],h:"DHCP snooping vertrouwt enkel DHCP-antwoorden van de 'trusted' poort waar de echte server op zit."},
{type:"mc",q:"Wat is een DHCP conflict?",o:["Twee DHCP-servers die dezelfde scope hebben","Een IP-adres dat door de DHCP-server is uitgedeeld maar ook manueel gebruikt wordt — leidt tot IP-conflicten","Een fout in de DHCP-configuratie","Een DHCP-server die geen adressen meer heeft"],c:[1],h:"Conflict = zelfde IP voor twee apparaten. Gebruik reservations of sla manueel toegewezen IPs uit de scope."},
{type:"mc",q:"Wat is NAT?",o:["Network Access Technology","Network Address Translation — vertaalt private IP-adressen naar publieke IP-adressen voor internettoegang","Een type DNS-record","Een routeringsprotocol"],c:[1],h:"NAT = de vertaler. Private IPs zijn niet routeerbaar op het internet; NAT lost dit op."},
{type:"mc",q:"Wat is het verschil tussen PAT en NAT?",o:["Ze zijn identiek","PAT (Port Address Translation) = meerdere private IPs vertalen naar één publiek IP via poortnummers; NAT kan ook één-op-één vertaling doen","NAT gebruikt poorten; PAT niet","PAT is voor IPv6; NAT voor IPv4"],c:[1],h:"PAT = NAT overload. Eén publiek IP gedeeld door honderden interne apparaten dankzij poortnummers."},
{type:"mc",q:"Wat is statische NAT?",o:["Eén publiek IP gedeeld door meerdere interne IPs","Een vaste één-op-één mapping tussen een privaat en een publiek IP-adres","NAT met behulp van poorten","Tijdelijke NAT-vertalingen"],c:[1],h:"Statisch = permanent, vast. Nuttig voor servers die van buiten bereikbaar moeten zijn."},
{type:"mc",q:"Waarom is NAT een partiële beveiligingsoplossing?",o:["NAT versleutelt verkeer","NAT verbergt interne IP-adressen voor buitenstaanders, maar is geen vervanging voor een firewall","NAT blokkeert alle inkomende verbindingen","NAT detecteert aanvallen"],c:[1],h:"NAT = obscuring, geen security. Interne IPs zijn onzichtbaar maar NAT controleert geen verkeer inhoudelijk."},
{type:"mc",q:"Op welke OSI-laag werkt een router?",o:["Laag 1","Laag 2","Laag 3 (Network)","Laag 4"],c:[2],h:"Routers werken op IP-adressen — dat is de Network laag (laag 3)."},
{type:"mc",q:"Wat is een routeringstabel?",o:["Een tabel met MAC-adressen","Een tabel met bekende netwerken en de bijbehorende uitgangsinterface of next-hop router","Een ARP-tabel","Een VLAN-tabel"],c:[1],h:"De routeringstabel bepaalt: voor dit bestemmingsnetwerk, gebruik deze route."},
{type:"mc",q:"Wat is het verschil tussen statische en dynamische routering?",o:["Ze zijn identiek","Statisch = routes manueel geconfigureerd; dynamisch = routes automatisch uitgewisseld via routeringsprotocollen","Dynamisch is altijd trager","Statisch werkt alleen in grote netwerken"],c:[1],h:"Statisch = manueel, eenvoudig maar onflexibel. Dynamisch = automatisch, schaalbaar maar complexer."},
{type:"mc",q:"Wat is een default route?",o:["De snelste route naar een bestemming","Een route die wordt gebruikt als er geen specifiekere route bestaat — 'de uitgang als je het niet weet'","De route naar het lokale netwerk","Een back-up route"],c:[1],h:"0.0.0.0/0 = default route. Als niets anders matcht: ga hier naartoe."},
{type:"mc",q:"Wat is 'longest prefix match' in routering?",o:["De router kiest altijd de kortste route","De router kiest de route met het meest specifieke subnetmasker (langste prefix) dat overeenkomt met het bestemmingsadres","De router kiest de route met de laagste metric","De router kiest de eerste overeenkomende route"],c:[1],h:"Specifiekere route wint altijd. /24 wint van /16 als beide overeenkomen met het bestemmingsadres."},
{type:"mc",q:"Wat is OSPF?",o:["Een type VPN-protocol","Open Shortest Path First — een link-state routeringsprotocol dat de kortste paden berekent via Dijkstra's algoritme","Een DHCP-variant","Een type VLAN-protocol"],c:[1],h:"OSPF = open standaard, link-state, intern routeringsprotocol (IGP)."},
{type:"multi",q:"Welke zijn Interior Gateway Protocols (IGP)? (meerdere antwoorden)",o:["OSPF","RIP","EIGRP","BGP","IS-IS"],c:[0,1,2,4],h:"BGP is een Exterior Gateway Protocol (EGP) — gebruikt tussen autonome systemen op het internet."},
{type:"mc",q:"Wat is het verschil tussen een Layer 2 en Layer 3 switch?",o:["Een Layer 3 switch heeft meer poorten","Een Layer 2 switch werkt enkel op MAC-adressen; een Layer 3 switch heeft ook routeringsfunctionaliteit en werkt op IP","Een Layer 2 switch is sneller","Een Layer 3 switch is ook een firewall"],c:[1],h:"L3 switch = switch + router. Intern: ASIC-gebaseerd routing is veel sneller dan een traditionele router."},
{type:"mc",q:"Wat is een 'choke point' in een netwerktopologie?",o:["Een kwetsbaar punt","Een geforceerd doorvoerpunt waar al het verkeer langs moet, ideaal voor filtering en monitoring","Een backup-router","Een redundante verbinding"],c:[1],h:"Choke point = bewust één punt creëren. Alle verkeer langs één punt = makkelijker te monitoren."},
{type:"mc",q:"Wat is port security op een switch?",o:["Het beveiligen van de switch-behuizing","Een feature die het aantal en de identiteit van MAC-adressen per poort beperkt — blokkeert onbevoegde apparaten","Een type VLAN","Een firewall op de switch"],c:[1],h:"Port security = slechts X MAC-adressen mogen op deze poort verschijnen."},
{type:"mc",q:"Wat is 802.1X?",o:["De VLAN-tagging standaard","Een IEEE-standaard voor port-based Network Access Control — vereist authenticatie voor netwerktoegang","Een STP-variant","Een type Wi-Fi-beveiliging"],c:[1],h:"802.1X = authenticeer jezelf voor je het netwerk betreedt. Gebruikt EAP en een RADIUS-server."},
{type:"mc",q:"Wat is een ACL (Access Control List) op een router?",o:["Een lijst van gebruikers","Een reeks regels die bepalen welk verkeer door een router-interface wordt toegelaten of geblokkeerd op basis van IP-adressen en poortnummers","Een routeringstabel","Een VLAN-toewijzing"],c:[1],h:"ACL = filterregels op de router. Standard ACL filtert op source IP; Extended ACL op meer criteria."},
{type:"mc",q:"Wat is het verschil tussen een Standard en Extended ACL?",o:["Ze zijn identiek","Standard ACL filtert alleen op bron-IP; Extended ACL filtert op bron-IP, doel-IP, protocol en poort","Extended ACL is verouderd","Standard ACL is complexer"],c:[1],h:"Extended = meer parameters. Meer controle maar ook meer complex."},
{type:"mc",q:"Hoe beveilig je de console-poort van een switch?",o:["Via een VLAN","Via een wachtwoord op de console-lijn (line console 0 → password → login)","Via SSH","Via een ACL"],c:[1],h:"Console = fysieke toegang. Beveilig met een wachtwoord op de console-lijn."},
{type:"open",q:"Welk protocol gebruik je voor beveiligde remote toegang tot een switch of router in plaats van Telnet?",ans:["ssh","secure shell"],h:"Het vervangt Telnet omdat het al het verkeer versleutelt."},
{type:"mc",q:"Waarom is Telnet onveilig voor switch/router-beheer?",o:["Telnet is te traag","Telnet stuurt alle data inclusief wachtwoorden in plaintext — afluisterbaar via MitM of sniffing","Telnet werkt niet op moderne hardware","Telnet heeft geen authenticatie"],c:[1],h:"Plaintext = onversleuteld. Alles wat je typt is leesbaar voor iemand op het netwerk."},
{type:"mc",q:"Wat is VLAN hopping?",o:["Het wisselen van VLAN voor een apparaat","Een aanval waarbij een aanvaller toegang krijgt tot een ander VLAN zonder autorisatie, bijv. via double tagging","Het samenvoegen van twee VLANs","Een type inter-VLAN routing"],c:[1],h:"VLAN hopping = beveiligingsprobleem. Schaf het native VLAN af of gebruik VLAN 999 als unused native VLAN."},
{type:"multi",q:"Welke maatregelen neem je om een switch te beveiligen? (meerdere antwoorden)",o:["Poorten niet in gebruik uitschakelen","Default wachtwoorden wijzigen","VLAN 1 als management VLAN vermijden","Telnet vervangen door SSH","Alle wachtwoorden in plaintext opslaan"],c:[0,1,2,3],h:"Eén optie is een ernstige beveiligingsfout die je juist moet vermijden."},
{type:"mc",q:"Een apparaat stuurt een frame naar MAC ff:ff:ff:ff:ff:ff. Wat doet de switch?",o:["Het frame wordt weggegooid","Het frame wordt geflooded naar alle poorten behalve de inkomende","Het frame wordt naar de router gestuurd","Het frame wordt teruggestuurd"],c:[1],h:"ff:ff:ff:ff:ff:ff = broadcast MAC-adres. Broadcasts gaan naar iedereen."},
{type:"mc",q:"Twee apparaten in hetzelfde VLAN maar op verschillende switches communiceren. Wat is nodig?",o:["Een router","Een trunk-link tussen de twee switches die het VLAN draagt","Een aparte switch","Een DHCP-server"],c:[1],h:"VLAN-verkeer over meerdere switches = trunk-link nodig met 802.1Q tagging."},
{type:"mc",q:"Een apparaat in VLAN 10 wil communiceren met een apparaat in VLAN 20. Wat is nodig?",o:["Niets — VLANs kunnen altijd direct communiceren","Een router of Layer 3 switch voor inter-VLAN routing","Een trunk-poort","Een extra switch"],c:[1],h:"VLANs zijn gescheiden. Voor communicatie tussen VLANs is laag 3 (routering) nodig."},
{type:"mc",q:"Een switch-poort blijft in Blocking-state ondanks dat er een apparaat op aangesloten is. Wat is de meest waarschijnlijke oorzaak?",o:["De switch heeft geen stroom","STP heeft deze poort geblokkeerd om een lus te voorkomen — activeer PortFast als het een access-poort is","De poort is kapot","VLAN is verkeerd geconfigureerd"],c:[1],h:"Blocking = STP doet zijn werk. PortFast slaat de wachttijd over voor eindapparatuur-poorten."},
{type:"mc",q:"Je hebt 3 switches in een ring verbonden. Wat is het gevaar en hoe los STP dit op?",o:["Geen gevaar","Lus-gevaar: broadcasts circuleren oneindig. STP detecteert de lus en blokkeert één redundante poort","Snelheidsproblemen","IP-conflicten"],c:[1],h:"Ring = redundantie + lus. STP blokkeert één pad zodat er geen lus is maar redundantie bewaard blijft."},
{type:"mc",q:"Een DHCP-server staat in VLAN 100. Clients staan in VLAN 10 en 20. Hoe bereiken de clients de DHCP-server?",o:["Rechtstreeks via VLAN-doorgang","Via een DHCP relay agent geconfigureerd op de router of L3-switch","Via een apart netwerk","Dit is niet mogelijk"],c:[1],h:"DHCP gebruikt broadcasts die VLAN-grenzen niet oversteken. Relay agent stuurt het door als unicast."},
{type:"mc",q:"Je configureert een router-on-a-stick voor VLANs 10 en 20. Hoeveel fysieke interfaces heb je minimaal nodig op de router?",o:["Twee (één per VLAN)","Eén (met twee sub-interfaces)","Drie (één per VLAN + één voor management)","Vier"],c:[1],h:"Router-on-a-stick = één fysieke interface met meerdere sub-interfaces (bijv. G0/0.10 en G0/0.20)."},
{type:"mc",q:"Een aanvaller sluit een onbeheerde switch aan op een bedrijfsnetwerk. Welk gevaar brengt dit mee voor STP?",o:["Geen gevaar","De onbeheerde switch kan hogere STP-prioriteit claimen en root bridge worden, waarna verkeer via de aanvaller stroomt","Het netwerk vertraagt","IP-conflicten ontstaan"],c:[1],h:"STP mangling: de aanvaller manipuleert STP om root bridge te worden. BPDU Guard beschermt hiertegen."},
{type:"mc",q:"Wat is de function van een 'uplink' poort op een switch?",o:["Een poort voor draadloze apparaten","Een hogere-capaciteits poort voor verbindingen tussen switches of naar de kern van het netwerk","Een poort enkel voor servers","Een PoE-poort"],c:[1],h:"Uplink = naar boven in de hiërarchie. Typisch hogere snelheid (1G of 10G) voor aggregatie."},
{type:"mc",q:"Welk commando geeft je op een Cisco switch een overzicht van alle VLANs?",o:["show ip route","show vlan brief","show mac address-table","show interfaces trunk"],c:[1],h:"'show vlan brief' toont alle geconfigureerde VLANs met hun naam en member-poorten."},
{type:"open",q:"Wat is de default STP bridge prioriteit op Cisco switches?",ans:["32768"],h:"Het is een macht van 2, namelijk 2 tot de 15de macht."},
{type:"mc",q:"Wat doet het commando 'switchport mode trunk' op een Cisco switch?",o:["Schakelt de poort in access mode","Configureert de poort als trunk — draagt verkeer van meerdere VLANs met 802.1Q tagging","Schakelt STP uit op de poort","Configureert de poort als management interface"],c:[1],h:"Trunk mode = meerdere VLANs via één fysieke link met VLAN-tags."},
{type:"mc",q:"Welk commando gebruik je om een VLAN aan te maken op een Cisco switch?",o:["create vlan 10","vlan 10 (in global config mode)","add vlan 10","interface vlan 10"],c:[1],h:"In globale configuratiemodus: 'vlan 10' gevolgd door optioneel 'name [naam]'."},
{type:"mc",q:"Wat is een floating static route?",o:["Een route die automatisch wordt berekend","Een back-up statische route met hogere administrative distance die enkel actief wordt als de primaire route wegvalt","Een type dynamische route","Een route zonder next-hop"],c:[1],h:"Floating static = hogere AD dan de primaire route. Blijft 'zweven' tot de primaire verdwijnt."},
{type:"mc",q:"Wat is administrative distance (AD)?",o:["De afstand in meters van de router","Een waarde die de betrouwbaarheid van een routeringsbron aangeeft — lagere AD = hogere voorkeur","De kost van een route","De bandbreedte van een link"],c:[1],h:"AD: Connected=0, Static=1, OSPF=110, RIP=120. Lagere waarde = meer vertrouwd."},
{type:"mc",q:"Wat is een 'metric' in routeringsprotocollen?",o:["De AD van een route","De waarde die bepaalt welke route het beste is als er meerdere routes naar hetzelfde netwerk zijn","De routeringstabelgrootte","De verwerkingskracht van de router"],c:[1],h:"Metric = hoe goed is deze route? OSPF gebruikt cost (bandbreedte), RIP gebruikt hop count."},
{type:"mc",q:"Wat is de metric die OSPF gebruikt?",o:["Hop count","Cost — gebaseerd op bandbreedte van de link (hogere bandbreedte = lagere cost)","Delay","MTU"],c:[1],h:"OSPF cost = 100Mbps / link_bandbreedte. Gigabit link (1Gbps) = cost 1. FastEthernet (100Mbps) = cost 1."},
{type:"mc",q:"Wat is de metric die RIP gebruikt?",o:["Cost","Delay","Hop count — maximaal 15 hops, hop 16 = onbereikbaar","Bandbreedte"],c:[2],h:"RIP = telroutes. Meer dan 15 routers tussen bron en doel = onbereikbaar. Limiteert netwerkomvang."},
{type:"mc",q:"Wat is een 'routing loop' en hoe voorkomen routeringsprotocollen dit?",o:["Een type STP-probleem","Pakketten die oneindig rondcirkelen — voorkomen via split horizon, route poisoning en hold-down timers","Een type broadcast storm","Een type VLAN-probleem"],c:[1],h:"Routing loop = circular: A→B→C→A→... Pakketten reizen nooit aan. TTL beperkt de schade."},
{type:"mc",q:"Wat is 'split horizon'?",o:["Een type STP-beveiliging","Een RIP-regel: stuur geen route-informatie terug via de interface waarlangs je die informatie ontvangen hebt","Een type VLAN-techniek","Een type NAT-configuratie"],c:[1],h:"Split horizon = stuur niet terug waar je het vandaan hebt. Voorkomt eenvoudige routing loops."},
{type:"mc",q:"Wat is EIGRP?",o:["Een open standaard routeringsprotocol","Een Cisco-proprietary advanced distance-vector routeringsprotocol dat bandbreedte, delay, load en reliability als metric gebruikt","Een type spanning tree protocol","Een type VLAN-protocol"],c:[1],h:"EIGRP = Cisco's eigen protocol. Combineert distance-vector en link-state eigenschappen. Zeer snel convergerend."},
{type:"mc",q:"Wat is BGP en waar wordt het gebruikt?",o:["Een intern routeringsprotocol","Border Gateway Protocol — het routeringsprotocol van het internet dat verkeer route tussen autonome systemen","Een type VLAN-protocol","Een type STP-variant"],c:[1],h:"BGP = het 'ruggengraat'-protocol van het internet. Elke ISP spreekt BGP met andere ISPs."},
{type:"mc",q:"Wat is een autonome systeem (AS) in routering?",o:["Een zelfstandige router","Een netwerk of groep netwerken onder één enkel administratief beheer met een gemeenschappelijk routeringsbeleid","Een type VLAN","Een type subnet"],c:[1],h:"AS = één administratieve eenheid. Bedrijven en ISPs hebben elk hun eigen AS-nummer."},
{type:"mc",q:"Wat is VLSM (Variable Length Subnet Masking)?",o:["Een type VLAN-techniek","Het gebruik van verschillende subnetmaskers voor subnetten van hetzelfde netwerk om IP-adressen efficiënt te verdelen","Een type NAT","Een type routeringsprotocol"],c:[1],h:"VLSM = flexibele subnetting. /30 voor point-to-point links, /24 voor kantoren — optimaal adresgebruik."},
{type:"mc",q:"Wat is subnetting?",o:["Het samenvoegen van netwerken","Het verdelen van een netwerk in kleinere subnetwerken door bits van het host-gedeelte te 'lenen' voor het netwerk-gedeelte","Een type VLAN","Een type NAT"],c:[1],h:"Subnetten = opdelen. Eén groot /16 netwerk opdelen in 256 /24 subnetten voor verschillende afdelingen."},
{type:"mc",q:"Wat is het doel van CIDR (Classless Inter-Domain Routing)?",o:["Een type routeringsprotocol","Flexibele IP-adressering zonder vaste klassen (A/B/C) — maakt efficiëntere adresverdeling en route aggregatie mogelijk","Een type NAT","Een type VLAN"],c:[1],h:"CIDR = voorbij de klassen. /22 in plaats van altijd /8, /16 of /24. Meer flexibiliteit, minder verspilling."},
{type:"mc",q:"Wat is route summarization (route aggregation)?",o:["Het uitbreiden van een route","Het samenvatten van meerdere specifieke routes in één minder specifieke route — verkleint routeringstabellen","Een type NAT","Een type VLAN"],c:[1],h:"10.0.0.0/24, 10.0.1.0/24, 10.0.2.0/24, 10.0.3.0/24 → samengevat als 10.0.0.0/22."},
{type:"mc",q:"Wat is een point-to-point link en welk subnetmasker gebruik je typisch?",o:["Een verbinding voor veel hosts, /24","Een directe verbinding tussen twee routers — /30 of /31 omdat je slechts twee adressen nodig hebt","Een type VLAN","Een type trunk"],c:[1],h:"/30 = 4 adressen: netwerk, 2 hosts, broadcast. /31 = 2 adressen voor point-to-point (RFC 3021)."},
{type:"mc",q:"Wat is een loopback interface op een router?",o:["Een interface voor lokaal verkeer","Een virtuele interface zonder fysieke kabel die altijd actief is — nuttig als router-ID, management interface en voor testen","Een type VLAN-interface","Een type trunk-interface"],c:[1],h:"Loopback = altijd Up/Up. Ideaal als stabiele router-ID voor OSPF/BGP en als management-adres."},
{type:"mc",q:"Wat is OSPF Area 0?",o:["Een optioneel OSPF-gebied","De backbone area van OSPF — alle andere areas moeten direct of via virtual links verbonden zijn met area 0","Een type OSPF-configuratie","Een type AS"],c:[1],h:"Area 0 = het centrum. Alle inter-area verkeer loopt via area 0. Vergelijkbaar met een hub-and-spoke."},
{type:"mc",q:"Wat is een OSPF designated router (DR)?",o:["De router met de meeste routes","Op een multi-access netwerk (bijv. Ethernet) de router die als centraal punt fungeert voor LSA-uitwisseling — vermindert OSPF-overhead","De root bridge van OSPF","De router met het laagste router-ID"],c:[1],h:"DR/BDR = efficiëntie op shared media. Niet elke router praat met elke andere — enkel met DR/BDR."},
{type:"mc",q:"Wat is een 'hello packet' in OSPF?",o:["Een type ICMP-bericht","Een OSPF-pakket dat periodiek verstuurd wordt om neighborships te onderhouden en dead intervals te detecteren","Een type ARP-bericht","Een type STP-bericht"],c:[1],h:"Hello = ik leef nog. OSPF neighbors verwachten regelmatig hello-pakketten. Geen hello = link dood."},
{type:"mc",q:"Wat is een OSPF neighbour relationship?",o:["Een type VLAN-relatie","Een bijdirectionale OSPF-communicatierelatie tussen twee routers die OSPF hello-pakketten uitwisselen via een gedeelde interface","Een type BGP-sessie","Een type STP-relatie"],c:[1],h:"Neighbor = OSPF-partner. Neighbors wisselen LSAs (topologie-informatie) uit."},
{type:"mc",q:"Wat is een LSA (Link State Advertisement) in OSPF?",o:["Een type ARP-aankondiging","Een pakket dat topologie-informatie bevat die OSPF routers uitwisselen om hun netwerktopologie te synchroniseren","Een type BGP-update","Een type SNMP-trap"],c:[1],h:"LSA = bouwsteen van de OSPF topologie-database. Elke router kent alle LSAs in zijn area."},
{type:"mc",q:"Wat is een routing table vs. een forwarding table?",o:["Ze zijn identiek","Routing table = logische weergave van bekende netwerken; forwarding table = geoptimaliseerde hardware-tabel voor snelle pakketdoorstuur","Forwarding table is groter","Routing table is in hardware"],c:[1],h:"Routing table = software (show ip route). Forwarding table = hardware (CEF/FIB) voor lijnsnelheid forwarding."},
{type:"mc",q:"Wat is Cisco Express Forwarding (CEF)?",o:["Een type routeringsprotocol","Een Cisco hardware-acceleratietechnologie die een FIB en adjacency table gebruikt voor lijnsnelheid pakketdoorstuur","Een type STP","Een type VLAN"],c:[1],h:"CEF = fast forwarding. De router hoeft niet elke route-opzoeking software-matig te doen."},
{type:"mc",q:"Wat is een 'null route' of 'black hole route'?",o:["Een route zonder bestemming","Een route die pakketten weggooit — nuttig als veiligheidsnet om pakketten naar niet-bestaande bestemmingen te droppen","Een type default route","Een type floating static route"],c:[1],h:"Null0 interface = black hole. ip route 10.0.0.0 255.0.0.0 Null0 = gooi alle pakketten naar dit netwerk weg."},
{type:"mc",q:"Wat is IP SLA in Cisco-configuratie?",o:["Een type beveiligingspolicy","Een Cisco-feature die continu connectiviteit en performance meet (ping, HTTP, TCP) en acties kan triggeren op basis van resultaten","Een type QoS-functie","Een type VLAN-functie"],c:[1],h:"IP SLA = actieve monitoring vanuit de router. Combineer met floating static routes voor automatische failover."},
{type:"mc",q:"Wat is QoS (Quality of Service)?",o:["Een type beveiliging","Mechanismen die bepaald verkeer prioriteit geven over het netwerk — essentieel voor VoIP en video","Een type routeringsprotocol","Een type VLAN"],c:[1],h:"QoS = verkeersprioriteit. VoIP-pakketten voor data-backup-pakketten. Latency en jitter minimaliseren."},
{type:"mc",q:"Wat is DSCP (Differentiated Services Code Point)?",o:["Een type IP-adres","Een 6-bit markering in de IP-header die de QoS-klasse aangeeft voor prioriteitsbehandeling","Een type VLAN-tag","Een type routeringsprotocol"],c:[1],h:"DSCP = QoS-markering in het IP-pakket. EF (46) = hoogste prioriteit voor VoIP. CS0 = standaard."},
{type:"mc",q:"Wat is MPLS?",o:["Multi-Protocol Link State","Multiprotocol Label Switching — verkeer wordt op basis van labels (niet IP-adressen) doorgestuurd voor hoge snelheid en traffic engineering","Een type VPN","Een type routeringsprotocol"],c:[1],h:"MPLS = label-based forwarding. Sneller dan IP-lookup, nuttig voor grote service provider netwerken."},
{type:"mc",q:"Wat is een GRE tunnel?",o:["Een type encryptie","Generic Routing Encapsulation — een tunnelprotocol dat pakketten inpakt zodat ze via netwerken kunnen reizen die het originele protocol niet ondersteunen","Een type VPN","Een type VLAN"],c:[1],h:"GRE = generieke tunnel. IPv6 over IPv4 netwerk? GRE tunnel. Multicast over WAN? GRE tunnel."},
{type:"mc",q:"Wat is het verschil tussen een routed port en een SVI op een L3 switch?",o:["Ze zijn identiek","Routed port = geen VLAN, fungeert als router-interface; SVI (VLAN interface) = virtuele interface voor een VLAN, voor inter-VLAN routing","SVI heeft meer bandbreedte","Routed port ondersteunt meer protocols"],c:[1],h:"SVI (interface VlanX) = de gateway voor hosts in VLAN X. Routed port = verbinding naar andere routers."},
{type:"mc",q:"Wat is CDP (Cisco Discovery Protocol)?",o:["Een type routeringsprotocol","Een Cisco-proprietary laag 2 protocol dat informatie uitwisselt tussen direct verbonden Cisco-apparaten (interfaces, modellen, OS-versies)","Een type VLAN-protocol","Een type STP-variant"],c:[1],h:"CDP = Cisco-burenprotocol. Zie welke apparaten direct verbonden zijn zonder in te loggen. Schakel uit naar buiten."},
{type:"mc",q:"Wat is LLDP (Link Layer Discovery Protocol)?",o:["Een type STP","De open standaard equivalent van CDP — laat apparaten van verschillende fabrikanten elkaars informatie uitwisselen","Een type OSPF","Een type VLAN-protocol"],c:[1],h:"LLDP = open CDP-alternatief. IEEE 802.1AB. Werkt ook tussen Cisco en niet-Cisco apparaten."},
{type:"mc",q:"Wat is port mirroring (SPAN)?",o:["Het dupliceren van een poort","Een switch-feature die al het verkeer van één of meerdere poorten kopieert naar een analyse-poort voor monitoring/troubleshooting","Een type VLAN","Een type trunk"],c:[1],h:"SPAN = maak een kopie van verkeer voor een sniffer. Zie wat er langs gaat zonder het netwerk te onderbreken."},
{type:"mc",q:"Wat is een EtherChannel (Link Aggregation)?",o:["Een type VLAN","Het bundelen van meerdere fysieke links tot één logische link voor hogere bandbreedte en redundantie","Een type STP-feature","Een type trunk"],c:[1],h:"EtherChannel = 4 × 1Gbps links = 4Gbps logische link. Hoge beschikbaarheid + hogere throughput."},
{type:"mc",q:"Wat is LACP (Link Aggregation Control Protocol)?",o:["Een type routeringsprotocol","Het open standaard protocol (IEEE 802.3ad) voor automatische negotiatie van EtherChannel-links","Een type STP","Een type VLAN-protocol"],c:[1],h:"LACP = open standaard voor link aggregation. PAgP is Cisco-proprietary equivalent."},
{type:"mc",q:"Wat is storm control op een switch?",o:["Een type beveiliging tegen DDoS","Een feature die het volume van broadcast, multicast en unicast-verkeer per poort beperkt om storm-situaties te voorkomen","Een type STP-feature","Een type VLAN-functie"],c:[1],h:"Storm control = bescherm het netwerk tegen broadcast storms door een drempelwaarde in te stellen per poort."},
{type:"mc",q:"Wat is dynamic ARP inspection (DAI)?",o:["Een type ARP-monitoring","Een beveiligingsfunctie die ARP-pakketten valideert via de DHCP snooping binding table om ARP poisoning te voorkomen","Een type VLAN-beveiliging","Een type STP-beveiliging"],c:[1],h:"DAI = valideer ARP-pakketten. Als MAC+IP niet overeenkomt met de DHCP lease database → drop het pakket."},
{type:"mc",q:"Wat is IP source guard?",o:["Een type firewall","Een beveiligingsfunctie die IP-pakketten valideert op basis van de DHCP snooping binding table om IP-adres spoofing te voorkomen","Een type NAT","Een type VLAN"],c:[1],h:"IP source guard = valideer source IP. Pakketten met onbekend IP op een poort worden gedropped."},
{type:"mc",q:"Wat is het doel van het 'spanning-tree portfast' commando?",o:["Versnelt STP-convergentie voor alle poorten","Laat de poort onmiddellijk de Forwarding state ingaan zonder de normale STP-states te doorlopen — alleen voor access-poorten met eindapparaten","Schakelt STP uit","Verhoogt de prioriteit van de poort"],c:[1],h:"PortFast = skip Listening/Learning. Direkt Forwarding. Alleen op poorten naar eindapparaten, nooit naar switches!"},
{type:"mc",q:"Wat is 'show mac address-table' op een Cisco switch?",o:["Toont de routeringstabel","Toont de CAM-table: welke MAC-adressen zijn bekend op welke poorten","Toont de ARP-tabel","Toont de VLAN-configuratie"],c:[1],h:"show mac address-table = kijk in de 'hersenen' van de switch. Nuttig voor troubleshooting."},
{type:"mc",q:"Wat is een 'wildcard mask' in OSPF en ACLs?",o:["Het inverse van het subnetmasker","Een masker dat aangeeft welke bits van een IP-adres gecontroleerd worden — 0=controleer, 1=negeer (inverse van subnetmasker)","Het subnetmasker zelf","Een type routeringsfilter"],c:[1],h:"Wildcard = inverse subnetmasker. /24 subnetmasker 255.255.255.0 → wildcard 0.0.0.255."},
{type:"mc",q:"Wat is PVLAN (Private VLAN)?",o:["Een persoonlijk VLAN","Een VLAN-variant die isolatie biedt tussen poorten in hetzelfde VLAN — nuttig voor hosting waar klanten elkaars servers niet mogen bereiken","Een type trunk","Een type management VLAN"],c:[1],h:"PVLAN = isolatie binnen een VLAN. Promiscuous port (router) praat met iedereen; isolated ports niet met elkaar."},
{type:"mc",q:"Wat is Multi-Chassis EtherChannel (MLAG/vPC)?",o:["EtherChannel over meerdere kabels","EtherChannel waarvan de links verdeed zijn over twee fysiek aparte switches voor maximale redundantie","Een type STP","Een type VLAN"],c:[1],h:"MLAG/vPC = EtherChannel over twee switches. Geen single point of failure. Switch A falt? Switch B neemt over."},
{type:"mc",q:"Wat is het commando 'show ip route' op een Cisco router?",o:["Toont de interfaces","Toont de routeringstabel met alle bekende netwerken en hun next-hop/interface","Toont de ARP-tabel","Toont de OSPF-neighbors"],c:[1],h:"show ip route = de routeringstabel. C=Connected, S=Static, O=OSPF, R=RIP. Essentieel voor troubleshooting."},
{type:"mc",q:"Wat is 'traceroute' en waarvoor gebruik je het?",o:["Een ping-variant","Een tool die het pad toont dat pakketten volgen van bron naar doel — toont elke hop/router onderweg","Een type monitoring","Een type netwerkscan"],c:[1],h:"Traceroute = volg het pad. Nuttig om te zien waar in het netwerk connectivity wegvalt."},
{type:"mc",q:"Wat is het TTL-veld in een IP-pakket?",o:["Transporttijd in seconden","Time to Live — een teller die bij elke router met 1 verlaagd wordt; als TTL=0 wordt het pakket weggegooid","De prioriteit van het pakket","De grootte van het pakket"],c:[1],h:"TTL = max router hops. Voorkomt dat pakketten eeuwig rondcirkelen in een routing loop."},
{type:"mc",q:"Wat is een ARP table op een router?",o:["Een routeringstabel","Een tabel die IP-adressen koppelt aan MAC-adressen van direct verbonden apparaten — nodig voor frame-encapsulatie","Een type VLAN-tabel","Een type CAM-table"],c:[1],h:"ARP table = IP→MAC mapping. De router weet welk MAC-adres bij elk direct verbonden IP-adres hoort."},
{type:"mc",q:"Wat is het verschil tussen unicast, multicast en broadcast?",o:["Ze zijn identiek","Unicast = één ontvanger; multicast = groep ontvangers die zich ingeschreven hebben; broadcast = alle apparaten in het broadcast-domein","Broadcast = één ontvanger; unicast = iedereen","Multicast = alle ontvangers"],c:[1],h:"Unicast: één-op-één. Multicast: één-op-groep (efficiënter dan broadcast). Broadcast: één-op-allen."},
{type:"mc",q:"Wat is IGMP (Internet Group Management Protocol)?",o:["Een type routeringsprotocol","Een protocol waarmee hosts zichzelf inschrijven bij en uitschrijven uit multicast-groepen","Een type STP","Een type VLAN-protocol"],c:[1],h:"IGMP = multicast group management. Routers gebruiken IGMP om te weten welke hosts welke multicast-streams willen."},
{type:"mc",q:"Wat is een 'access list' op een router en wat is de standaard actie?",o:["Een lijst van toegestane gebruikers","Een reeks permit/deny regels voor IP-verkeer — de impliciete standaard actie is DENY (alle niet-gematched verkeer wordt geweigerd)","Een type routeringsfilter","Een type VLAN-toewijzing"],c:[1],h:"ACL heeft altijd een impliciete 'deny all' aan het einde. Vergeet je een permit → alles geblokkeerd."},
{type:"mc",q:"Wat is het verschil tussen inbound en outbound ACL toepassing op een interface?",o:["Er is geen verschil","Inbound: filtert verkeer dat de interface INKOMT; Outbound: filtert verkeer dat de interface VERLAAT","Outbound is efficiënter","Inbound werkt niet op routers"],c:[1],h:"Inbound ACL = verkeer dat de router binnenkomt. Outbound = verkeer dat de router verlaat. Locatie bepaalt efficiency."},
{type:"mc",q:"Wat is een 'standard numbered ACL' op Cisco?",o:["ACL nummer 100-199","ACL nummer 1-99 die filtert op ALLEEN source IP-adres","Een type extended ACL","Een type named ACL"],c:[1],h:"Standard ACL (1-99) = enkel source IP. Extended ACL (100-199) = source+dest IP, protocol, poort."},
{type:"mc",q:"Wat is een 'named ACL'?",o:["Een ACL met een naam","Een ACL die aangeduid wordt met een naam in plaats van een nummer — makkelijker te beheren en bevat ook sequence numbers voor rij-aanpassing","Een type standaard ACL","Een type extended ACL"],c:[1],h:"Named ACL = onderhoudsvriendelijk. Je kunt regels toevoegen/verwijderen op specifieke posities via sequence numbers."},
{type:"mc",q:"Wat is het RFC 1918-adresruimte?",o:["Publieke IP-adressen","Privé IP-adressen die niet routeerbaar zijn op het internet: 10.x.x.x, 172.16-31.x.x, 192.168.x.x","IPv6-adressen","Multicast-adressen"],c:[1],h:"RFC 1918 = privé-adressen. Achter NAT zijn miljoenen apparaten met 192.168.x.x adressen."},
{type:"mc",q:"Wat is IPv6 en welk probleem lost het op?",o:["Een nieuwe versie van OSPF","De opvolger van IPv4 met 128-bit adressen die het adresuitputtingsprobleem van IPv4 (32-bit) oplost","Een type routeringsprotocol","Een type VPN"],c:[1],h:"IPv6 = 128-bit = 340 undeciljoen adressen. IPv4 had 4.3 miljard adressen — uitgeput in 2011."},
{type:"mc",q:"Wat is een IPv6 link-local adres?",o:["Een publiek IPv6-adres","Een automatisch geconfigureerd IPv6-adres geldig enkel op het lokale netwerksegment (prefix fe80::/10) — nodig voor NDP","Een type multicast-adres","Een type anycast-adres"],c:[1],h:"Link-local = FE80::/10. Automatisch geconfigureerd op elke IPv6-interface. Niet routeerbaar."},
{type:"mc",q:"Wat is NDP (Neighbor Discovery Protocol) in IPv6?",o:["Een type routeringsprotocol","Het IPv6-equivalent van ARP — ontdekt buren, resolveert MAC-adressen en detecteert duplicate adressen","Een type DNS-protocol","Een type DHCP-protocol"],c:[1],h:"NDP = ARP voor IPv6. Gebruikt multicast i.p.v. broadcast. Ook voor router discovery en SLAAC."},
{type:"mc",q:"Wat is SLAAC (Stateless Address Autoconfiguration) in IPv6?",o:["Een type DHCP","Een mechanisme waarbij IPv6-apparaten zichzelf automatisch configureren op basis van router advertisements zonder DHCPv6-server","Een type NDP-functie","Een type routeringsprotocol"],c:[1],h:"SLAAC = zelfconfiguratie. Router advertiseert prefix → apparaat combineert met zijn EUI-64 MAC → volledig adres."},
{type:"mc",q:"Wat is het verschil tussen router advertisement en router solicitation in NDP?",o:["Ze zijn identiek","Router advertisement (RA): router stuurt prefix-info; Router solicitation (RS): host vraagt om een RA","RS is van router; RA van host","RA is ouder dan RS"],c:[1],h:"Host stuurt RS → router reageert met RA → host configureert zijn adres via SLAAC."},
{type:"mc",q:"Wat is het doel van 'show interfaces' op een Cisco switch/router?",o:["Toont de routeringstabel","Toont gedetailleerde informatie over alle interfaces: status, errors, bandbreedte, input/output statistieken","Toont de VLAN-tabel","Toont de ARP-tabel"],c:[1],h:"show interfaces = alles over een interface. Input errors, CRC errors, collisions — essentieel voor troubleshooting."},
{type:"mc",q:"Wat is een 'duplex mismatch' en wat veroorzaakt het?",o:["Een type IP-conflict","Een configuratieprobleem waarbij één kant full-duplex en de andere kant half-duplex gebruikt — veroorzaakt collisions en slechte prestaties","Een type VLAN-conflict","Een type STP-probleem"],c:[1],h:"Duplex mismatch = de meest voorkomende performance-oorzaak op schakellinks. Stel duplex altijd expliciet in."},
{type:"mc",q:"Wat is een 'speed mismatch' op een switch-poort?",o:["Twee switches met verschillende modellen","Wanneer beide kanten van een link verschillende snelheden proberen te gebruiken — de verbinding komt niet op of werkt slecht","Een type duplex-probleem","Een type VLAN-conflict"],c:[1],h:"Speed mismatch = geen verbinding of terugval naar lagere snelheid. Zet speed en duplex altijd handmatig."},
{type:"mc",q:"Wat is het commando om een VLAN naam te geven op een Cisco switch?",o:["vlan 10 name Verkoop","In VLAN configuratiemodus: name Verkoop — na het commando 'vlan 10' in global config","interface vlan 10 name Verkoop","switchport name Verkoop"],c:[1],h:"vlan 10 → name Verkoop. De naam maakt VLANs herkenbaar in show vlan brief output."},
{type:"mc",q:"Wat is een 'management VLAN' en waarom gebruik je niet VLAN 1?",o:["Het VLAN voor eindgebruikers","Het VLAN voor beheerverkeer naar switches — gebruik nooit VLAN 1 omdat het het default VLAN is met minder beveiliging","Het VLAN voor VoIP","Het VLAN voor servers"],c:[1],h:"VLAN 1 = default, onbeheerd, verkeer loopt er standaard op. Gebruik een apart management VLAN voor beveiliging."},
{type:"mc",q:"Wat is 'VLAN pruning' in VTP?",o:["Het verwijderen van VLANs","Het automatisch beperken van VLAN-verkeer op trunk-links tot enkel de VLANs die actieve hosts hebben op de ontvangende switch","Een type VLAN-beveiliging","Een type trunk-configuratie"],c:[1],h:"Pruning = stuur geen onnodig VLAN-verkeer over trunks. Als een switch geen hosts heeft in VLAN X, stuur VLAN X niet."},
{type:"mc",q:"Wat is het commando om een trunk-poort te configureren op een Cisco switch?",o:["switchport mode trunk","interface trunk","vlan trunk enable","set trunk on"],c:[0],h:"switchport mode trunk → alle VLANs zijn toegestaan op de trunk (tenzij beperkt via allowed VLANs)."},
{type:"mc",q:"Wat is 'allowed VLANs' op een trunk-poort?",o:["VLANs die verboden zijn","Een configuratie die bepaalt welke VLANs er over een specifieke trunk-link mogen worden gestuurd","Een type VLAN-tagging","Een type VTP-configuratie"],c:[1],h:"switchport trunk allowed vlan 10,20,30 = stuur enkel deze VLANs over deze trunk. Beter dan alles toestaan."},
{type:"mc",q:"Wat is een 'sub-interface' op een Cisco router voor inter-VLAN routing?",o:["Een back-up interface","Een virtuele interface op een fysieke interface (bijv. G0/0.10) geconfigureerd met encapsulation dot1Q voor één specifiek VLAN","Een type loopback","Een type VLAN-interface"],c:[1],h:"G0/0.10 met 'encapsulation dot1Q 10' + IP-adres = de gateway voor VLAN 10. Router-on-a-stick."},
{type:"mc",q:"Wat is het doel van 'no ip domain-lookup' op een Cisco router?",o:["Schakelt DNS uit","Voorkomt dat de router DNS-lookups uitvoert als je een typo maakt in een commando — vermijdt lange wachttijden","Schakelt DHCP uit","Configureert de DNS-server"],c:[1],h:"Zonder no ip domain-lookup: typfout in commando → router zoekt 10 seconden naar een DNS-naam. Irritant bij configuratie."},
{type:"mc",q:"Wat doet 'ip helper-address' op een router?",o:["Configureert een statische route","Converteert DHCP-broadcasts naar unicasts en stuurt ze door naar een DHCP-server in een ander subnet","Configureert een DNS-helper","Configureert een NAT-regel"],c:[1],h:"ip helper-address = DHCP relay. Broadcasts reizen niet over routers — helper-address stuurt ze door als unicast."},
{type:"mc",q:"Welk commando configureer je een statische route op Cisco?",o:["route add 10.0.0.0 255.0.0.0 192.168.1.1","ip route 10.0.0.0 255.0.0.0 192.168.1.1","static route 10.0.0.0/8 next-hop 192.168.1.1","add route 10.0.0.0 mask 255.0.0.0 via 192.168.1.1"],c:[1],h:"ip route NETWERK MASKER NEXT-HOP — de standaard Cisco syntax voor statische routes."},
{type:"mc",q:"Wat is 'eigrp stub' configuratie?",o:["Een type EIGRP-beveiliging","Een EIGRP-feature die een router aangeeft als stub (eindpunt) zodat hij geen transit-verkeer verwerkt — vermindert query-overhead","Een type OSPF-configuratie","Een type BGP-configuratie"],c:[1],h:"EIGRP stub = remote kantoor configuratie. De hub hoeft geen queries te sturen naar stub-routers voor netwerken elders."},
{type:"mc",q:"Wat is een 'passive interface' in OSPF/EIGRP?",o:["Een interface die geen verkeer verstuurt","Een interface die OSPF/EIGRP-hello's onderdrukt — vermijdt dat onnodige neighbor relationships worden gevormd op netwerken zonder routers","Een uitgeschakelde interface","Een type loopback interface"],c:[1],h:"Passive interface = stuur geen hellos, adverteer het netwerk wel. Gebruik op interfaces naar eindapparaten."},
{type:"mc",q:"Wat is 'BFD' (Bidirectional Forwarding Detection)?",o:["Een type spanning tree protocol","Een snel link-failure detectieprotocol dat binnen milliseconden failover triggert — werkt samen met routeringsprotocollen","Een type VLAN-protocol","Een type QoS-protocol"],c:[1],h:"BFD = super-snelle link-detectie. Zonder BFD duurt OSPF dead-timer 40 seconden. Met BFD: sub-seconde failover."},
