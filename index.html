<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Hogeschool — Quiz Platform</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07080b; --panel:#0d0f14; --panel2:#141720;
  --border:#1a1f2e; --border2:#242b3d;
  --text:#dde3f0; --muted:#4a5568; --muted2:#6b7280;
  --cyan:#00d4ff; --green:#39ff14; --red:#ff3355;
  --amber:#ffb800; --purple:#a855f7; --pink:#ff4d6d;
  --correct:#22c55e; --wrong:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,212,255,.05),transparent),radial-gradient(ellipse 50% 80% at 100% 60%,rgba(168,85,247,.03),transparent);pointer-events:none;z-index:0}

/* ── UTILS ── */
.hidden{display:none!important}
.mono{font-family:'IBM Plex Mono',monospace}

/* ── SCREEN MANAGEMENT ── */
#screen-home,#screen-quiz,#screen-score{position:relative;z-index:1}

/* ══════════════════════════════════
   HOME SCREEN
══════════════════════════════════ */
#screen-home{max-width:1100px;margin:0 auto;padding:40px 24px 100px}
.home-header{text-align:center;padding:64px 0 56px}
.home-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(0,212,255,.25);padding:5px 16px;border-radius:2px;display:inline-block;margin-bottom:22px}
.home-title{font-family:'IBM Plex Mono',monospace;font-size:clamp(2rem,6vw,3.6rem);font-weight:700;letter-spacing:-1.5px;line-height:1.05;margin-bottom:14px}
.home-title em{color:var(--cyan);font-style:normal}
.home-sub{color:var(--muted2);font-size:1rem;font-weight:300}

.topic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:8px}
.topic-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:28px 28px 24px;cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden}
.topic-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;background:linear-gradient(135deg,rgba(255,255,255,.03),transparent)}
.topic-card:hover{border-color:var(--accent-color,var(--cyan));transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.topic-card:hover::before{opacity:1}
.topic-card:active{transform:translateY(-1px)}
.tc-icon{font-size:2.2rem;margin-bottom:14px;display:block}
.tc-title{font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--text)}
.tc-desc{font-size:.82rem;color:var(--muted2);line-height:1.6;margin-bottom:18px}
.tc-meta{display:flex;align-items:center;justify-content:space-between}
.tc-count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent-color,var(--cyan));background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.15);padding:3px 10px;border-radius:3px}
.tc-arrow{font-size:1.2rem;color:var(--muted);transition:transform .2s}
.topic-card:hover .tc-arrow{transform:translateX(4px);color:var(--accent-color,var(--cyan))}

/* config row */
.config-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:32px;padding:20px 24px;background:var(--panel);border:1px solid var(--border);border-radius:8px}
.config-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
.config-select{background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer}
.config-select:focus{outline:none;border-color:var(--cyan)}
.config-sep{width:1px;height:28px;background:var(--border);margin:0 4px}

/* ══════════════════════════════════
   QUIZ SCREEN
══════════════════════════════════ */
#screen-quiz{display:none;max-width:860px;margin:0 auto;padding:28px 20px 80px}
.quiz-topbar{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.back-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);background:transparent;border:1px solid var(--border2);padding:7px 14px;border-radius:4px;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--muted);color:var(--text)}
.quiz-topic-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:3px;border:1px solid;margin-left:auto}

/* stats */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--border);border-radius:7px;overflow:hidden;background:var(--panel);margin-bottom:18px}
.stat{text-align:center;padding:12px 0;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:1.3rem;font-weight:700;line-height:1;display:block}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-top:3px;display:block}

/* progress */
.prog-wrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:5px;overflow:hidden}
.prog-bar{height:100%;border-radius:2px;transition:width .5s ease}
.prog-text{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-align:right;margin-bottom:18px}

/* question card */
.q-card{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:32px 36px;margin-bottom:18px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.q-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--cyan);background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);padding:3px 10px;border-radius:2px}
.q-les{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted2);background:var(--panel2);border:1px solid var(--border);padding:3px 10px;border-radius:2px}
.q-type-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 10px;border-radius:2px}
.q-type-multi{color:var(--amber);background:rgba(255,184,0,.07);border:1px solid rgba(255,184,0,.2)}
.q-type-open{color:var(--purple);background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.2)}
.q-text{font-size:1.02rem;font-weight:500;line-height:1.65;margin-bottom:22px;color:var(--text)}

/* options */
.options{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:13px;padding:12px 16px;border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:border-color .12s,background .12s;background:var(--bg);user-select:none}
.opt:hover:not(.locked){border-color:var(--qcolor,var(--cyan));background:rgba(0,212,255,.03)}
.opt.sel{border-color:var(--qcolor,var(--cyan));background:rgba(0,212,255,.07)}
.opt.ok{border-color:var(--correct);background:rgba(34,197,94,.07)}
.opt.bad{border-color:var(--wrong);background:rgba(239,68,68,.07)}
.opt.missed{border-color:var(--amber);background:rgba(255,184,0,.06)}
.opt-box{width:18px;height:18px;flex-shrink:0;margin-top:2px;border:2px solid var(--border2);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .12s}
.opt.sel .opt-box{border-color:var(--qcolor,var(--cyan));background:var(--qcolor,var(--cyan));color:var(--bg)}
.opt.ok .opt-box{border-color:var(--correct);background:var(--correct);color:#fff}
.opt.bad .opt-box{border-color:var(--wrong);background:var(--wrong);color:#fff}
.opt.missed .opt-box{border-color:var(--amber);background:var(--amber);color:#000}
.opt-letter{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px;flex-shrink:0}
.opt-text{font-size:.92rem;line-height:1.5}

/* open answer */
.open-wrap{margin-top:4px}
.open-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:12px 16px;font-family:'IBM Plex Sans',sans-serif;font-size:.95rem;resize:none;transition:border-color .15s}
.open-input:focus{outline:none;border-color:var(--qcolor,var(--cyan))}
.open-input.ok{border-color:var(--correct);background:rgba(34,197,94,.07)}
.open-input.bad{border-color:var(--wrong);background:rgba(239,68,68,.07)}

/* hint */
.hint-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--amber);background:rgba(255,184,0,.07);border:1px solid rgba(255,184,0,.2);padding:6px 14px;border-radius:4px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.hint-btn:hover{background:rgba(255,184,0,.12)}
.hint-box{margin-top:12px;padding:12px 16px;background:rgba(255,184,0,.06);border:1px solid rgba(255,184,0,.2);border-radius:5px;font-size:.88rem;line-height:1.6;color:var(--amber);display:none;animation:fadeUp .2s ease}
.hint-box.show{display:block}

/* feedback */
.feedback{margin-top:18px;padding:13px 18px;border-radius:5px;font-size:.88rem;line-height:1.6;display:none;animation:fadeUp .2s ease}
.feedback.show{display:block}
.fb-ok{background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.3)}
.fb-bad{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.3)}

/* btn row */
.btn-row{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.btn{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:10px 22px;border-radius:4px;cursor:pointer;border:none;transition:all .15s}
.btn-check{background:var(--qcolor,var(--cyan));color:var(--bg);font-weight:700}
.btn-check:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px)}
.btn-check:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}
.btn-next{background:transparent;color:var(--qcolor,var(--cyan));border:1px solid var(--qcolor,var(--cyan))}
.btn-next:hover{background:rgba(0,212,255,.07)}
.btn-skip{background:transparent;color:var(--muted2);border:1px solid var(--border2)}
.btn-skip:hover{border-color:var(--muted);color:var(--text)}

/* ══════════════════════════════════
   SCORE SCREEN
══════════════════════════════════ */
#screen-score{display:none;max-width:700px;margin:0 auto;padding:60px 24px 100px;text-align:center}
.score-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(0,212,255,.25);padding:5px 16px;border-radius:2px;display:inline-block;margin-bottom:20px}
.score-big{font-family:'IBM Plex Mono',monospace;font-size:clamp(4rem,12vw,7rem);font-weight:700;line-height:1;margin:16px 0}
.score-msg{font-size:1.05rem;color:var(--muted2);margin:12px 0 32px}
.score-grid{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;margin:24px 0 40px}
.sg{text-align:center}
.sg-num{font-family:'IBM Plex Mono',monospace;font-size:2rem;font-weight:700;display:block}
.sg-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-top:3px;display:block}
.score-breakdown{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:24px;margin:0 0 32px;text-align:left}
.sb-title{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:14px}
.sb-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.sb-row:last-child{border-bottom:none}
.sb-topic{font-size:.9rem}
.sb-nums{font-family:'IBM Plex Mono',monospace;font-size:.85rem}
.score-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-restart-home{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:13px 32px;border-radius:4px;cursor:pointer;font-weight:700;transition:all .15s;background:transparent;color:var(--cyan);border:1px solid var(--cyan)}
.btn-restart-home:hover{background:rgba(0,212,255,.08)}
.btn-restart-same{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:13px 32px;border-radius:4px;cursor:pointer;font-weight:700;transition:all .15s;border:none}
.btn-restart-same:hover{filter:brightness(1.15);transform:translateY(-1px)}

@media(max-width:600px){
  .q-card{padding:20px 18px}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .stat:nth-child(2){border-right:none}
  .stat:nth-child(3){border-right:1px solid var(--border)}
  .score-grid{gap:20px}
  .topic-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div id="screen-home">
  <div class="home-header">
    <div class="home-badge">AP Hogeschool · 2025-26</div>
    <h1 class="home-title">Quiz <em>Platform</em></h1>
    <p class="home-sub">Kies een onderwerp en test je kennis · 250+ vragen per module</p>
  </div>

  <div class="topic-grid" id="topic-grid"></div>

  <div class="config-row" style="margin-top:28px">
    <span class="config-label">Aantal vragen</span>
    <select class="config-select" id="cfg-count">
      <option value="25">25 vragen</option>
      <option value="50" selected>50 vragen</option>
      <option value="100">100 vragen</option>
      <option value="all">Alle vragen</option>
    </select>
    <div class="config-sep"></div>
    <span class="config-label">Volgorde</span>
    <select class="config-select" id="cfg-order">
      <option value="shuffle" selected>Willekeurig</option>
      <option value="sequential">Op volgorde</option>
    </select>
    <div class="config-sep"></div>
    <span class="config-label">Types</span>
    <select class="config-select" id="cfg-types">
      <option value="all" selected>Alle types</option>
      <option value="mc">Meerkeuze</option>
      <option value="multi">Meerdere antwoorden</option>
      <option value="open">Open vragen</option>
    </select>
  </div>
</div>

<!-- ══ QUIZ ══ -->
<div id="screen-quiz">
  <div class="quiz-topbar">
    <button class="back-btn" onclick="goHome()">← Terug</button>
    <span class="quiz-topic-badge" id="quiz-topic-badge"></span>
  </div>

  <div class="stats-bar">
    <div class="stat"><span class="stat-val" id="sv-score" style="color:var(--correct)">0</span><span class="stat-lbl">Correct</span></div>
    <div class="stat"><span class="stat-val" id="sv-wrong" style="color:var(--wrong)">0</span><span class="stat-lbl">Fout</span></div>
    <div class="stat"><span class="stat-val" id="sv-left" style="color:var(--cyan)">—</span><span class="stat-lbl">Resterend</span></div>
    <div class="stat"><span class="stat-val" id="sv-pct" style="color:var(--purple)">—</span><span class="stat-lbl">Score %</span></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <div class="prog-text" id="prog-text">Vraag 1 / —</div>

  <div id="q-container"></div>

  <div class="btn-row">
    <button class="btn btn-skip" id="btn-skip" onclick="skipQ()">Sla over</button>
    <button class="btn btn-check" id="btn-check" disabled onclick="checkAnswer()">Controleer</button>
    <button class="btn btn-next hidden" id="btn-next" onclick="nextQ()">Volgende →</button>
  </div>
</div>

<!-- ══ SCORE ══ -->
<div id="screen-score"></div>

<script>
// ── TOPIC CONFIG ──────────────────────────────────────────────────
const TOPICS = [
  { id:'cybersecurity', label:'Cybersecurity Intro', icon:'🔐', color:'#00d4ff',
    desc:'CIA-triade · GDPR · Frameworks · Cryptografie · MitM · Phishing · AAA · Netwerk- & OS-beveiliging' },
  { id:'auditing',      label:'Auditing & Monitoring', icon:'📊', color:'#39ff14',
    desc:'Zabbix · SNMP · Logging · Triggers · Templates · LLD · Syslog · Grafana' },
  { id:'databanken',    label:'Databanken Intro', icon:'🗄️', color:'#a855f7',
    desc:'SQL · DDL/DML · Normalisatie · Sleutels · JOINs · Subqueries · Aggregatie · Transacties' },
  { id:'routering',     label:'Routering & Switching', icon:'🌐', color:'#ffb800',
    desc:'Switching · VLANs · STP · Trunking · Inter-VLAN · DHCP · NAT · OSPF · BGP' },
  { id:'serverbeheer',  label:'Serverbeheer S2', icon:'🖥️', color:'#ff4d6d',
    desc:'DNS · DHCP · Windows Sharing · Business Continuity · Backup & Recovery · Active Directory' },
];

// Build topic cards
const grid = document.getElementById('topic-grid');
TOPICS.forEach(t => {
  const card = document.createElement('div');
  card.className = 'topic-card';
  card.style.setProperty('--accent-color', t.color);
  card.innerHTML = `
    <span class="tc-icon">${t.icon}</span>
    <div class="tc-title">${t.label}</div>
    <div class="tc-desc">${t.desc}</div>
    <div class="tc-meta">
      <span class="tc-count" style="color:${t.color};background:${t.color}15;border-color:${t.color}30">250+ vragen</span>
      <span class="tc-arrow">→</span>
    </div>`;
  card.onclick = () => startQuiz(t.id);
  grid.appendChild(card);
});

// ── QUIZ STATE ────────────────────────────────────────────────────
let currentTopic = null, questions = [], idx = 0;
let correct = 0, wrong = 0, selected = new Set(), hintShown = false;

function goHome() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-score').style.display = 'none';
  document.getElementById('screen-home').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

function startQuiz(topicId) {
  const topic = TOPICS.find(t => t.id === topicId);
  currentTopic = topic;

  // get questions for topic
  const pool = window['QUESTIONS_' + topicId] || [];
  let filtered = [...pool];

  // filter by type
  const typeFilter = document.getElementById('cfg-types').value;
  if (typeFilter !== 'all') filtered = filtered.filter(q => q.type === typeFilter);

  // order
  const order = document.getElementById('cfg-order').value;
  if (order === 'shuffle') filtered = shuffle(filtered);

  // count
  const countVal = document.getElementById('cfg-count').value;
  if (countVal !== 'all') filtered = filtered.slice(0, parseInt(countVal));

  questions = filtered;
  idx = 0; correct = 0; wrong = 0;

  // badge
  const badge = document.getElementById('quiz-topic-badge');
  badge.textContent = topic.icon + ' ' + topic.label;
  badge.style.color = topic.color;
  badge.style.borderColor = topic.color + '50';
  badge.style.background = topic.color + '10';

  // progress bar color
  document.getElementById('prog-bar').style.background = `linear-gradient(90deg, ${topic.color}, ${topic.color}99)`;

  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-score').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';

  updateStats();
  renderQ();
  window.scrollTo({ top: 0 });
}

function updateStats() {
  const total = questions.length;
  const done = idx;
  const left = total - done;
  const pct = done > 0 ? Math.round((correct / done) * 100) : null;
  document.getElementById('sv-score').textContent = correct;
  document.getElementById('sv-wrong').textContent = wrong;
  document.getElementById('sv-left').textContent = left;
  document.getElementById('sv-pct').textContent = pct !== null ? pct + '%' : '—';
  document.getElementById('prog-bar').style.width = ((done / total) * 100) + '%';
  document.getElementById('prog-text').textContent = `Vraag ${Math.min(idx + 1, total)} / ${total}`;
}

function renderQ() {
  selected = new Set();
  hintShown = false;
  const q = questions[idx];
  const color = currentTopic.color;
  const letters = ['A','B','C','D','E','F'];

  let bodyHTML = '';

  if (q.type === 'open') {
    bodyHTML = `
      <div class="open-wrap">
        <textarea class="open-input" id="open-ans" rows="2" placeholder="Typ je antwoord hier…" oninput="onOpenInput()"></textarea>
      </div>`;
  } else {
    const opts = q.o.map((o, i) => `
      <div class="opt" id="o${i}" onclick="toggleOpt(${i})">
        <div class="opt-box" id="b${i}"></div>
        <span class="opt-letter">${letters[i]}</span>
        <span class="opt-text">${o}</span>
      </div>`).join('');
    bodyHTML = `<div class="options">${opts}</div>`;
  }

  const typeBadge = q.type === 'multi'
    ? `<span class="q-type-badge q-type-multi">◈ Meerdere antwoorden</span>`
    : q.type === 'open'
    ? `<span class="q-type-badge q-type-open">✏ Open vraag</span>`
    : '';

  document.getElementById('q-container').innerHTML = `
    <div class="q-card" style="--qcolor:${color}">
      <div class="q-meta">
        <span class="q-num">V${idx + 1}</span>
        <span class="q-les">${q.t}</span>
        ${typeBadge}
      </div>
      <div class="q-text">${q.q}</div>
      ${bodyHTML}
      <div style="margin-top:16px">
        <button class="hint-btn" onclick="showHint()" id="hint-btn">💡 Hint</button>
        <div class="hint-box" id="hint-box">${q.h}</div>
      </div>
      <div class="feedback" id="fb"></div>
    </div>`;

  const btnCheck = document.getElementById('btn-check');
  btnCheck.disabled = true;
  btnCheck.style.background = color;
  btnCheck.classList.remove('hidden');

  const btnNext = document.getElementById('btn-next');
  btnNext.classList.add('hidden');
  btnNext.style.color = color;
  btnNext.style.borderColor = color;

  document.getElementById('btn-skip').classList.remove('hidden');

  if (q.type === 'open') {
    const ta = document.getElementById('open-ans');
    ta.style.borderColor = '';
    ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!btnCheck.disabled) checkAnswer(); } });
  }
}

function onOpenInput() {
  const val = document.getElementById('open-ans')?.value.trim();
  document.getElementById('btn-check').disabled = !val;
}

function showHint() {
  const hb = document.getElementById('hint-box');
  hb.classList.toggle('show');
  document.getElementById('hint-btn').textContent = hb.classList.contains('show') ? '💡 Hint verbergen' : '💡 Hint';
}

function toggleOpt(i) {
  const q = questions[idx];
  if (document.getElementById('o' + i)?.classList.contains('locked')) return;

  if (q.type === 'mc') {
    selected.forEach(s => {
      document.getElementById('o' + s)?.classList.remove('sel');
      const b = document.getElementById('b' + s);
      if (b) b.innerHTML = '';
    });
    selected.clear();
  }

  if (selected.has(i)) {
    selected.delete(i);
    document.getElementById('o' + i).classList.remove('sel');
    document.getElementById('b' + i).innerHTML = '';
  } else {
    selected.add(i);
    document.getElementById('o' + i).classList.add('sel');
    document.getElementById('b' + i).innerHTML = '✓';
  }
  document.getElementById('btn-check').disabled = selected.size === 0;
}

function checkAnswer() {
  const q = questions[idx];
  let isPerfect = false;

  if (q.type === 'open') {
    const raw = document.getElementById('open-ans').value.trim().toLowerCase();
    const accepted = (q.ans || []).map(a => a.toLowerCase());
    isPerfect = accepted.some(a => raw === a || raw.includes(a) || a.includes(raw));
    const ta = document.getElementById('open-ans');
    ta.classList.add(isPerfect ? 'ok' : 'bad');
    ta.disabled = true;
  } else {
    const sel = [...selected];
    const cor = q.c;
    q.o.forEach((_, i) => document.getElementById('o' + i)?.classList.add('locked'));
    q.o.forEach((_, i) => {
      const el = document.getElementById('o' + i);
      const bx = document.getElementById('b' + i);
      if (!el) return;
      el.classList.remove('sel');
      if (sel.includes(i) && cor.includes(i)) { el.classList.add('ok'); if(bx) bx.innerHTML = '✓'; }
      else if (sel.includes(i) && !cor.includes(i)) { el.classList.add('bad'); if(bx) bx.innerHTML = '✗'; }
      else if (!sel.includes(i) && cor.includes(i)) { el.classList.add('missed'); if(bx) bx.innerHTML = '!'; }
    });
    isPerfect = cor.every(c => sel.includes(c)) && sel.every(s => cor.includes(s));
  }

  if (isPerfect) correct++; else wrong++;
  updateStats();

  const fb = document.getElementById('fb');
  fb.className = 'feedback show ' + (isPerfect ? 'fb-ok' : 'fb-bad');
  fb.innerHTML = (isPerfect ? '✅ <strong>Correct!</strong> ' : '❌ <strong>Fout.</strong> ') + q.f;

  document.getElementById('btn-check').classList.add('hidden');
  document.getElementById('btn-skip').classList.add('hidden');
  const btnNext = document.getElementById('btn-next');
  btnNext.classList.remove('hidden');
  btnNext.textContent = idx >= questions.length - 1 ? 'Resultaten →' : 'Volgende →';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function skipQ() {
  wrong++;
  updateStats();
  advanceQ();
}

function nextQ() { advanceQ(); }

function advanceQ() {
  idx++;
  if (idx >= questions.length) { showScore(); return; }
  renderQ();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showScore() {
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);
  const t = currentTopic;
  let msg;
  if (pct >= 85) msg = '🏆 Uitstekend! Je beheerst de leerstof uitstekend.';
  else if (pct >= 70) msg = '👍 Goed gedaan! Nog een beetje herhaling en je zit gebakken.';
  else if (pct >= 55) msg = '📚 Voldoende, maar extra studie is aangeraden.';
  else msg = '💡 Herhaal de cursusinhoud goed en probeer opnieuw.';

  document.getElementById('screen-quiz').style.display = 'none';
  const sc = document.getElementById('screen-score');
  sc.style.display = 'block';
  sc.innerHTML = `
    <div class="score-badge">${t.icon} ${t.label}</div>
    <div class="score-big" style="color:${t.color}">${pct}%</div>
    <div class="score-msg">${msg}</div>
    <div class="score-grid">
      <div class="sg"><span class="sg-num" style="color:var(--correct)">${correct}</span><span class="sg-lbl">Correct</span></div>
      <div class="sg"><span class="sg-num" style="color:var(--wrong)">${wrong}</span><span class="sg-lbl">Fout / Over</span></div>
      <div class="sg"><span class="sg-num" style="color:var(--muted2)">${total}</span><span class="sg-lbl">Totaal</span></div>
    </div>
    <div class="score-btns">
      <button class="btn-restart-home" onclick="goHome()">← Andere module</button>
      <button class="btn-restart-same" style="background:${t.color};color:#07080b" onclick="startQuiz('${t.id}')">↺ Opnieuw</button>
    </div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

{type:"mc",q:"Wat is DNS cache poisoning?",o:["Het versleutelen van DNS-verzoeken","Het injecteren van valse DNS-records in een resolver-cache zodat domeinnamen naar valse IPs wijzen","Het overbelasten van een DNS-server","Het blokkeren van DNS-verkeer"],c:[1],h:"De 'cache' van de DNS-resolver wordt 'vergiftigd' met nep-antwoorden."},
{type:"mc",q:"Waarvoor staat arpspoof -i eth0 -t 172.16.0.2 172.16.0.1?",o:["Vergiftig de gateway zodat die denkt dat 172.16.0.2 de aanvaller is","Stuur valse ARP-replies naar 172.16.0.2 met het MAC van de aanvaller als 'gateway' (172.16.0.1)","Scan het netwerk op ARP-kwetsbaarheden","Start IP forwarding op interface eth0"],c:[1],h:"-t = target (slachtoffer). Laatste argument = de host die je imiteert (gateway)."},
{type:"mc",q:"Waarom zijn twee arpspoof-commando's nodig voor een volledige MitM-aanval?",o:["Eén voor versleuteling, één voor ontsleuteling","Eén vergiftigt de ARP-cache van het slachtoffer, het andere die van de gateway — voor bidirectioneel verkeer","Ze zijn sneller wanneer parallel uitgevoerd","Eén start IP forwarding, het andere start sniffing"],c:[1],h:"Denk aan twee richtingen: slachtoffer → gateway EN gateway → slachtoffer."},
{type:"mc",q:"Wat is STP Mangling?",o:["Het aanpassen van DNS-records via STP","Het manipuleren van Spanning Tree Protocol zodat de aanvaller als root bridge wordt gekozen","Het overbelasten van STP met updates","Het blokkeren van STP om netwerklussen te veroorzaken"],c:[1],h:"STP kiest een root bridge. Als de aanvaller die wordt, passeert al het verkeer via hem."},
{type:"mc",q:"Welk CIA-principe wordt DIRECT geschonden bij sniffing in een MitM-aanval?",o:["Availability","Integrity","Confidentiality","Non-repudiation"],c:[2],h:"Sniffing = passief meelezen. Welk principe gaat over geheimhouding van data?"},
{type:"multi",q:"Welke tools worden in de cursus gebruikt voor ARP poisoning? (meerdere antwoorden)",o:["arpspoof","ettercap","nighthawk","nmap","dSploit"],c:[0,1,2,4],h:"nmap is een scanner, geen ARP poisoning tool."},
{type:"mc",q:"Wat is phishing?",o:["Een technische aanval via netwerkkwetsbaarheden","Een vorm van social engineering waarbij de aanvaller een betrouwbare organisatie imiteert om gevoelige info te ontfutselen","Een malware-aanval via USB","Een brute-force aanval op wachtwoorden"],c:[1],h:"Phishing is een SOCIALE aanval, geen technische."},
{type:"mc",q:"Wat is 'Smishing'?",o:["Phishing via e-mail","Phishing via SMS-berichten","Phishing via telefonische oproepen","Phishing via QR-codes"],c:[1],h:"SM = SMS. Smishing = SMS + phishing."},
{type:"mc",q:"Wat is 'Vishing'?",o:["Phishing via valse QR-codes","Phishing via telefonische oproepen","Phishing via SMS","Phishing via nep-video-oproepen"],c:[1],h:"V = Voice. Vishing = Voice + phishing."},
{type:"mc",q:"Wat is 'Quishing'?",o:["Phishing via SMS","Phishing via telefoon","Phishing via valse QR-codes","Phishing via sociale media"],c:[2],h:"QR = Quick Response code. Quishing = QR + phishing."},
{type:"open",q:"Hoe noemt men een gerichte phishingaanval op een specifiek individu of organisatie?",ans:["spear phishing","spear-phishing"],h:"Het woord verwijst naar een 'speer' in tegenstelling tot een brede networp."},
{type:"multi",q:"Welke social engineering-technieken worden bij phishing gebruikt? (meerdere antwoorden)",o:["Autoriteit","Urgentie","Vertrouwen","Nieuwsgierigheid","SQL-injection"],c:[0,1,2,3],h:"SQL-injection is een technische aanval, geen social engineering techniek."},
{type:"mc",q:"Wat is 'Credential Harvesting'?",o:["Wachtwoorden raden via brute force","Een nep-loginpagina die eruitziet als een echte site om inloggegevens te verzamelen","Wachtwoorden onderscheppen via MitM","Een keylogger installeren via malware"],c:[1],h:"'Harvesting' = oogsten. De aanvaller 'oogst' inloggegevens via een nep-site."},
{type:"mc",q:"Wat is EchoLeak?",o:["Een SSL/TLS-kwetsbaarheid","De eerste bekende zero-click AI-aanval op Microsoft 365 Copilot via prompt injection in mailheaders","Een deepfake-tool voor stemimitatie","Een phishing-toolkit voor clone-websites"],c:[1],h:"EchoLeak misbruikt AI-assistenten via verborgen instructies in e-mailheaders."},
{type:"multi",q:"Welke technische protocollen beschermen tegen e-mail phishing? (meerdere antwoorden)",o:["SPF","DKIM","DMARC","ARP","SNMP"],c:[0,1,2],h:"De drie juiste protocollen werken samen als een e-mailbeveiligingslaag."},
{type:"open",q:"Wat betekent de afkorting SPF bij e-mailbeveiliging?",ans:["sender policy framework"],h:"Het definieert welke mailservers e-mail mogen versturen voor een domein."},
{type:"mc",q:"Hoe vergroten deepfakes het gevaar van social engineering?",o:["Ze versleutelen phishing-e-mails automatisch","AI-gegenereerde nep-video/audio kan stemmen en gezichten imiteren voor fraude (bijv. CEO-fraude)","Ze maken phishing e-mails grammaticaal correcter","Ze omzeilen SPF/DKIM filters"],c:[1],h:"Denk aan CEO-fraude waarbij een 'directeur' belt of in video verschijnt."},
{type:"mc",q:"Wat verplicht de GDPR als een phishing-aanval leidt tot een datalek?",o:["Niets — phishing is crimineel gedrag en valt buiten GDPR","Organisaties moeten het datalek in de meeste gevallen binnen 72 uur melden aan de toezichthouder","Organisaties mogen het intern houden als er geen schade is","Alleen de aanvaller moet zich verantwoorden"],c:[1],h:"GDPR heeft een meldingsplicht ongeacht de oorzaak van het datalek."},
{type:"mc",q:"Wat staat AAA voor in cybersecurity?",o:["Authentication, Authorization, Accountability","Access, Audit, Authorization","Availability, Authenticity, Accountability","Authentication, Access, Auditing"],c:[0],h:"De drie A's zijn drie opeenvolgende stappen in toegangsbeheer."},
{type:"mc",q:"Wat is het verschil tussen identificatie en authenticatie?",o:["Ze zijn identiek","Identificatie = zeggen wie je bent; authenticatie = bewijzen wie je bent","Authenticatie = zeggen wie je bent; identificatie = bewijzen wie je bent","Identificatie vereist altijd biometrie"],c:[1],h:"Identificatie is een claim; authenticatie is het bewijs van die claim."},
{type:"multi",q:"Wat zijn de vier authenticatiefactoren ('something you...')? (meerdere antwoorden)",o:["Something you know (wachtwoord)","Something you are (biometrie)","Something you have (mobiele telefoon)","Where you are (geografische locatie)","Something you think (cognitieve tests)"],c:[0,1,2,3],h:"De vier factoren zijn kennis, bezit, zijn en locatie."},
{type:"mc",q:"Wat is Multi-Factor Authenticatie (MFA)?",o:["Aanmelden met meerdere wachtwoorden","Combinatie van 2 of meer verschillende authenticatiefactoren","Aanmelden op meerdere apparaten tegelijk","Gebruik van een wachtwoordmanager"],c:[1],h:"'Multi' = meerdere, maar het gaat over VERSCHILLENDE factoren, niet hetzelfde type twee keer."},
{type:"open",q:"Welke wachtwoordmanager wordt in de cursus expliciet vermeld als aanbeveling?",ans:["keepass"],h:"Het is een open-source wachtwoordmanager die lokaal werkt."},
{type:"mc",q:"Wat is een zwakte van eenvoudige biometrie zoals fingerprint scanners?",o:["Ze zijn te duur voor consumenten","Ze zijn altijd een benadering en bieden geen 100% garantie","Ze werken alleen bij extreme veiligheid","Ze zijn langzamer dan wachtwoorden"],c:[1],h:"Biometrie is nooit perfect — er zijn altijd false positives/negatives."},
{type:"mc",q:"Wat is 'mutual authentication'?",o:["Twee gebruikers authenticeren elkaar tegelijk","Zowel de client als de server verifiëren elkaars identiteit","Een systeem waarbij wachtwoorden wederzijds gedeeld worden","Authenticatie via twee factoren"],c:[1],h:"'Mutual' = wederzijds. Beide partijen bewijzen hun identiteit."},
{type:"mc",q:"Waarom zijn zwakke wachtwoorden zoals gewone woorden gevaarlijk?",o:["Ze zijn te lang om te onthouden","Ze kunnen geraden worden via dictionary attacks","Ze voldoen niet aan de GDPR","Ze werken niet op moderne systemen"],c:[1],h:"Een 'dictionary attack' gebruikt woordenboeklijsten — gewone woorden staan daar gewoon in."},
{type:"multi",q:"Welke kenmerken heeft een sterk wachtwoord? (meerdere antwoorden)",o:["Volledig random met kleine letters, hoofdletters, cijfers en speciale tekens","Minimale lengte","Hetzelfde wachtwoord op alle platforms hergebruiken","Uniek per platform","Bevat geen persoonlijke info zoals geboortedatum"],c:[0,1,3,4],h:"Eén optie is een slechte praktijk die je juist moet vermijden."},
{type:"mc",q:"Wat is accountability in de context van AAA?",o:["Het recht om anoniem te surfen","Het bijhouden van wie wat wanneer heeft gedaan voor verantwoording achteraf","Het blokkeren van onbevoegde gebruikers","Het versleutelen van audit logs"],c:[1],h:"Accountability = aantoonbaarheid / naspeurbaarheid van acties."},
{type:"mc",q:"Wat is een stateless firewall?",o:["Een firewall die de volledige verbindingsstatus bijhoudt","Een firewall die alleen de IP-header inspecteert (source/destination IP, port, protocol) zonder verbindingsstatus","Een firewall op applicatieniveau","Een firewall die specifiek webverkeer filtert"],c:[1],h:"Stateless = geen geheugen van eerdere pakketten. Elk pakket wordt onafhankelijk beoordeeld."},
{type:"mc",q:"Wat is een stateful firewall?",o:["Een firewall die enkel IP-headers bekijkt","Een firewall die de volledige verbindingsstatus bijhoudt en pakketten in context van een verbinding beoordeelt","Een firewall die alleen op applicatieniveau filtert","Een firewall zonder configuratie"],c:[1],h:"Stateful = bewust van de verbindingsstatus. Geeft context aan elk pakket."},
{type:"multi",q:"Welke zijn types firewalls? (meerdere antwoorden)",o:["Packet filtering (stateless)","Stateful firewall","Web Application Firewall (WAF)","ARP-firewall","Next Generation Firewall (NGFW)"],c:[0,1,2,4],h:"Eén optie bestaat niet als officieel type — ARP wordt gefilterd op een andere manier."},
{type:"mc",q:"Wat is een IDS?",o:["Een systeem dat aanvallen automatisch blokkeert","Een Intrusion Detection System dat verdacht verkeer detecteert en meldt maar niet blokkeert","Een systeem voor Identity and Access Management","Een tool voor DNS-filtering"],c:[1],h:"Detection = detecteren. Vergelijk met IPS dat ook preventie/blokkering doet."},
{type:"mc",q:"Wat is het default firewall-principe dat in de cursus wordt aanbevolen?",o:["Default Allow — blokkeer enkel wat gevaarlijk is","Default Deny — sta enkel toe wat expliciet is toegestaan","KISS: Keep It Simple and Secure","Default Log — log alles maar blokkeer niets"],c:[1],h:"Default Deny is het veiligste principe: alles is verboden tenzij uitdrukkelijk toegestaan."},
{type:"mc",q:"Wat is een honeypot in network security?",o:["Een aantrekkelijk systeem dat bewust kwetsbaar wordt gelaten om aanvallers te lokken en te bestuderen","Een versleutelde opslag voor wachtwoorden","Een type firewall","Een tool voor netwerkscan"],c:[0],h:"Een 'pot met honing' lokt indringers — in dit geval aanvallers die je wil observeren."},
{type:"mc",q:"Wat is netwerksegmentatie?",o:["Het verdubbelen van de bandbreedte","Het opdelen van een netwerk in kleinere, afgeschermde zones om aanvallen in te perken","Het versleutelen van alle netwerkverkeer","Het instellen van VLANs op switches"],c:[1],h:"Segmentatie = verdeel en heers. Een aanvaller die één segment binnendringt, bereikt niet alles."},
{type:"open",q:"Hoe heet de aanvaltechniek waarbij ongevalideerde gebruikersinput wordt uitgevoerd als code in een webapplicatie's database?",ans:["sql injection","sql-injection"],h:"De aanval werkt door SQL-code mee te sturen als inputdata."},
{type:"mc",q:"Wat is XSS (Cross-Site Scripting)?",o:["Een server-side aanval via SQL-injectie","Een client-side aanval waarbij kwaadaardig script wordt ingevoegd in een webpagina die door andere gebruikers wordt bekeken","Een aanval via valse SSL-certificaten","Een netwerkaanval via ARP-vergiftiging"],c:[1],h:"XSS = kwaadaardig script dat in de browser van het slachtoffer wordt uitgevoerd."},
{type:"mc",q:"Wat is OS hardening?",o:["Het installeren van de nieuwste versie van het OS","Het beperken van kwetsbaarheden in het OS door onnodige software/diensten te verwijderen en de configuratie te versterken","Het inschakelen van automatische updates","Het versleutelen van de harde schijf"],c:[1],h:"Hardening = het 'verharden' van een systeem door de aanvalsoppervlakte te verkleinen."},
{type:"mc",q:"Waarom moeten onnodige services verwijderd worden bij OS hardening?",o:["Ze vertragen het systeem","Elke actieve service die niet nodig is, vergroot de aanvalsoppervlakte met extra kwetsbaarheden","Ze verbruiken te veel geheugen","Ze zijn moeilijk te configureren"],c:[1],h:"Minder services = minder aanvalspunten = kleiner attack surface."},
{type:"mc",q:"Waarom moeten default accounts (Guest, Administrator) worden gewijzigd?",o:["Ze zijn verouderd","Aanvallers kennen de standaard accountnamen en kunnen ze targeten","Ze hebben te veel geheugen nodig","Ze zijn niet compatibel met moderne systemen"],c:[1],h:"Default = voorspelbaar. Aanvallers proberen standaard accountnamen eerst."},
{type:"multi",q:"Waardoor worden softwarekwetsbaarheden veroorzaakt? (meerdere antwoorden)",o:["Programmeerfouten","Ontwerpfouten","Verouderde componenten","Foute configuraties","Te veel beveiligingssoftware"],c:[0,1,2,3],h:"Kwetsbaarheden zijn vrijwel altijd te wijten aan één van de eerste vier opties."},
{type:"mc",q:"Wat is een vulnerability in software security?",o:["Een bewuste backdoor van de ontwikkelaar","Een kwetsbaarheid in code die misbruikt kan worden om extra toegang te krijgen","Een foutmelding in het logbestand","Een verouderd wachtwoord"],c:[1],h:"'Vulnerability' = kwetsbaarheid die kan worden geëxploiteerd."},
{type:"mc",q:"Hoe kan je controleren op welke poorten een server luistert?",o:["Via de taakbeheerder","Via NMAP of een equivalent netwerk-scannertools","Via de event viewer","Via de firewall-configuratie"],c:[1],h:"NMAP is de meest gebruikte tool voor het scannen van open poorten."},
{type:"mc",q:"Wat is CSRF (Cross-Site Request Forgery)?",o:["Een aanval waarbij kwaadaardig script wordt ingevoegd in een webpagina","Een aanval waarbij een slachtoffer ongewild acties uitvoert op een site waar ze al zijn ingelogd","Een aanval via valse DNS-records","Een aanval via SQL-injectie"],c:[1],h:"De aanvaller misbruikt de actieve sessie (cookie) van het slachtoffer om requests uit te voeren."},
{type:"open",q:"Hoe noemt men de techniek waarbij een aanvaller vanuit een gewone gebruikersaccount admin-rechten probeert te verkrijgen?",ans:["privilege escalation","elevation of privilege"],h:"'Escalation' verwijst naar het opklimmen in het rechtenhiërarchie."},
{type:"mc",q:"Wat is 'clickjacking'?",o:["Een aanval via valse QR-codes","Een aanval waarbij een slachtoffer op een verborgen element klikt dat een andere actie uitvoert dan verwacht","Een brute-force aanval op wachtwoorden","Een aanval via valse SSL-certificaten"],c:[1],h:"Het slachtoffer 'klikt' op iets maar een onzichtbare laag registreert de klik voor iets anders."},
{type:"mc",q:"Waarom worden software-audits uitgevoerd?",o:["Om te controleren of alle software up-to-date is","Om te controleren of code voldoet aan beveiligingsnormen en om kwetsbaarheden te identificeren voor ze geëxploiteerd worden","Om de prestaties van software te meten","Om licentiekosten te besparen"],c:[1],h:"Een software-audit gaat over KWALITEIT en VEILIGHEID van code, niet enkel updates."},
{type:"multi",q:"Welke aanvallen zijn typisch client-side web-aanvallen? (meerdere antwoorden)",o:["Cross-site scripting (XSS)","Cross-site request forgery (CSRF)","Clickjacking","SQL-injection","Command injection"],c:[0,1,2],h:"Client-side aanvallen vinden plaats in de BROWSER van het slachtoffer."},
{type:"mc",q:"Een medewerker verwijdert per ongeluk de productiedatabase. Welk CIA-principe is geschonden en welk type incident is dit?",o:["Integrity — een cyberaanval","Availability — een menselijke fout","Confidentiality — een datalek","Integrity — een configuratiefout"],c:[1],h:"De data is NIET meer beschikbaar (Availability). Het was onopzettelijk (menselijke fout)."},
{type:"mc",q:"Een aanvaller plaatst zich tussen een gebruiker en zijn bank. Hij onderschept het verkeer en vervangt het rekeningnummer bij een overschrijving. Welke CIA-principes zijn geschonden?",o:["Alleen Confidentiality","Alleen Integrity","Zowel Confidentiality als Integrity","Availability, Integrity en Confidentiality"],c:[2],h:"Het verkeer werd GELEZEN (Confidentiality) EN AANGEPAST (Integrity)."},
{type:"mc",q:"Een bedrijf voldoet perfect aan ISO 27001 maar wordt toch gehackt. Wat illustreert dit?",o:["ISO 27001 is waardeloos","Compliance garandeert geen volledige veiligheid","De aanval was onmogelijk te vermijden","De ISO-norm moet herzien worden"],c:[1],h:"Compliance ≠ veiligheid. Normen garanderen processen, niet het resultaat."},
{type:"mc",q:"Een aanvaller gebruikt LinkedIn om informatie te verzamelen over een CEO en stuurt hem daarna een ultrapersoonlijk phishing-bericht. Welke technieken combineert hij?",o:["MAC flooding en ARP poisoning","OSINT en spear phishing","DNS cache poisoning en credential harvesting","Vishing en smishing"],c:[1],h:"OSINT = informatie verzamelen. Spear phishing = gerichte aanval. Combinatie = gevaarlijk."},
{type:"mc",q:"Een webapplicatie accepteert gebruikersinput in een zoekveld en voert die rechtstreeks uit in een SQL-query. Wat is het risico?",o:["Buffer overflow","SQL-injection waarbij de aanvaller de database kan manipuleren","Cross-site scripting","Command injection"],c:[1],h:"Ongevalideerde input + SQL-query = klassieke SQL-injection kwetsbaarheid."},
{type:"multi",q:"Een bedrijf wil MFA implementeren. Welke combinaties zijn echte multi-factor? (meerdere antwoorden)",o:["Wachtwoord + SMS-code","Vingerafdruk + gezichtsherkenning (beide zijn 'something you are')","Bankkaart + PIN-code","Wachtwoord + authenticator-app","Twee verschillende wachtwoorden"],c:[0,2,3],h:"MFA vereist twee VERSCHILLENDE factoren. Twee van hetzelfde type = geen MFA."},
{type:"mc",q:"Een trigger in Zabbix gaat af voor een server die uitvalt. Tegelijkertijd gaan ook triggers af voor alle servers ACHTER die server. Hoe voorkom je alert flooding?",o:["Door meer triggers aan te maken","Via trigger dependencies: de afhankelijke triggers gaan niet in Problem als de parent-trigger al in Problem staat","Door de triggers te verwijderen van afhankelijke systemen","Door de polling-interval te verlagen"],c:[1],h:"Trigger dependencies zorgen dat het ROOT-probleem zichtbaar is, niet alle gevolgen."},
{type:"mc",q:"Een bedrijf gebruikt synchronisatie als back-up. Een medewerker verwijdert per ongeluk een bestand. Wat is het probleem?",o:["Synchronisatie is altijd veiliger dan backup","Synchronisatie kopieert de verwijdering naar de andere locatie — het bestand is dus op beide locaties weg","Synchronisatie werkt te traag","Synchronisatie is niet GDPR-conform"],c:[1],h:"Sync = real-time kopie. Verwijdering op locatie A = verwijdering op locatie B."},
{type:"mc",q:"Wat is het verschil tussen RTO en RPO in Business Continuity?",o:["RTO = dataverlies; RPO = hersteltijd","RTO = Recovery Time Objective (max. aanvaardbare downtijd); RPO = Recovery Point Objective (max. aanvaardbaar dataverlies)","Ze zijn identiek","RPO = hersteltijd; RTO = dataverlies"],c:[1],h:"RTO gaat over TIJD (hoe lang mag het duren?). RPO gaat over DATA (hoeveel mag je verliezen?)."},
{type:"mc",q:"Een aanvaller heeft toegang tot de source code van een webapplicatie en zoekt naar hardcoded credentials. Dit is een voorbeeld van:",o:["SQL-injection","Code review / static analysis voor een beveiligingsaudit — of misbruik ervan door een aanvaller","ARP poisoning","Privilege escalation"],c:[1],h:"Hardcoded credentials in source code zijn een klassieke beveiligingsfout die bij code reviews gevonden wordt."},
{type:"mc",q:"Wat is een 'choke point' in secure network design?",o:["Een kwetsbaar punt in het netwerk","Een geforceerd doorvoerpunt waar al het verkeer langs moet, zodat het gecontroleerd kan worden","Een bottleneck die prestaties verlaagt","Een backup-server"],c:[1],h:"Alle traffic moet langs één punt = ideaal voor monitoring en filtering."},
{type:"mc",q:"Wat is redundantie in de context van network security?",o:["Het dubbel versleutelen van data","Het voorzien van alternatieven zodat één componentfailure niet tot volledige uitval leidt","Het bijhouden van duplicate logs","Het maken van wekelijkse backups"],c:[1],h:"Redundantie = geen Single Point of Failure. Altijd een backup-component."},
{type:"open",q:"Hoe noemt men de aanval waarbij een aanvaller een legitieme gebruiker nadoet door zijn session-cookie te stelen?",ans:["session hijacking","sessiehijacking"],h:"De aanvaller 'kaapt' een actieve sessie door de authenticatie-token over te nemen."},
{type:"mc",q:"Wat is 'Port Stealing' op een switch?",o:["Het stelen van fysieke poorten op een switch","Een aanval waarbij de aanvaller frames stuurt met het MAC-adres van het slachtoffer zodat de switch zijn poort toewijst aan de aanvaller","Het blokkeren van poorten via SNMP","Het kopiëren van verkeer via een mirror-poort"],c:[1],h:"De aanvaller 'steelt' de poort van het slachtoffer in de CAM-table door zijn MAC te imiteren."},
{type:"mc",q:"Wat is het doel van een pentest (penetratietest)?",o:["Een systeem overnemen voor criminele doeleinden","Gecontroleerd en met toestemming kwetsbaarheden opsporen in een systeem voor ze door echte aanvallers worden gevonden","Het auditen van netwerkverkeer","Het testen van firewall-prestaties"],c:[1],h:"'Pen' = penetratie. Het is een gesanctioneerde aanvalsimulatie."},
{type:"multi",q:"Welke zijn typische stappen in een cyberaanval (Cyber Kill Chain)? (meerdere antwoorden)",o:["Verkenning (reconnaissance)","Wapen ontwikkelen (weaponization)","Toegang verkrijgen (exploitation)","Persistentie bewaren","Security awareness training geven"],c:[0,1,2,3],h:"Eén optie is een defensieve maatregel, geen aanvalsstap."},
{type:"mc",q:"Wat is het verschil tussen een IDS en een IPS?",o:["Ze zijn identiek","Een IDS detecteert aanvallen en genereert meldingen; een IPS detecteert EN blokkeert aanvallen actief","Een IDS is hardware; een IPS is software","Een IPS detecteert; een IDS blokkeert"],c:[1],h:"IDS = Detection (melding). IPS = Prevention (blokkering + melding)."},
{type:"mc",q:"Wat is 'Zero Trust' als beveiligingsmodel?",o:["Niemand vertrouwen, zelfs niet binnen het interne netwerk — elk verzoek wordt geverifieerd","Alleen externe gebruikers wantrouwen","Het verwijderen van alle firewalls","Vertrouwen op basis van IP-adres"],c:[0],h:"'Zero Trust' = nooit automatisch vertrouwen, altijd verifiëren — ook intern."},
{type:"open",q:"Hoe noemt men het principe waarbij medewerkers enkel de minimaal noodzakelijke rechten krijgen?",ans:["least privilege","principe van minimale rechten","need-to-know"],h:"Het principe beperkt schade bij compromittering: je kunt alleen wat je nodig hebt."},
{type:"mc",q:"Wat is de 'attack kill chain' bij een ransomware-aanval?",o:["Verkenning → wapen → phishing → exploitatie → laterale beweging → encryptie van data → losgeld","Inloggen → data stelen → vertrekken","Phishing → DDoS → data stelen","Scanning → patchen → monitoren"],c:[0],h:"Ransomware-aanvallen volgen een reeks stappen van verkenning tot encryptie."},
{type:"mc",q:"Wat is het verschil tussen een virus en een worm?",o:["Ze zijn identiek","Een virus heeft een gastheerbestand nodig; een worm verspreidt zich zelfstandig over het netwerk","Een worm versleutelt data; een virus steelt data","Een virus is hardware-based; een worm is software-based"],c:[1],h:"Het onderscheid zit in de verspreiding: worm = autonoom, virus = parasitair."},
{type:"mc",q:"Wat is een APT (Advanced Persistent Threat)?",o:["Een snel, geautomatiseerde aanval","Een langdurige, geavanceerde aanval door goed georganiseerde groepen die onopgemerkt willen blijven","Een type ransomware","Een soort DDoS-aanval"],c:[1],h:"'Persistent' = langdurig aanwezig. APTs zijn vaak staatsgesponsord."},
{type:"multi",q:"Welke maatregelen beschermen tegen ransomware? (meerdere antwoorden)",o:["Regelmatige offline backups","Patchen van systemen","MFA op alle accounts","Gebruikers toestaan alle software te installeren","Security awareness training"],c:[0,1,2,4],h:"Eén optie vergroot net de kans op ransomware-infectie."},
{type:"mc",q:"Wat is 'lateral movement' in de context van een cyberaanval?",o:["De aanvaller beweegt fysiek naar het datacenter","Na initiële toegang beweegt de aanvaller zijdelings door het netwerk om meer systemen te compromitteren","De aanvaller verwijdert zijn sporen","De aanvaller installeert ransomware op één systeem"],c:[1],h:"Lateral = zijdelings. De aanvaller verspreidt zich van systeem naar systeem."},
{type:"mc",q:"Wat is het doel van 'threat intelligence'?",o:["Het onmiddellijk blokkeren van alle bedreigingen","Het proactief verzamelen en analyseren van informatie over dreigingsactoren en hun technieken om betere verdediging te bouwen","Het uitvoeren van penetratietests","Het trainen van medewerkers in security awareness"],c:[1],h:"Intelligence = kennis. Betere kennis van de vijand = betere verdediging."},
{type:"mc",q:"Wat is een zero-day kwetsbaarheid?",o:["Een kwetsbaarheid ontdekt op nieuwjaarsdag","Een kwetsbaarheid waarvoor nog geen patch bestaat op het moment van ontdekking/exploitatie","Een kwetsbaarheid in verouderde software","Een kwetsbaarheid enkel in open-source software"],c:[1],h:"Zero-day = 0 dagen om te patchen. De aanvaller exploiteert het voor de patch beschikbaar is."},
{type:"mc",q:"Wat is een patch en waarom is patchen essentieel?",o:["Een update die nieuwe functies toevoegt","Een fix voor een bekende kwetsbaarheid in software — patchen sluit het aanvalsvenster","Een type malware","Een back-up van software"],c:[1],h:"Patches = gaten dichten. Ongepatchte systemen zijn laaghangende vruchten voor aanvallers."},
{type:"open",q:"Hoe heet de aanvalstechniek waarbij een aanvaller een legitieme softwareupdate vervangt door een kwaadaardige versie?",ans:["supply chain attack","supply chain aanval"],h:"Het gaat over het aanvallen van de leveringsketen van software."},
{type:"mc",q:"Wat is een buffer overflow?",o:["Een server die te veel verzoeken ontvangt","Een aanval waarbij meer data in een buffer geschreven wordt dan het aankan, waardoor aangrenzend geheugen overschreven wordt","Een type SQL-aanval","Een type DDoS"],c:[1],h:"Buffer overflow = schrijven buiten de grenzen. Klassieke aanval die code-uitvoering mogelijk kan maken."},
{type:"mc",q:"Wat is het principe van 'least privilege'?",o:["Medewerkers krijgen zo veel mogelijk rechten","Gebruikers en processen krijgen enkel de minimaal noodzakelijke rechten om hun taak uit te voeren","Alleen administrators mogen inloggen","Privileges worden automatisch toegewezen"],c:[1],h:"Least privilege = beperk de schade als een account gecompromitteerd wordt."},
{type:"multi",q:"Welke zijn voorbeelden van technische controls? (meerdere antwoorden)",o:["Firewalls","Encryptie","Toegangsbadges","Beveiligingspolicies","MFA"],c:[0,1,3,4],h:"Technische controls zijn software/hardware gebaseerd. Badges zijn fysiek."},
{type:"mc",q:"Wat is een DMZ (Demilitarized Zone) in netwerkbeveiliging?",o:["Een verboden zone in het bedrijfspand","Een netwerksegment tussen het interne netwerk en het internet voor publiek toegankelijke servers — begrensd door twee firewalls","Een type VPN","Een beveiligd segment voor gevoelige data"],c:[1],h:"DMZ = tussenzone. Webservers staan in de DMZ — bereikbaar van buiten maar gescheiden van intern netwerk."},
{type:"mc",q:"Wat is VPN en hoe beschermt het?",o:["Virtual Private Network — versleuteld en geauthenticeerd tunnel over een onbetrouwbaar netwerk","Een type firewall","Een draadloos netwerk","Een beveiligde zone in het datacenter"],c:[0],h:"VPN = versleutelde tunnel. Veilig verbinden via publiek internet alsof je op het interne netwerk zit."},
{type:"mc",q:"Wat is het verschil tussen IDS en IPS?",o:["Ze zijn identiek","IDS = Intrusion Detection System (detecteert en meldt); IPS = Intrusion Prevention System (detecteert EN blokkeert)","IPS detecteert; IDS blokkeert","IDS is hardware; IPS is software"],c:[1],h:"D = Detection (melden). P = Prevention (melden + blokkeren). IPS is actiever."},
{type:"mc",q:"Wat is een WAF (Web Application Firewall)?",o:["Een standaard netwerk-firewall","Een firewall specifiek voor webapplicaties die HTTP/HTTPS verkeer inspecteert op aanvalspatronen (XSS, SQLi...)","Een type VPN","Een DNS-filter"],c:[1],h:"WAF = laag 7 firewall voor web. Begrijpt HTTP en kan aanvalspatronen herkennen."},
{type:"open",q:"Welke aanvalstechniek gebruikt een aanvaller om toegang te krijgen door het wachtwoord van een gehashte wachtwoorddatabase te kraken via vooraf berekende tabellen?",ans:["rainbow table attack","rainbow table"],h:"De tabel heeft alle kleuren van de regenboog aan mogelijkheden — vandaar de naam."},
{type:"mc",q:"Wat is salting bij wachtwoord-hashing?",o:["Wachtwoorden versleutelen met AES","Een random waarde toevoegen aan elk wachtwoord voor het hashen om rainbow table aanvallen te verhinderen","Wachtwoorden langer maken","Wachtwoorden in plaintext opslaan"],c:[1],h:"Salt = unieke willekeurige toevoeging. Maakt rainbow tables waardeloos omdat elke hash uniek is."},
{type:"mc",q:"Wat is phreaking?",o:["Een type phishing via SMS","Het manipuleren van telefoonsystemen — historisch de voorloper van moderne hacking","Een type netwerkaanval","Een social engineering techniek"],c:[1],h:"Phreaking = phone + freaking. De vroege hackers manipuleerden telefoniesystemen."},
{type:"mc",q:"Wat is het verschil tussen een white hat en black hat hacker?",o:["Kleur van hun hoed","White hat = ethische hacker met toestemming; black hat = kwaadaardige hacker zonder toestemming","White hat = beginner; black hat = expert","Ze zijn identiek"],c:[1],h:"Hoedenkleur = intentie. White = goed, black = slecht, grey = ergens tussenin."},
{type:"mc",q:"Wat is social engineering?",o:["Het bouwen van sociale netwerken","Het manipuleren van mensen om informatie te geven of acties uit te voeren — de menselijke kwetsbaarheid exploiteren","Een type netwerkaanval","Een type malware"],c:[1],h:"Social engineering = de mens aanvallen, niet de technologie. De zwakste schakel is menselijk."},
{type:"mc",q:"Wat is een man-in-the-browser aanval?",o:["Een type MitM-aanval op netwerkniveau","Malware in de browser die transacties manipuleert nadat de gebruiker is ingelogd","Een aanval via phishing e-mails","Een type XSS-aanval"],c:[1],h:"MitB = browser-level malware. Verandert transactiedata nadat de gebruiker ze heeft goedgekeurd."},
{type:"mc",q:"Wat is het 'CIA' model aangevuld met non-repudiation?",o:["CIAN","CIAR","Het CIA-model uitgebreid met de garantie dat een actie achteraf niet ontkend kan worden","CIAS"],c:[2],h:"Non-repudiation = je kunt niet ontkennen dat je een actie hebt uitgevoerd. Digitale handtekeningen bieden dit."},
{type:"mc",q:"Wat is cryptografische agility?",o:["Het snel versleutelen van data","Het vermogen om cryptografische algoritmen eenvoudig te vervangen als ze gecompromitteerd raken","Een type versleuteling","Een back-upstrategie voor sleutels"],c:[1],h:"Als SHA-1 gebroken wordt, moet je eenvoudig naar SHA-2 kunnen overstappen zonder het systeem te herbouwen."},
{type:"mc",q:"Wat is een CSP (Content Security Policy)?",o:["Een beveiligingsprotocol voor cloud","Een HTTP-header die bepaalt welke bronnen (scripts, stijlen, afbeeldingen) een webpagina mag laden — beschermt tegen XSS","Een type firewall","Een certificaatbeleid"],c:[1],h:"CSP = whitelist voor webpaginabronnen. Kwaadaardige scripts van externe domeinen worden geblokkeerd."},
{type:"mc",q:"Wat is PKI (Public Key Infrastructure)?",o:["Een type versleuteling","Een systeem van digitale certificaten, CA's en protocollen dat asymmetrische encryptie beheert en vertrouwen in publieke sleutels garandeert","Een type netwerkprotocol","Een type database"],c:[1],h:"PKI = het vertrouwenssysteem achter HTTPS. Certificate Authorities ondertekenen certificaten."},
{type:"mc",q:"Wat is een Certificate Authority (CA)?",o:["Een beveiligingsauditeur","Een vertrouwde instantie die digitale certificaten uitgeeft en ondertekent, waarbij ze de identiteit van de certificaathouder verifieert","Een type firewall","Een type encryptie"],c:[1],h:"CA = de vertrouwde derde partij. Je vertrouwt het certificaat omdat de CA het ondertekend heeft."},
{type:"mc",q:"Wat is TLS en waarvoor dient het?",o:["Een type DNS-protocol","Transport Layer Security — versleutelt en authenticeer netwerkverbindingen (opvolger van SSL)","Een type VPN","Een type firewall"],c:[1],h:"TLS = HTTPS. Versleuteld transport op laag 4. De opvolger van het verouderde SSL."},
{type:"mc",q:"Wat is een man-in-the-middle aanval op TLS?",o:["Altijd onmogelijk","Mogelijk als de aanvaller een vals certificaat kan installeren als vertrouwde CA — SSL stripping of rogue CA","Altijd eenvoudig uit te voeren","Enkel mogelijk in wifi-netwerken"],c:[1],h:"TLS-MitM vereist een vals certificaat dat de browser vertrouwt. Public key pinning beschermt hiertegen."},
{type:"mc",q:"Wat is HTTPS en hoe verschilt het van HTTP?",o:["Snellere versie van HTTP","HTTP + TLS-versleuteling. Verkeer is versleuteld en de serveridentiteit is geverifieerd via een certificaat","Een type DNS-protocol","Een alternatief voor HTTP"],c:[1],h:"HTTPS = HTTP met TLS-bescherming. Poort 443 i.p.v. 80."},
{type:"multi",q:"Welke zijn voorbeelden van twee-factor authenticatie? (meerdere antwoorden)",o:["Wachtwoord + SMS-code (OTP)","Bankkaart (have) + PIN (know)","Twee wachtwoorden","Vingerafdruk + gezichtsherkenning (beide 'are')","Wachtwoord + authenticator-app"],c:[0,1,4],h:"MFA = twee VERSCHILLENDE factoren. Vingerafdruk + gezichtsherkenning zijn beide 'something you are'."},
{type:"mc",q:"Wat is TOTP (Time-based One-Time Password)?",o:["Een eenmalig wachtwoord gebaseerd op de huidige tijd — verandert elke 30 seconden (Google Authenticator)","Een type SMS-verificatie","Een permanent wachtwoord","Een type biometrie"],c:[0],h:"TOTP = tijdgebaseerd eenmalig wachtwoord. Werkt zonder internet — enkel de klok moet kloppen."},
{type:"mc",q:"Waarom zijn SMS-gebaseerde OTPs minder veilig dan authenticator-apps?",o:["SMS is versleuteld","SMS kan onderschept worden via SIM swapping, SS7-aanvallen of MitM — authenticator-apps zijn niet afhankelijk van het telefoonsysteem","Ze zijn even veilig","SMS-codes verlopen nooit"],c:[1],h:"SIM swapping = aanvaller krijgt jouw telefoonnummer op zijn SIM. Dan ontvangt hij je SMS-codes."},
{type:"mc",q:"Wat is de Principle of Separation of Duties?",o:["Eén persoon is verantwoordelijk voor alles","Kritieke taken worden verdeeld over meerdere personen zodat geen één persoon fraude kan plegen zonder medeplichtigheid","Taken worden willekeurig verdeeld","Alleen managers hebben toegang tot gevoelige systemen"],c:[1],h:"Separation of duties = vier-ogen-principe. Bijv. een financiële transactie goedgekeurd door twee mensen."},
{type:"mc",q:"Wat is een Denial of Service (DoS) aanval?",o:["Een aanval die data steelt","Een aanval die een systeem of dienst onbereikbaar maakt door het te overspoelen met verkeer of verzoeken","Een type phishing","Een type malware"],c:[1],h:"DoS = beschikbaarheid aanvallen. DDoS = gedistribueerd (via botnet)."},
{type:"mc",q:"Wat maakt een DDoS-aanval moeilijker te mitigeren dan een DoS?",o:["DDoS gebruikt sterkere aanvallen","Het verkeer komt van duizenden bronnen (botnet) — blokkeer je één IP, er zijn nog duizenden over","DDoS is altijd versleuteld","DDoS aanvallen zijn kleiner"],c:[1],h:"Botnet = duizenden gecompromitteerde systemen. Één IP blokkeren helpt niet."},
{type:"mc",q:"Wat is een rootkit?",o:["Een type firewall","Malware die zichzelf verbergt in het OS — vaak op kernel-niveau — en aanvallen maskeert voor beveiligingssoftware","Een type wachtwoordmanager","Een beveiligingstool"],c:[1],h:"Rootkit = stealthy malware. Moeilijk te detecteren omdat het het OS zelf manipuleert."},
{type:"mc",q:"Wat is een keylogger?",o:["Een type back-up software","Software die alle toetsaanslagen registreert en doorstuurt naar een aanvaller — steelt wachtwoorden en gevoelige info","Een type versleuteling","Een type firewall"],c:[1],h:"Keylogger = registreert wat je typt. Wachtwoorden, creditcardnummers, berichten — alles."},
{type:"mc",q:"Wat is adware?",o:["Malware die data versleutelt","Software die ongewenste advertenties toont, vaak gebundeld met gratis software","Een type ransomware","Een type spyware"],c:[1],h:"Adware = advertising software. Irritant en soms een vector voor ernstigere malware."},
{type:"mc",q:"Wat is spyware?",o:["Software voor systeembeheer","Malware die stiekem informatie verzamelt over de gebruiker (surfgedrag, wachtwoorden, locatie) en doorstuurt","Een type advertentiesoftware","Een type firewall"],c:[1],h:"Spyware = bespioneer software. Verzamelt info zonder medeweten van de gebruiker."},
{type:"mc",q:"Wat is een trojan horse?",o:["Een type netwerkaanval","Malware vermomd als legitieme software — installeert een backdoor of payload terwijl de gebruiker denkt iets nuttigs te installeren","Een type worm","Een type ransomware"],c:[1],h:"Trojan = vermomde malware. Net als het mythologische paard: kwaad verborgen in iets onschuldig."},
{type:"mc",q:"Wat is een botnet?",o:["Een netwerk van beveiligingsservers","Een netwerk van gecompromitteerde computers (bots) bestuurd door een command-and-control server voor aanvallen","Een type VPN","Een beveiligd bedrijfsnetwerk"],c:[1],h:"Botnet = leger van gecompromitteerde toestellen. Gebruikt voor DDoS, spam, cryptomining..."},
{type:"mc",q:"Wat is een C2/C&C server (Command and Control)?",o:["Een back-upserver","De server waarvan een aanvaller commando's stuurt naar geïnfecteerde machines in een botnet","Een type firewall","Een legitieme serverconfiguratie"],c:[1],h:"C2 = het 'hoofdkwartier' van een aanvaller. Stuurt instructies naar alle bots."},
{type:"mc",q:"Wat is steganografie?",o:["Een type versleuteling","Het verbergen van informatie in andere data (bijv. een geheime boodschap in een afbeelding) zodat het bestaan van de informatie zelf verborgen blijft","Een type compressie","Een type digitale handtekening"],c:[1],h:"Steganografie ≠ encryptie. Encryptie maakt data onleesbaar; steganografie verbergt dat de data er is."},
{type:"mc",q:"Wat is het verschil tussen encryptie at rest en encryption in transit?",o:["Ze zijn identiek","At rest = data versleuteld op opslag (harde schijf, cloud); in transit = data versleuteld tijdens overdracht (bijv. TLS)","At rest is veiliger","In transit is veiliger"],c:[1],h:"Beide zijn nodig. At rest beschermt bij diefstal van hardware; in transit beschermt bij netwerkaflulisering."},
{type:"mc",q:"Wat is data masking?",o:["Het versleutelen van data","Het vervangen van gevoelige data door realistische maar fictieve waarden voor test/ontwikkelomgevingen","Het verwijderen van data","Een type toegangscontrole"],c:[1],h:"Masking = nep-maar-realistisch. Testomgevingen met echte klantdata zijn een beveiligingsrisico."},
{type:"open",q:"Hoe heet de techniek waarbij gevoelige data tokenized wordt — vervangen door een token zonder cryptografische relatie met de originele data?",ans:["tokenization","tokenisatie"],h:"Denk aan creditcardverwerking: het echte nummer wordt vervangen door een token."},
{type:"mc",q:"Wat is een security incident?",o:["Een geplande onderhoudsperiode","Een event dat de CIA van informatie bedreigt of schendt","Een type beveiligingsaudit","Een softwarefout zonder beveiligingsgevolgen"],c:[1],h:"Incident = CIA wordt bedreigd of geschonden. Niet elke fout is een incident."},
{type:"mc",q:"Wat is een incident response plan?",o:["Een plan voor softwarereleases","Een gedocumenteerde procedure voor het detecteren, reageren op en herstellen van beveiligingsincidenten","Een type back-upplan","Een beveiligingsaudit"],c:[1],h:"IRP = weet wat je doet als het misgaat. Zonder plan chaos; met plan controle."},
{type:"multi",q:"Welke zijn fasen van een incident response? (meerdere antwoorden)",o:["Voorbereiding","Detectie & analyse","Containment","Eradicatie","Herstel","Post-incident review"],c:[0,1,2,3,4,5],h:"Alle zes zijn officiële fasen van een incident response lifecycle."},
{type:"mc",q:"Wat is digitaal forensisch onderzoek?",o:["Een type penetratietest","Het verzamelen, bewaren en analyseren van digitale bewijzen na een incident op een manier die juridisch geldig is","Een type monitoring","Een type beveiligingsaudit"],c:[1],h:"Forensics = bewijsverzameling. Chain of custody is cruciaal voor juridische geldigheid."},
{type:"mc",q:"Wat is threat hunting?",o:["Het automatisch blokkeren van bedreigingen","Het proactief zoeken naar tekenen van aanvallen in een netwerk die niet door automatische tools zijn gedetecteerd","Een type monitoring","Een type penetratietest"],c:[1],h:"Threat hunting = actief zoeken. Niet wachten op alerts maar zelf sporen van aanvallers zoeken."},
{type:"mc",q:"Wat is een security baseline?",o:["Een minimale beveiligingsnorm","Een geconfigureerde standaard voor systemen die het minimale beveiligingsniveau definieert dat alle systemen moeten voldoen","Een type firewall-configuratie","Een monitoringdrempel"],c:[1],h:"Baseline = de minimale veilige configuratie. Alle nieuwe systemen worden hiermee geconfigureerd."},
{type:"mc",q:"Wat is vulnerability management?",o:["Het direct patchen van alle kwetsbaarheden","Een continue cyclus van het identificeren, evalueren, behandelen en rapporteren van kwetsbaarheden","Een type monitoring","Een beveiligingsaudit eenmaal per jaar"],c:[1],h:"Vulnerability management = cyclisch proces. Identificeer → Prioriteer → Remedieer → Verifieer."},
{type:"mc",q:"Wat is threat modeling?",o:["Een type monitoring","Het systematisch identificeren van bedreigingen voor een systeem om beveiligingsmaatregelen te prioriteren","Een type penetratietest","Een type beveiligingsaudit"],c:[1],h:"Threat modeling = denk als een aanvaller. Wat kan er misgaan? Hoe? Wat is de impact?"},
{type:"mc",q:"Wat is SIEM?",o:["Een type firewall","Security Information and Event Management — verzamelt en correleert logdata uit meerdere bronnen voor beveiligingsanalyse en detectie","Een type back-upsysteem","Een type IDS"],c:[1],h:"SIEM = centrale log-aggregatie + correlatie. Detecteert patronen die afzonderlijke tools missen."},
{type:"mc",q:"Wat is het doel van een beveiligingsaudit?",o:["Software updaten","Systematisch controleren of beveiligingsmaatregelen effectief zijn en voldoen aan normen","Netwerken monitoren","Incidenten behandelen"],c:[1],h:"Audit = verificatie. Zijn de maatregelen die we zeggen te hebben ook effectief?"},
{type:"mc",q:"Wat is phishing simulation?",o:["Echte phishing aanvallen","Gecontroleerde nep-phishing aanvallen op eigen medewerkers om hun alertheid te testen en te trainen","Een type security training","Een type penetratietest"],c:[1],h:"Phishing simulatie = test je eigen mensen. Klikken ze? Dan moeten ze training krijgen."},
{type:"mc",q:"Wat is security awareness training?",o:["Technische beveiligingstraining voor IT-medewerkers","Opleiding voor alle medewerkers om beveiligingsrisico's te herkennen en correct te reageren","Een type certificering","Een type compliance-audit"],c:[1],h:"Security awareness = de menselijke firewall trainen. Technologie alleen is niet genoeg."},
{type:"mc",q:"Wat is het security onion model?",o:["Een type UI voor SIEM","Het concept van meerdere beveiligingslagen waarbij de meest waardevolle data in het centrum zit beschermd door meerdere lagen","Een type netwerktopologie","Een monitoringstool"],c:[1],h:"Security onion = defense in depth visueel. Zoals een ui: laag na laag bescherming."},
{type:"mc",q:"Wat is OWASP?",o:["Een type firewall","Open Web Application Security Project — een non-profit die resources biedt voor webapplicatiebeveiliging, incl. de OWASP Top 10","Een standaard voor netwerken","Een type certificering"],c:[1],h:"OWASP Top 10 = de tien meest voorkomende webapplicatiekwetsbaarheden. Bijbel voor web security."},
{type:"mc",q:"Wat staat bovenaan de OWASP Top 10 als meest kritieke risico?",o:["XSS","Broken Access Control","SQL Injection","Insecure Direct Object Reference"],c:[1],h:"Broken Access Control staat sinds 2021 op #1 — toegangscontrolefouten zijn het meest voorkomend."},
{type:"mc",q:"Wat is insecure direct object reference (IDOR)?",o:["Een type XSS-aanval","Een kwetsbaarheid waarbij een aanvaller direct toegang krijgt tot objecten (bestanden, records) door de ID te raden/manipuleren","Een type SQL-aanval","Een type sessie-aanval"],c:[1],h:"IDOR = bijv. user/123/profiel → verander naar user/124/profiel → je ziet andermans profiel."},
{type:"mc",q:"Wat is security misconfiguration?",o:["Het instellen van een verkeerde firewall","Een van de meest voorkomende kwetsbaarheden: standaard credentials, onnodige services, fout geconfigureerde permissions","Een type SQL-aanval","Een type malware"],c:[1],h:"Misconfiguratie = de laagste-inspanning aanval. Standaard wachtwoorden, onnodige poorten open..."},
{type:"mc",q:"Wat is broken authentication?",o:["Authenticatie die te traag is","Kwetsbaarheden in authenticatiemechanismen die aanvallers toelaten sessies over te nemen of credentials te raden","Een type MFA","Een type firewall"],c:[1],h:"Broken auth = aanvallers kunnen inloggen als iemand anders. Zwakke sessie-beheer, geen MFA..."},
{type:"mc",q:"Wat is een security header zoals X-Frame-Options?",o:["Een type cookie","Een HTTP-response header die de browser instrueert bepaalde beveiligingsmaatregelen toe te passen — bijv. voorkomt dat de pagina in een iframe geplaatst wordt","Een type TLS-certificaat","Een type WAF-regel"],c:[1],h:"X-Frame-Options: DENY/SAMEORIGIN voorkomt clickjacking door iframing van je pagina te verbieden."},
{type:"mc",q:"Wat is input validatie en waarom is het cruciaal?",o:["Controleren of gebruikersinput logisch is","Het valideren én sanitizeren van alle gebruikersinput om injection aanvallen (SQL, XSS, command) te voorkomen","Een type logging","Een type authenticatie"],c:[1],h:"Nooit vertrouw op gebruikersinput. Validate server-side, altijd."},
{type:"mc",q:"Wat is het verschil tussen blacklisting en whitelisting bij input validatie?",o:["Ze zijn identiek","Blacklisting blokkeert bekende gevaarlijke input; whitelisting staat enkel bekende veilige input toe — whitelisting is veiliger","Whitelisting is minder veilig","Blacklisting blokkeert alles"],c:[1],h:"Whitelist = sta enkel toe wat je kent als veilig. Blacklist = blokkeer wat je kent als gevaarlijk. Blacklist mist altijd."},
{type:"mc",q:"Wat is code injection in het algemeen?",o:["Een type back-up","Het injecteren van uitvoerbare code in een programma via ongevalideerde input die dan uitgevoerd wordt met de rechten van het programma","Een type versleuteling","Een type monitoring"],c:[1],h:"Injection = data die als code behandeld wordt. SQL, OS-commando's, LDAP, XML... allemaal mogelijk."},
{type:"mc",q:"Wat is OS command injection?",o:["Een aanval op het OS via een fysiek medium","Een aanval waarbij OS-commando's worden meegestuurd als gebruikersinput die dan door de server worden uitgevoerd","Een type privilege escalation","Een type buffer overflow"],c:[1],h:"Bijv. een webformulier voert 'ping ' + userinput uit. Aanvaller voert in: 'google.com; rm -rf /'"},
{type:"mc",q:"Wat is HSTS (HTTP Strict Transport Security)?",o:["Een type authenticatieprotocol","Een HTTP-header die de browser dwingt enkel via HTTPS te verbinden — voorkomt SSL stripping aanvallen","Een type firewall","Een type VPN"],c:[1],h:"HSTS = eenmaal gezien, nooit meer HTTP. Browser onthoudt dat deze site HTTPS vereist."},
{type:"mc",q:"Wat is een SSL stripping aanval?",o:["Het breken van een SSL-certificaat","Een MitM-aanval waarbij de aanvaller HTTPS degradeert naar HTTP tussen het slachtoffer en de aanvaller, terwijl de aanvaller wel HTTPS gebruikt naar de server","Een type XSS-aanval","Een type DNS-aanval"],c:[1],h:"SSL stripping = slachtoffer denkt HTTPS maar communiceert met aanvaller via HTTP. HSTS beschermt."},
{type:"mc",q:"Wat is clickjacking en hoe werkt het?",o:["Automatisch klikken door een bot","Een transparante laag over een legitieme site plaatsen zodat het slachtoffer denkt iets te klikken maar in werkelijkheid iets anders aanklikt","Een type XSS","Een type CSRF"],c:[1],h:"Transparante iframe over een knop. 'Klik hier om te winnen' → klikt in werkelijkheid op 'Bevestig betaling'."},
{type:"mc",q:"Wat is het verschil tussen authentication en authorization?",o:["Ze zijn identiek","Authentication = wie ben je? (identiteit verifiëren); Authorization = wat mag je doen? (rechten bepalen)","Authorization = identiteit; Authentication = rechten","Authentication is sterker dan authorization"],c:[1],h:"Eerst authenticeer je (wie), dan autoriseer je (wat mag die wie). Twee aparte stappen."},
{type:"mc",q:"Wat is RBAC (Role-Based Access Control)?",o:["Een type firewall","Een toegangscontrolesysteem waarbij rechten worden toegewezen aan rollen, en gebruikers aan rollen worden gekoppeld","Een type biometrie","Een type encryptie"],c:[1],h:"RBAC = rechten via rollen. Bijv. 'Accountant' rol heeft toegang tot factuurmodule. Makkelijker te beheren."},
{type:"mc",q:"Wat is een access control lijst (ACL) in de context van bestandssystemen?",o:["Een type firewall-configuratie","Een lijst gekoppeld aan een object (bestand, map) die specificeert welke gebruikers of groepen welke rechten hebben","Een type authenticatie","Een type encryptie"],c:[1],h:"ACL op bestandsniveau = granulaire controle. Niet enkel eigenaar/groep/anderen maar per gebruiker/groep."},
{type:"mc",q:"Wat is een Security Operations Center (SOC)?",o:["Een type datacenter","Een team en faciliteit die 24/7 beveiligingsevenementen monitort, analyseert en op incidenten reageert","Een type firewall","Een type certificering"],c:[1],h:"SOC = de wacht van een organisatie. Altijd waakzaam, detecteert en reageert op aanvallen."},
{type:"mc",q:"Wat is threat intelligence sharing?",o:["Het delen van beveiligingssoftware","Het uitwisselen van informatie over dreigingen, aanvalspatronen en IOCs tussen organisaties om collectief beter voorbereid te zijn","Een type monitoring","Een type audit"],c:[1],h:"Samenwerken = sterkere verdediging. Als jouw concurrent aangevallen wordt, leer jij ervan."},
{type:"mc",q:"Wat is een IoC (Indicator of Compromise)?",o:["Een type beveiligingscertificaat","Forensisch bewijs of artefacten die erop wijzen dat een systeem gecompromitteerd is (bijv. verdacht IP, malware hash, vreemde registry key)","Een type malware","Een type audit"],c:[1],h:"IoC = bewijs van aanwezigheid van een aanvaller. Gebruikt om aanvallen te detecteren en te correleren."},
{type:"mc",q:"Wat is responsible disclosure?",o:["Kwetsbaarheden onmiddellijk publiek maken","Het proces waarbij een beveiligingsonderzoeker een kwetsbaarheid meldt aan de leverancier zodat die een patch kan ontwikkelen, voor publieke bekendmaking","Kwetsbaarheden nooit publiceren","Kwetsbaarheden verkopen aan de hoogste bieder"],c:[1],h:"Responsible disclosure = first give the vendor time to fix, then publish. Balans tussen transparantie en veiligheid."},
{type:"mc",q:"Wat is een bug bounty programma?",o:["Een type beveiligingscertificering","Een programma waarbij organisaties beloningen uitbetalen aan ethische hackers die kwetsbaarheden vinden en verantwoordelijk melden","Een type monitoring","Een type penetratietest"],c:[1],h:"Bug bounty = betaal hackers om te zoeken voor je. Goedkoper dan een hack achteraf."},
{type:"mc",q:"Wat is de purpose van security baselines bij OS configuratie?",o:["Alle functies inschakelen","Een minimaal geconfigureerde maar maximaal beveiligde standaardconfiguratie die als referentiepunt dient voor alle systemen","Alle updates installeren","Alle niet-standaard software verwijderen"],c:[1],h:"Baseline = gestandaardiseerde veilige configuratie. Elke afwijking moet bewust en goedgekeurd zijn."},
{type:"mc",q:"Wat is het verschil tussen een vulnerability scan en een penetratietest?",o:["Ze zijn identiek","Vulnerability scan = automatisch identificeren van kwetsbaarheden; penetratietest = manuele exploitatie van kwetsbaarheden om de echte impact te bepalen","Penetratietest is automatisch","Vulnerability scan is manueel"],c:[1],h:"Scan = wat is kwetsbaar? Pentest = kan ik het ook echt exploiteren? Pentest is dieper."},
{type:"mc",q:"Wat is een red team oefening?",o:["Een IT-team dat systemen monitort","Een team van ethische hackers die realistische aanvallen simuleren op een organisatie om de verdedigingscapaciteit te testen","Een type beveiligingsaudit","Een type compliance-controle"],c:[1],h:"Red team = aanvalssimulatie. Blue team = verdediging. Red team test of de blue team standhoudt."},
{type:"mc",q:"Wat is een purple team oefening?",o:["Een combinatie van rood en blauw","Een oefening waarbij red team en blue team samenwerken om detectie en response te verbeteren in plaats van puur te concurreren","Een type audit","Een type monitoring"],c:[1],h:"Purple = rood + blauw. Samenwerking i.p.v. competitie. Sneller leren en verbeteren."},
