{type:"mc",q:"Wat is de purpose van een 'Zabbix proxy' in een grootschalige omgeving?",o:["Back-up van de Zabbix server","Een tussenschakel die data verzamelt voor een deel van het netwerk en doorstuurt — verlaagt load op de centrale server","Een type agent","Een type template"],c:[1],h:"Proxy = gedistribueerde monitoring. Elke remote site heeft een proxy die lokaal data verzamelt."},
{type:"mc",q:"Wat is 'SNMP v3 authPriv'?",o:["SNMP zonder authenticatie","SNMP v3 modus met zowel authenticatie (wachtwoord) als encryptie (AES/DES) — de veiligste SNMP-configuratie","SNMP met enkel authenticatie","SNMP zonder encryptie"],c:[1],h:"authPriv = maximale beveiliging voor SNMP. Auth = wie ben je? Priv = niemand kan meelezen."},
{type:"mc",q:"Wat is het doel van 'Zabbix history storage compression'?",o:["Snellere queries","Het comprimeren van historische data in de database om opslagruimte te besparen — bijv. via TimescaleDB compression","Betere grafiekkwaliteit","Snellere alerts"],c:[1],h:"Compressie = minder opslagruimte voor dezelfde historische data. TimescaleDB kan 90%+ comprimeren."},
{type:"mc",q:"Wat is een 'Zabbix item value type'?",o:["Het type monitoring item","Het datatype van de waarde die een item opslaat: numeriek (float/integer), string, tekst, log","Een type trigger","Een type actie"],c:[1],h:"Value type = hoe de data opgeslagen wordt. Getallen als float/integer; tekst als character/text; logs apart."},
{type:"mc",q:"Wat is de standaard poort van de Zabbix web-interface?",o:["8080","80 (HTTP) of 443 (HTTPS) — afhankelijk van de webserverconfiguratie","3000","8443"],c:[1],h:"Zabbix web draait op Apache/Nginx — standaard poort 80 of 443 voor HTTPS."},
{type:"mc",q:"Wat is een 'Zabbix alert script'?",o:["Een interne script","Een extern script dat Zabbix oproept als notificatie-methode — nuttig voor aangepaste alertkanalen","Een type back-up script","Een type discovery script"],c:[1],h:"Alert scripts = custom notificaties. Bijv. een script dat een ticket aanmaakt in Jira bij een alert."},
{type:"mc",q:"Wat is de purpose van 'item units' in Zabbix?",o:["De frequentie van monitoring","De meeteenheid die weergegeven wordt bij een item-waarde (bijv. bytes, %, req/s) — maakt grafieken begrijpelijker","Een type trigger-drempel","Een type berekening"],c:[1],h:"Units = context. 8589934592 bytes → 8 GB. Zabbix kan automatisch eenheden converteren."},
{type:"mc",q:"Wat is het verschil tussen een 'check_period' en 'update_interval' in Zabbix?",o:["Ze zijn identiek","update_interval = hoe vaak het item uitgelezen wordt; check_period = de periode waarbinnen het item actief is (bijv. enkel tijdens kantooruren)","check_period bepaalt de frequentie","update_interval bepaalt wanneer gemonitord wordt"],c:[1],h:"Je kunt items beperken tot bepaalde tijdvensters — bijv. een item enkel 's nachts actief."},
{type:"mc",q:"Wat is 'Zabbix network discovery' vs 'agent auto-registration'?",o:["Ze zijn identiek","Network discovery = Zabbix scant actief IP-bereiken; auto-registration = agents melden zich zelf aan bij de server","Auto-registration is uitgebreider","Network discovery vereist een agent"],c:[1],h:"Discovery = pull (Zabbix zoekt). Auto-registration = push (agent meldt zich). Verschillende use cases."},
{type:"mc",q:"Wat is een 'Zabbix script' (global script)?",o:["Een type alertscript","Een script dat vanuit de Zabbix-interface handmatig uitgevoerd kan worden op een host — bijv. ping, traceroute, service restart","Een type back-up","Een type LLD"],c:[1],h:"Global scripts = on-demand acties. Rechtermuisklik op een host → voer script uit op die host."},
{type:"mc",q:"Wat is de maximale lengte van een SNMP community string?",o:["8 tekens","16 tekens","127 tekens — maar korter is gebruikelijker","Onbeperkt"],c:[2],h:"Technisch 127 tekens, maar gebruik een sterke willekeurige string. 'public' is absoluut te vermijden."},
{type:"mc",q:"Wat is 'rate limiting' in de context van Zabbix API?",o:["Beperking van item-waarden","Beperking van het aantal API-verzoeken per tijdseenheid om overbelasting van de Zabbix-server te voorkomen","Een type trigger","Een type actie"],c:[1],h:"API rate limiting = bescherm de server tegen te veel gelijktijdige API-calls van externe scripts."},
{type:"mc",q:"Welk protocol gebruikt Zabbix voor communicatie met de Java Gateway?",o:["SNMP","JMX over TCP (poort 10052 standaard)","HTTP REST","SOAP"],c:[1],h:"Java Gateway luistert op TCP poort 10052. Zabbix server communiceert via dit kanaal met JMX-bronnen."},
{type:"mc",q:"Wat is de purpose van 'Zabbix frontend' configuratiebestand?",o:["Monitoring-instellingen","De configuratie van de web-interface (database-verbinding, Zabbix-server adres) — zconf.php of zabbix.conf.php","Agent-instellingen","Template-instellingen"],c:[1],h:"De frontend config verbindt de web-UI met de database en Zabbix-server."},
{type:"mc",q:"Wat is 'Zabbix keepalive' voor agents?",o:["Een type back-up","De instelling die bepaalt hoe lang een TCP-verbinding open blijft tussen active agent en server — vermindert overhead","Een type trigger","Een type macro"],c:[1],h:"Keepalive = verbinding open houden. Minder TCP-handshakes = efficiënter voor actieve agents."},
{type:"mc",q:"Welke informatie bevat een syslog-bericht? (RFC 5424 formaat)",o:["Enkel de boodschap","Prioriteit (facility+severity), versie, timestamp, hostname, applicatienaam, process-ID, message-ID en de boodschap","Enkel timestamp en boodschap","Enkel severity en boodschap"],c:[1],h:"RFC 5424 syslog = gestandaardiseerd en rijk format met veel metadata naast de eigenlijke boodschap."},
{type:"mc",q:"Wat is facility in syslog?",o:["De ernst van het bericht","Een code die de bron of categorie van het bericht aangeeft (bijv. kern=kernel, auth=authenticatie, mail=mailserver)","De timestamp","De hostname van de afzender"],c:[1],h:"Facility = welk subsysteem genereert dit bericht? kern(0) voor kernel, user(1) voor gebruikersmeldingen."},
{type:"mc",q:"Wat is de 'severity' in syslog?",o:["De bron van het bericht","Het ernstniveau: 0=Emergency tot 7=Debug — hoe lager het getal, hoe ernstiger","De tijdstempel","De hostname"],c:[1],h:"Syslog severity: 0=Emergency, 1=Alert, 2=Critical, 3=Error, 4=Warning, 5=Notice, 6=Info, 7=Debug."},
{type:"open",q:"Welk Linux-commando gebruik je om realtime de laatste regels van een logbestand te volgen?",ans:["tail -f","tail"],h:"Het commando werkt met de optie -f voor 'follow'."},
{type:"mc",q:"Wat is 'log parsing' in de context van monitoring?",o:["Logbestanden comprimeren","Het gestructureerd analyseren van logberichten om relevante informatie te extraheren voor monitoring en alerting","Logbestanden verwijderen","Logbestanden overbrengen"],c:[1],h:"Log parsing = ruwe tekst omzetten in bruikbare data. Bijv. extraheer HTTP-statuscodes uit access logs."},
{type:"mc",q:"Wat is Graylog?",o:["Een type firewall","Een open-source log management en SIEM platform voor het centraal verzamelen, zoeken en analyseren van logdata","Een type Zabbix-plugin","Een type back-upoplossing"],c:[1],h:"Graylog = gecentraliseerd log management. Alternatief voor ELK stack (Elasticsearch, Logstash, Kibana)."},
{type:"mc",q:"Wat is de ELK-stack?",o:["Een type netwerk","Elasticsearch (opslag/search) + Logstash (verwerking) + Kibana (visualisatie) — populaire stack voor log analytics","Een type firewall","Een type monitoring"],c:[1],h:"ELK = de log analytics driehoek. Logstash verwerkt, Elasticsearch slaat op, Kibana visualiseert."},
{type:"mc",q:"Wat is Prometheus in relatie tot monitoring?",o:["Een type database","Een open-source monitoring systeem en tijdreeksdatabase, populair voor Kubernetes/cloud monitoring","Een type Zabbix-alternatief enkel","Een type log manager"],c:[1],h:"Prometheus = pull-based monitoring. Verzamelt metrics via HTTP scraping. Vaak gecombineerd met Grafana."},
{type:"mc",q:"Wat is een 'exporter' in Prometheus-context?",o:["Een export functie","Een service die metrics verzamelt van een applicatie en blootstelt in Prometheus-formaat (bijv. node_exporter, mysqld_exporter)","Een type back-up","Een type alert"],c:[1],h:"Exporters = Prometheus-compatibele metric-bronnen. Node exporter = systeemmetrics, mysqld exporter = database."},
{type:"mc",q:"Wat is Alertmanager in het Prometheus-ecosysteem?",o:["Een type dashboard","Een component die alerts van Prometheus ontvangt, dedupliceert, groepeert en doorstuurt naar notificatiekanalen","Een type exporter","Een type database"],c:[1],h:"Alertmanager = het alertverwerkingscomponent. Zorgt voor deduplicatie en routing van Prometheus-alerts."},
{type:"mc",q:"Wat is InfluxDB in relatie tot monitoring?",o:["Een type firewall","Een tijdreeksdatabase geoptimaliseerd voor monitoring-metrics — vaak gecombineerd met Grafana en Telegraf","Een type log manager","Een type Zabbix-alternatief"],c:[1],h:"InfluxDB + Telegraf + Grafana = de TIG-stack. Alternatief voor Prometheus voor tijdreeksdata."},
{type:"mc",q:"Wat is 'metric cardinality' en waarom is het een probleem?",o:["De kwaliteit van metrics","Het aantal unieke combinaties van labels/tags voor een metric — hoge cardinality explodeert de opslagruimte en query-tijd","De nauwkeurigheid van metingen","De frequentie van metrics"],c:[1],h:"Hoge cardinality = miljarden unieke tijdreeksen. Bijv. elke HTTP-request als aparte metric = onschaalbaar."},
{type:"mc",q:"Wat is 'scrape interval' in Prometheus?",o:["De bewaartermijn voor data","Hoe vaak Prometheus metrics ophaalt bij een exporter — standaard 15 seconden","De timeout voor scrapes","Het maximale aantal targets"],c:[1],h:"Scrape interval = polling frequentie. 15s is standaard; verlaag voor kritieke systemen, verhoog voor minder belangrijke."},
{type:"mc",q:"Wat is PromQL?",o:["Een type SQL voor databases","De querytaal van Prometheus voor het bevragen en berekenen van tijdreeksdata","Een type dashboard-configuratie","Een type alert-syntaxis"],c:[1],h:"PromQL = Prometheus Query Language. Krachtig maar anders dan SQL — tijdreeksgeoriënteerd."},
{type:"mc",q:"Wat is het verschil tussen 'push' en 'pull' monitoring?",o:["Ze zijn identiek","Pull = monitoring systeem haalt actief data op (Zabbix passive, Prometheus); Push = bronnen sturen data naar het monitoring systeem (Zabbix active, SNMP traps)","Push is altijd veiliger","Pull vereist meer bandbreedte"],c:[1],h:"Pull = Zabbix/Prometheus vraagt. Push = bron verstuurt. Elk heeft voor- en nadelen bij firewalls."},
{type:"mc",q:"Wat is 'service discovery' in monitoring?",o:["Het detecteren van netwerkdiensten","Het automatisch ontdekken en toevoegen van te monitoren targets zonder manuele configuratie — bijv. Prometheus met Kubernetes","Een type SNMP-discovery","Een type Zabbix LLD"],c:[1],h:"Service discovery = automatisch bijhouden van dynamische infrastructuren. Essentieel in cloud/containers."},
{type:"mc",q:"Wat is container monitoring en waarom verschilt het van traditionele servermonitoring?",o:["Er is geen verschil","Containers zijn vluchtig (ephemeral) en dynamisch — traditionele agentinstallatie werkt niet. Monitoring moet adaptief zijn aan het container-lifecycle","Containers zijn eenvoudiger te monitoren","Container monitoring vereist SNMP"],c:[1],h:"Containers starten en stoppen snel. Statische monitoring-configs werken niet — service discovery is vereist."},
{type:"mc",q:"Wat is 'log aggregation' en waarom is het belangrijk?",o:["Het samenvoegen van logbestanden op één server voor archief","Het centraliseren van logs van alle systemen op één platform voor correlatie, analyse en doorzoekbaarheid","Het comprimeren van logs","Het verwijderen van oude logs"],c:[1],h:"Log aggregation = alle logs op één plek. Eén incident = logs op 10 servers. Centraal zoeken = tijdwinst."},
{type:"mc",q:"Wat is 'structured logging'?",o:["Het opslaan van logs in bestanden","Het schrijven van logs in een gestructureerd formaat (bijv. JSON) zodat ze makkelijker te parsen en doorzoeken zijn","Het versleutelen van logs","Het roteren van logs"],c:[1],h:"Structured = JSON of key-value. Machine-leesbaar. Veel eenvoudiger te doorzoeken dan vrije tekst."},
{type:"mc",q:"Wat is 'log shipping'?",o:["Het fysiek verplaatsen van logmedia","Het automatisch doorsturen van logs van productiemachines naar een centrale log-aggregatieoplossing","Het back-uppen van logs","Het versleutelen van logs voor transport"],c:[1],h:"Log shipping = logs van A naar B sturen. Tools: Filebeat, Logstash, rsyslog met remote target."},
{type:"mc",q:"Wat is de role van Filebeat in de ELK-stack?",o:["Het analyseren van logs","Een lichtgewicht log-shipper die logbestanden monitort en naar Logstash of Elasticsearch stuurt","Een type database","Een type dashboard"],c:[1],h:"Filebeat = de log-verzamelaar op het bronmachine. Lichtgewicht, betrouwbaar, met backpressure support."},
{type:"mc",q:"Wat is 'log retention compliance'?",o:["Het technisch bewaren van logs","Het naleven van wettelijke en beleidsmatige vereisten voor hoe lang bepaalde logs bewaard moeten worden","Het automatisch verwijderen van logs","Het versleutelen van gearchiveerde logs"],c:[1],h:"Bijv. GDPR, NIS2 of sector-specifieke regels kunnen minimale bewaartermijnen voor security logs opleggen."},
{type:"mc",q:"Wat is een 'correlation rule' in SIEM?",o:["Een type SQL-query","Een regel die meerdere events uit verschillende bronnen combineert om complexe aanvalspatronen te detecteren die individuele events zouden missen","Een type alert","Een type log filter"],c:[1],h:"Bijv. 5 mislukte logins + 1 succesvolle login vanuit hetzelfde IP = brute-force detectie."},
{type:"mc",q:"Wat is 'false positive' in de context van monitoring en alerting?",o:["Een succesvolle aanval","Een alert gegenereerd voor iets dat geen echt probleem is — veroorzaakt alert fatigue","Een gemiste aanval","Een type trigger"],c:[1],h:"False positive = loos alarm. Te veel false positives → beheerders negeren alle alerts → gevaarlijk."},
{type:"mc",q:"Wat is 'alert fatigue'?",o:["Vermoeidheid door te veel werken","Het fenomeen waarbij beheerders alerts beginnen te negeren vanwege een te hoge frequentie van meldingen, inclusief valse positieven","Een type monitoring probleem","Een type Zabbix configuratie"],c:[1],h:"Alert fatigue = de wolf die roept. Teveel alerts → beheerder negeert ze → echte alert gemist."},
{type:"mc",q:"Wat is 'anomaly detection' in monitoring?",o:["Het detecteren van netwerkanomalieen","Het automatisch detecteren van afwijkingen van normale gedragspatronen via statistische of ML-methoden","Een type threshold alert","Een type SNMP discovery"],c:[1],h:"Anomaly detection = geen vaste drempel maar dynamische baseline. Detecteert ongewone patronen."},
{type:"mc",q:"Wat is de 'cardinality' van een metric label?",o:["Het gewicht van de metric","Het aantal unieke waarden dat een label kan aannemen — hoge cardinality belast de tijdreeksdatabase","De frequentie van de metric","De nauwkeurigheid van de metric"],c:[1],h:"Laag cardinality = goed (bijv. status: ok/error). Hoog cardinality = slecht (bijv. user_id als label)."},
{type:"mc",q:"Wat is 'Golden Signals' monitoring (Google SRE)?",o:["Een type dashboard","Vier key metrics: Latency, Traffic, Errors, Saturation — de minimale set voor effectieve service monitoring","Een type alert","Een type SLA"],c:[1],h:"Golden Signals = de vier essentiële metrics voor elke service. Simpel maar krachtig."},
{type:"mc",q:"Wat is 'USE method' voor monitoring?",o:["Een type gebruiksmonitoring","Utilization, Saturation, Errors — een methodologie voor het analyseren van resource performance problemen","Een type alertmethode","Een type SLA methode"],c:[1],h:"USE method door Brendan Gregg. Utilization = hoe druk? Saturation = wachtrij? Errors = fouten?"},
{type:"mc",q:"Wat is 'RED method' voor service monitoring?",o:["Een type alertkleur","Rate, Errors, Duration — focus op request-gebaseerde metrics voor microservices monitoring","Een type dashboard","Een type SLA"],c:[1],h:"RED = hoe snel behandel je verzoeken (rate), hoeveel gaan fout (errors), hoe lang duurt het (duration)?"},
{type:"mc",q:"Wat is een 'runbook' in het kader van incident response?",o:["Een type logboek","Een gedocumenteerde stap-voor-stap procedure voor het afhandelen van specifieke incidenten — hoe herstel je service X?","Een type back-up","Een type monitoring configuratie"],c:[1],h:"Runbook = procedures voor ops. 2u 's nachts, dienst is neer, wat doe je? Het runbook vertelt je."},
{type:"mc",q:"Wat is MTTR en hoe beïnvloedt monitoring het?",o:["Maximum Time To Restore","Mean Time To Repair — goede monitoring verlaagt MTTR door snellere detectie en betere diagnose-informatie","Minimum Time To Recover","Monthly Time to Repair"],c:[1],h:"Snelle detectie + goede diagnoseinformatie (logs, metrics) = kortere herstelijd. Monitoring = lagere MTTR."},
{type:"mc",q:"Wat is 'SLI' (Service Level Indicator)?",o:["Een type SLA","Een specifieke meetwaarde die de kwaliteit van een service uitdrukt (bijv. beschikbaarheid als % van succesvolle requests)","Een type alert","Een type KPI voor HR"],c:[1],h:"SLI = de maat voor servicekwaliteit. SLO = de target voor die maat. SLA = de contractuele afspraak."},
{type:"mc",q:"Wat is 'SLO' (Service Level Objective)?",o:["Een type SLA","De interne doelstelling voor een SLI — bijv. 99,9% beschikbaarheid — nog geen contractuele verplichting","Een type KPI","Een type monitoring threshold"],c:[1],h:"SLO = intern doel. Als je SLO faalt, krijgt de klant het misschien nog niet te voelen. SLA-falen wel."},
{type:"mc",q:"Wat is een 'error budget' in SRE?",o:["Een budget voor foutoplossing","Het maximale aantal fouten of downtime toegestaan binnen een tijdsperiode op basis van de SLO — bijv. 0,1% van de tijd offline","Een type financieel budget","Een type alert"],c:[1],h:"Error budget = 100% - SLO. Bij 99,9% SLO = 0,1% downtime budget = 8,76u/jaar. Opgebruikt? Geen deployments."},
{type:"mc",q:"Waarom is het belangrijk om monitoring zelf te monitoren?",o:["Het is niet nodig","Als het monitoring systeem zelf uitvalt, detecteer je geen problemen meer — monitor de beschikbaarheid van Zabbix/Prometheus/etc.","Monitoring monitort zichzelf automatisch","Alleen grote bedrijven moeten dit doen"],c:[1],h:"Quis custodiet ipsos custodes? Wie bewaakt de wachter? Zabbix neer = blind. Monitor je monitoring."},
{type:"mc",q:"Wat is 'topology discovery' in Zabbix?",o:["Een type netwerkscan","Het automatisch ontdekken van de netwerktopologie en relaties tussen hosts voor de network map","Een type LLD","Een type template"],c:[1],h:"Topology discovery = wie is verbonden met wie? Maakt automatische netwerkmaps mogelijk."},
{type:"mc",q:"Wat is een 'Zabbix problem tag'?",o:["Een type trigger tag","Een label gekoppeld aan een probleem voor filtering, correlatie en routing van acties","Een type host tag","Een type item tag"],c:[1],h:"Problem tags = organiseer problemen. Route alerts op basis van tags naar het juiste team."},
{type:"mc",q:"Wat is 'capacity planning' en hoe helpt monitoring?",o:["Het plannen van serverruimte","Het voorspellen van toekomstige resourcebehoeften op basis van trends in historische monitoring-data","Een type audit","Een type back-up"],c:[1],h:"Trend data + groeipercentage = capaciteitsplanning. Wanneer heb ik meer schijfruimte/RAM/CPU nodig?"},
{type:"mc",q:"Wat is 'on-call rotation' in een monitoring context?",o:["Roterend schema waarbij beheerders om beurt verantwoordelijk zijn voor het reageren op kritieke alerts buiten de kantooruren","Een type monitoring software","Een type alertfilter","Een type SLA"],c:[0],h:"On-call = wie is vannacht verantwoordelijk? Zabbix kan de juiste persoon alerteren op basis van schema."},
{type:"mc",q:"Wat is een postmortem rapport na een incident?",o:["Een type audit rapport","Een analyse na een incident die de oorzaak, tijdlijn, impact en verbeteracties documenteert — blameless culture","Een type back-up rapport","Een type monitoring rapport"],c:[1],h:"Postmortem = leer van incidenten. Blameless = focus op systemen/processen, niet op schuldige personen."},
{type:"mc",q:"Wat is 'mean time between failures' (MTBF) en hoe meet je het?",o:["Hoe lang herstel duurt","De gemiddelde tijdsduur tussen twee storingen — meet door alle uptime-periodes te middelen","De maximale uptime","De minimale downtime"],c:[1],h:"MTBF = betrouwbaarheidsmaatstaf. Hogere MTBF = minder frequent uitvallen = betrouwbaarder systeem."},
{type:"mc",q:"Waarom bewaar je monitoring-data over langere periodes?",o:["Om compliance te bewijzen","Voor trend-analyse, capaciteitsplanning, SLA-rapportage en vergelijking met historische situaties","Om GDPR te bewijzen","Om back-ups te valideren"],c:[1],h:"Historische data = context. Hoe presteerde de server een jaar geleden? Trend naar beneden of boven?"},
{type:"mc",q:"Wat is een 'Zabbix data collector'?",o:["Een type agent","Elk component dat data verzamelt voor Zabbix: agent, SNMP, IPMI, HTTP agent, external check, database monitor","Een type proxy","Een type template"],c:[1],h:"Zabbix ondersteunt vele data-collectiemethodes. Kies de methode die past bij het te monitoren systeem."},
{type:"mc",q:"Wat is 'performance baseline' in monitoring?",o:["Een minimale drempelwaarde","De gedocumenteerde normale prestatieniveaus van een systeem waartegen afwijkingen gemeten worden","Een type trigger","Een type SLA"],c:[1],h:"Baseline = wat is normaal? Zonder baseline weet je niet wat abnormaal is. Verzamel data, analyseer trends."},
{type:"mc",q:"Wat is het doel van een 'monitoring maturity model'?",o:["Een type certificering","Een framework dat organisaties helpt te begrijpen waar ze staan in hun monitoring-volwassenheid en hoe ze kunnen verbeteren","Een type monitoring software","Een type SLA framework"],c:[1],h:"Van reactief (gebruiker belt) → proactief (alert voor impact) → predictief (probleem voor het optreedt)."},
{type:"mc",q:"Wat is 'synthetic monitoring'?",o:["Monitoring via nep data","Het simuleren van gebruikersinteracties met een applicatie vanuit externe locaties om beschikbaarheid en performance te meten","Een type log monitoring","Een type SNMP monitoring"],c:[1],h:"Synthetic = simuleer gebruikers van buiten. Test of je website bereikbaar en snel is vanuit verschillende locaties."},
{type:"mc",q:"Wat is 'real user monitoring' (RUM)?",o:["Monitoring door echte beheerders","Het meten van de werkelijke ervaringen van echte gebruikers met een applicatie — performantie vanuit de browser","Een type synthetic monitoring","Een type log monitoring"],c:[1],h:"RUM = echte gebruikerservaringen meten. Browser stuurt performantiedata naar de monitoring server."},
];

window.QUESTIONS_databanken = [
{type:"mc",q:"Wat is een database (databank)?",o:["Een spreadsheet","Een gestructureerde verzameling elektronische gegevens die door één of meerdere gebruikers gelijktijdig gemanipuleerd kan worden","Een programmeertaal","Een type besturingssysteem"],c:[1],h:"Twee kernkenmerken: gestructureerd én meerdere gebruikers tegelijk."},
{type:"open",q:"Waarvoor staat DBMS?",ans:["database management system","databankbeheersysteem"],h:"Het systeem dat de toegang tot en integriteit van de databank beheert."},
{type:"mc",q:"Wat is de taak van een DBMS?",o:["Data opslaan zonder beheer","Gegevens bekijken, wijzigen, verwijderen en de integriteit van de database bewaken","Netwerkverkeer beheren","Gebruikers authenticeren"],c:[1],h:"DBMS = het intermediaire systeem tussen applicaties en de ruwe data."},
{type:"mc",q:"Wat is DDL?",o:["Data Definition Language — definieert de STRUCTUUR van data (tabellen, kolommen, datatypes)","Data Deletion Language","Dynamic Data Language","Database Definition Logic"],c:[0],h:"DDL = structuurdefinitie. CREATE, ALTER, DROP zijn DDL-commando's."},
{type:"mc",q:"Wat is DML?",o:["Data Manipulation Language — manipuleert de INHOUD van data (INSERT, UPDATE, DELETE, SELECT)","Data Management Logic","Database Modification Layer","Dynamic Mapping Language"],c:[0],h:"DML = data-inhoud. Alles wat je met bestaande data doet (lezen, schrijven, aanpassen, verwijderen)."},
{type:"multi",q:"Welke zijn DDL-commando's? (meerdere antwoorden)",o:["CREATE","ALTER","DROP","SELECT","INSERT"],c:[0,1,2],h:"DDL gaat over STRUCTUUR aanpassen. SELECT en INSERT werken op data-inhoud (DML/DQL)."},
{type:"mc",q:"Wat doet het SQL-commando DROP TABLE?",o:["Verwijdert alle data uit de tabel maar behoudt de structuur","Verwijdert de tabel én alle data erin permanent","Past de structuur van de tabel aan","Leegt de tabel tijdelijk"],c:[1],h:"DROP = weg voor altijd. Niet te verwarren met DELETE (verwijdert rijen maar behoudt tabel)."},
{type:"mc",q:"Wat is het verschil tussen VARCHAR en CHAR als datatype?",o:["Ze zijn identiek","VARCHAR is variabele lengte (spaart ruimte); CHAR is vaste lengte","CHAR is voor grote teksten; VARCHAR voor kleine","VARCHAR is numeriek; CHAR is tekst"],c:[1],h:"VARCHAR(50) kan 1 tot 50 tekens bevatten. CHAR(50) is altijd exact 50 tekens."},
{type:"open",q:"Welk SQL-datatype gebruik je voor een kolom die een heel getal opslaat?",ans:["int","integer"],h:"Het meest basale numerieke datatype voor gehele getallen."},
{type:"mc",q:"Wat doet NULL in SQL?",o:["Nul (het getal 0)","Een lege string","Een ontbrekende of onbekende waarde — verschilt van 0 en van een lege string","Een foutmelding"],c:[2],h:"NULL = onbekend/afwezig. IS NULL en IS NOT NULL zijn de operators om op NULL te testen."},
{type:"mc",q:"Wat is AUTO_INCREMENT in MySQL?",o:["Een trigger dat automatisch data bijwerkt","Zorgt dat MySQL automatisch een oplopende waarde toekent aan een kolom (typisch een primary key)","Een type index","Een back-up functie"],c:[1],h:"Auto_increment = de database telt zelf op. Geen manuele ID-toewijzing nodig."},
{type:"mc",q:"Wat doet SELECT DISTINCT?",o:["Sorteert resultaten alfabetisch","Toont enkel unieke waarden/combinaties — elimineert duplicaten","Selecteert de eerste rij","Telt het aantal rijen"],c:[1],h:"DISTINCT = geen duplicaten. SELECT DISTINCT stad toont elke stad één keer."},
{type:"multi",q:"Welke aggregatiefuncties ken je in SQL? (meerdere antwoorden)",o:["COUNT","SUM","MIN","MAX","AVG","GROUP_CONCAT"],c:[0,1,2,3,4,5],h:"Alle zes zijn aggregatiefuncties die in de cursus worden behandeld."},
{type:"mc",q:"Wat doet COUNT(*) in SQL?",o:["Telt het aantal kolommen","Telt het totale aantal rijen (inclusief NULL-waarden)","Telt het aantal niet-NULL waarden in een specifieke kolom","Berekent het gemiddelde"],c:[1],h:"* = alle rijen tellen, inclusief rijen met NULL-waarden in kolommen."},
{type:"mc",q:"Wat is het verschil tussen WHERE en HAVING?",o:["Ze zijn identiek","WHERE filtert rijen VOOR groepering; HAVING filtert groepen NA groepering (na GROUP BY)","HAVING filtert rijen; WHERE filtert groepen","WHERE is voor DML; HAVING voor DDL"],c:[1],h:"WHERE = vóór GROUP BY. HAVING = ná GROUP BY. Je kunt geen aggregatiefunctie in WHERE gebruiken."},
{type:"mc",q:"Wat doet GROUP BY?",o:["Sorteert de resultaten","Groepeert rijen met gemeenschappelijke waarden zodat aggregatiefuncties per groep worden berekend","Verwijdert duplicaten","Combineert tabellen"],c:[1],h:"GROUP BY = één resultaatrij per groep. Aggregaties worden per groep berekend."},
{type:"mc",q:"Wat doet ORDER BY DESC?",o:["Sorteert oplopend (A→Z, 1→9)","Sorteert aflopend (Z→A, 9→1)","Verwijdert duplicaten in gesorteerde volgorde","Groepeert resultaten"],c:[1],h:"DESC = descending = dalend. ASC = ascending = stijgend (default)."},
{type:"open",q:"Welk SQL-commando gebruik je om data in een tabel in te voegen?",ans:["insert","insert into"],h:"Het DML-commando voor het toevoegen van nieuwe rijen."},
{type:"mc",q:"Wat doet UPDATE in SQL?",o:["Voegt nieuwe rijen toe","Past de waarden van bestaande rijen aan op basis van een conditie","Verwijdert rijen","Herstelt een tabel"],c:[1],h:"Altijd een WHERE-conditie gebruiken bij UPDATE — anders update je ALLE rijen!"},
{type:"mc",q:"Wat doet DELETE in SQL?",o:["Verwijdert de tabel zelf","Verwijdert rijen uit een tabel op basis van een conditie","Verwijdert een kolom","Leegt de database"],c:[1],h:"DELETE verwijdert rijen. DROP verwijdert de tabel zelf."},
{type:"mc",q:"Wat is een primaire sleutel (primary key)?",o:["Een kolom die NULL-waarden bevat","Een kolom (of combinatie) die elk record in de tabel uniek identificeert","Een verwijzing naar een andere tabel","Een tijdelijke sleutel voor queries"],c:[1],h:"PK = uniek + nooit NULL. Elke tabel heeft er typisch één."},
{type:"mc",q:"Wat is het verschil tussen een natural key en een surrogate key?",o:["Ze zijn identiek","Natural key = bestaande zinvolle kolom (bijv. rijksregisternummer); surrogate key = kunstmatige kolom zonder betekenis (bijv. auto-increment ID)","Surrogate key is altijd een string; natural key een integer","Natural key is veiliger"],c:[1],h:"In de praktijk wordt bijna altijd een surrogate key gebruikt voor stabiliteit."},
{type:"mc",q:"Wat is een vreemde sleutel (foreign key)?",o:["Een kolom die automatisch wordt gegenereerd","Een kolom die verwijst naar de primaire sleutel van een ander record, typisch in een andere tabel","Een versleutelde primaire sleutel","Een kolom die altijd uniek moet zijn"],c:[1],h:"FK = verwijzing naar PK van een andere tabel. Zorgt voor referentiële integriteit."},
{type:"mc",q:"Wat is referentiële integriteit?",o:["Alle kolommen moeten waarden bevatten","Een foreign key mag nooit verwijzen naar een record dat niet bestaat in de gerefereerde tabel","Alle primaire sleutels moeten integers zijn","Tabellen mogen geen NULL-waarden bevatten"],c:[1],h:"Een FK mag niet verwijzen naar iets dat niet bestaat — anders verlies je integriteit."},
{type:"multi",q:"Welke types relaties bestaan er tussen tabellen? (meerdere antwoorden)",o:["Één-op-één (1:1)","Één-op-veel (1:N)","Veel-op-veel (M:N)","Nul-op-een (0:1)"],c:[0,1,2],h:"De drie klassieke relatietypes in een relationeel datamodel."},
{type:"mc",q:"Hoe stel je een veel-op-veel (M:N) relatie voor in een relationele database?",o:["Via een foreign key in één van de tabellen","Via een koppeltabel (junction table) met twee foreign keys die verwijzen naar de twee gerelateerde tabellen","Via een array-kolom","Via meerdere foreign keys in dezelfde kolom"],c:[1],h:"M:N = koppeltabel. Bijv. Studenten ↔ Cursussen via inschrijvingen-tabel."},
{type:"mc",q:"Wat is normalisatie?",o:["Het versnellen van queries via indexen","Het proces om redundantie en inconsistenties in een datamodel te elimineren door data correct te verdelen over tabellen","Het versleutelen van gevoelige data","Het samenvoegen van tabellen voor performantie"],c:[1],h:"Normalisatie = correct verdelen van data om redundantie te vermijden."},
{type:"mc",q:"Wat is de Eerste Normaalvorm (1NF)?",o:["Geen transitieve afhankelijkheden","Alle kolommen zijn atomair (niet deelbaar) en er zijn geen herhalende groepen","Alle niet-sleutelattributen zijn volledig afhankelijk van de volledige primaire sleutel","Geen redundante data"],c:[1],h:"1NF = atomaire waarden. Geen lijsten of herhalende kolommen in één cel."},
{type:"mc",q:"Wat is de Tweede Normaalvorm (2NF)?",o:["Geen herhalende groepen","Atomaire waarden","Voldoet aan 1NF EN alle niet-sleutelattributen zijn volledig functioneel afhankelijk van de VOLLEDIGE primaire sleutel","Geen transitieve afhankelijkheden"],c:[2],h:"2NF elimineert partiële afhankelijkheden bij samengestelde primaire sleutels."},
{type:"mc",q:"Wat is de Derde Normaalvorm (3NF)?",o:["Atomaire waarden","Geen partiële afhankelijkheden","Voldoet aan 2NF EN er zijn geen transitieve afhankelijkheden (niet-sleutelattribuut afhankelijk van ander niet-sleutelattribuut)","Alle foreign keys zijn gedefinieerd"],c:[2],h:"3NF = geen transitieve afhankelijkheden. A → B → C: B en C moeten los."},
{type:"open",q:"Welk ERD-model gebruik je om de structuur van een database visueel voor te stellen?",ans:["entity relationship diagram","erd","entity-relationship diagram"],h:"De afkorting is drie letters en staat voor Entiteit-Relatie-Diagram."},
{type:"mc",q:"Wat is een CROSS JOIN?",o:["Combineert rijen die gemeenschappelijke waarden hebben in een kolom","Combineert elke rij uit tabel A met elke rij uit tabel B (cartesisch product)","Selecteert rijen die NIET in een andere tabel voorkomen","Combineert alle rijen uit beide tabellen"],c:[1],h:"Cross join = cartesisch product. 10 rijen × 5 rijen = 50 resultaatrijen. Zelden nuttig."},
{type:"mc",q:"Wat is een INNER JOIN?",o:["Toont alle rijen uit beide tabellen","Toont alleen rijen waarvoor er een overeenkomst is in BEIDE tabellen op basis van de join-conditie","Toont alle rijen uit de linker tabel, ook zonder match","Combineert elke rij met elke andere rij"],c:[1],h:"INNER = alleen de 'doorsnede'. Geen match = rij verschijnt niet in het resultaat."},
{type:"mc",q:"Wat is een LEFT JOIN?",o:["Toont alleen rijen met een match","Toont alle rijen uit de LINKER tabel + overeenkomstige rijen uit de rechter tabel (rechts NULL als geen match)","Toont alleen rijen uit de rechter tabel","Toont rijen die in geen enkele tabel voorkomen"],c:[1],h:"LEFT = linker tabel is altijd volledig aanwezig. Rechts kan NULL zijn."},
{type:"mc",q:"Wat is een scalaire subquery?",o:["Een subquery die meerdere rijen geeft","Een subquery die exact één waarde (1 rij, 1 kolom) terugggeeft","Een subquery in de FROM-clausule","Een subquery met IN-operator"],c:[1],h:"Scalair = één waarde. Kan gebruikt worden waar je anders een vaste waarde zou schrijven."},
{type:"mc",q:"Wanneer gebruik je een subquery met IN?",o:["Wanneer je één exacte waarde wil vergelijken","Wanneer de subquery een lijst van waarden terug geeft en je wil controleren of een waarde in die lijst zit","Wanneer je tabellen wil samenvoegen","Wanneer je wil groeperen"],c:[1],h:"IN + subquery = 'is mijn waarde aanwezig in dit lijstje resultaten?'"},
{type:"mc",q:"Wat is het verschil tussen een subquery en een JOIN?",o:["Ze zijn altijd identiek","Subquery's zijn leesbaar maar soms minder efficient; JOINs zijn efficiënter maar complexer — beiden kunnen dezelfde resultaten geven","JOINs zijn altijd sneller","Subquery's kunnen geen aggregaties bevatten"],c:[1],h:"In theorie equivalent, in de praktijk: JOIN is doorgaans sneller."},
{type:"open",q:"Welk SQL-commando gebruik je om de structuur van een bestaande tabel aan te passen?",ans:["alter","alter table"],h:"Het DDL-commando voor structuurwijzigingen aan bestaande tabellen."},
{type:"mc",q:"Wat doet CONCAT in MySQL?",o:["Verdeelt een string in delen","Telt het aantal characters in een string","Combineert twee of meer strings tot één string","Zoekt een substring in een string"],c:[2],h:"CONCAT('Hello', ' ', 'World') = 'Hello World'."},
{type:"mc",q:"Wat doet SUBSTRING in MySQL?",o:["Combineert strings","Geeft een deel van een string terug op basis van startpositie en lengte","Verwijdert spaties","Vergelijkt twee strings"],c:[1],h:"SUBSTRING('Hallo', 1, 3) = 'Hal'. Startpositie is 1-gebaseerd in MySQL."},
{type:"mc",q:"Wat is collation in de context van MySQL?",o:["Een type JOIN","De regels voor het vergelijken en sorteren van strings (bijv. hoofdlettergevoelig of niet)","Een type index","Een normalisatieregel"],c:[1],h:"Collation bepaalt hoe strings vergeleken worden. utf8_general_ci = case-insensitive."},
{type:"mc",q:"Wat doet GROUP_CONCAT in MySQL?",o:["Groepeert rijen","Telt het aantal waarden per groep","Combineert alle waarden in een groep tot één komma-gescheiden string","Berekent de som per groep"],c:[2],h:"GROUP_CONCAT is MySQL-specifiek en verschijnt bij GROUP BY. Geeft een lijst als string."},
{type:"mc",q:"Hoe test je of een waarde NULL is in SQL?",o:["WHERE kolom = NULL","WHERE kolom IS NULL","WHERE kolom == NULL","WHERE ISNULL(kolom)"],c:[1],h:"NULL kan niet vergeleken worden met = . Gebruik altijd IS NULL of IS NOT NULL."},
{type:"mc",q:"Wat is het verschil tussen DELETE en TRUNCATE?",o:["Ze zijn identiek","DELETE verwijdert rijen op basis van een conditie (loggable); TRUNCATE verwijdert alle rijen snel zonder individuele logging en reset auto_increment","TRUNCATE is veiliger dan DELETE","DELETE is DDL; TRUNCATE is DML"],c:[1],h:"TRUNCATE = atomische reset van de hele tabel. Sneller maar onomkeerbaar."},
{type:"mc",q:"Welk sleutelwoord gebruik je om aan te geven dat een kolom geen NULL-waarden mag bevatten?",o:["NOT EMPTY","REQUIRED","NOT NULL","MANDATORY"],c:[2],h:"NOT NULL = verplicht veld. De database weigert INSERT/UPDATE met NULL in die kolom."},
{type:"mc",q:"Wat is een index in een database?",o:["Een lijst van alle tabellen","Een datastructuur die zoekoperaties versnelt door een gesorteerde verwijzing naar kolombegwaarden","Een type primary key","Een query die automatisch uitvoert"],c:[1],h:"Index = sneller zoeken, meer opslagruimte en tragere writes. Trade-off."},
{type:"mc",q:"Wat is een VIEW in SQL?",o:["Een permanent opgeslagen kopie van een query-resultaat","Een virtuele tabel gebaseerd op een opgeslagen query — toont altijd actuele data wanneer aangesproken","Een type index","Een back-up van een tabel"],c:[1],h:"VIEW = opgeslagen query. Oproepen van de view voert de query steeds opnieuw uit."},
{type:"mc",q:"Wat is een TRANSACTION in SQL?",o:["Een enkelvoudig SQL-commando","Een reeks SQL-commando's die als één geheel worden uitgevoerd — of alles slaagt, of niets (atomiciteit)","Een type join","Een procedure"],c:[1],h:"Transacties = atomiciteit. COMMIT = bevestig alles. ROLLBACK = maak alles ongedaan."},
{type:"mc",q:"Wat doet ROLLBACK in SQL?",o:["Bevestigt alle wijzigingen in een transactie","Maakt alle wijzigingen ongedaan die gedaan zijn binnen de huidige transactie","Verwijdert de laatste tabel","Herstelt een deleted rij"],c:[1],h:"ROLLBACK = annuleer alles. COMMIT = bewaar alles. Beide zijn transactiecommando's."},
{type:"open",q:"Welk commando gebruik je in SQL om een query te filteren op basis van een conditie?",ans:["where","where clause"],h:"Het meest gebruikte filtercommando in SQL, altijd na FROM."},
{type:"mc",q:"Wat is het verschil tussen een relationele en een niet-relationele database?",o:["Er is geen verschil","Relationele databases gebruiken tabellen met vaste structuur en SQL; niet-relationele (NoSQL) databases gebruiken flexibele structuren (documents, key-value, graphs)","NoSQL databases zijn altijd sneller","Relationele databases zijn verouderd"],c:[1],h:"SQL = tabellen en relaties. NoSQL = flexibel, schaalbaar, minder structuur."},
{type:"mc",q:"Wat is AVG in SQL?",o:["De maximale waarde","Het gemiddelde van numerieke waarden in een kolom","De som van waarden","Het aantal waarden"],c:[1],h:"AVG = average = gemiddelde. Werkt enkel op numerieke kolommen."},
{type:"mc",q:"Wat is SUM in SQL?",o:["Telt het aantal rijen","Berekent de som van numerieke waarden","Geeft de maximale waarde","Geeft de minimale waarde"],c:[1],h:"SUM = totaal. SELECT SUM(prijs) FROM producten geeft de totaalprijs."},
{type:"mc",q:"Welk SQL-commando gebruik je om een subquery te gebruiken als tijdelijke tabel?",o:["Subquery in WHERE","Subquery in SELECT","Subquery in FROM (met alias)","Subquery in GROUP BY"],c:[2],h:"Een subquery in FROM gedraagt zich als een tijdelijke tabel. Geef hem een alias."},
{type:"mc",q:"Wat doet LIMIT in MySQL?",o:["Beperkt het aantal kolommen","Beperkt het aantal rijen dat teruggegeven wordt","Filtert resultaten op basis van een waarde","Sorteert resultaten"],c:[1],h:"LIMIT 10 = geef mij maximaal 10 rijen. Essentieel voor paginering."},
{type:"mc",q:"Wat is een stored procedure?",o:["Een opgeslagen back-up","Een herbruikbaar blok SQL-code dat opgeslagen is in de database en opgeroepen kan worden","Een type trigger","Een view met parameters"],c:[1],h:"Stored procedure = herbruikbaar, server-side SQL-programma."},
{type:"mc",q:"Wat is een trigger in de context van databases?",o:["Een alert in Zabbix","Een automatisch uitgevoerd stuk code dat afgaat bij een INSERT, UPDATE of DELETE op een tabel","Een type foreign key","Een constraint"],c:[1],h:"Database trigger ≠ Zabbix trigger. Dit zijn automatische acties bij data-wijzigingen."},
{type:"mc",q:"Wat is lexicografische volgorde bij het vergelijken van strings?",o:["Volgorde op basis van stringlengte","Alfabetische volgorde op basis van de Unicode/ASCII-waarden van tekens","Volgorde op basis van het eerste teken alleen","Willekeurige volgorde"],c:[1],h:"'Aardig' < 'Aardig2' omdat de lege string < '2' in Unicode."},
{type:"open",q:"Welk SQL-sleutelwoord gebruik je om resultaten te sorteren?",ans:["order by"],h:"Gevolgd door de kolomnaam en optioneel ASC of DESC."},
{type:"mc",q:"Wat is een NOT NULL constraint?",o:["Zorgt dat een kolom altijd NULL is","Verbiedt NULL-waarden in een kolom — de kolom moet altijd een waarde bevatten","Zorgt dat alle waarden uniek zijn","Verbiedt lege strings"],c:[1],h:"NOT NULL = verplicht veld. Vergelijk met UNIQUE wat duplicaten verbiedt."},
{type:"mc",q:"Wat doet de UNIQUE constraint?",o:["Verbiedt NULL-waarden","Zorgt dat alle waarden in een kolom uniek zijn (geen duplicaten)","Verbiedt lege strings","Versnelt zoekoperaties"],c:[1],h:"UNIQUE ≠ PRIMARY KEY. Een tabel kan meerdere UNIQUE kolommen hebben."},
{type:"mc",q:"Wat is een RIGHT JOIN?",o:["Geeft alle rijen uit de linker tabel","Geeft alle rijen uit de RECHTER tabel + overeenkomstige rijen uit de linker tabel (links NULL als geen match)","Geeft alleen rijen met een match in beide tabellen","Geeft alle rijen uit beide tabellen"],c:[1],h:"RIGHT JOIN = spiegelbeeld van LEFT JOIN. Zelden gebruikt — je kan altijd een LEFT JOIN gebruiken door de tabellen om te wisselen."},
{type:"mc",q:"Wat is een FULL OUTER JOIN?",o:["Geeft alleen matches","Geeft alle rijen uit BEIDE tabellen, ook rijen zonder match aan beide kanten (NULL waar geen match)","Geeft het cartesisch product","Is hetzelfde als een CROSS JOIN"],c:[1],h:"FULL OUTER = alle rijen van links + alle rijen van rechts, ook zonder match. MySQL ondersteunt dit niet standaard."},
{type:"mc",q:"Wat is het doel van normalisatie tot 3NF?",o:["De database zo snel mogelijk te maken","Redundantie elimineren, data-integriteit garanderen en update-anomalieën voorkomen","Alle tabellen samen te voegen","De database te versleutelen"],c:[1],h:"Zonder normalisatie: één update op één plek moet op tien plekken doorgevoerd worden."},
{type:"mc",q:"Wat zijn update-anomalieën in een database?",o:["Fouten bij het uitvoeren van UPDATE-commando's","Inconsistenties die optreden wanneer dezelfde data op meerdere plaatsen opgeslagen is en niet overal bijgewerkt wordt","Fouten bij het toevoegen van nieuwe rijen","Conflicten tussen transacties"],c:[1],h:"Update-anomalie = data op 5 plaatsen, slechts 4 bijgewerkt → inconsistentie."},
{type:"mc",q:"Wat is een subquery in FROM ook wel genoemd?",o:["Geneste view","Derived table (afgeleide tabel)","Stored procedure","Common table expression"],c:[1],h:"Een subquery in FROM gedraagt zich als een tijdelijke tabel — vandaar 'derived table'."},
{type:"mc",q:"Wat is het verschil tussen een database en een schema in MySQL?",o:["Database is groter dan schema","In MySQL zijn database en schema synoniemen — CREATE DATABASE en CREATE SCHEMA doen hetzelfde","Schema is een subset van database","Schema bevat enkel tabellen; database ook views en procedures"],c:[1],h:"In MySQL: CREATE SCHEMA = CREATE DATABASE. Ze zijn volledig equivalent."},
{type:"mc",q:"Wat is een functionele afhankelijkheid?",o:["Een afhankelijkheid tussen tabellen","Een relatie waarbij de waarde van attribuut A de waarde van attribuut B uniek bepaalt (A → B)","Een type foreign key","Een type index"],c:[1],h:"A → B: als je A kent, ken je B eenduidig. Bijv. rijksregisternummer → naam."},
{type:"mc",q:"Wat is een partiële afhankelijkheid en in welke normaalvorm elimineert men ze?",o:["Afhankelijkheid van een deel van de PK — geëlimineerd in 1NF","Afhankelijkheid van een deel van de samengestelde PK — geëlimineerd in 2NF","Afhankelijkheid tussen niet-sleutelattributen — 3NF","Afhankelijkheid via een tussenliggende sleutel"],c:[1],h:"2NF: elk niet-sleutelattribuut moet afhangen van de VOLLEDIGE PK, niet slechts een deel ervan."},
{type:"mc",q:"Wat is een transitieve afhankelijkheid?",o:["Een directe afhankelijkheid van de PK","A → B → C waarbij C afhankelijk is van B (niet-sleutelattribuut) in plaats van direct van de PK","Een afhankelijkheid tussen twee PK's","Een afhankelijkheid in een 1NF-relatie"],c:[1],h:"3NF: vermijd A → B → C. C moet direct afhangen van de PK, niet via tussenstap B."},
{type:"mc",q:"Wat is een kandidaatsleutel?",o:["Altijd de primaire sleutel","Een minimale verzameling attributen die elk record uniek identificeert — er kunnen meerdere zijn, maar één wordt gekozen als PK","Een type vreemde sleutel","Een alternatieve index"],c:[1],h:"Kandidaatsleutels = alle mogelijke PK-kandidaten. De PK is de gekozen kandidaatsleutel."},
{type:"mc",q:"Wat is een alternatieve sleutel (alternate key)?",o:["Een tweede PK","Een kandidaatsleutel die NIET gekozen is als primaire sleutel — nog steeds uniek maar niet de officiële PK","Een type index","Een UNIQUE constraint"],c:[1],h:"Alternate key = kandidaatsleutel die de 'verkiezing' verloor. Bijv. e-mailadres als alternatief voor user_id."},
{type:"mc",q:"Wat is een samengestelde sleutel?",o:["Een sleutel bestaande uit meerdere tabellen","Een sleutel bestaande uit twee of meer attributen die samen uniek zijn","Een encrypted primary key","Een auto-increment sleutel"],c:[1],h:"Samengesteld = meerdere kolommen vormen samen de sleutel. Bijv. (student_id, cursus_id) in een koppeltabel."},
{type:"open",q:"Welk SQL-sleutelwoord gebruik je om een kolom als primaire sleutel te definiëren bij CREATE TABLE?",ans:["primary key"],h:"Twee woorden die samen de meest fundamentele constraint definiëren."},
{type:"mc",q:"Wat doet de CHECK constraint?",o:["Controleert of een waarde in een andere tabel bestaat","Valideert dat waarden in een kolom voldoen aan een specifieke conditie","Garandeert uniciteit","Verbiedt NULL-waarden"],c:[1],h:"CHECK(leeftijd >= 18) = de database weigert waarden die de conditie schenden."},
{type:"mc",q:"Wat is het verschil tussen ON DELETE CASCADE en ON DELETE RESTRICT?",o:["Ze zijn identiek","CASCADE = verwijder de gerelateerde rijen automatisch; RESTRICT = weiger de delete als er gerelateerde rijen zijn","RESTRICT verwijdert automatisch","CASCADE blokkeert de delete"],c:[1],h:"Cascade = kettingreactie, verwijder alles. Restrict = beschermend, geen wezen-rijen toegestaan."},
{type:"mc",q:"Wat is een join condition (ON-clausule) bij een JOIN?",o:["Een filter na de join","De conditie die bepaalt welke rijen van de twee tabellen samengevoegd worden","Een type ORDER BY","Een type GROUP BY"],c:[1],h:"ON tabel1.kolom = tabel2.kolom — de kolommen waarop de tabellen samengevoegd worden."},
{type:"mc",q:"Wat is een self-join?",o:["Een join van een tabel met zichzelf — met aliassen — om hiërarchieën of relaties binnen één tabel te bevragen","Een type CROSS JOIN","Een join zonder ON-clausule","Een join van twee identieke tabellen"],c:[0],h:"Bijv. employees tabel met manager_id die verwijst naar employee_id in dezelfde tabel."},
{type:"mc",q:"Wat is een non-equi join?",o:["Een join waarbij geen gelijkheidsconditie gebruikt wordt","Een join met ON tabel1.id != tabel2.id of gebruik van <, >, BETWEEN","Een type CROSS JOIN","Beide opties A en B"],c:[3],h:"Bijv. ON salary BETWEEN min_sal AND max_sal — combineer rijen op basis van een bereik."},
{type:"mc",q:"Wat doet COALESCE in SQL?",o:["Combineert strings","Geeft de eerste niet-NULL waarde uit een lijst van argumenten","Telt niet-NULL waarden","Vervangt lege strings door NULL"],c:[1],h:"COALESCE(a, b, c) = geef a als niet-NULL, anders b, anders c. Handig voor NULL-afhandeling."},
{type:"mc",q:"Wat doet IFNULL in MySQL?",o:["Test of een waarde NULL is","Geeft de tweede waarde als de eerste NULL is (MySQL-specifiek equivalent van COALESCE met 2 argumenten)","Vervangt alle NULL door 0","Telt NULL waarden"],c:[1],h:"IFNULL(kolom, 0) = geef de kolomwaarde, tenzij NULL, geef dan 0."},
{type:"mc",q:"Wat is een correlated subquery?",o:["Een subquery die altijd hetzelfde resultaat geeft","Een subquery die voor elke rij van de buitenste query opnieuw uitgevoerd wordt, waarbij het resultaat afhangt van de huidige rij","Een subquery in de FROM-clausule","Een subquery met IN-operator"],c:[1],h:"Correlated = afhankelijk van de buitenste query. Trager dan niet-gecorreleerde subqueries."},
{type:"mc",q:"Wat doet EXISTS in SQL?",o:["Controleert of een tabel bestaat","Geeft TRUE als de subquery minstens één rij retourneert — efficiënter dan IN voor grote datasets","Telt het aantal rijen","Geeft de eerste rij"],c:[1],h:"EXISTS = efficiënt testen of er iets bestaat. Stopt zodra de eerste overeenkomende rij gevonden is."},
{type:"mc",q:"Wat is het verschil tussen IN en EXISTS?",o:["Ze zijn identiek","IN vergelijkt met een lijst van waarden; EXISTS test of een subquery rijen retourneert — EXISTS is efficiënter bij grote subquery-resultaten","EXISTS is altijd trager","IN werkt niet met subqueries"],c:[1],h:"IN materialiseert de hele subquery-lijst. EXISTS stopt bij de eerste match. Voor grote datasets: kies EXISTS."},
{type:"mc",q:"Wat is UNION in SQL?",o:["Een type JOIN","Combineert resultaten van twee queries in één resultatenset — verwijdert duplicaten (gebruik UNION ALL om duplicaten te bewaren)","Een type GROUP BY","Een type subquery"],c:[1],h:"UNION = stapel resultaten op elkaar. Kolommen moeten overeenkomen. UNION ALL behoudt duplicaten."},
{type:"mc",q:"Wat is het verschil tussen UNION en UNION ALL?",o:["Ze zijn identiek","UNION verwijdert duplicaten (trager); UNION ALL behoudt alle rijen inclusief duplicaten (sneller)","UNION ALL verwijdert duplicaten","UNION is sneller"],c:[1],h:"UNION = DISTINCT na combinatie. UNION ALL = alles zonder deduplicatie. Kies ALL als duplicaten oké zijn."},
{type:"mc",q:"Wat is INTERSECT in SQL?",o:["Combineer alle rijen","Geeft enkel rijen die in BEIDE queries voorkomen","Geeft rijen die in de eerste maar niet tweede query voorkomen","Een type JOIN"],c:[1],h:"INTERSECT = doorsnede. Enkel de gemeenschappelijke rijen van beide resultatensets."},
{type:"mc",q:"Wat is EXCEPT (of MINUS) in SQL?",o:["Geeft de doorsnede","Geeft rijen die in de eerste query voorkomen maar NIET in de tweede","Geeft alle rijen van beide queries","Een type subquery"],c:[1],h:"EXCEPT = verschil. Alles van query 1 minus wat ook in query 2 zit."},
{type:"mc",q:"Wat is een CTE (Common Table Expression)?",o:["Een type stored procedure","Een tijdelijke benoemde resultatenset gedefinieerd met WITH die binnen één query hergebruikt kan worden","Een type view","Een type index"],c:[1],h:"WITH cte AS (SELECT ...) SELECT * FROM cte — maakt complexe queries leesbaarder."},
{type:"mc",q:"Wat is een recursive CTE?",o:["Een CTE die zichzelf aanroept","Een CTE die via recursie hiërarchieën kan doorlopen (bijv. organigrammen, categoriestructuren)","Een type stored procedure","Een type view"],c:[1],h:"Recursive CTE = hiërarchieën bevragen. CEO → manager → medewerker, oneindig diep."},
{type:"mc",q:"Wat is een window function in SQL?",o:["Een type aggregatiefunctie","Een functie die berekeningen uitvoert over een set rijen (window) gerelateerd aan de huidige rij, zonder te groeperen","Een type JOIN","Een type subquery"],c:[1],h:"ROW_NUMBER(), RANK(), LAG(), LEAD() zijn window functions. Resulaat per rij zonder GROUP BY."},
{type:"mc",q:"Wat doet ROW_NUMBER() als window function?",o:["Geeft het totale aantal rijen","Kent een uniek oplopend nummer toe aan elke rij binnen de partition, gesorteerd op een opgegeven kolom","Rangschikt rijen met gedeelde nummers bij gelijke waarden","Berekent een lopend totaal"],c:[1],h:"ROW_NUMBER() = 1, 2, 3... uniek per rij. RANK() geeft dezelfde rang bij gelijke waarden."},
{type:"mc",q:"Wat doet PARTITION BY in een window function?",o:["Splitst de tabel permanent","Deelt de resultatenset in partities waarbinnen de window function onafhankelijk berekend wordt","Een type GROUP BY","Een type WHERE"],c:[1],h:"PARTITION BY = window function herstart voor elke partitie. Bijv. ROW_NUMBER() per afdeling."},
{type:"mc",q:"Wat is LAG() als window function?",o:["De volgende rij bekijken","De waarde van een kolom in een vorige rij bekijken zonder zelf-join","Het gemiddelde van vorige rijen","Een type ranking functie"],c:[1],h:"LAG(kolom, 1) = waarde van de vorige rij. Nuttig voor vergelijking met vorige periode."},
{type:"mc",q:"Wat is LEAD() als window function?",o:["De vorige rij bekijken","De waarde van een kolom in een volgende rij bekijken","Een type aggregatie","Een type ranking"],c:[1],h:"LEAD(kolom, 1) = waarde van de volgende rij. Nuttig voor lookahead-vergelijkingen."},
{type:"mc",q:"Wat is SUM() OVER() als window function?",o:["Een groepsgewijs totaal","Een lopend totaal (running total) berekend over de huidige en vorige rijen","Het totaal van de volledige tabel","Een type aggregatie"],c:[1],h:"SUM(bedrag) OVER (ORDER BY datum) = cumulatief totaal per datum. Geen GROUP BY nodig."},
{type:"mc",q:"Wat is het verschil tussen CHAR_LENGTH() en LENGTH() in MySQL?",o:["Ze zijn identiek","CHAR_LENGTH() telt tekens; LENGTH() telt bytes — verschil bij multibyte-tekens (bijv. UTF-8 emojis)","LENGTH() telt tekens","CHAR_LENGTH() telt bytes"],c:[1],h:"Voor ASCII is er geen verschil. Voor UTF-8 multibyte tekens is LENGTH() groter dan CHAR_LENGTH()."},
{type:"mc",q:"Wat doet UPPER() en LOWER() in SQL?",o:["Vergelijken strings","Converteren tekst naar hoofdletters (UPPER) of kleine letters (LOWER)","Extraheren tekst","Verwijderen spaties"],c:[1],h:"UPPER('hello') = 'HELLO'. LOWER('HELLO') = 'hello'. Nuttig voor case-insensitive vergelijkingen."},
{type:"mc",q:"Wat doet TRIM() in SQL?",o:["Verkorte tekst","Verwijdert leidende en afsluitende spaties (of opgegeven tekens) van een string","Knipt tekst bij vaste lengte","Verwijdert alle spaties"],c:[1],h:"TRIM(' hello ') = 'hello'. LTRIM voor links, RTRIM voor rechts."},
{type:"mc",q:"Wat doet REPLACE() in SQL?",o:["Vervangt rijen","Vervangt alle voorkomens van een substring door een andere substring in een string","Verwijdert tekens","Vergelijkt strings"],c:[1],h:"REPLACE('hello world', 'world', 'SQL') = 'hello SQL'."},
{type:"mc",q:"Wat doet ROUND() in SQL?",o:["Afkappen","Afrondt een getal tot het opgegeven aantal decimalen","Berekent een modulo","Vergelijkt getallen"],c:[1],h:"ROUND(3.14159, 2) = 3.14. FLOOR() = naar beneden, CEIL() = naar boven."},
{type:"mc",q:"Wat doet ABS() in SQL?",o:["Geeft de som","Geeft de absolute (positieve) waarde van een getal","Berekent het gemiddelde","Geeft de maximale waarde"],c:[1],h:"ABS(-5) = 5. ABS(5) = 5. Verwijdert het minteken."},
{type:"mc",q:"Wat is NOW() in MySQL?",o:["De datum van de laatste update","Geeft de huidige datum én tijd","Geeft enkel de huidige datum","Geeft het huidige tijdstip zonder datum"],c:[1],h:"NOW() = '2025-01-15 14:30:00'. CURDATE() = enkel datum. CURTIME() = enkel tijd."},
{type:"mc",q:"Wat doet DATE_FORMAT() in MySQL?",o:["Converteert een string naar datum","Formatteert een datum/tijd-waarde naar een specifiek string-formaat","Berekent het verschil tussen datums","Voegt tijd toe aan een datum"],c:[1],h:"DATE_FORMAT(NOW(), '%d/%m/%Y') = '15/01/2025'. Flexibel datumopmaak."},
{type:"mc",q:"Wat is DATEDIFF() in MySQL?",o:["Voegt een interval toe aan een datum","Berekent het verschil in dagen tussen twee datums","Formatteert een datum","Geeft de huidige datum"],c:[1],h:"DATEDIFF('2025-12-31', '2025-01-01') = 364. Altijd in dagen."},
{type:"mc",q:"Wat doet DATE_ADD() in MySQL?",o:["Trekt een interval af","Voegt een tijdinterval toe aan een datum (bijv. 30 dagen, 2 maanden)","Formatteert een datum","Berekent het verschil"],c:[1],h:"DATE_ADD(NOW(), INTERVAL 30 DAY) = datum over 30 dagen."},
{type:"mc",q:"Wat is het verschil tussen DATETIME en TIMESTAMP in MySQL?",o:["Ze zijn identiek","DATETIME: grote bereik (1000-9999), geen tijdzone-conversie; TIMESTAMP: kleiner bereik (1970-2038), automatische tijdzone-conversie","TIMESTAMP heeft groter bereik","DATETIME converteeert tijdzones"],c:[1],h:"TIMESTAMP slaat UTC op en converteert naar server-tijdzone. DATETIME = letterlijk wat ingevoerd is."},
{type:"mc",q:"Wat is het ENUM datatype in MySQL?",o:["Een type integer","Een datatype waarbij de kolom enkel één waarde uit een vooraf gedefinieerde lijst kan bevatten","Een type string","Een type boolean"],c:[1],h:"ENUM('Maandag','Dinsdag',...) = efficiënte opslag van beperkte waardelijsten. Ordinal vergelijking mogelijk."},
{type:"mc",q:"Wat is het SET datatype in MySQL?",o:["Een type ENUM","Een datatype waarbij een kolom nul of meer waarden uit een vooraf gedefinieerde lijst kan bevatten","Een type array","Een type JSON"],c:[1],h:"SET verschilt van ENUM: meerdere waarden tegelijk mogelijk. SET('lezen','schrijven','admin')."},
{type:"mc",q:"Wat is JSON als datatype in MySQL?",o:["Een type tekst","Een datatype voor het opslaan van JSON-documenten met validatie en uitgebreide querying via JSON-functies","Een type BLOB","Een type array"],c:[1],h:"MySQL 5.7+ ondersteunt native JSON. JSON_EXTRACT(), JSON_ARRAY(), JSON_OBJECT() voor manipulatie."},
{type:"mc",q:"Wat doet JSON_EXTRACT() in MySQL?",o:["Valideert JSON","Extraheert een waarde uit een JSON-document op een opgegeven pad","Converteert JSON naar tabel","Vergelijkt JSON-documenten"],c:[1],h:"JSON_EXTRACT(data, '$.naam') of de kortere notatie data->'$.naam'."},
{type:"mc",q:"Wat is een Full-Text index in MySQL?",o:["Een index op alle kolommen","Een speciale index voor tekstzoekopdrachten die efficiënte MATCH...AGAINST queries mogelijk maakt","Een type UNIQUE index","Een type PRIMARY KEY"],c:[1],h:"Full-text index = zoek in tekst zoals een zoekmachine. MATCH(kolom) AGAINST('zoekterm')."},
{type:"mc",q:"Wat is MATCH...AGAINST in MySQL?",o:["Een type JOIN","Een full-text zoekopdracht die relevante rijen teruggeeft gebaseerd op tekstovereenkomst","Een type string-vergelijking","Een type subquery"],c:[1],h:"MATCH(beschrijving) AGAINST('database' IN BOOLEAN MODE) = zoek naar 'database' in de tekst."},
{type:"mc",q:"Wat is het verschil tussen MyISAM en InnoDB als MySQL storage engine?",o:["Ze zijn identiek","InnoDB: transacties, foreign keys, row-level locking, ACID; MyISAM: geen transacties, tabel-level locking, sneller voor reads","MyISAM ondersteunt transacties","InnoDB is verouderd"],c:[1],h:"InnoDB = de moderne standaard. MyISAM = verouderd, geen transacties. Gebruik altijd InnoDB."},
{type:"mc",q:"Wat zijn ACID-eigenschappen in database transacties?",o:["Atomicity, Consistency, Isolation, Durability","Access, Control, Integrity, Data","Automatic, Consistent, Independent, Durable","Atomic, Complete, Isolated, Dated"],c:[0],h:"ACID = de vier garanties van betrouwbare transacties. InnoDB implementeert ze alle vier."},
{type:"mc",q:"Wat is Atomicity in ACID?",o:["Snelle transacties","Een transactie is alles-of-niets: ofwel alle operaties slagen, ofwel geen enkele wordt definitief gemaakt","Geïsoleerde transacties","Duurzame opslag"],c:[1],h:"Atomiciteit = ondeelbaar. Bijv. bankoverschrijving: debet EN credit, of geen van beide."},
{type:"mc",q:"Wat is Isolation in ACID?",o:["Transacties zijn versleuteld","Gelijktijdige transacties beïnvloeden elkaar niet — elke transactie ziet een consistente databasestate","Transacties bewaren hun resultaat permanent","Transacties brengen de database van valide staat naar valide staat"],c:[1],h:"Isolation = concurrent transacties zien elkaars tussenstappen niet. Verschillende isolation levels bestaan."},
{type:"mc",q:"Wat is een dirty read?",o:["Een corrupte query","Het lezen van onbevestigde data van een andere, nog niet gecommitte transactie — treedt op bij lage isolation levels","Een type NULL-waarde","Een type fout in de query"],c:[1],h:"Dirty read = lees data die nog niet gecommit is. Als die transactie rolt terug, las je fictieve data."},
{type:"mc",q:"Wat is een phantom read?",o:["Een niet-bestaande rij lezen","Rijen die in een eerste query niet bestonden verschijnen in een tweede query binnen dezelfde transactie door inserts van andere transacties","Een type dirty read","Een type non-repeatable read"],c:[1],h:"Phantom = spookrijen. Nieuwe rijen verschijnen terwijl je nog in dezelfde transactie zit."},
{type:"mc",q:"Wat is database sharding?",o:["Een type back-up","Het horizontaal verdelen van data over meerdere servers op basis van een shard key voor schaalbaarheid","Een type index","Een type normalisatie"],c:[1],h:"Sharding = horizontale schaling. Elk shard heeft een deel van de data. Complexer maar schaalbaar."},
{type:"mc",q:"Wat is database replication?",o:["Een type back-up","Het automatisch kopiëren van data van een primaire server (master) naar één of meer secundaire servers (slaves/replicas)","Een type normalisatie","Een type sharding"],c:[1],h:"Replicatie = redundantie + load balancing voor reads. Master voor writes, replicas voor reads."},
{type:"mc",q:"Wat is een deadlock in een database?",o:["Een server die crasht","Een situatie waarbij twee transacties op elkaar wachten om elkaars locks vrij te geven — beide kunnen niet verder","Een type dirty read","Een type index fout"],c:[1],h:"Deadlock = A wacht op B, B wacht op A. De database detecteert dit en rollt één transactie terug."},
{type:"mc",q:"Wat is optimistische vs pessimistische locking?",o:["Ze zijn identiek","Pessimistisch = lock data meteen (voorkomen conflicten); Optimistisch = lock niet, check bij commit (performanter maar conflicten mogelijk)","Optimistisch is altijd beter","Pessimistisch is altijd beter"],c:[1],h:"Pessimistisch = veilig maar trager. Optimistisch = sneller maar vereist conflictresolutie."},
{type:"mc",q:"Wat is een stored function vs stored procedure?",o:["Ze zijn identiek","Function = geeft altijd één waarde terug, bruikbaar in queries; Procedure = kan meerdere resultaten teruggeven, niet in queries bruikbaar","Procedure geeft altijd één waarde","Function kan meerdere waarden teruggeven"],c:[1],h:"Function = gebruik in SELECT. Procedure = CALL. Function retourneert altijd via RETURN."},
{type:"mc",q:"Wat is een cursor in SQL?",o:["Een type index","Een programmeerstructuur die het mogelijk maakt rij per rij door een resultatenset te itereren","Een type stored procedure","Een type view"],c:[1],h:"Cursor = itereer rij per rij. Langzamer dan set-based operaties maar soms noodzakelijk."},
{type:"mc",q:"Wat is een event in MySQL?",o:["Een type trigger","Een geplande taak die automatisch SQL-code uitvoert op basis van een tijdschema (eenmalig of herhalend)","Een type stored procedure","Een type index"],c:[1],h:"MySQL Event Scheduler = een cron-job voor de database. Automatisch data opruimen, rapporten genereren."},
{type:"mc",q:"Wat is de purpose van EXPLAIN in MySQL?",o:["Geeft uitleg over SQL-syntax","Toont het uitvoeringsplan van een query — hoe MySQL de query zal uitvoeren, welke indexes gebruikt worden","Geeft documentatie","Voert de query langzamer uit voor debugging"],c:[1],h:"EXPLAIN = kijk in de motor. Ziet MySQL de index? Doet het een full table scan? Optimaliseer daarna."},
{type:"mc",q:"Wat is een covering index?",o:["Een index op alle kolommen","Een index die alle kolommen bevat die een query nodig heeft — de query kan volledig beantwoord worden vanuit de index zonder de tabel te raadplegen","Een type UNIQUE index","Een type full-text index"],c:[1],h:"Covering index = ultra-efficiënt. Geen tabel-lookup nodig. Query leest enkel de index."},
{type:"mc",q:"Wat is een composite index (samengestelde index)?",o:["Een index op één kolom","Een index op meerdere kolommen die queries met WHERE-condities op die combinatie van kolommen versnelt","Een type UNIQUE index","Een type full-text index"],c:[1],h:"Composite index op (voornaam, achternaam) versnelt queries op beide kolommen samen (leftmost prefix rule)."},
{type:"mc",q:"Wat is de 'leftmost prefix rule' voor composite indexes?",o:["De index werkt altijd van links naar rechts","Een composite index op (A, B, C) kan gebruikt worden voor queries op A, of (A, B), of (A, B, C) maar NIET op alleen B of C","De index werkt altijd","De index werkt enkel voor de eerste kolom"],c:[1],h:"Index op (voornaam, achternaam): WHERE voornaam werkt. WHERE achternaam werkt NIET als enige conditie."},
{type:"mc",q:"Wat is query caching in MySQL?",o:["Een type index","Het in-memory cachen van query-resultaten zodat dezelfde query direct uit cache bediend wordt — MySQL 8.0 heeft dit verwijderd","Een type stored procedure","Een type replicatie"],c:[1],h:"Query cache = snel maar problematisch bij veel writes. MySQL 8.0 heeft het afgeschaft wegens performantieproblemen."},
{type:"mc",q:"Wat is de difference between CHAR and VARCHAR in terms of storage?",o:["Er is geen verschil","CHAR(n) gebruikt altijd n bytes (gevuld met spaties indien korter); VARCHAR(n) gebruikt enkel de benodigde bytes plus 1-2 bytes overhead","VARCHAR gebruikt meer ruimte","CHAR is variabel"],c:[1],h:"CHAR = vaste lengte, efficiënt voor vaste-lengte data. VARCHAR = variabel, efficiënt voor variabele data."},
{type:"mc",q:"Wat is TEXT vs VARCHAR in MySQL?",o:["Ze zijn identiek","VARCHAR: maximaal 65535 bytes, opgeslagen in de rij; TEXT: grote tekst opgeslagen buiten de rij, trager maar voor grote teksten","TEXT is kleiner","VARCHAR kan groter zijn dan TEXT"],c:[1],h:"Voor kleine tot middelgrote strings: VARCHAR. Voor grote documenten (artikelen, beschrijvingen): TEXT."},
{type:"mc",q:"Wat is BLOB in MySQL?",o:["Een type TEXT","Binary Large Object — opslaan van binaire data (afbeeldingen, bestanden) in de database","Een type VARCHAR","Een type JSON"],c:[1],h:"BLOB = binaire data. TINYBLOB, BLOB, MEDIUMBLOB, LONGBLOB. Overweeg alternatieven (bestandssysteem + pad)."},
{type:"mc",q:"Wat is het verschil tussen TINYINT, SMALLINT, INT en BIGINT?",o:["Ze zijn identiek","Ze hebben verschillende opslaggroottes en bereiken: TINYINT=1byte(-128/127), SMALLINT=2bytes, INT=4bytes, BIGINT=8bytes","BIGINT is het kleinst","TINYINT heeft het grootste bereik"],c:[1],h:"Kies het kleinste type dat past bij je data. TINYINT voor boolean-achtige waarden, BIGINT voor grote IDs."},
{type:"mc",q:"Wat is UNSIGNED in de context van integer datatypes?",o:["Een teken zonder waarde","Verwijdert de negatieve helft van het bereik — een UNSIGNED INT gaat van 0 tot 4.294.967.295 i.p.v. -2.1B tot +2.1B","Een type NULL","Een type constraint"],c:[1],h:"UNSIGNED = enkel positieve getallen. Verdubbelt het positieve bereik. Gebruik voor IDs en tellers."},
{type:"mc",q:"Wat is DECIMAL vs FLOAT/DOUBLE?",o:["Ze zijn identiek","DECIMAL = exacte precisie voor financiële data; FLOAT/DOUBLE = benaderend met drijvende komma, geschikt voor wetenschappelijke berekeningen","FLOAT is preciezer","DECIMAL is sneller"],c:[1],h:"Nooit FLOAT voor geld! 0.1 + 0.2 ≠ 0.3 in floating point. Gebruik DECIMAL(10,2) voor euro's."},
{type:"mc",q:"Wat is een database schema?",o:["Een type back-up","De logische structuur van de database: tabellen, kolommen, datatypes, constraints en relaties","Een type query","Een type stored procedure"],c:[1],h:"Schema = de blauwdruk. Hoe is de database georganiseerd? In MySQL = equivalent aan database."},
{type:"mc",q:"Wat is het doel van INFORMATION_SCHEMA in MySQL?",o:["Een standaard systeemtabel","Een speciale database die metadata bevat over alle databases, tabellen, kolommen en constraints op de server","Een type back-up","Een type replicatie"],c:[1],h:"INFORMATION_SCHEMA = de meta-database. SELECT * FROM INFORMATION_SCHEMA.TABLES geeft alle tabellen."},
{type:"mc",q:"Wat is SHOW TABLES en SHOW COLUMNS in MySQL?",o:["Type back-up commando's","MySQL-specifieke commando's om respectievelijk alle tabellen en de kolommen van een tabel te tonen","Type queries","Type stored procedures"],c:[1],h:"SHOW TABLES = overzicht. SHOW COLUMNS FROM tabelnaam = kolomstructuur. Handig voor verkenning."},
{type:"mc",q:"Wat is DESCRIBE (of DESC) in MySQL?",o:["Sorteert aflopend","Toont de structuur van een tabel: kolomnamen, datatypes, NULL-toestaan, keys, defaults","Een type subquery","Een type view"],c:[1],h:"DESCRIBE tabelnaam = snel de tabelstructuur bekijken. Alternatief: SHOW COLUMNS FROM tabelnaam."},
{type:"mc",q:"Wat is GRANT in MySQL?",o:["Een type INSERT","Een opdracht om privileges toe te kennen aan een gebruiker","Een type SELECT","Een type UPDATE"],c:[1],h:"GRANT SELECT ON db.* TO 'user'@'host' = geef leesrechten. REVOKE neemt rechten af."},
{type:"mc",q:"Wat is REVOKE in MySQL?",o:["Een type DELETE","Een opdracht om privileges van een gebruiker in te trekken","Een type DROP","Een type ROLLBACK"],c:[1],h:"REVOKE SELECT ON db.* FROM 'user'@'host' = verwijder leesrechten."},
{type:"mc",q:"Wat is de purpose van FLUSH PRIVILEGES in MySQL?",o:["Herstelt de database","Herlaadt de privilege-tabel in het geheugen nadat rechten handmatig gewijzigd zijn","Verwijdert alle caches","Herstart de MySQL-server"],c:[1],h:"Na manuele wijzigingen in de mysql.user tabel is FLUSH PRIVILEGES nodig. Na GRANT/REVOKE niet."},
{type:"mc",q:"Wat is een database gebruiker vs root in MySQL?",o:["Ze zijn identiek","Root heeft alle rechten; applicatiegebruikers hebben beperkte, specifieke rechten — principle of least privilege","Root is gevaarlijk","Database gebruikers zijn altijd veiliger"],c:[1],h:"Root enkel voor beheer. Applicaties krijgen een eigen gebruiker met enkel de nodige rechten."},
{type:"mc",q:"Wat is database backup in MySQL met mysqldump?",o:["Een type replicatie","Een command-line tool die een SQL-bestand genereert met alle CREATE- en INSERT-statements om de database te herstellen","Een type stored procedure","Een type export naar CSV"],c:[1],h:"mysqldump -u root -p database > backup.sql — exporteer naar SQL. herstel: mysql < backup.sql."},
{type:"mc",q:"Wat is LOAD DATA INFILE in MySQL?",o:["Een type INSERT","Laadt data efficiënt vanuit een tekstbestand (CSV) in een tabel — veel sneller dan individuele INSERTs","Een type back-up","Een type IMPORT"],c:[1],h:"LOAD DATA INFILE is de snelste manier om bulk data in MySQL te laden. Ideaal voor data-import."},
{type:"mc",q:"Wat is de purpose van SELECT INTO OUTFILE in MySQL?",o:["Een type SELECT","Exporteert query-resultaten naar een bestand op de server in een opgegeven formaat (CSV, TSV)","Een type back-up","Een type INSERT"],c:[1],h:"SELECT * FROM tabel INTO OUTFILE '/tmp/export.csv' = exporteer naar CSV op de server."},
{type:"mc",q:"Wat is een multi-table UPDATE in SQL?",o:["Bijwerken van meerdere databases","Een UPDATE die via JOIN meerdere tabellen betrekt om de juiste waarden te bepalen voor de update","Een type stored procedure","Een type trigger"],c:[1],h:"UPDATE t1 JOIN t2 ON t1.id=t2.id SET t1.kolom = t2.waarde WHERE ... — update op basis van een andere tabel."},
{type:"mc",q:"Wat is een multi-table DELETE in SQL?",o:["Verwijderen van meerdere databases","Een DELETE die via JOIN rijen uit meerdere tabellen tegelijk verwijdert","Een type DROP","Een type TRUNCATE"],c:[1],h:"DELETE t1, t2 FROM t1 JOIN t2 ON t1.id=t2.t1_id WHERE ... — verwijder uit beide tabellen via één statement."},
{type:"mc",q:"Wat is het verschil tussen een clustered en non-clustered index?",o:["Ze zijn identiek","Clustered index bepaalt de fysieke volgorde van data in de tabel (InnoDB: de PK); non-clustered = aparte structuur die verwijst naar de data","Non-clustered is sneller","Clustered indexes zijn verboden in MySQL"],c:[1],h:"InnoDB gebruikt de PK als clustered index. Alle andere indexes verwijzen via de PK naar de data."},
{type:"mc",q:"Wat is query optimalisatie en waarom is het belangrijk?",o:["Het schrijven van kortere queries","Het aanpassen van queries, indexes en schema voor betere performance — kritisch bij grote datasets","Het hernoemen van tabellen","Het verwijderen van onnodige kolommen"],c:[1],h:"Slechte query op grote tabel = seconden/minuten. Geoptimaliseerde query = milliseconden. EXPLAIN is je vriend."},
{type:"mc",q:"Wat is een N+1 query probleem?",o:["Een type normalisatiefout","Een performantieprobleem waarbij voor N records nog N extra queries uitgevoerd worden — oplosbaar met een JOIN","Een type deadlock","Een type transactiefout"],c:[1],h:"Haal 10 gebruikers op → doe voor elke gebruiker nog een extra query voor zijn orders = 11 queries. JOIN = 1 query."},
{type:"mc",q:"Wat is database connection pooling?",o:["Een type replicatie","Het hergebruiken van bestaande database-verbindingen in plaats van telkens een nieuwe te openen — vermindert overhead","Een type caching","Een type sharding"],c:[1],h:"Connection pooling = verbindingen delen. Openen/sluiten van verbindingen kost tijd. Pool hergebruikt ze."},
{type:"mc",q:"Wat is ORM (Object-Relational Mapping)?",o:["Een type database","Een abstractielaag die objecten uit een programmeertaal automatisch omzet naar database-operaties","Een type query","Een type stored procedure"],c:[1],h:"ORM = schrijf objectgeoriënteerde code, ORM vertaalt naar SQL. Bijv. Hibernate (Java), Eloquent (PHP)."},
{type:"mc",q:"Waarom is parameterized queries (prepared statements) belangrijk?",o:["Ze zijn sneller","Ze scheiden data van SQL-code, waardoor SQL-injection onmogelijk wordt","Ze zijn makkelijker te schrijven","Ze vereisen minder geheugen"],c:[1],h:"Prepared statement = data is nooit code. Gebruikersinput kan geen SQL-injectie veroorzaken."},
{type:"mc",q:"Wat is het verschil tussen DDL en DML in transactiebeheer?",o:["Ze zijn identiek","DDL (CREATE, DROP, ALTER) veroorzaakt in MySQL een impliciete COMMIT en kan niet worden teruggedraaid; DML (INSERT, UPDATE, DELETE) kan worden teruggedraaid","DML kan niet worden teruggedraaid","DDL kan altijd worden teruggedraaid"],c:[1],h:"Pas op: DROP TABLE is niet te rollbacken in MySQL. Denk goed na voor je DDL uitvoert."},
{type:"mc",q:"Wat is een NULL-safe comparison operator in MySQL?",o:["IS NULL","<=> (spaceship operator) — vergelijkt twee waarden waarbij NULL ook gelijk kan zijn aan NULL","= NULL","!= NULL"],c:[1],h:"NULL <=> NULL geeft TRUE. NULL = NULL geeft NULL (onbekend). Spaceship is NULL-safe."},
{type:"mc",q:"Wat is BETWEEN in SQL?",o:["Een type JOIN","Een operator die test of een waarde binnen een bereik valt (inclusief beide grenzen): WHERE leeftijd BETWEEN 18 AND 65","Een type subquery","Een type aggregatie"],c:[1],h:"BETWEEN is inclusief. BETWEEN 18 AND 65 = >= 18 AND <= 65."},
{type:"mc",q:"Wat is LIKE in SQL?",o:["Een type vergelijking voor exacte waarden","Een patroonvergelijking waarbij % nul of meer tekens vervangt en _ precies één teken vervangt","Een type string functie","Een type ORDER BY"],c:[1],h:"'Jo%' = begint met Jo. '%son' = eindigt op son. '%oh%' = bevat oh. Case-insensitief in MySQL default."},
{type:"mc",q:"Wat is REGEXP in MySQL?",o:["Een type LIKE","Een krachtigere patroonvergelijking via reguliere expressies voor complexere zoekpatronen","Een type full-text search","Een type index"],c:[1],h:"REGEXP '^[A-Z]' = begint met hoofdletter. Krachtig maar trager dan LIKE. Gebruik indien nodig."},
{type:"mc",q:"Wat is een view met updatable-eigenschap?",o:["Alle views zijn updatable","Een view is updatable als het aan specifieke condities voldoet (geen GROUP BY, DISTINCT, JOIN op meerdere tabellen) — dan kan je INSERT/UPDATE via de view","Views kunnen nooit geüpdatet worden","Alle views zijn read-only"],c:[1],h:"Simpele views op één tabel zijn vaak updatable. Complexe views (GROUP BY, JOINs) zijn read-only."},
{type:"open",q:"Welk SQL commando gebruik je om een nieuwe gebruiker aan te maken in MySQL?",ans:["create user","create user 'user'@'host'"],h:"Gevolgd door IDENTIFIED BY 'wachtwoord' en GRANT voor de rechten."},
{type:"mc",q:"Wat is het verschil tussen INNER JOIN en LEFT JOIN in termen van resultaat?",o:["Ze geven altijd hetzelfde resultaat","INNER JOIN: alleen rijen met matches in beide tabellen; LEFT JOIN: alle rijen uit linker tabel + matches rechts (NULL als geen match)","LEFT JOIN geeft minder resultaten","INNER JOIN geeft meer resultaten"],c:[1],h:"Als alle linkse rijen een match hebben, zijn de resultaten identiek. Zonder match: links zit in LEFT maar niet INNER."},
{type:"mc",q:"Wat is het verschil tussen normalisatie en denormalisatie?",o:["Ze zijn identiek","Normalisatie: verdeel data voor integriteit en minder redundantie; Denormalisatie: voeg redundantie toe voor betere read-performance","Denormalisatie is altijd beter","Normalisatie is verouderd"],c:[1],h:"Trade-off: genormaliseerd = integer en minder data, maar meer JOINs. Gedenormaliseerd = sneller lezen, meer redundantie."},
{type:"mc",q:"Wat is een OLTP database?",o:["Online Analytical Processing","Online Transaction Processing — geoptimaliseerd voor snelle, kleine transacties zoals webapplicaties en e-commerce","Een type big data database","Een type data warehouse"],c:[1],h:"OLTP = hoge concurrentie, kleine transacties, genormaliseerd schema. MySQL is een typisch OLTP-systeem."},
{type:"mc",q:"Wat is een OLAP database?",o:["Online Transaction Processing","Online Analytical Processing — geoptimaliseerd voor complexe analytische queries op grote datasets","Een type RDBMS","Een type document database"],c:[1],h:"OLAP = datawarehouse, business intelligence. Groot, gedenormaliseerd, weinig writes, complexe reads."},
{type:"mc",q:"Wat is een star schema in data warehousing?",o:["Een type ster-netwerk","Een schema met één centrale fact table omringd door dimension tables — optimaal voor analytische queries","Een type normalisatie","Een type OLTP schema"],c:[1],h:"Star schema: feitentabel in het midden, dimensietabellen (tijd, product, klant) eromheen als sterpunten."},
{type:"mc",q:"Wat is het verschil tussen een fact table en een dimension table?",o:["Ze zijn identiek","Fact table: meetbare feiten (verkopen, bedragen, aantallen); Dimension table: contextuele beschrijvende informatie (wie, wat, wanneer, waar)","Dimension table bevat feiten","Fact table bevat beschrijvingen"],c:[1],h:"Factentabel: verkoop_bedrag, hoeveelheid. Dimensietabel: klant_naam, product_naam, datum."},
{type:"mc",q:"Wat is database federation?",o:["Een type replicatie","Het distribueren van data over meerdere databases die elk verantwoordelijk zijn voor een subset — transparant voor de applicatie","Een type sharding","Een type normalisatie"],c:[1],h:"Federation = verdeel tabellen over servers. Gebruikerstabel op server A, ordertabel op server B."},
{type:"mc",q:"Wat is een FULL OUTER JOIN en wanneer heb je het nodig?",o:["Hetzelfde als INNER JOIN","Geeft alle rijen uit BEIDE tabellen, ook zonder match aan beide kanten — in MySQL gesimuleerd via UNION van LEFT en RIGHT JOIN","Hetzelfde als CROSS JOIN","Bestaat niet in SQL"],c:[1],h:"MySQL ondersteunt FULL OUTER JOIN niet direct — gebruik UNION van LEFT JOIN en RIGHT JOIN."},
{type:"open",q:"Welk SQL-sleutelwoord gebruik je om tabellen samen te voegen op basis van een overeenkomende kolom?",ans:["join","inner join"],h:"Het meest fundamentele sleutelwoord voor het combineren van tabellen."},
{type:"mc",q:"Wat is een self join?",o:["Een tabel die naar zichzelf refereert","Een JOIN waarbij dezelfde tabel twee keer gebruikt wordt, nuttig voor hiërarchische data (bijv. medewerker-manager)","Een type subquery","Een type view"],c:[1],h:"Self join = dezelfde tabel met twee aliassen. Nuttig voor hiërarchieën in één tabel."},
{type:"mc",q:"Wat doet de SQL functie NOW()?",o:["Geeft het huidige tijdstip","Geeft de huidige datum en tijd van de databaseserver","Geeft de datum van de laatste update","Geeft een random tijdstip"],c:[1],h:"NOW() = huidige datum + tijd op de server. DATE(NOW()) geeft enkel de datum."},
{type:"mc",q:"Wat is het verschil tussen CHAR_LENGTH en LENGTH in MySQL?",o:["Ze zijn identiek","CHAR_LENGTH telt het aantal tekens; LENGTH telt het aantal bytes — verschil bij multibyte karaktersets zoals UTF-8","LENGTH telt tekens; CHAR_LENGTH bytes","LENGTH is standaard SQL; CHAR_LENGTH is MySQL-specifiek"],c:[1],h:"Bij UTF-8 kan één teken meerdere bytes zijn. CHAR_LENGTH = tekens (logisch). LENGTH = bytes (fysiek)."},
{type:"mc",q:"Wat doet ROUND(waarde, decimalen) in MySQL?",o:["Rondt af naar het dichtstbijzijnde geheel getal","Rondt een getal af op het opgegeven aantal decimalen","Knipt decimalen af","Verdubbelt het getal"],c:[1],h:"ROUND(3.456, 2) = 3.46. ROUND(3.456, 0) = 3."},
