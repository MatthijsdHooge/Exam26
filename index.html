{type:"mc",q:"Wat is Azure Site Recovery in Business Continuity context?",o:["Een type DNS-dienst","Een Microsoft cloud-dienst die on-premises servers repliceert naar Azure voor cloud-gebaseerde disaster recovery","Een type back-up software","Een type replicatieprotocol"],c:[1],h:"Azure Site Recovery = DR in de cloud. Failover naar Azure als het eigen datacenter uitvalt."},
{type:"mc",q:"Wat is een Recovery Point in de context van back-ups?",o:["Een type back-up-server","Een specifiek punt in de tijd waarnaar een systeem hersteld kan worden — overeenkomend met een back-up die genomen werd op dat moment","Een type snapshot","Een type checkpoint"],c:[1],h:"Recovery point = het moment in de tijd waarnaar je kunt herstellen. Frequentere back-ups = meer recovery points."},
{type:"mc",q:"Wat is een 'image-based backup'?",o:["Een back-up van afbeeldingen","Een back-up van het volledige volume inclusief OS, apps en data als één schijfimage — voor snelle bare metal restore","Een type incrementele back-up","Een type database back-up"],c:[1],h:"Image-based = alles als één bestand. Sneller herstellen dan bestandsgebaseerde back-up. Grotere back-upbestanden."},
{type:"mc",q:"Wat is een 'file-level backup'?",o:["Een back-up van één bestand","Een back-up die individuele bestanden en mappen opslaat — flexibeler voor het herstellen van specifieke bestanden maar trager bij volledige systeem-restore","Een type image-based backup","Een type database back-up"],c:[1],h:"File-level = selectief herstellen. Wil je enkel document.docx terug? File-level back-up is de keuze."},
{type:"mc",q:"Wat is een cloud-back-up en welke voordelen biedt het?",o:["Een back-up van cloudservices","Een back-up opgeslagen in de cloud — offsite, schaalbaar, geen hardware-beheer, toegankelijk van overal","Een type lokale back-up","Een type tape-back-up"],c:[1],h:"Cloud back-up = offsite zonder eigen hardware. Voldoet automatisch aan het 3-2-1 principe (offsite-kopie)."},
{type:"mc",q:"Wat is een tape-back-up en wanneer is het nog relevant?",o:["Verouderde technologie zonder gebruik","Een back-up op magneetband — goedkoop per GB, offline (air-gapped), lange bewaarperiode — relevant voor archief en compliance","Altijd beter dan cloud","Een type deduplicatie"],c:[1],h:"Tape = goedkoop archief. Offline = niet bereikbaar voor ransomware. Gebruikt door grote enterprise voor langetermijn-bewaring."},
{type:"mc",q:"Wat is 'continuous data protection' (CDP)?",o:["Een type dagelijkse back-up","Een back-uptechnologie die alle wijzigingen real-time vastlegt zodat je kunt herstellen naar elk moment in de tijd (RPO ≈ 0)","Een type synchronisatie","Een type replicatie"],c:[1],h:"CDP = near-zero RPO. Elke write wordt vastgelegd. Herstel naar 'net voor de fatale actie' is mogelijk."},
{type:"mc",q:"Wat is een 'backup window'?",o:["Het tijdstip van de back-up","De tijdsperiode (typisch 's nachts) waarin back-ups uitgevoerd worden zonder impact op de productie — kritieke factor voor back-upplanning","De duur van een back-up","De retentieperiode"],c:[1],h:"Backup window = beschikbare tijd voor back-up. Volle back-up in 6 uur = goed. 48 uur = probleem."},
{type:"mc",q:"Wat is een NAS (Network Attached Storage) back-up target?",o:["Een type server","Een netwerk-opslagapparaat dat als back-up-bestemming wordt gebruikt — eenvoudig, goedkoop, snel toegankelijk","Een type tape-system","Een type cloud back-up"],c:[1],h:"NAS als back-up target = snel en makkelijk. Voeg ook een offsite kopie toe voor 3-2-1 compliance."},
{type:"mc",q:"Wat is Windows Server Backup?",o:["Een type antivirus","De ingebouwde back-up tool van Windows Server voor bestandsniveau, volume en bare metal restore","Een type monitoring","Een type replicatie"],c:[1],h:"Windows Server Backup = gratis ingebouwde back-up. Beperkt maar voldoende voor kleine omgevingen."},
{type:"mc",q:"Wat is een 'disaster recovery drill'?",o:["Een type brand-training","Een geoefend scenario waarbij het DRP getest wordt door een noodgeval te simuleren — bewijst dat herstel ook echt werkt","Een type monitoring","Een type audit"],c:[1],h:"DR drill = oefenen voor het echte geval. Ontdek problemen in je DRP voor je ze in crisis nodig hebt."},
{type:"mc",q:"Wat is RTO vs. downtime cost?",o:["Ze zijn identiek","RTO is de maximaal aanvaardbare downtime; als de werkelijke hersteltijd de RTO overschrijdt, overtreft de schade wat acceptabel is","RTO is altijd groter","Downtime cost is irrelevant"],c:[1],h:"RTO bepaal je door de maximale schade te berekenen die acceptabel is. Langere downtime = meer schade."},
{type:"mc",q:"Wat is een 'tabletop exercise' in Business Continuity?",o:["Een type technische test","Een bespreking van een noodscenario door stakeholders zonder systemen te activeren — test kennismaking met procedures","Een type DR drill","Een type audit"],c:[1],h:"Tabletop = discussie-oefening. Goedkoop, snel. Ontdek gaten in kennis en procedures zonder systemen te activeren."},
{type:"mc",q:"Wat is een 'BCP scope' in Business Continuity Planning?",o:["De omvang van het back-up systeem","De afbakening van welke processen, systemen en mensen het BCP dekt en welke niet","De duur van het BCP","De kosten van het BCP"],c:[1],h:"Scope = grenzen van het plan. Welke afdelingen? Welke systemen? Buiten de scope = niet gedekt door het BCP."},
{type:"mc",q:"Wat is een 'crisis communication plan' als onderdeel van BCP?",o:["Een marketingstrategie","Een plan dat beschrijft wie communiceert met wie tijdens een incident — intern (medewerkers) en extern (klanten, media, overheid)","Een type escalatieplan","Een type back-upplan"],c:[1],h:"Crisis communicatie = wie zegt wat aan wie. Zonder dit plan leiden geruchten tot extra schade."},
{type:"mc",q:"Wat is een 'service dependency mapping' in BIA?",o:["Een type netwerktopologie","Het in kaart brengen welke IT-services van andere services afhangen — als A wegvalt, wat gaat dan ook fout?","Een type monitoring","Een type audit"],c:[1],h:"Dependency mapping = domino-effect visualiseren. Email server weg? → CRM weg? → Verkoop platgelegd?"},
{type:"mc",q:"Wat is het verschil tussen een 'hot standby' en een 'warm standby'?",o:["Ze zijn identiek","Hot standby = real-time gesynchroniseerd, direct failover; Warm standby = periodiek gesynchroniseerd, langere failover-tijd","Warm standby is sneller","Hot standby is goedkoper"],c:[1],h:"Hot = direct over, warm = minuten tot uren. Hot kost meer, warm is goedkoper. Kies op basis van RTO."},
{type:"mc",q:"Wat is een 'health check' in de context van servers en services?",o:["Een medische check voor IT-personeel","Automatische controles die periodiek verifiëren of een service correct functioneert — gebruikt door load balancers en monitoring-tools","Een type audit","Een type monitoring-alert"],c:[1],h:"Health check = is de service OK? Load balancers sturen geen verkeer naar unhealthy servers."},
{type:"mc",q:"Wat is een Windows Server 'Server Core' installatie en waarom kiezen beheerders daarvoor?",o:["Een installatie met minder features","Een installatie zonder grafische interface — kleiner aanvalsoppervlak, lager geheugenverbruik, minder patches nodig","Een type virtuele machine","Een type container"],c:[1],h:"Server Core = command-line only. Minder software = minder kwetsbaarheden. Microsoft adviseert Server Core."},
{type:"mc",q:"Wat is een Windows Server 'Nano Server'?",o:["Een kleine fysieke server","Een ultra-minimale Windows Server installatieoptie voor containers en cloud — geen lokale login mogelijk","Een type back-up server","Een type domain controller"],c:[1],h:"Nano Server = kleiner dan Server Core. Enkel voor containers en moderne cloud-workloads."},
{type:"mc",q:"Wat is de purpose van een 'jump server' (bastion host)?",o:["Een type back-up server","Een beveiligde toegangsserver die als enige directe verbinding heeft met productie-servers — beheerders loggen eerst in op de jump server","Een type proxy server","Een type DNS-server"],c:[1],h:"Jump server = toegangspoort. Je logt in op de jump server → dan naar de productie-server. Nooit rechtstreeks."},
{type:"mc",q:"Wat is een Windows Server Deduplicatie feature?",o:["Een type back-up","Een storage-optimalisatietechnologie die identieke datablokken in bestanden detecteert en slechts één exemplaar opslaat","Een type replicatie","Een type RAID"],c:[1],h:"Deduplicatie = bewaar één exemplaar van herhalende data. 60-80% opslagbesparing op typische file servers."},
{type:"mc",q:"Wat is het doel van 'Windows Server Essentials Experience'?",o:["Een type beheerdersinterface","Een vereenvoudigde serverervaring voor kleine bedrijven met ingebouwde functies voor back-up, remote access en dashboard","Een type Active Directory","Een type replicatiedienst"],c:[1],h:"Essentials = Windows Server voor kleine bedrijven. Eenvoudigere beheerinterface, ingebouwde essentiële functies."},
{type:"open",q:"Welk PowerShell commando gebruik je om de DNS-serverrol te installeren op Windows Server?",ans:["install-windowsfeature dns","install-windowsfeature -name dns","install-windowsfeature dns -includemanagementtools"],h:"Gebruik Install-WindowsFeature in PowerShell. De rolnaam voor DNS is 'DNS'."},
{type:"mc",q:"Wat is het verschil tussen een primaire en secundaire DNS-zone op Windows Server?",o:["Ze zijn identiek","Primaire zone = bewerkbare master; Secundaire zone = read-only kopie die via zone transfer bijgewerkt wordt","Secundaire zone is bewerkbaar","Primaire zone is read-only"],c:[1],h:"Primair = de bron. Secundair = de kopie. Wijzigingen altijd op de primaire server, secundaire volgt automatisch."},
{type:"mc",q:"Wat is een DNS 'aging and scavenging'?",o:["Een type DNS-beveiliging","Een Windows DNS-feature die verouderde DNS-records automatisch detecteert en verwijdert — voorkomt 'DNS-vuilnis'","Een type DNS-delegatie","Een type DNS-replica"],c:[1],h:"Aging = meet hoe oud een record is. Scavenging = verwijder records ouder dan de no-refresh + refresh interval."},
{type:"mc",q:"Wat is een DHCP split scope?",o:["Een scope verdeeld over twee subnetten","Een configuratie waarbij de DHCP-scope verdeeld wordt over twee servers (bijv. 80/20) voor redundantie zonder failover-configuratie","Een type superscope","Een type DHCP-optie"],c:[1],h:"Split scope = 80% op server A, 20% op server B. Als A uitvalt, deelt B de resterende adressen uit (trage failover)."},
{type:"mc",q:"Wat is een 'DHCP lease database' en waar staat die op Windows Server?",o:["Een type bestand","De database (%systemroot%\\system32\\dhcp) die alle actieve leases bijhoudt — belangrijk om te back-uppen voor herstel","Een type registratie","Een type DNS-record"],c:[1],h:"DHCP lease database = wie heeft welk IP-adres. Bij servercrash zonder back-up: IP-conflicten bij herstart."},
{type:"mc",q:"Wat is een 'Domain Functional Level' in Active Directory?",o:["Het beveiligingsniveau van het domein","De minimale Windows Server-versie die alle DCs draaien — bepaalt welke AD-features beschikbaar zijn","Het aantal gebruikers","Het aantal DCs"],c:[1],h:"Functional level = de 'laagste gemeenschappelijke deler'. Verhoog het als alle DCs bijgewerkt zijn voor nieuwe features."},
{type:"mc",q:"Wat is een 'read-only domain controller' (RODC)?",o:["Een DC die enkel leest","Een DC die een read-only kopie van de AD-database heeft — voor fysiek onveilige locaties waar een DC nodig is maar niet vertrouwd wordt","Een type back-up DC","Een type proxy DC"],c:[1],h:"RODC = DC voor onveilige locaties. Bijkantoor met slechte fysieke beveiliging? RODC zodat diefstal minder schade berokkent."},
{type:"mc",q:"Wat is 'fine-grained password policy' in Windows Server?",o:["Een type wachtwoordbeleid voor alle gebruikers","De mogelijkheid om per groep of gebruiker een ander wachtwoordbeleid te definiëren — onafhankelijk van het domeinwachtwoordbeleid","Een type GPO","Een type beveiligingsgroep"],c:[1],h:"Fine-grained = granulair wachtwoordbeleid. IT-administrators krijgen een sterker beleid dan gewone gebruikers."},
{type:"mc",q:"Wat is het doel van een 'service account' in Windows?",o:["Een account voor klanten","Een account gebruikt door services en applicaties om met Windows-resources te interageren — met minimale privileges","Een type administrator-account","Een type gastaccount"],c:[1],h:"Service account = least privilege voor diensten. Niet de administrator-account gebruiken voor services!"},
{type:"mc",q:"Wat is een 'gMSA' (group Managed Service Account)?",o:["Een type gebruikersgroep","Een Managed Service Account dat automatisch zijn wachtwoord roteert en door meerdere servers gebruikt kan worden","Een type beveiligingsgroep","Een type roaming profiel"],c:[1],h:"gMSA = veilige service accounts. Automatische wachtwoordrotatie, geen manueel wachtwoordbeheer nodig."},
{type:"mc",q:"Wat is Windows Event Forwarding?",o:["Een type e-mailforwarding","Een mechanisme waarmee Windows events van meerdere computers gecollecteerd worden op één centrale event collector voor gecentraliseerde analyse","Een type DNS-forwarding","Een type DHCP-forwarding"],c:[1],h:"Event Forwarding = Windows equivalent van syslog forwarding. Centraliseer alle security events op één server."},
{type:"mc",q:"Wat is een 'subscription' in Windows Event Forwarding?",o:["Een type e-mailabonnement","Een configuratie die definieert welke events van welke bronnen gefollecteerd worden op de collector-server","Een type taak","Een type GPO"],c:[1],h:"Subscription = filter en stuur. Definieer: welke computers, welke event-IDs, naar welke collector."},
{type:"mc",q:"Wat is een 'storage spaces' in Windows Server?",o:["Een type virtueel geheugen","Een Windows Server-feature die meerdere fysieke schijven combineert tot één of meerdere virtuele schijven met RAID-functionaliteit","Een type back-up","Een type RAID-controller"],c:[1],h:"Storage Spaces = software-RAID op Windows. Combineer goedkope JBOD schijven tot een fault-tolerant volume."},
{type:"mc",q:"Wat is 'ReFS' (Resilient File System) en wanneer gebruik je het?",o:["Een type back-up","Een Microsoft bestandssysteem geoptimaliseerd voor grote volumes en data-integriteit — bij voorkeur voor Hyper-V VHDs en back-up targets","Een type NTFS-variant","Een type Linux bestandssysteem"],c:[1],h:"ReFS = robuust voor grote volumes en virtualisatie. Integriteitschecks, snellere VHDX-operaties."},
{type:"mc",q:"Wat is het verschil tussen NTFS en FAT32 als bestandssysteem?",o:["Ze zijn identiek","NTFS = journaling, bestandspermissies, grote bestanden (>4GB), versleuteling; FAT32 = eenvoudig, breed compatibel, max 4GB per bestand","FAT32 is veiliger","FAT32 ondersteunt grotere bestanden"],c:[1],h:"NTFS voor Windows Server altijd. FAT32 enkel voor USB-sticks die ook op niet-Windows toestellen werken."},
{type:"mc",q:"Wat is een 'shared nothing cluster' in Windows Server?",o:["Een cluster zonder gedeelde opslag","Een type Hyper-V cluster waarbij elke node zijn eigen opslag heeft — Hyper-V Replica of CSV voor synchronisatie","Een type RAID-cluster","Een type DNS-cluster"],c:[1],h:"Shared nothing = geen shared storage vereist. Goedkoper dan traditionele SAN-clusters."},
{type:"mc",q:"Wat is 'Storage Replica' in Windows Server?",o:["Een type deduplicatie","Een Windows Server-feature voor synchrone of asynchrone volume-replicatie tussen servers — voor disaster recovery","Een type back-up","Een type RAID"],c:[1],h:"Storage Replica = blokniveau-replicatie. Synchrone replica = zero RPO (maar prestatieimpact). Asynchroon = meer RPO."},
{type:"mc",q:"Wat is het doel van 'System State backup' op Windows Server?",o:["Een back-up van gebruikersdata","Een back-up van kritieke OS-componenten (registry, boot files, COM+ registratie, AD database) voor systeemherstel","Een type image-back-up","Een type bestandsback-up"],c:[1],h:"System State = het hart van Windows. Herstel AD uit System State back-up na een corrupte database."},
{type:"mc",q:"Wat is 'Authoritative Restore' bij Active Directory?",o:["Een normale AD-herstel","Een herstel waarbij de herstelde AD-data als authoritative gemarkeerd wordt zodat ze gerepliceerd worden naar andere DCs (niet overschreven)","Een type DC-promotie","Een type AD-back-up"],c:[1],h:"Authoritative restore = forceer de teruggedraaide data. Verwijderde OU? Authoritative restore brengt hem terug."},
{type:"mc",q:"Wat is 'Tombstone lifetime' in Active Directory?",o:["De levensduur van een DC","De periode gedurende welke verwijderde AD-objecten bewaard worden als 'tombstones' zodat de verwijdering kan worden gerepliceerd","Een type FSMO-rol","Een type back-up periode"],c:[1],h:"Tombstone lifetime = standaard 180 dagen. Back-ups ouder dan dit zijn te oud voor AD-herstel. Plan back-ups hierop!"},
{type:"mc",q:"Wat is AD Recycle Bin in Windows Server?",o:["Een type prullenbak voor bestanden","Een AD-feature die verwijderde objecten bewaart met al hun attributen, herstelbaar zonder downtime of back-uprestauratie","Een type back-up","Een type FSMO-rol"],c:[1],h:"AD Recycle Bin = herstel verwijderde users/OUs/computers onmiddellijk vanuit AD. Geen back-up nodig."},
{type:"mc",q:"Wat is het doel van Windows Server 'iSCSI Target'?",o:["Een type DNS-target","Een Windows Server-rol die een iSCSI storage target biedt — serveert blokniveau-opslag via het IP-netwerk","Een type DHCP-target","Een type back-up target"],c:[1],h:"iSCSI Target = SAN over Ethernet. Goedkoop alternatief voor Fibre Channel SAN. Windows Server kan iSCSI bieden."},
{type:"mc",q:"Wat is een Windows Server NLB (Network Load Balancing)?",o:["Een type netwerksegmentatie","Een ingebouwde load balancer die inkomend netwerk-verkeer verdeelt over meerdere servers voor beschikbaarheid en schaalbaarheid","Een type routing","Een type clustering"],c:[1],h:"NLB = IP-gebaseerde load balancing voor webservers, IIS, remote desktop. Eenvoudiger dan hardwarebalancers."},
{type:"mc",q:"Wat is een 'Windows Server Core' voordeel voor beveiliging?",o:["Snellere patches","Kleiner aanvalsoppervlak door minder geïnstalleerde componenten, minder services en minder patches nodig","Betere GUI","Meer compatibiliteit"],c:[1],h:"Server Core = minimalistisch. Minder code = minder kwetsbaarheden. Microsoft adviseert het voor productie."},
{type:"mc",q:"Wat is 'Windows Admin Center' (WAC)?",o:["Een type Active Directory-tool","Een moderne web-gebaseerde beheerconsole voor Windows Server, Hyper-V, clusters en Windows 10/11 beheer","Een type back-up tool","Een type DNS-tool"],c:[1],h:"WAC = de moderne opvolger van traditionele MMC-consoles. Beheer servers via browser zonder RDP."},
{type:"mc",q:"Wat is het verschil tussen 'graceful shutdown' en 'hard poweroff' van een server?",o:["Ze zijn identiek","Graceful shutdown = OS sluit correct af, services stoppen netjes, data wordt geflushed; Hard poweroff = stroom weg, mogelijke datacorruptie","Hard poweroff is veiliger","Graceful shutdown is langzamer en gevaarlijker"],c:[1],h:"Graceful = correct afsluiten. Hard poweroff bij een crash = risico op corruptie van databases en logs."},
{type:"mc",q:"Wat is een UPS (Uninterruptible Power Supply) schakelingsintegratie met Windows Server?",o:["Een type router","Via een UPS-beheersoftware kan Windows Server automatisch een graceful shutdown uitvoeren wanneer de batterij bijna leeg is","Een type back-up","Een type monitoring"],c:[1],h:"UPS + software = automatische graceful shutdown bij langdurige stroomuitval. Voorkomt datacorruptie."},
{type:"mc",q:"Wat is een 'bare metal recovery' en wanneer is het nodig?",o:["Een back-up van gebruikersdata","Het volledig herstellen van een server op nieuwe of lege hardware vanuit een back-up — inclusief OS, applicaties en configuratie","Een type image back-up","Een type partitionele herstel"],c:[1],h:"Bare metal = herstel van nul. Hardware kapot? Nieuwe server + bare metal back-up = terug in productie."},
{type:"mc",q:"Wat is 'Windows Deployment Services' (WDS)?",o:["Een type DNS-dienst","Een Windows Server-rol voor netwerk-gebaseerde OS-installatie — PXE boot voor massale deployment","Een type DHCP-dienst","Een type back-up dienst"],c:[1],h:"WDS + PXE = installeer Windows op 100 computers tegelijk via het netwerk zonder USB-sticks."},
{type:"mc",q:"Wat is MDT (Microsoft Deployment Toolkit)?",o:["Een type monitoring tool","Een gratis Microsoft tool voor geautomatiseerde OS-deployment met takenreeksen, drivers en applicaties","Een type back-up tool","Een type DHCP-tool"],c:[1],h:"MDT = scripted deployment. Definieer eenmaal hoe een PC geconfigureerd moet worden, pas toe op honderden."},
{type:"mc",q:"Wat is SCCM/Endpoint Manager en wat is de relatie met serverbeheer?",o:["Een type DNS-tool","Microsoft's enterprise-tool voor OS-deployment, patching, software-distributie en compliance-monitoring","Een type firewall","Een type back-up tool"],c:[1],h:"SCCM = de grote broer van WSUS. Niet enkel patches maar ook software, OS-deployment en inventaris."},
{type:"mc",q:"Wat is een 'runbook' in IT-beheer?",o:["Een type monitoringdashboard","Een gedocumenteerde stap-voor-stap procedure voor het uitvoeren van specifieke taken — essentieel voor herhaalbare en foutvrije operaties","Een type back-up","Een type audit rapport"],c:[1],h:"Runbook = de handleiding voor operaties. Zo kan ook een junior de procedure correct uitvoeren."},
{type:"mc",q:"Wat is 'Change Management' in IT-beheer?",o:["Het beheren van wisselgeld","Het gestructureerde proces voor het beoordelen, goedkeuren en implementeren van wijzigingen — minimaliseert het risico van verstoring","Een type back-up proces","Een type monitoring proces"],c:[1],h:"Change management = geen wijzigingen zonder goedkeuring. CAB (Change Advisory Board) beoordeelt grote wijzigingen."},
{type:"mc",q:"Wat is een 'post-implementation review' na een serverwijziging?",o:["Een type audit","Een evaluatie na het doorvoeren van een wijziging om te controleren of alles correct werkt en lessen te trekken","Een type back-up","Een type monitoring"],c:[1],h:"PIR = evalueer wat je gedaan hebt. Werkt alles? Waren er onverwachte problemen? Wat leren we hieruit?"},
{type:"mc",q:"Wat is het verschil tussen 'in-place upgrade' en 'migration' bij Windows Server?",o:["Ze zijn identiek","In-place upgrade = OS upgraden op dezelfde hardware; Migration = diensten verplaatsen naar nieuwe hardware/OS","Migration is altijd beter","In-place is altijd riskanter"],c:[1],h:"In-place = eenvoudiger maar risicovoller. Migration = meer werk maar schoner resultaat. Voor kritieke systemen: migreer."},
{type:"mc",q:"Wat is 'Windows Server Licensing' per core?",o:["Een licentie per gebruiker","Microsoft licentieert Windows Server op basis van het aantal fysieke processor-cores — alle cores moeten gelicentieerd zijn","Een licentie per server","Een licentie per virtuele machine"],c:[1],h:"Per-core licensing = alle cores tellen. Minimaal 16 cores per processor. Virtualisatie heeft aparte licentieregels."},
{type:"mc",q:"Wat is een 'CAL' (Client Access License) voor Windows Server?",o:["Een type certificaat","Een licentie die elke gebruiker of apparaat nodig heeft die toegang krijgt tot Windows Server-diensten","Een type back-up licentie","Een type monitoring licentie"],c:[1],h:"CAL = toegangslicentie. Naast de server-licentie heeft elke gebruiker/apparaat die verbindt een CAL nodig."},
{type:"mc",q:"Wat is het doel van 'Windows Server Evaluation' versies?",o:["Gratis permanente versies","Tijdelijke (180 dagen) volledige versies voor evaluatie en testen, zonder productiegebruik","Een type student-licentie","Een type cloud-licentie"],c:[1],h:"Evaluation = test alles gratis voor 180 dagen. Daarna activeren met licentie of opnieuw installeren."},
{type:"mc",q:"Wat is Azure Arc voor on-premises servers?",o:["Een type back-up","Een Microsoft cloud-dienst die Azure-beheerfunctionaliteit uitbreidt naar on-premises en multi-cloud servers — unified management","Een type DNS-dienst","Een type monitoring tool"],c:[1],h:"Azure Arc = beheer on-premises servers als waren ze Azure-resources. Unified policy, monitoring en update management."},
{type:"mc",q:"Wat is het doel van 'Windows Server Message Blocks Signing'?",o:["Een type versleuteling","Een beveiligingsfunctie die SMB-verkeer digitaal ondertekent om man-in-the-middle aanvallen op bestandsoverdrachten te voorkomen","Een type authenticatie","Een type compressie"],c:[1],h:"SMB Signing = handtekening op elk SMB-pakket. Aanvaller kan verkeer niet aanpassen zonder detectie."},
{type:"mc",q:"Wat is 'SMB 3.0 Encryption'?",o:["Een type compressie","Versleuteling van SMB-verkeer end-to-end — beschermt bestandsoverdrachten op het netwerk tegen afluistering","Een type authenticatie","Een type handtekening"],c:[1],h:"SMB Encryption = versleutel alle bestandsoverdrachten. Beschermt ook op vertrouwde interne netwerken."},
{type:"mc",q:"Wat is 'Windows Server 2022' belangrijkste security verbetering?",o:["Snellere back-ups","Secured-core server met hardwaregebaseerde beveiligingsfeatures: Secure Boot, DRTM, HVCI voor kernelbeveiliging","Betere GUI","Meer VLAN-ondersteuning"],c:[1],h:"Secured-core = diepere hardwarebeveiliging. TPM 2.0, UEFI Secure Boot, Virtualization Based Security verplicht."},
{type:"mc",q:"Wat is een 'patch Tuesday'?",o:["Een willekeurige patchdag","De tweede dinsdag van elke maand waarop Microsoft beveiligingsupdates uitbrengt — standaard patch-cyclus","De eerste dinsdag","Een type automatisch patch-systeem"],c:[1],h:"Patch Tuesday = Microsofts maandelijkse beveiligingsupdates. Plan je WSUS-goedkeuring en uitrol hierop."},
{type:"mc",q:"Wat is een 'zero-day patch'?",o:["Een patch uitgebracht op nuldagen","Een noodpatch uitgebracht buiten de normale patch-cyclus voor kritieke kwetsbaarheden die actief geëxploiteerd worden","Een type WSUS-update","Een type firmware-update"],c:[1],h:"Zero-day patch = spoedreparatie. Wacht niet op patch Tuesday — patch onmiddellijk bij actieve exploitatie."},
{type:"mc",q:"Wat is het doel van 'Windows Server Monitoring'?",o:["Een type back-up","Het continu bewaken van server-gezondheid (CPU, geheugen, schijf, events) voor proactieve probleemdetectie","Een type beveiliging","Een type deployment"],c:[1],h:"Server monitoring = vroeg weten. CPU-pieken, schijf bijna vol, service gestopt — proactief actie ondernemen."},
{type:"mc",q:"Wat is Performance Monitor op Windows Server?",o:["Een type taakbeheerder","Een tool voor het vastleggen en analyseren van performance-metrics over tijd via performance counters","Een type event viewer","Een type resource monitor"],c:[1],h:"Performance Monitor (perfmon) = tijdreeksanalyse. Leg CPU, geheugen, disk en netwerk vast over langere periode."},
{type:"mc",q:"Wat is Resource Monitor op Windows Server?",o:["Een type performance monitor","Een real-time tool die CPU, geheugen, schijf en netwerk per proces toont — dieper dan taakbeheer","Een type event viewer","Een type process monitor"],c:[1],h:"Resource Monitor = detail per proces. Welk proces gebruikt al die disk-IO? Resource Monitor toont het."},
{type:"mc",q:"Wat is het 'Windows Assessment and Deployment Kit' (ADK)?",o:["Een type monitoring toolkit","Een toolkit met tools voor het aanpassen, evalueren en deployen van Windows — bevat WinPE, DISM, Windows SIM","Een type back-up toolkit","Een type beveiligingstoolkit"],c:[1],h:"ADK = de gereedschapskist voor Windows deployment. WinPE voor boot-media, DISM voor image-beheer."},
{type:"mc",q:"Wat is DISM (Deployment Image Servicing and Management)?",o:["Een type DNS-tool","Een command-line tool voor het beheren van Windows images — offline patches toepassen, drivers toevoegen, features in/uitschakelen","Een type back-up tool","Een type monitoring tool"],c:[1],h:"DISM = bewerk een Windows-image zonder het te starten. Patch WinPE, voeg drivers toe aan een image."},
{type:"mc",q:"Wat is 'WinPE' (Windows Preinstallation Environment)?",o:["Een type bare-metal OS","Een minimale Windows-omgeving die booted van USB/PXE voor troubleshooting, deployment en herstel","Een type server OS","Een type back-up omgeving"],c:[1],h:"WinPE = boot-omgeving. Start van USB, herstel een systeem, deploy een image — zonder een volledig OS nodig."},
{type:"mc",q:"Wat is het doel van 'Sysprep' bij Windows Server deployment?",o:["Een type performance-tool","Een tool die een Windows-installatie generaliseert voor klonen — verwijdert machine-specifieke informatie voor deployment","Een type back-up tool","Een type monitoring tool"],c:[1],h:"Sysprep = maak klaar voor klonen. Verwijdert SID, computernaam, activering zodat elke clone uniek wordt."},
{type:"mc",q:"Wat is een 'golden image' in serverdeployment?",o:["Een type back-up","Een geoptimaliseerde, vooraf geconfigureerde master OS-image die gebruikt wordt als basis voor alle nieuwe server-deployments","Een type performance image","Een type beveiligingsimage"],c:[1],h:"Golden image = de perfecte blauwdruk. Gepatcht, geconfigureerd, klaar. Kloon het voor nieuwe servers."},
{type:"mc",q:"Wat is 'Desired State Configuration' (DSC) in PowerShell?",o:["Een type monitoring","Een PowerShell-framework voor het declaratief beschrijven en afdwingen van de gewenste configuratietoestand van servers","Een type back-up","Een type deployment tool"],c:[1],h:"DSC = zeg hoe de server eruit moet zien, PowerShell zorgt dat het zo is en blijft. Infrastructure as Code."},
{type:"mc",q:"Wat is 'Infrastructure as Code' (IaC) in servercontext?",o:["Een type programmeeromgeving","Het beheren van infrastructuur via code (scripts, templates) zodat omgevingen reproduceerbaar en versie-beheerd zijn","Een type monitoring","Een type back-up"],c:[1],h:"IaC = geen handmatige serverconfiguratie. Code beschrijft de infrastructuur → reproduceerbaar en auditeerbaar."},
{type:"mc",q:"Wat is Ansible in de context van Windows Server beheer?",o:["Een type back-up","Een open-source automatiseringstool die Windows servers kan configureren via WinRM/SSH zonder agent","Een type monitoring","Een type deployment tool"],c:[1],h:"Ansible = agentloze automatisering. Gebruik playbooks om Windows Server te configureren op schaal."},
{type:"mc",q:"Wat is Terraform in servercontext?",o:["Een type besturingssysteem","Een IaC-tool voor het provisioneren van cloud- en on-premises infrastructuur via declaratieve configuratiebestanden","Een type monitoring","Een type back-up"],c:[1],h:"Terraform = provisioneer servers via code. Hetzelfde bestand voor AWS, Azure en VMware — multi-cloud IaC."},
{type:"mc",q:"Wat is een 'configuration drift' probleem?",o:["Een type netwerkverschuiving","De geleidelijke afwijking van een server van zijn gewenste configuratie door manuele wijzigingen, patches of incidenten","Een type prestatieverslechtering","Een type beveiligingsprobleem"],c:[1],h:"Configuration drift = server A en B waren identiek maar zijn dat niet meer. DSC/Ansible/Chef detecteren en corrigeren dit."},
{type:"mc",q:"Wat is 'immutable infrastructure'?",o:["Een type legacy-infrastructuur","Een aanpak waarbij servers nooit gewijzigd worden na deployment — bij wijziging wordt een nieuwe server gecreëerd en de oude vervangen","Een type back-up strategie","Een type clusterconfiguratie"],c:[1],h:"Immutable = geen configuratiewijzigingen achteraf. Probleem? Gooi weg, deploy een nieuwe. Elimineert drift."},
{type:"mc",q:"Wat is een 'Heartbeat' monitoring in de context van servers?",o:["Een type prestatiemeting","Periodieke ping of check om te bevestigen dat een server nog leeft — als geen heartbeat ontvangen, alarm slaan","Een type back-up check","Een type security scan"],c:[1],h:"Heartbeat = ik leef nog. Geen heartbeat = server dood of netwerk weg. Eenvoudigste vorm van monitoring."},
{type:"mc",q:"Wat is 'Event ID 4625' in Windows Security log?",o:["Succesvolle aanmelding","Mislukte aanmelding — nuttig voor detectie van brute force aanvallen","Account aanmaak","Wachtwoordwijziging"],c:[1],h:"Event 4625 = failed logon. Veel 4625s voor hetzelfde account = brute force aanval. Monitor dit!"},
{type:"mc",q:"Wat is 'Event ID 4624' in Windows Security log?",o:["Mislukte aanmelding","Succesvolle aanmelding — log van wie wanneer ingelogd heeft","Account vergrendeld","Service gestart"],c:[1],h:"Event 4624 = successful logon. Combineer met 4625 voor login-analyse. Basis voor security monitoring."},
{type:"mc",q:"Wat is 'kerberos' authenticatie in Windows?",o:["Een type wachtwoord-hash","Het standaard authenticatieprotocol in Active Directory-omgevingen — gebruikt tickets voor single sign-on","Een type LDAP-protocol","Een type firewall"],c:[1],h:"Kerberos = ticket-based authenticatie. KDC geeft tickets uit → eenmalig inloggen geeft toegang tot alle services."},
{type:"mc",q:"Wat is LDAP en waarvoor wordt het gebruikt in Windows omgevingen?",o:["Een type routeringsprotocol","Lightweight Directory Access Protocol — het protocol voor het bevragen en wijzigen van directory-informatie zoals Active Directory","Een type DNS-protocol","Een type DHCP-protocol"],c:[1],h:"LDAP = communiceer met AD. Zoek gebruikers, controleer groepen, authenticeer applicaties via LDAP(S)."},
{type:"mc",q:"Wat is een 'Service Principal Name' (SPN) in Kerberos?",o:["Een type gebruikersnaam","Een unieke identificator voor een service-instantie in een Kerberos-omgeving — clients gebruiken het om de juiste service te vinden","Een type computer account","Een type groepsbeleid"],c:[1],h:"SPN = Kerberos-adres voor een service. HTTP/server.domein.be voor IIS, MSSQLSvc/sql.domein.be voor SQL Server."},
{type:"mc",q:"Wat is 'Privilege Access Workstation' (PAW)?",o:["Een krachtige werkstation","Een geharde, speciaal geconfigureerde werkstation gebruikt uitsluitend voor beheertaken — gescheiden van dagelijks gebruik","Een type server","Een type virtual machine"],c:[1],h:"PAW = dedicated admin-werkstation. Geen internet, geen e-mail, enkel beheertaken. Beschermt admin-credentials."},
{type:"mc",q:"Wat is 'Just Enough Administration' (JEA) in PowerShell?",o:["Een type monitoring","Een PowerShell-feature die beheertaken beperkt tot specifieke commando's voor specifieke gebruikers — least privilege voor beheerders","Een type back-up","Een type deployment"],c:[1],h:"JEA = least privilege voor admins. Helpdesk kan wachtwoord resetten maar niet alles in AD."},
{type:"mc",q:"Wat is 'tiered administration model' in Active Directory beveiliging?",o:["Een type groepsbeheer","Een beveiligingsmodel met drie lagen: Tier 0 (domein admins), Tier 1 (server admins), Tier 2 (werkstationbeheer) — accounts worden niet gecrossed","Een type OU-structuur","Een type GPO-model"],c:[1],h:"Tiered model = isoleer admin-accounts per laag. Domein admin-account nooit op werkstations gebruiken."},
{type:"mc",q:"Wat is een 'Server baseline hardening' voor Windows Server?",o:["Een type back-up","Het verwijderen van onnodige rollen, services en functies, instellen van beveiligde configuraties en toepassen van security baselines voor een veilige standaard","Een type monitoring","Een type deployment"],c:[1],h:"Hardening = maak de server zo klein en veilig mogelijk. CIS Benchmarks of Microsoft Security Baselines als referentie."},
{type:"mc",q:"Wat is 'AppLocker' in Windows Server?",o:["Een type wachtwoordbeheerder","Een Windows-feature die bepaalt welke applicaties mogen worden uitgevoerd op basis van regels (pad, uitgever, hash)","Een type firewall","Een type antivirus"],c:[1],h:"AppLocker = whitelist van toegestane applicaties. Voorkomt dat ongeautoriseerde software (incl. malware) draait."},
{type:"mc",q:"Wat is Windows Defender Credential Guard?",o:["Een type wachtwoordkluis","Een Windows 10/Server 2016+ feature die credential-hashes isoleert in een virtuele container zodat Pass-the-Hash aanvallen worden voorkomen","Een type antivirus","Een type firewall"],c:[1],h:"Credential Guard = VBS-gebaseerde isolatie van LSASS. Geen toegang tot credential-hashes, ook niet voor admins."},
{type:"mc",q:"Wat is Pass-the-Hash (PtH)?",o:["Een type wachtwoordbrute-force","Een aanval waarbij een aanvaller de wachtwoordhash van een gebruiker steelt en direct gebruikt voor authenticatie zonder het echte wachtwoord te kennen","Een type phishing","Een type privilege escalation"],c:[1],h:"PtH = gebruik de hash als authenticatie. Credential Guard maakt dit onmogelijk door hashes te isoleren."},
{type:"mc",q:"Wat is 'Mimikatz' en waarvoor wordt het gebruikt?",o:["Een type monitoring tool","Een post-exploitation tool die wachtwoorden en Kerberos-tickets uit het Windows-geheugen kan extraheren","Een type deployment tool","Een type back-up tool"],c:[1],h:"Mimikatz = credential dumping tool. Aanvallers gebruiken het na compromittering. Defender credential guard beschermt."},
{type:"mc",q:"Wat is een 'Golden Ticket attack' in Kerberos?",o:["Een type phishing-aanval","Een aanval waarbij de aanvaller het wachtwoord van het KRBTGT-account steelt om zichzelf valse Kerberos-tickets te kunnen maken met willekeurige privileges","Een type DDoS","Een type DNS-aanval"],c:[1],h:"Golden Ticket = onbeperkte toegang. Met KRBTGT-hash maak je tickets voor elke gebruiker, elke privilege. Reset KRBTGT tweemaal na compromise."},
{type:"mc",q:"Wat is 'Windows Firewall with Advanced Security' (WFAS)?",o:["Een type antivirus","De ingebouwde Windows-firewall met ondersteuning voor inbound/outbound regels, IPsec, authenticatie en verbindingsbeveiligingsregels","Een type IDS","Een type proxy"],c:[1],h:"WFAS = krachtige ingebouwde firewall. Configureer via GPO voor alle domein-computers. Niet enkel on/off."},
{type:"mc",q:"Wat is IPsec en hoe wordt het gebruikt op Windows Server?",o:["Een type VPN-protocol","Een set protocollen voor beveiligde IP-communicatie via authenticatie en encryptie — gebruikt voor server-isolatie en beveiligde communicatie","Een type firewall","Een type DNS-beveiliging"],c:[1],h:"IPsec op Windows = versleutel en authenticeer IP-verkeer. Verbindingsbeveiligingsregels in WFAS configureren IPsec."},
{type:"mc",q:"Wat is 'Network Policy Server' (NPS) op Windows Server?",o:["Een type DNS-server","Een RADIUS-server rol op Windows Server voor het authenticeren van VPN-clients, 802.1X en Wi-Fi-gebruikers","Een type DHCP-server","Een type back-up server"],c:[1],h:"NPS = Windows RADIUS server. Authenticeer VPN- en 802.1X-verbindingen tegen Active Directory."},
{type:"mc",q:"Wat is een Windows Server Container?",o:["Een type beveiligde zone","Een lichtgewicht, geïsoleerde omgeving voor het uitvoeren van applicaties met gedeelde OS-kernel — sneller dan VM's maar minder geïsoleerd","Een type virtuele machine","Een type VLAN"],c:[1],h:"Windows Containers = Docker-compatible containers op Windows. Gedeelde kernel = efficiënter dan VMs."},
{type:"mc",q:"Wat is het verschil tussen een Windows Container en een Hyper-V Container?",o:["Ze zijn identiek","Windows Container = gedeelde kernel; Hyper-V Container = eigen micro-VM per container voor sterkere isolatie","Hyper-V Container is minder veilig","Windows Container is altijd trager"],c:[1],h:"Hyper-V Container = extra isolatie. Elke container heeft een eigen lichtgewicht Hyper-V VM. Veiliger, iets meer overhead."},
{type:"mc",q:"Wat is 'IIS' op Windows Server?",o:["Een type DNS-server","Internet Information Services — de ingebouwde webserver van Windows Server voor het hosten van websites en web-API's","Een type DHCP-server","Een type monitoring service"],c:[1],h:"IIS = Windows webserver. ASP.NET applicaties, statische websites, WebDAV, FTP — allemaal via IIS."},
{type:"mc",q:"Wat is een 'Application Pool' in IIS?",o:["Een type database-pool","Een geïsoleerd werkproces (w3wp.exe) dat een of meer websites/applicaties host — isolatie voorkomt dat een crash andere apps neersloopt","Een type back-up","Een type load balancer"],c:[1],h:"App Pool = isolatie in IIS. Als één app crasht, valt alleen die app — niet de hele webserver."},
{type:"mc",q:"Wat is 'Web Deploy' (MSDeploy) in IIS?",o:["Een type update-service","Een tool voor het deployen, migreren en synchroniseren van IIS-websites en applicaties","Een type monitoring","Een type back-up"],c:[1],h:"Web Deploy = automated website deployment. Publiceer vanuit Visual Studio of CI/CD direct naar IIS."},
{type:"mc",q:"Wat is een 'Server-Sent Events' probleem in het kader van Windows Server security?",o:["Een type SSE-kwetsbaarheid","Geen direct Windows Server concept — dit is een web-technologie. Afleidervraag.","Een type IIS-kwetsbaarheid","Een type SSRF-aanval"],c:[1],h:"Server-Sent Events is een web-technologie, geen specifiek Windows Server beveiligingsconcept."},
{type:"mc",q:"Wat is 'Remote Desktop Services' (RDS) op Windows Server?",o:["Een type VPN-dienst","Een Windows Server-rol voor het centraal aanbieden van desktops, applicaties en sessies via het netwerk","Een type DNS-dienst","Een type back-up dienst"],c:[1],h:"RDS = terminal server. Medewerkers verbinden via RDP naar een centrale server die de applicaties en desktops host."},
{type:"mc",q:"Wat is 'Remote Desktop Gateway' (RD Gateway)?",o:["Een type router","Een Windows Server-rol die RDP-verbindingen via HTTPS tunnelt voor veilige toegang van buiten het netwerk","Een type VPN","Een type DNS-dienst"],c:[1],h:"RD Gateway = veilige RDP via HTTPS. Geen directe TCP 3389 blootstelling — alles via poort 443 (HTTPS tunnel)."},
{type:"mc",q:"Wat is een 'print server' rol op Windows Server?",o:["Een type file server","Een Windows Server-rol die netwerk-printers centraliseert — één printserver beheert alle printers voor de organisatie","Een type DNS-server","Een type DHCP-server"],c:[1],h:"Print server = centraal printerbeheer. Drivers eenmalig op server, automatisch uitgerold via GPO naar clients."},
{type:"mc",q:"Wat is een 'File Server Resource Manager' (FSRM)?",o:["Een type monitoring tool","Een Windows Server feature voor het beheren van bestandsopslag: quota, file screening, storage reports","Een type back-up tool","Een type DNS-tool"],c:[1],h:"FSRM = storage governance. Blokkeer .exe bestanden op file shares, stel opslagquota per gebruiker in."},
{type:"mc",q:"Wat is 'BitLocker' op Windows Server?",o:["Een type wachtwoordbeheerder","Een Windows encryptietechnologie voor het versleutelen van volledige schijven — beschermt data bij fysieke diefstal van hardware","Een type firewall","Een type anti-malware"],c:[1],h:"BitLocker = volledige schijfversleuteling. Server gestolen? Zonder de decryptiesleutel zijn de data onleesbaar."},
{type:"mc",q:"Wat is 'EFS' (Encrypting File System)?",o:["Een type firewall","Windows bestandssysteem-encryptie op bestandsniveau — bestanden zijn versleuteld, enkel de eigenaar en geautoriseerde gebruikers kunnen ze lezen","Een type back-up","Een type compressie"],c:[1],h:"EFS = per-bestand encryptie in NTFS. Verschil met BitLocker: EFS = per bestand, BitLocker = hele schijf."},
{type:"mc",q:"Wat is 'Windows Server 2022 Secured-core'?",o:["Een type back-up feature","Een configuratie die hardware, firmware en OS beveiligingsfuncties combineert: Secure Boot, TPM 2.0, DRTM voor maximale bescherming","Een type prestatiefunctie","Een type replicatiefunctie"],c:[1],h:"Secured-core = diepste verdediging. Hardware-gebaseerde bescherming tegen firmware-aanvallen en rootkits."},
{type:"mc",q:"Wat is een 'TPM' (Trusted Platform Module) en waarom is het relevant voor servers?",o:["Een type processor","Een hardware chip die cryptografische sleutels veilig opslaat — gebruikt door BitLocker, Secure Boot en Credential Guard","Een type geheugen","Een type opslagmedium"],c:[1],h:"TPM = hardware sleutelkluis. BitLocker slaat zijn sleutel in de TPM op — verwijder de harde schijf → data onleesbaar."},
{type:"mc",q:"Wat is 'Secure Boot' op Windows Server?",o:["Een type snelle opstart","Een UEFI-beveiligingsfunctie die verifieert dat de bootloader digitaal ondertekend is door een vertrouwde partij — blokkeert bootkits","Een type firewall","Een type versleuteling"],c:[1],h:"Secure Boot = vertrouw enkel ondertekende bootloaders. Bootkits manipuleren het opstartproces — Secure Boot stopt dit."},
{type:"mc",q:"Wat is een 'bootkit'?",o:["Een type malware-toolkit","Malware die zich installeert in de bootloader/MBR zodat het laadt voor het OS en moeilijk detecteerbaar is","Een type rootkit","Een type ransomware"],c:[1],h:"Bootkit = extra low-level. Start voor Windows, dus het kan Windows-beveiligingssoftware omzeilen."},
{type:"mc",q:"Wat is het verschil tussen een 'warm reboot' en een 'cold boot' van een server?",o:["Ze zijn identiek","Warm reboot = herstart via software (OS sluit af, herstart); Cold boot = stroom uit en terug aan — hardware volledig reset","Cold boot is sneller","Warm reboot is gevaarlijker"],c:[1],h:"Warm reboot = schoon via OS. Cold boot = hardware-reset. Voor sommige hardware-problemen is cold boot nodig."},
{type:"mc",q:"Wat is 'iDRAC' (Integrated Dell Remote Access Controller)?",o:["Een type monitoring software","Een out-of-band beheerinterface op Dell servers die toegang biedt tot de server ook als het OS offline is","Een type RAID-controller","Een type back-up systeem"],c:[1],h:"iDRAC = Dell's BMC. Vergelijkbaar met HP iLO. Virtuele console, power management, hardware monitoring zonder OS."},
{type:"mc",q:"Wat is 'HP iLO' (Integrated Lights-Out)?",o:["Een type monitoring software","HP's out-of-band beheerinterface voor servers die toegang biedt tot de server onafhankelijk van het OS","Een type RAID-controller","Een type beveiligingschip"],c:[1],h:"iLO = de 'noodlijn' voor HP servers. Server gecrasht? iLO geeft virtuele console-toegang voor probleemoplossing."},
{type:"mc",q:"Wat is een 'SAS' (Serial Attached SCSI) schijf vs een 'SATA' schijf voor servers?",o:["Ze zijn identiek","SAS = hogere betrouwbaarheid, hogere RPM, dual-port, voor enterprise servers; SATA = goedkoper, lagere RPM, voor minder kritieke opslag","SATA is sneller","SAS is goedkoper"],c:[1],h:"SAS voor productie-servers: betrouwbaarder, sneller, dual-port voor redundantie. SATA voor back-up/archief."},
{type:"mc",q:"Wat is een 'NVMe' schijf en wat maakt het geschikt voor servers?",o:["Een type netwerk-schijf","Non-Volatile Memory Express — ultra-snelle SSD-interface direct op PCIe, veel sneller dan SATA SSD","Een type HDD","Een type SAS-schijf"],c:[1],h:"NVMe = PCIe-direct SSD. 7GB/s+ lezen vs 600MB/s SATA. Voor databases en hot-tier opslag in servers."},
{type:"mc",q:"Wat is een 'RAID controller' met batterij-back-up?",o:["Een type back-up systeem","Een hardware RAID-controller met een ingebouwde batterij die de write cache beschermt bij stroomuitval — voorkomt datacorruptie","Een type UPS","Een type stroombeveiliging"],c:[1],h:"RAID controller met BBU = write-cache is veilig. Zonder BBU: write-cache uitschakelen voor integriteit."},
{type:"mc",q:"Wat is een 'hot spare' schijf in een RAID-array?",o:["Een extra back-upschijf","Een extra schijf in de array die automatisch de rebuild start als een andere schijf uitvalt — minimale tussenkomst nodig","Een type extra schijf voor opslag","Een type SSD-cache"],c:[1],h:"Hot spare = klaar-voor-gebruik reserve. Schijf failure → hot spare begint automatisch rebuild. Minder menselijke tussenkomst."},
{type:"mc",q:"Wat is 'RAID 10' (RAID 1+0)?",o:["Een combinatie van RAID 1 en 0","RAID dat striping (RAID 0) combineert met mirroring (RAID 1) — hoge snelheid EN fouttolerantie maar vereist minimaal 4 schijven en 50% opslagefficiëntie","Een type RAID 5 met spiegel","Een type software RAID"],c:[1],h:"RAID 10 = snel + betrouwbaar. Stripe van mirrors. Kan meerdere schijffouten overleven als niet uit dezelfde mirror."},
{type:"mc",q:"Wat is 'RAID 6' en wanneer gebruik je het boven RAID 5?",o:["RAID 5 met extra schijf","RAID met twee pariteitsblokken — kan twee gelijktijdige schijffouten overleven. Gebruik bij grote arrays waar rebuild-tijd lang duurt.","Een type RAID 10","RAID 5 met versleuteling"],c:[1],h:"RAID 6 = twee fouten tolereren. Bij grote (4TB+) schijven duurt RAID 5 rebuild zo lang dat een tweede failure reëel is."},
{type:"mc",q:"Wat is 'VEEAM' in de context van Windows Server back-up?",o:["Een type antivirus","Een populaire back-up en replicatie-software specifiek ontworpen voor virtuele omgevingen (Hyper-V, VMware)","Een type monitoring tool","Een type deployment tool"],c:[1],h:"Veeam = enterprise back-up voor virtuele machines. Agentloze VM-back-up, instant recovery, tape support."},
{type:"mc",q:"Wat is 'instant VM recovery' in Veeam/moderne back-up?",o:["Onmiddellijk een nieuwe VM maken","Het starten van een VM rechtstreeks vanuit de back-up storage zonder volledige restore — server is binnen minuten online","Een type live migratie","Een type replicatie"],c:[1],h:"Instant recovery = draai de back-up zelf als VM. Productie binnen 2 minuten online. Migrate daarna naar definitieve opslag."},
{type:"mc",q:"Wat is 'Changed Block Tracking' (CBT) bij VM back-ups?",o:["Een type monitoring","Een hypervisor-feature die bijhoudt welke schijfblokken gewijzigd zijn — maakt incrementele VM-back-ups veel sneller","Een type replicatie","Een type snapshot-technologie"],c:[1],h:"CBT = track wijzigingen. Incrementele back-up weet exact welke blokken veranderd zijn. Geen volledige scan nodig."},
{type:"mc",q:"Wat is een 'application-consistent backup'?",o:["Een type file-level back-up","Een back-up waarbij applicaties (bijv. SQL Server, Exchange) in een consistente staat worden gebracht (bijv. via VSS) voor de back-up","Een type image-back-up","Een type RAID-back-up"],c:[1],h:"App-consistent = database is 'schoon'. VSS writer stopt writes even, flusht buffers. Back-up is bruikbaar zonder transactieherstel."},
];
