{type:"mc",q:"Wat is het verschil tussen een 'distance-vector' en 'link-state' routeringsprotocol?",o:["Ze zijn identiek","Distance-vector: routert op basis van richting+afstand, kent enkel buren; Link-state: bouwt volledige topologiekaart, berekent kortste pad","Link-state is altijd trager","Distance-vector gebruikt meer bandbreedte"],c:[1],h:"RIP = distance-vector. OSPF = link-state. Link-state convergeert sneller maar gebruikt meer CPU/geheugen."},
{type:"mc",q:"Wat is 'triggered update' in RIP?",o:["Een type RIP-beveiliging","Een onmiddellijke route-update gestuurd wanneer een topologiewijziging optreedt — versnelt convergentie boven de normale 30-seconden timer","Een type RIP-timer","Een type OSPF-update"],c:[1],h:"Triggered update = stuur meteen, wacht niet op de 30-seconden timer. Snellere convergentie bij failover."},
{type:"mc",q:"Wat is 'route redistribution'?",o:["Het kopiëren van routes","Het uitwisselen van routing-informatie tussen twee verschillende routeringsprotocollen, bijv. OSPF-routes importeren in EIGRP","Een type statische route","Een type route-samenvatting"],c:[1],h:"Redistributie = vertaal routes tussen protocollen. OSPF leert niets van EIGRP zonder redistributie."},
{type:"mc",q:"Wat is een 'routing domain'?",o:["Een type VLAN","Een groep routers die hetzelfde routeringsprotocol en -beleid gebruiken","Een type subnet","Een type AS"],c:[1],h:"Routing domain = één protocol, één beheer. Grenzen worden bepaald door redistribute commando's."},
{type:"mc",q:"Wat is het verschil tussen 'shutdown' en 'no shutdown' op een interface?",o:["Ze zijn identiek","shutdown = schakel de interface administratief uit; no shutdown = activeer de interface","no shutdown schakelt de interface uit","shutdown verwijdert de interface"],c:[1],h:"Nieuwe interfaces zijn standaard 'shutdown' op Cisco routers. 'no shutdown' activeert ze."},
{type:"mc",q:"Wat is 'show running-config' op een Cisco apparaat?",o:["Toont de opgeslagen configuratie","Toont de actieve configuratie in RAM — de huidige werkende configuratie","Toont de routeringstabel","Toont de interface-status"],c:[1],h:"Running-config = actuele config. Startup-config = opgeslagen config. 'copy run start' slaat running op."},
{type:"mc",q:"Hoe sla je de configuratie op op een Cisco apparaat?",o:["save config","write memory (of copy running-config startup-config)","commit config","store config"],c:[1],h:"write memory OF copy run start = sla de actieve configuratie op zodat ze na reboot bewaard blijft."},
{type:"mc",q:"Wat is 'NVRAM' op een Cisco router?",o:["Een type RAM-geheugen","Non-Volatile RAM — slaat de startup-config op die bewaard blijft na stroomuitval","Een type flash-geheugen","Een type ROM"],c:[1],h:"NVRAM = startup-config opslag. Flash = IOS image opslag. RAM = running-config (tijdelijk)."},
{type:"mc",q:"Wat is het verschil tussen 'running-config' en 'startup-config'?",o:["Ze zijn identiek","Running-config = actieve config in RAM (verloren bij reboot zonder save); startup-config = opgeslagen in NVRAM (bewaard na reboot)","Startup-config is in RAM","Running-config is permanent"],c:[1],h:"Vergeet te saven? Na reboot is je config weg. Altijd 'wr mem' na configuratiewijzigingen!"},
{type:"mc",q:"Wat is 'erase startup-config' op een Cisco apparaat?",o:["Verwijdert de running-config","Verwijdert de opgeslagen startup-config in NVRAM — na reboot start het apparaat met factory defaults","Herstelt de config","Verwijdert het IOS"],c:[1],h:"Erase startup-config = factory reset. Na reload start het apparaat met het initiële setup-dialoog."},
{type:"mc",q:"Wat is 'OSPF passive-interface default' configuratie?",o:["Maakt alle interfaces passief","Zet alle interfaces als passief en gebruik 'no passive-interface' om specifieke interfaces actief te maken — veiliger dan per interface configureren","Schakelt OSPF uit","Maakt de router een stub"],c:[1],h:"passive-interface default + no passive-interface op specifieke interfaces = beveiligde aanpak. Stuur hellos enkel waar nodig."},
{type:"mc",q:"Wat is een 'summarize-address' commando in EIGRP?",o:["Berekent het subnetmasker","Configureert route-samenvatting op een interface — meerdere specifieke routes worden geadverteerd als één samengevatte route","Configureert een statische route","Configureert route-redistributie"],c:[1],h:"EIGRP route summarization = verklein de routeringstabel. Bijv. 10.1.0.0/16 tot 10.3.0.0/16 → 10.0.0.0/14."},
{type:"mc",q:"Wat is het 'area range' commando in OSPF?",o:["Definieert een OSPF-area","Configureert inter-area route-samenvatting op een ABR — samengevatte routes worden naar andere areas geadverteerd","Configureert een stub area","Configureert redistributie"],c:[1],h:"OSPF area range = samenvatting op de ABR (Area Border Router). Verklein het aantal LSAs in andere areas."},
{type:"mc",q:"Wat is een 'OSPF stub area'?",o:["Een area met één router","Een OSPF-area die geen externe routes ontvangt — de ABR injecteert enkel een default route in de stub area","Een area zonder LSAs","Een area met enkel static routes"],c:[1],h:"Stub area = geen externe LSAs. Routers in de stub gebruiken de default route voor alles buiten het OSPF-domein."},
{type:"mc",q:"Wat is een 'OSPF totally stubby area'?",o:["Een stub area met extra beveiliging","Een ultra-minimale OSPF-area die enkel een default route ontvangt — geen inter-area of externe routes. Cisco-proprietary.","Een type OSPF NSSA","Een type stub area"],c:[1],h:"Totally stubby = maximale vereenvoudiging. Enkel intra-area routes + één default route. Minimale routeringstabel."},
{type:"mc",q:"Wat is een 'OSPF NSSA' (Not-So-Stubby Area)?",o:["Een type stub area","Een OSPF stub area die ook externe routes mag importeren via NSSA-externe LSAs — combinatie van stub en redistributie","Een type totally stubby area","Een type backbone area"],c:[1],h:"NSSA = stub maar met externe routes. Bijv. een kantoor met een directe internetverbinding maar min. OSPF-overhead."},
{type:"mc",q:"Wat is BGP 'path attributes' en waarom zijn ze belangrijk?",o:["Een type routeringsmetric","Eigenschappen van BGP-routes (AS-path, next-hop, MED, local preference) die bepalen welk pad gekozen wordt bij meerdere opties","Een type BGP-policy","Een type BGP-timer"],c:[1],h:"BGP path attributes = de rijkdom van BGP. Verkeersengineering door attributen te manipuleren."},
{type:"mc",q:"Wat is het BGP 'AS-path' attribuut?",o:["Het pad door de router","Een lijst van autonome systemen die een BGP-route heeft doorkruist — beschermt ook tegen routing loops","Een type metric","Een type preference"],c:[1],h:"AS-path = historiek van het BGP-pad. Langer pad = verder weg. AS-path loop-detectie: eigen AS al in het pad → reject."},
{type:"mc",q:"Wat is een 'route reflector' in BGP?",o:["Een type router","Een BGP-router die routes reflecteert naar andere iBGP-peers zodat full-mesh iBGP-verbindingen niet nodig zijn","Een type AS","Een type BGP-policy"],c:[1],h:"Route reflector = vereenvoudig iBGP. Zonder RR: n*(n-1)/2 iBGP sessions. Met RR: elke router praat met de RR."},
{type:"mc",q:"Wat is 'BGP confederation'?",o:["Een groep AS'en","Een alternatieve methode om iBGP-scalabiliteit te verbeteren door een grote AS op te delen in sub-AS'en — alternatie voor route reflectors","Een type BGP-policy","Een type BGP-timer"],c:[1],h:"Confederation = deel één groot AS op in sub-AS'en. Minder full-mesh verbindingen. Minder gebruikt dan route reflectors."},
{type:"mc",q:"Wat is 'community' in BGP?",o:["Een type AS-group","Een optioneel BGP-attribuut voor het taggen van routes — maakt het mogelijk beleid toe te passen op groepen routes","Een type routeringsmetric","Een type prefix"],c:[1],h:"Community = tag voor routes. Bijv. NO_EXPORT community = adverteer deze route niet buiten dit AS."},
{type:"mc",q:"Wat is 'MED' (Multi-Exit Discriminator) in BGP?",o:["Een type metric","Een BGP-attribuut dat de voorkeursingang in een AS aangeeft voor een aangrenzend AS — één richting beïnvloeding","Een type community","Een type next-hop"],c:[1],h:"MED = hint aan de buur: gebruik liever DIT pad om in ons AS te komen. Maar de buur kan het negeren."},
{type:"mc",q:"Wat is 'local preference' in BGP?",o:["Een type metric","Een iBGP-attribuut dat het voorkeurpad voor verlaten van het AS aangeeft — hogere waarde = meer voorkeur","Een type community","Een type MED"],c:[1],h:"Local preference = intern beleid voor uitgang. Hoger = meer voorkeur. Overschrijft MED van buren."},
{type:"mc",q:"Wat is een 'access-list' op een Cisco router voor BGP-filtering?",o:["Een type BGP-policy","Een filter die bepaalt welke BGP-prefixes geaccepteerd of geadverteerd worden op basis van ACL-regels","Een type route-map","Een type community-list"],c:[1],h:"ACL + distribute-list = filter BGP-routes op prefix. Route-map biedt meer flexibiliteit voor BGP-policies."},
{type:"mc",q:"Wat is een 'prefix-list' in Cisco routering?",o:["Een type ACL","Een efficiëntere manier dan ACLs om IP-prefixen te filteren — ondersteunt lengtecontrole van subnetmaskers","Een type route-map","Een type community-list"],c:[1],h:"Prefix-list = krachtigere prefix-filter. ip prefix-list TEST permit 10.0.0.0/8 le 24 = alles van /8 tot /24 in 10.0.0.0."},
{type:"mc",q:"Wat is een 'route-map' in Cisco routering?",o:["Een kaart van routes","Een flexibel policy-instrument voor het aanpassen van route-attributen en het filteren van routes bij redistribution of BGP","Een type ACL","Een type prefix-list"],c:[1],h:"Route-map = conditional match + set attributes. Bijv. match community 100 → set local-preference 200."},
{type:"mc",q:"Wat is 'DHCP snooping trust'?",o:["Vertrouw alle DHCP-servers","Markeer enkel de switch-poort verbonden met de legitieme DHCP-server als 'trusted' — alle andere poorten zijn untrusted","Vertrouw alle DHCP-clients","Een type VLAN-trust"],c:[1],h:"Trusted port = mag DHCP-antwoorden sturen. Untrusted = mag enkel DHCP-verzoeken sturen. Rogue DHCP blocked."},
{type:"mc",q:"Wat is het doel van 'BPDU filter' op een PortFast-poort?",o:["Blokkeert alle BPDUs","Voorkomt dat BPDUs verzonden EN ontvangen worden op een poort — gebruik alleen op strikt gecontroleerde poorten","Hetzelfde als BPDU Guard","Versnelt STP-convergentie"],c:[1],h:"BPDU filter = volledig STP-stilte op een poort. Gevaarlijker dan BPDU Guard. BPDU Guard is veiliger voor toegangspoorten."},
{type:"mc",q:"Wat is 'UplinkFast' in Cisco STP?",o:["Versnelt uplinks algemeen","Een verouderde Cisco STP-feature die snelle failover biedt voor uplinks door een directe switch naar Forwarding — vervangen door RSTP","Een type trunk-feature","Een type VTP-feature"],c:[1],h:"UplinkFast = klassiek Cisco. Met RSTP bereik je hetzelfde sneller en standaard. Gebruik RSTP/MST i.p.v. UplinkFast."},
{type:"mc",q:"Wat is 'MST' (Multiple Spanning Tree)?",o:["Een type VLAN-protocol","Een STP-variant (IEEE 802.1s) die meerdere VLANs groepeert in MST-instanties — betere schaalbaarheid dan PVST+","Een type EtherChannel","Een type VTP-variant"],c:[1],h:"MST = VLAN-groepen per STP-instantie. Efficiënter dan PVST+ (één instantie per VLAN) voor grote netwerken."},
{type:"mc",q:"Wat is 'DTP' (Dynamic Trunking Protocol)?",o:["Een type routeringsprotocol","Een Cisco-protocol dat automatisch onderhandelt of een poort access of trunk wordt — best uitschakelen op access-poorten","Een type STP","Een type VTP"],c:[1],h:"DTP auto-trunking = beveiligingsrisico. Schakel DTP uit op access-poorten: 'switchport nonegotiate'."},
{type:"mc",q:"Wat is een 'rogue switch' aanval via DTP?",o:["Een type VLAN-aanval","Een aanvaller sluit een switch aan en laat DTP onderhandelen tot trunk-modus — geeft toegang tot alle VLANs","Een type STP-aanval","Een type ARP-aanval"],c:[1],h:"Rogue switch + DTP = trunk → alle VLANs zichtbaar. Bescherm via 'switchport mode access + nonegotiate'."},
{type:"mc",q:"Wat is 'CDP-based VLAN Discovery'?",o:["Een type VLAN-scan","Het automatisch configureren van VoIP-telefoons met het juiste Voice VLAN op basis van CDP-berichten van de switch","Een type STP-feature","Een type VTP-feature"],c:[1],h:"CDP + VoIP = switch adverteert het voice VLAN via CDP → IP-telefoon configureert zichzelf automatisch."},
{type:"mc",q:"Wat is een 'VACL' (VLAN Access Control List)?",o:["Een type standard ACL","Een ACL die toegepast wordt op een VLAN voor het filteren van verkeer binnen het VLAN of tussen VLANs op een switch","Een type extended ACL","Een type NAT-regel"],c:[1],h:"VACL = ACL op een VLAN. Filterverkeer dat nooit een router passeert — bijv. directe L2-communicatie binnen een VLAN."},
{type:"mc",q:"Wat is een 'trunk allowed VLAN' beveiligingspraktijk?",o:["Sta alle VLANs toe op alle trunks","Beperk trunks tot enkel de VLANs die echt nodig zijn voor een segment — verkleint de aanvalsoppervlakte","Voeg alle VLANs toe aan elke trunk","Verwijder native VLAN van trunks"],c:[1],h:"Minimaal noodzakelijke VLANs op elke trunk = kleinere blast radius bij een VLAN-aanval."},
{type:"mc",q:"Wat is een 'management plane' op een netwerkapparaat?",o:["De dataverwerking","Het deel van het netwerkapparaat dat verantwoordelijk is voor het beheer (SSH, SNMP, syslog) — apart beveiligen van het data plane","Een type routing tabel","Een type ARP-tabel"],c:[1],h:"Drie vlakken: Data plane (pakketdoorstuur), Control plane (routeringsprotocollen), Management plane (beheer)."},
{type:"mc",q:"Wat is een 'control plane' op een netwerkapparaat?",o:["Het datapad","Het deel dat routeringsprotocollen, STP, OSPF hello's en andere protocolberichten verwerkt — apart van data doorstuur","Een type monitoring","Een type beheer"],c:[1],h:"Control plane = routeringsprotocollen draaien. Aanval op control plane (bijv. OSPF flooding) = CPU overbelasting."},
{type:"mc",q:"Wat is 'CoPP' (Control Plane Policing)?",o:["Een type QoS","Een beveiligingsfunctie die het verkeer naar de router-CPU (control plane) beperkt om CPU-aanvallen te voorkomen","Een type firewall","Een type ACL"],c:[1],h:"CoPP = bescherm de router-CPU. Stel limieten in voor hoeveel control plane verkeer (OSPF, SNMP, SSH) de CPU bereikt."},
{type:"mc",q:"Wat is een 'MPLS VPN' (L3VPN)?",o:["Een type internet VPN","Een service waarbij een MPLS-provider VPN-connectiviteit biedt tussen klantlocaties via een gedeelde MPLS-infrastructuur","Een type IPsec VPN","Een type SSL VPN"],c:[1],h:"MPLS L3VPN = gedeelde infrastructure, geïsoleerde klantnetwerken via VRFs en MPLS-labels."},
{type:"mc",q:"Wat is een 'VRF' (Virtual Routing and Forwarding)?",o:["Een type virtuele switch","Een virtuele routerinstantie die een aparte routeringstabel bijhoudt — meerdere VRFs op één router voor multi-tenant isolatie","Een type VLAN","Een type routing protocol"],c:[1],h:"VRF = meerdere routeringstabellen op één router. Klant A en B kunnen overlappende IP's hebben zonder conflict."},
{type:"mc",q:"Wat is 'DMVPN' (Dynamic Multipoint VPN)?",o:["Een type statisch VPN","Een Cisco hub-and-spoke VPN-architectuur die ook spoke-to-spoke tunnels dynamisch aanmaakt — efficiënter dan full-mesh IPsec","Een type MPLS VPN","Een type SSL VPN"],c:[1],h:"DMVPN = hub-and-spoke VPN met on-demand spoke-to-spoke verbindingen. Ideaal voor WAN met veel lokaties."},
{type:"mc",q:"Wat is 'SD-WAN' (Software-Defined WAN)?",o:["Een type MPLS-service","Een WAN-architectuur waarbij een centrale controller de WAN-verbindingen beheert over meerdere transports (MPLS, internet, LTE)","Een type VPN","Een type routing protocol"],c:[1],h:"SD-WAN = flexible WAN. Goedkoop internet + MPLS intelligent combineren. Traffic steering op basis van applicatie."},
{type:"mc",q:"Wat is het doel van 'NetFlow' op een Cisco router?",o:["Een type firewall","Het exporteren van verkeersstatistieken (wie praat met wie, hoeveel, welk protocol) voor analyse en capacity planning","Een type routeringsprotocol","Een type SNMP-feature"],c:[1],h:"NetFlow = verkeersanalyse. Wie gebruikt hoeveel bandbreedte? Welke applicaties? Nuttig voor security en capacity planning."},
{type:"mc",q:"Wat is 'SFLOW' en hoe verschilt het van NetFlow?",o:["Ze zijn identiek","sFlow = open standaard, samples pakketdata op schaal; NetFlow = Cisco-proprietary, exporteert flow-statistieken","sFlow is sneller","NetFlow is open standaard"],c:[1],h:"sFlow = sampling op hoge snelheid. NetFlow = exacte flow-statistieken. sFlow schaalbaar op hoge-snelheidslinks."},
{type:"mc",q:"Wat is een 'proxy ARP'?",o:["Een type ARP-aanval","Een router-feature waarbij de router ARP-verzoeken beantwoordt namens een host in een ander subnet","Een type ARP-beveiliging","Een type ARP-cache"],c:[1],h:"Proxy ARP = de router antwoordt 'ik ben de gateway voor dat adres'. Nuttig voor sommige legacy-configuraties maar kan verwarrend zijn."},
{type:"mc",q:"Wat is HSRP (Hot Standby Router Protocol)?",o:["Een type STP","Een Cisco-protocol voor gateway-redundantie waarbij twee routers één virtueel IP-adres delen","Een type routeringsprotocol","Een type VLAN"],c:[1],h:"HSRP = actieve/standby gateways. Clients configureren het virtuele IP als gateway. Actieve router valt uit → standby neemt over."},
{type:"mc",q:"Wat is VRRP (Virtual Router Redundancy Protocol)?",o:["Een Cisco-proprietary redundantieprotocol","De open standaard equivalent van HSRP (IEEE) — meerdere routers delen één virtueel IP-adres voor gateway-redundantie","Een type STP","Een type routeringsprotocol"],c:[1],h:"VRRP = open HSRP. Hetzelfde principe maar vendor-onafhankelijk. Gebruik VRRP voor multi-vendor omgevingen."},
{type:"mc",q:"Wat is GLBP (Gateway Load Balancing Protocol)?",o:["Een type HSRP-variant","Een Cisco-protocol voor gateway-redundantie MET load balancing — meerdere routers zijn actief en verwerken elk een deel van het verkeer","Een type VPN","Een type routeringsprotocol"],c:[1],h:"GLBP = load balanced gateway redundantie. Vier routers kunnen elk 25% van het verkeer verwerken + failover."},
{type:"mc",q:"Wat is 'Gratuitous ARP' en hoe kan het misbruikt worden?",o:["Een type ARP-verzoek","Een ARP-bericht dat een apparaat stuurt om zijn IP-MAC mapping te adverteren — misbruikt bij ARP poisoning om de cache te vervuilen","Een type ARP-cache","Een type ARP-beveiliging"],c:[1],h:"Gratuitous ARP = 'ik heb dit IP-adres'. Onzevraagd. Aanvallers sturen valse gratuitous ARPs om caches te vergiftigen."},
{type:"mc",q:"Wat is 'RSTP edge port' en hoe configuur je het op Cisco?",o:["Hetzelfde als trunk port","Een RSTP-poort die onmiddellijk in forwarding gaat zonder STP-states — geconfigureerd via 'spanning-tree portfast'","Een type access-poort","Een type uplink-poort"],c:[1],h:"RSTP edge port = PortFast in RSTP-terminologie. Cisco: spanning-tree portfast. Enkel voor access-poorten!"},
{type:"mc",q:"Wat is 'RSTP proposal/agreement mechanisme'?",o:["Een type STP-bericht","Het snelle RSTP-convergentiemechanisme waarbij een nieuwe link direct Forwarding gaat na een handshake met de buur","Een type STP-timer","Een type BPDU-type"],c:[1],h:"Proposal/Agreement = RSTP's geheim voor snelle convergentie. Geen 30-50 seconde wachten — milliseconden."},
{type:"mc",q:"Wat is een 'CAM-table overflow' aanval?",o:["Hetzelfde als ARP poisoning","Een aanval waarbij een switch's CAM-table gevuld wordt met valse MAC-adressen zodat hij degradeert naar hub-gedrag (MAC flooding)","Een type VLAN-aanval","Een type STP-aanval"],c:[1],h:"CAM overflow = MAC flooding. De aanval en het resultaat zijn hetzelfde. Port security beperkt het aantal MAC-adressen per poort."},
{type:"mc",q:"Wat doet het commando 'switchport port-security maximum 2'?",o:["Staat 2 VLANs toe","Beperkt het aantal MAC-adressen op de poort tot 2 — meer MAC's = security violation actie","Staat 2 clients toe","Configureert 2 trunk-VLANs"],c:[1],h:"Port security maximum = CAM-table beperking per poort. Nuttig om MAC flooding te voorkomen."},
{type:"mc",q:"Wat zijn de drie port-security violation modes op Cisco?",o:["Allow, Block, Monitor","Protect (drop), Restrict (drop + log), Shutdown (poort uitschakelen)","Accept, Deny, Log","Drop, Forward, Block"],c:[1],h:"Protect = stil droppen. Restrict = droppen + SNMP/syslog. Shutdown = poort err-disabled. Shutdown is het strengst."},
{type:"mc",q:"Wat is een 'err-disabled' poort op een Cisco switch?",o:["Een uitgeschakelde poort","Een poort die automatisch uitgeschakeld is door de switch na een beveiligings- of configuratiefout — herstel via 'no shutdown' of auto-recovery","Een type trunk-poort","Een type access-poort"],c:[1],h:"Err-disabled = automatische uitschakeling. Oorzaken: port security violation, BPDU Guard, UDLD. Herstel manueel."},
{type:"mc",q:"Wat is 'UDLD' (Unidirectional Link Detection)?",o:["Een type STP-protocol","Een Cisco-protocol dat eenzijdige verbindingen detecteert — links die in één richting werken maar niet in de andere (fiber)","Een type routing-protocol","Een type EtherChannel-protocol"],c:[1],h:"UDLD = detecteer broken fiber links. Optisch = ene richting kan werken, andere niet. UDLD schakelt de link uit."},
{type:"mc",q:"Wat is 'LLDP-MED' (Media Endpoint Discovery)?",o:["Een type LLDP voor media-servers","Een uitbreiding van LLDP specifiek voor IP-telefoons — adverteert voice VLAN, QoS-beleid en locatie-informatie","Een type CDP-variant","Een type SNMP-extensie"],c:[1],h:"LLDP-MED = LLDP voor VoIP. Open standaard equivalent van Cisco CDP voor IP-telefoon configuratie."},
{type:"mc",q:"Wat is 'PoE' (Power over Ethernet) en wat zijn de standaarden?",o:["Een type netwerk-protocol","Voeding via Ethernet-kabel voor apparaten zoals IP-telefoons, AP's en camera's — IEEE 802.3af (15W), 802.3at (30W), 802.3bt (90W)","Een type VLAN-techniek","Een type QoS-methode"],c:[1],h:"PoE = geen apart stroomkabel nodig. 802.3af voor IP-phones, 802.3at voor AP's, 802.3bt voor hoge-vermogen apparaten."},
{type:"mc",q:"Wat is 'spanning-tree guard root' op een Cisco switch?",o:["Beschermt de root bridge","Voorkomt dat een niet-root switch de root bridge wordt door poorten te blokkeren die superieure BPDUs ontvangen","Hetzelfde als BPDU Guard","Hetzelfde als BPDU Filter"],c:[1],h:"Root Guard = root bridge positie verdedigen. Een poort met Root Guard gaat err-disabled als het superieure BPDUs ontvangt."},
{type:"mc",q:"Wat is een 'super VLAN' of 'VLAN aggregation'?",o:["Een VLAN met veel hosts","Een architectuur waarbij meerdere sub-VLANs één IP-subnet delen via een super VLAN interface — bespaard IP-adressen op access-switches","Een type trunk","Een type inter-VLAN routing"],c:[1],h:"Super VLAN = IP-adresruimte delen. Alle sub-VLANs gebruiken hetzelfde subnet maar zijn L2-geïsoleerd van elkaar."},
{type:"mc",q:"Wat is 'IP Source Guard with Static Bindings'?",o:["Een statische ARP-tabel","Handmatig gedefinieerde IP-MAC-poort bindingen voor apparaten zonder DHCP — uitbreiding van de DHCP-snooping binding database","Een type statische route","Een type statische ACL"],c:[1],h:"Statische bindings voor IP Source Guard = servers met vaste IP-adressen ook beschermen tegen spoofing."},
{type:"mc",q:"Wat is een 'passive mode' FTP en waarom is het relevant voor firewalls?",o:["Een type file transfer","FTP waarbij de server een datapoort opent die de client verbindt — werkt beter met firewalls dan active FTP (waarbij de server verbinding initieert)","Een type NAT-configuratie","Een type ACL"],c:[1],h:"Passive FTP = client initieert data-verbinding. Active FTP = server initieert → geblokkeerd door stateful firewalls."},
{type:"mc",q:"Wat is 'OSPF Authentication'?",o:["Een type OSPF-beveiliging","MD5 of SHA-gebaseerde authenticatie van OSPF-buren om valse OSPF-updates te voorkomen","Een type OSPF-timer","Een type OSPF-feature"],c:[1],h:"OSPF auth = verifieer dat hellos van echte OSPF-buren komen. Rogue router kan anders valse routes injecteren."},
{type:"mc",q:"Wat is 'EIGRP Authentication'?",o:["Een type EIGRP-beveiliging","MD5 of SHA-gebaseerde authenticatie van EIGRP-updates om te voorkomen dat een aanvaller valse routes injecteert","Een type EIGRP-metric","Een type EIGRP-timer"],c:[1],h:"Routeringsprotocol-authenticatie = voorkomen dat een aanvaller valse routes injecteert en verkeer omlegt."},
{type:"mc",q:"Wat is 'BGP session security' best practice?",o:["BGP altijd zonder authenticatie","BGP MD5-authenticatie, TTL-beveiliging (GTSM), prefix-filtering en route-maps om BGP-hijacking te voorkomen","BGP enkel intern gebruiken","BGP met community strings beveiligen"],c:[1],h:"BGP zonder beveiliging = aanvaller kan valse routes adverteren. MD5 + GTSM + prefix-filtering = veilige BGP-sessie."},
{type:"mc",q:"Wat is 'GTSM' (Generalized TTL Security Mechanism) voor BGP?",o:["Een type BGP-timer","Een beveiligingsmechanisme dat BGP-paketten accepteert met TTL >= 254, waardoor aanvallen van ver weg geblokkeerd worden","Een type BGP-community","Een type BGP-attribuut"],c:[1],h:"GTSM = BGP buren zijn direct verbonden (TTL=255). TTL <254 = pakket heeft routers doorkruist → verwerp."},
{type:"mc",q:"Wat is 'RPKI' (Resource Public Key Infrastructure)?",o:["Een type PKI voor VPNs","Een systeem dat AS-nummers en IP-prefixen koppelt via cryptografische certificaten — beschermt tegen BGP-hijacking","Een type DNS-beveiliging","Een type firewall"],c:[1],h:"RPKI = verifieer dat AS X het recht heeft prefixes Y te adverteren. Beschermt tegen accidentele en opzettelijke BGP-hijacking."},
{type:"mc",q:"Wat is een 'internet exchange point' (IXP)?",o:["Een type ISP","Een neutrale locatie waar meerdere ISPs en netwerken directe verbindingen onderhouden voor efficiënte verkeersuitwisseling","Een type datacenter","Een type BGP-server"],c:[1],h:"IXP = de ontmoetingsplaats van het internet. Amsterdam AMS-IX, Frankfurt DE-CIX. Peering = goedkoper dan transit."},
{type:"mc",q:"Wat is het verschil tussen 'peering' en 'transit' in BGP?",o:["Ze zijn identiek","Peering = gratis wederzijdse uitwisseling van eigen routes; Transit = betaald doorzenden van all-routes via upstream provider","Transit is gratis","Peering is betaald"],c:[1],h:"Peering = uitwisselen van eigen routes. Transit = betaal een upstream om al je verkeer te forwarden."},
{type:"mc",q:"Wat is een 'full routing table' in BGP?",o:["Een volledige routeringstabel per ISP","De complete BGP-routeringstabel van het internet (~900.000+ prefixen) — alleen voor core internet routers","Een type full-mesh BGP","Een type default route"],c:[1],h:"Full table = alle internet-routes. ~900K+ prefixen. Vereist krachtige routers. Kleine sites gebruiken default route."},
{type:"mc",q:"Wat is een 'prefix hijacking' in BGP?",o:["Een type DNS-aanval","Een aanval waarbij een AS een prefix adverteert dat van een ander AS is — intentioneel (aanval) of accidenteel (misconfiguratie)","Een type ARP-aanval","Een type OSPF-aanval"],c:[1],h:"BGP hijacking = stelen van iemands IP-adresruimte. Verkeer gaat naar de verkeerde bestemming. Pakistan Telecom → YouTube 2008."},
{type:"mc",q:"Wat is een 'black hole community' in BGP?",o:["Een type BGP-filter","Een BGP-community waarmee een AS kan aangeven dat een specifiek prefix 'drop' moet worden — gebruikt voor DDoS-mitigatie via RTBH","Een type BGP-attribuut","Een type routeringsbeleid"],c:[1],h:"RTBH (Remotely Triggered Black Hole) = stop DDoS-verkeer bij de upstream. Prefix → black hole community → upstream dropt."},
{type:"mc",q:"Wat is 'Equal Cost Multi-Path' (ECMP)?",o:["Een type failover","Load balancing over meerdere gelijke-cost routes naar dezelfde bestemming — hogere doorvoer dan via één pad","Een type routing-metric","Een type STP-feature"],c:[1],h:"ECMP = gebruik meerdere even-goede paden tegelijk. Bijv. twee 10Gbps uplinks → effectief 20Gbps load balanced."},
{type:"mc",q:"Wat is 'PBR' (Policy-Based Routing)?",o:["Een type ACL","Het routeren van verkeer op basis van policies (bijv. source IP, protocol) in plaats van enkel de bestemming — negeeert de routeringstabel","Een type OSPF-feature","Een type NAT"],c:[1],h:"PBR = route anders dan de routeringstabel zegt. Bijv. web-verkeer (poort 80) via MPLS, backup via internet."},
{type:"mc",q:"Wat is het verschil tussen 'in-path' en 'out-of-path' netwerkapparaten?",o:["Ze zijn identiek","In-path = verkeer gaat door het apparaat (firewall, IDS/IPS); Out-of-path = krijgt een kopie (tap, SPAN) maar beïnvloedt het verkeer niet","Out-of-path is sneller","In-path kan geen verkeer blokkeren"],c:[1],h:"In-path = kan verkeer blokkeren maar toevoegt latency. Out-of-path = kan enkel melden, geen impact op doorvoer."},
{type:"mc",q:"Wat is een 'network tap' (test access port)?",o:["Een type port mirroring","Een passief hardware-apparaat dat een exacte kopie van het verkeer op een link maakt zonder invloed op dat verkeer","Een type SPAN","Een type firewall"],c:[1],h:"Network tap = perfecte kopie, geen impact. Beter dan SPAN voor forensics of IDS omdat niets gemist wordt."},
{type:"mc",q:"Wat is 'ERSPAN' (Encapsulated Remote SPAN)?",o:["Een type VPN","Een uitbreiding van SPAN waarbij gespiegeld verkeer via GRE-tunnel naar een remote locatie verstuurd wordt","Een type EtherChannel","Een type trunk-protocol"],c:[1],h:"ERSPAN = stuur SPAN-data over het netwerk. Analyseer verkeer van een switch in datacenter A vanuit kantoor B."},
{type:"mc",q:"Wat is een 'flow record' in NetFlow?",o:["Een type logboek","Een set van pakketkenmerken die een unieke flow definieert: src/dst IP, src/dst poort, protocol, ToS, input interface","Een type routing-record","Een type SNMP-trap"],c:[1],h:"Flow = unieke combinatie van 5-tuple (src IP, dst IP, src port, dst port, protocol). NetFlow telt bytes/pakketten per flow."},
{type:"mc",q:"Wat is een 'network baseline' in het kader van prestatiebeheer?",o:["Een minimale bandbreedte","De gemeten normale verkeers- en prestatiewaarden van een netwerk waartegen toekomstige metingen vergeleken worden","Een type monitoring-alert","Een type router-configuratie"],c:[1],h:"Baseline = wat is 'normaal'? Zonder baseline weet je niet of een waarde afwijkend is."},
{type:"mc",q:"Wat is 'capacity planning' voor netwerken?",o:["Een type back-up planning","Het analyseren van huidige en toekomstige verkeersbehoeften om tijdig bandbreedte en infrastructuur uit te breiden","Een type beveiligingsplanning","Een type monitoring"],c:[1],h:"Capacity planning = voorspel groei, upgrade proactief. NetFlow + trending = wanneer loopt mijn WAN-link vol?"},
{type:"mc",q:"Wat is 'jitter' bij netwerkcommunicatie?",o:["Een type vertraging","De variatie in vertraging (latency) tussen pakketten — kritisch voor VoIP en video waarbij consistente timing essentieel is","Een type pakketverlies","Een type bandbreedte-meting"],c:[1],h:"Jitter = inconsistente latency. VoIP pakketten moeten met vaste tussenposen aankomen. Hoge jitter = schokkerig geluid."},
{type:"mc",q:"Wat is 'packet loss' en wanneer is het acceptabel?",o:["Het verloren gaan van alle pakketten","Het percentage pakketten dat niet aankomt bij de bestemming — voor TCP is herversturing beschikbaar, voor UDP/VoIP is verlies direct merkbaar","Een type latency","Een type jitter"],c:[1],h:"Packet loss > 1% = waarneembaar voor VoIP. TCP compenseert via herversturing maar met verhoogde latency."},
{type:"mc",q:"Wat is MPLS-TE (Traffic Engineering)?",o:["Een type routing-protocol","MPLS-gebaseerde traffic engineering die expliciet paden door het netwerk definieert voor load balancing en bandbreedte-garanties","Een type QoS-protocol","Een type VPN"],c:[1],h:"MPLS-TE = stuur verkeer precies over het pad dat jij wil, niet wat het routeringsprotocol kiest. Bandbreedte-garanties."},
{type:"mc",q:"Wat is het verschil tussen 'soft configuration' en 'hard reset' bij BGP?",o:["Ze zijn identiek","Soft config = heractiveer BGP-policies zonder de BGP-sessie te resetten; Hard reset = verbreek en herstel de BGP-sessie (tijdelijk geen routing)","Hard reset is veiliger","Soft config is niet beschikbaar"],c:[1],h:"Soft reconfiguration = pas routing policies toe zonder sessieverstoring. Gebruik soft-reconfiguration inbound voor inbound policy changes."},
{type:"mc",q:"Wat is 'prefix-list vs distribute-list' in routeringsfiltering?",o:["Ze zijn identiek","Prefix-list = efficiëntere prefix-filter met lengtecontrole; distribute-list gebruikt ACLs (minder flexibel, trager)","ACLs zijn efficiënter","Distribute-list ondersteunt lengtecontrole"],c:[1],h:"Prefix-list = modernere aanpak. Ondersteuning voor minimale en maximale prefix-lengte. Gebruik prefix-lists boven ACLs voor routing."},
{type:"mc",q:"Wat is een 'OSPF router ID' en hoe wordt het bepaald?",o:["Het IP-adres van de router","Een 32-bit identifier die de router uniek identificeert in OSPF — keuze: manueel > loopback IP (hoogste) > actieve interface IP (hoogste)","De hostname van de router","Het AS-nummer"],c:[1],h:"Router ID = OSPF-identiteit. Configureer expliciet via 'router-id' om consistentie te garanderen."},
{type:"mc",q:"Wat is 'OSPF database exchange' tijdens neighbourship?",o:["Een type routing-update","Het initieel uitwisselen van de LSDB (link state database) tussen nieuwe OSPF-buren — states: ExStart, Exchange, Loading, Full","Een type hello-uitwisseling","Een type OSPF-timer"],c:[1],h:"Database exchange = OSPF-buren synchroniseren hun topologie-database. Full state = synchronisatie voltooid."},
{type:"mc",q:"Wat is 'OSPF SPF calculation' en wanneer treedt het op?",o:["Een type OSPF-berekening","De Dijkstra-algoritme-berekening die OSPF uitvoert om de kortste paden te berekenen nadat de topologie verandert","Een type OSPF-timer","Een type routeringstabel-update"],c:[1],h:"SPF = Shortest Path First. Elke topology-wijziging triggert een SPF-berekening. SPF throttle timers beperken frequentie."},
{type:"mc",q:"Wat is 'EIGRP DUAL algorithm'?",o:["Een type OSPF-algoritme","Diffusing Update Algorithm — EIGRP's algoritme voor het berekenen van de beste route en het direct hebben van een backup-route (feasible successor)","Een type RIP-algoritme","Een type BGP-algoritme"],c:[1],h:"DUAL = EIGRP's snelle convergentie. Als de primaire route wegvalt, is de feasible successor direct beschikbaar."},
{type:"mc",q:"Wat is een 'feasible successor' in EIGRP?",o:["Een back-up router","Een back-up route in EIGRP die al berekend is en direct actief wordt als de primaire route wegvalt — maakt EIGRP zeer snel convergerend","Een type OSPF-term","Een type statische route"],c:[1],h:"Feasible successor = hot standby route. Al gevalideerd via de feasibility condition. Geen herberekening nodig bij failover."},
{type:"mc",q:"Wat is 'OSPF LFA' (Loop-Free Alternates)?",o:["Een type OSPF-beveiliging","Een OSPF-feature die pre-computed backup paden bijhoudt voor snelle failover zonder SPF-herberekening","Een type OSPF-area","Een type OSPF-metric"],c:[1],h:"OSPF LFA = OSPF's equivalent van EIGRP feasible successor. Sub-seconde failover voor IP/MPLS netwerken."},
{type:"mc",q:"Wat is 'MPLS label stack'?",o:["Een type routing tabel","Meerdere MPLS-labels gestapeld op een pakket voor diensten als MPLS-VPN en TE-tunnels","Een type VLAN-tag","Een type QoS-markering"],c:[1],h:"Label stack = P-to-P stack. Binnenste label = VPN-label (klantidentificatie), buitenste label = transport."},
{type:"mc",q:"Wat is een 'penultimate hop popping' (PHP) in MPLS?",o:["Een type MPLS-timer","Het verwijderen van het MPLS-label door de voorlaatste hop (P-router) zodat de egress PE direct het IP-pakket ontvangt","Een type BGP-feature","Een type QoS-feature"],c:[1],h:"PHP = efficiëntie. Egress PE hoeft geen twee opzoekingen te doen (MPLS + IP). P-router doet de label-pop."},
{type:"mc",q:"Wat is een 'LSP' (Label Switched Path) in MPLS?",o:["Een type routing-tabel pad","Het end-to-end pad door een MPLS-netwerk dat pakketten volgen op basis van hun labels","Een type BGP-pad","Een type VPN-tunnel"],c:[1],h:"LSP = het gebaande pad voor MPLS-pakketten. Geconfigureerd via LDP (automatisch) of RSVP-TE (manueel)."},
{type:"mc",q:"Wat is het verschil tussen een 'edge' en 'core' router in een MPLS-netwerk?",o:["Ze zijn identiek","Edge (PE) = punten waar klantverkeer het MPLS-netwerk in/uitkomt (label push/pop); Core (P) = interne routers die enkel labels swappen","Core routers voegen labels toe","Edge routers swappen labels"],c:[1],h:"PE = Provider Edge (label toe/weghalen). P = Provider (alleen label swappen, hoge snelheid, enkel MPLS)."},
{type:"mc",q:"Wat is een 'MPLS label' en welke waarden zijn gereserveerd?",o:["Een 32-bit getal zonder restricties","Een 20-bit waarde (0-1.048.575) waarvan de laagste waarden gereserveerd zijn: 0=IPv4 explicit null, 3=implicit null (PHP)","Een 16-bit getal","Een 8-bit getal"],c:[1],h:"Label 0 = IPv4 explicit null (preserve QoS). Label 3 = implicit null (penultimate hop pop). Labels 0-15 zijn gereserveerd."},
{type:"mc",q:"Wat is 'Ethernet over MPLS' (EoMPLS)?",o:["Een type VLAN-techniek","Een L2VPN-dienst die Ethernet-frames tussen twee locaties tunnelt via een MPLS-kern — pseudo-wire","Een type IP-over-MPLS","Een type GRE-tunnel"],c:[1],h:"EoMPLS = stretch een Ethernet-segment over MPLS. Beide locaties zijn in hetzelfde L2 broadcast domain."},
{type:"mc",q:"Wat is 'IS-IS' routeringsprotocol?",o:["Een type OSPF-variant","Intermediate System to Intermediate System — een link-state IGP populair bij ISPs, ook IPv6-capable en schaalbaar","Een type BGP","Een type EIGRP"],c:[1],h:"IS-IS = OSPF's concurrente. Populair bij ISPs (Juniper-omgevingen). Werkt op eigen PDUs, niet op IP."},
];

window.QUESTIONS_serverbeheer = [
{type:"mc",q:"Waarvoor staat DNS?",o:["Dynamic Network Service","Domain Name System — vertaalt hostnamen naar IP-adressen en omgekeerd","Data Naming Standard","Distributed Network Security"],c:[1],h:"DNS = het 'telefoonboek' van het internet: naam → IP-adres."},
{type:"mc",q:"Wat doet een DNS resolver?",o:["Slaat domeinnamen op","Stuurt DNS-queries namens de client naar de juiste DNS-servers en geeft het antwoord terug","Beheert IP-adrestoewijzing","Routeert verkeer op basis van domeinnamen"],c:[1],h:"Resolver = de tussenpersoon. De client vraagt de resolver, de resolver zoekt het antwoord."},
{type:"mc",q:"Wat is het verschil tussen een autoritaire DNS-server en een recursive resolver?",o:["Ze zijn identiek","Autoritair: heeft het definitieve antwoord voor een zone; Recursive resolver: zoekt het antwoord door andere servers te bevragen","Recursive: heeft het definitieve antwoord; Autoritair: vraagt anderen","Autoritair werkt enkel intern"],c:[1],h:"Autoritair = de bron van waarheid voor een domein. Resolver = de zoeker namens de client."},
{type:"open",q:"Welk DNS-record type vertaalt een hostnaam naar een IPv4-adres?",ans:["a","a record","a-record"],h:"Het eenvoudigste en meest gebruikte DNS-recordtype. Één letter."},
{type:"open",q:"Welk DNS-record type vertaalt een hostnaam naar een IPv6-adres?",ans:["aaaa","aaaa record","quad-a"],h:"Vier keer de letter A, omdat IPv6 vier keer zo lang is als IPv4."},
{type:"mc",q:"Wat doet een CNAME record?",o:["Vertaalt een IP naar een hostnaam","Verwijst een alias-naam naar een canonieke (echte) naam","Specificeert de mailserver voor een domein","Bevat de SOA-informatie"],c:[1],h:"CNAME = Canonical Name. www.bedrijf.be → bedrijf.be (de echte naam)."},
{type:"mc",q:"Wat doet een MX record?",o:["Vertaalt een hostnaam naar een IP","Verwijst naar de mailserver(s) verantwoordelijk voor e-mail van een domein","Bevat de DNS-servernamen","Een alias voor een andere naam"],c:[1],h:"MX = Mail eXchanger. Vertelt mailservers waarheen e-mail voor dit domein te sturen."},
{type:"mc",q:"Wat doet een PTR record?",o:["Vertaalt een hostnaam naar een IP (forward lookup)","Vertaalt een IP-adres naar een hostnaam (reverse lookup)","Slaat tekst op bij een domein","Verwijst naar de nameservers"],c:[1],h:"PTR = Pointer. Reverse DNS: IP → naam. Handig voor e-mailvalidatie en logging."},
{type:"mc",q:"Wat doet een SOA record?",o:["Specificeert de mailserver","Bevat administratieve informatie over een DNS-zone: primaire nameserver, e-mail van beheerder, serienummer, timers","Slaat tekst op","Vertaalt naam naar IPv6"],c:[1],h:"SOA = Start of Authority. Elke DNS-zone heeft één SOA-record met zone-metadata."},
{type:"mc",q:"Wat is DNS caching en waarom is het nuttig?",o:["Het opslaan van DNS-zones op meerdere servers","Het tijdelijk bijhouden van DNS-antwoorden om herhaalde queries te vermijden en de snelheid te verbeteren","Het beveiligen van DNS-verkeer","Het automatisch updaten van DNS-records"],c:[1],h:"Cache = sla het antwoord op zodat je niet telkens opnieuw hoeft te zoeken. TTL bepaalt hoe lang."},
{type:"open",q:"Wat is de afkorting voor de tijdsduur die aangeeft hoe lang een DNS-record in cache mag blijven?",ans:["ttl","time to live"],h:"De afkorting is drie letters en staat voor de 'levensduur' van een DNS-antwoord."},
{type:"mc",q:"Wat is een DNS forward lookup zone?",o:["Een zone voor reverse DNS-queries","Een zone die hostnamen vertaalt naar IP-adressen","Een zone voor CNAME-records alleen","Een zone voor mailrecords"],c:[1],h:"Forward = de normale richting: naam → IP. Dat is de meest gebruikte richting."},
{type:"mc",q:"Wat is een DNS reverse lookup zone?",o:["Een zone die hostnamen vertaalt naar IP-adressen","Een zone die IP-adressen vertaalt naar hostnamen","Een zone voor CNAME-records","Een zone voor SOA-records"],c:[1],h:"Reverse = omgekeerde richting: IP → naam. Gebruikt in-addr.arpa voor IPv4."},
{type:"mc",q:"Wat is DNS-delegatie (zone delegation)?",o:["Het overdragen van verantwoordelijkheid voor een subdomein aan een andere nameserver","Het samenvoegen van twee DNS-zones","Het dupliceren van een zone naar een secundaire server","Het beveiligen van een DNS-zone"],c:[0],h:"Delegatie = 'voor dit subdomein, vraag die andere server'. Hiermee werkt het hiërarchische DNS-systeem."},
{type:"mc",q:"Wat is een conditional forwarder in Windows DNS?",o:["Een algemene forwarder voor alle DNS-queries","Een forwarder die DNS-queries voor een specifiek domein doorstuurt naar een specifieke DNS-server","Een back-up DNS-server","Een type caching-server"],c:[1],h:"Conditional = voorwaardelijk. Queries voor intern.bedrijf.be → interne DNS-server; de rest → ISP."},
{type:"mc",q:"Wat is DNSSEC?",o:["Een versleutelingsprotocol voor DNS-verkeer","Een extensie die digitale handtekeningen toevoegt aan DNS-antwoorden om te verifiëren dat ze authentiek zijn","Een type DNS-server","Een protocol voor beveiligde zone-overdrachten"],c:[1],h:"DNSSEC = DNS Security Extensions. Beschermt tegen DNS cache poisoning door antwoorden te ondertekenen."},
{type:"mc",q:"Wat is een DNS zone transfer?",o:["Het verwijderen van een DNS-zone","Het kopiëren van DNS-zone-data van de primaire naar de secundaire server voor redundantie","Het samenvoegen van twee zones","Het exporteren van DNS-records naar een bestand"],c:[1],h:"Zone transfer = replicatie van DNS-data. AXFR = volledige transfer, IXFR = incrementele transfer."},
{type:"mc",q:"Op welke poort luistert een DNS-server?",o:["TCP/UDP 53","TCP 80","UDP 161","TCP 443"],c:[0],h:"DNS gebruikt poort 53. UDP voor korte queries; TCP voor grote antwoorden of zone transfers."},
{type:"mc",q:"Wat is een 'stub zone' in Windows DNS?",o:["Een lege DNS-zone","Een zone die alleen de NS- en SOA-records van een andere zone bevat — voor efficiënte name resolution zonder volledige zone transfer","Een back-up van een primaire zone","Een zone voor interne hosts alleen"],c:[1],h:"Stub zone = minimale informatie over een andere zone — weet wie de autoritaire servers zijn."},
{type:"mc",q:"Wat is een secundaire DNS-zone?",o:["Een zone op de primaire server","Een read-only kopie van een primaire zone op een andere server — voor redundantie en load balancing","Een zone voor CNAME-records","Een zone zonder SOA-record"],c:[1],h:"Secundair = back-up. Read-only kopie van de primaire zone, automatisch bijgewerkt via zone transfer."},
{type:"mc",q:"Wat is de DHCP-serverrol op Windows Server?",o:["Een DNS-dienst","Een dienst die automatisch IP-adressen en netwerkconfiguratie uitdeelt aan clients in het netwerk","Een VPN-dienst","Een webserverrol"],c:[1],h:"DHCP op Windows Server = de rol die als DHCP-server functioneert voor het netwerk."},
{type:"mc",q:"Welke twee securitygroepen worden aangemaakt bij DHCP-installatie?",o:["DHCP Admins en DHCP Users","DHCP Operators en DHCP Clients","DHCP Servers en DHCP Managers","DHCP Masters en DHCP Slaves"],c:[0],h:"DHCP Users = read-only; DHCP Administrators = volledige controle."},
{type:"mc",q:"Wat is 'DHCP scope activeren' op Windows Server?",o:["De DHCP-server starten","De scope beschikbaar maken voor het uitdelen van adressen na configuratie","De scope verwijderen","De scope dupliceren"],c:[1],h:"Een scope moet geactiveerd worden nadat je hem aangemaakt hebt — anders deelt hij niets uit."},
{type:"mc",q:"Wat zijn DHCP-opties?",o:["Beveiligingsinstellingen","Extra netwerkconfiguratie-informatie die samen met het IP-adres wordt uitgedeeld (bijv. gateway, DNS-server, domein)","Types van IP-adressen","Back-up-instellingen"],c:[1],h:"Opties = alles behalve het IP-adres zelf. Router (option 3) en DNS (option 6) zijn de meest gebruikte."},
{type:"mc",q:"Wat is het verschil tussen DHCP-scope-opties en server-opties?",o:["Ze zijn identiek","Scope-opties gelden voor één specifieke scope; server-opties gelden voor alle scopes op de server","Server-opties zijn prioritair boven scope-opties","Scope-opties zijn voor IPv6; server-opties voor IPv4"],c:[1],h:"Scope-optie overschrijft de server-optie als ze conflicteren — meer specifiek wint."},
{type:"mc",q:"Wat is een DHCP superscope?",o:["Een zeer grote scope","Een logische container die meerdere scopes groepeert zodat één DHCP-server meerdere subnetten kan bedienen via één interface","Een scope met reservations","Een back-up scope"],c:[1],h:"Superscope = meerdere scopes, één server. Nuttig bij genummerde subnetten op één fysiek segment."},
{type:"mc",q:"Wat is DHCP failover in Windows Server?",o:["Een back-up scope op een andere server","Een configuratie waarbij twee DHCP-servers samenwerken voor hoge beschikbaarheid en load balancing","Een automatische scope-migratie","Een type DHCP relay"],c:[1],h:"DHCP failover = redundantie. Als één server uitvalt, neemt de andere over zonder configuratieverlies."},
{type:"open",q:"Welk DHCP-bericht stuurt een client als hij voor het eerst een IP-adres zoekt?",ans:["dhcp discover","discover"],h:"Het eerste bericht van de DORA-reeks. Het is een broadcast."},
{type:"mc",q:"Hoe autoriseer je een DHCP-server in een Active Directory-omgeving?",o:["Via het computerbeheer","Via de DHCP-beheerconsole → rechtermuisklik op de server → Authorize","Via de DNS-beheerconsole","Via PowerShell enkel"],c:[1],h:"AD-omgevingen vereisen autorisatie om rogue DHCP-servers te voorkomen."},
{type:"mc",q:"Wat is een DHCP-lease verlenging?",o:["Een nieuwe IP-aanvraag","Wanneer een client zijn lease verlengt bij de DHCP-server voordat de lease verloopt (typisch na 50% van de leaseduur)","Het verwijderen van een lease","Het overdragen van een lease"],c:[1],h:"Verlenging = de client vraagt zijn IP te mogen behouden. Gebeurt automatisch na 50% van de leasetijd."},
{type:"mc",q:"Welk protocol wordt gebruikt voor Windows bestandsdeling?",o:["FTP","SMB (Server Message Block)","HTTP","NFS"],c:[1],h:"SMB = het protocol achter Windows shares. Poort 445 (en vroeger ook 139)."},
{type:"mc",q:"Wat is een UNC-pad?",o:["Een type IP-adres","Universal Naming Convention pad — notatie voor netwerkmappen zoals \\\\server\\share","Een type URL","Een bestandspad op Linux"],c:[1],h:"UNC = \\\\servernaam\\sharenaam. Dit is hoe je een netwerksschijf bereikt in Windows."},
{type:"mc",q:"Wat is het verschil tussen share-permissies en NTFS-permissies?",o:["Ze zijn identiek","Share-permissies gelden alleen bij netwerktoegang; NTFS-permissies gelden altijd (netwerk én lokaal) — de meest restrictieve wint","NTFS-permissies gelden alleen bij lokale toegang","Share-permissies zijn gedetailleerder"],c:[1],h:"Beide lagen gelden cumulatief: het meest restrictieve niveau wint. NTFS is de sterkste laag."},
{type:"mc",q:"Wat is een verborgen share in Windows?",o:["Een share die automatisch versleuteld is","Een share waarvan de naam eindigt op '$' — niet zichtbaar bij bladeren maar bereikbaar via UNC-pad","Een share enkel voor administrators","Een share zonder permissies"],c:[1],h:"Voeg $ toe aan de sharenaam om hem te verbergen. \\\\server\\data$ is verborgen maar nog steeds bereikbaar."},
{type:"mc",q:"Wat zijn administrative shares op Windows?",o:["Shares aangemaakt door administrators","Automatisch aangemaakte verborgen shares (C$, D$, ADMIN$, IPC$) voor beheerdoeleinden","Shares met volledige toegang voor iedereen","Shares op domain controllers"],c:[1],h:"C$, D$, ADMIN$ zijn standaard aanwezig op Windows. Automatisch en verborgen."},
{type:"mc",q:"Hoe wijs je een netwerkschijf toe in Windows?",o:["Via de command prompt met 'net use Z: \\\\server\\share'","Via Verkenner → Computerbeheer → Schijven toewijzen","Via DHCP","Via DNS"],c:[0],h:"Net use = command-line methode. Je kunt ook via Verkenner → 'Map network drive'."},
{type:"mc",q:"Wat is DFS (Distributed File System)?",o:["Een type NTFS-bestandssysteem","Een Windows-functie die een uniforme naamruimte biedt voor gedeelde mappen verspreid over meerdere servers","Een type RAID-configuratie","Een back-up systeem"],c:[1],h:"DFS = één logische mapstructuur over meerdere servers. Gebruikers zien één \\\\domein\\share."},
{type:"mc",q:"Wat is Folder Redirection in Windows?",o:["Het omleiden van verkeer","Het automatisch verplaatsen van gebruikersmappen (Documenten, Bureaublad) naar een netwerklocatie — centraal beheer en back-up","Het doorsturen van DNS-queries","Een type file-sharing protocol"],c:[1],h:"Folder redirection = gebruikersdata op de server i.p.v. lokaal. Makkelijker te back-uppen."},
{type:"mc",q:"Wat is Offline Files in Windows?",o:["Bestanden die verwijderd zijn","Een functie waarmee netwerkbestanden lokaal gecached worden zodat ze ook zonder netwerkverbinding beschikbaar zijn","Een type compressie","Een back-up functie"],c:[1],h:"Offline files = werk verder als het netwerk uitvalt. Bij herstel wordt automatisch gesynchroniseerd."},
{type:"mc",q:"Welk Windows-commando gebruik je om actieve SMB-sessies te bekijken?",o:["net user","net session","netstat -a","arp -a"],c:[1],h:"net session toont alle actieve verbindingen naar gedeelde mappen op de server."},
{type:"mc",q:"Wat is Business Continuity Planning (BCP)?",o:["Een type back-upstrategie","Het geheel van maatregelen om kritieke bedrijfsprocessen te laten doorgaan tijdens en na een ramp of storing","Een beveiligingsaudit","Een type serverarchitectuur"],c:[1],h:"BCP = hoe blijft het bedrijf functioneren als het misgaat? Breder dan enkel IT."},
{type:"mc",q:"Wat is het verschil tussen BCP en DRP?",o:["Ze zijn identiek","BCP = breed (gehele organisatie, processen, mensen); DRP (Disaster Recovery Plan) = specifiek de IT-herstelprocedures","DRP = breder; BCP = IT-specifiek","BCP is voor grote bedrijven; DRP voor kleine"],c:[1],h:"DRP is een onderdeel van BCP, specifiek gericht op IT-herstel na een ramp."},
{type:"open",q:"Wat is de afkorting voor de maximaal aanvaardbare tijd dat een systeem offline mag zijn?",ans:["rto","recovery time objective"],h:"Het gaat over TIJD: hoe lang mag de downtime duren?"},
{type:"open",q:"Wat is de afkorting voor de maximale hoeveelheid dataverlies die aanvaardbaar is bij een ramp?",ans:["rpo","recovery point objective"],h:"Het gaat over DATA: hoeveel data mogen we kwijtraken?"},
{type:"mc",q:"Wat is het verschil tussen RTO en RPO?",o:["Ze zijn identiek","RTO = Recovery Time Objective: max. aanvaardbare downtijd; RPO = Recovery Point Objective: max. aanvaardbaar dataverlies","RPO = hersteltijd; RTO = dataverlies","RTO is voor servers; RPO voor databases"],c:[1],h:"RTO: hoe lang mag het duren om te herstellen? RPO: hoeveel data mogen we maximaal kwijtraken?"},
{type:"mc",q:"Een bedrijf heeft een RPO van 4 uur. Wat betekent dit voor de back-upfrequentie?",o:["Back-up elke 24 uur","Back-up elke 8 uur","Back-up minimaal elke 4 uur — anders verlies je meer data dan aanvaardbaar","Back-up enkel op weekends"],c:[2],h:"RPO = 4u → je mag max 4u data verliezen → je moet minstens elke 4u een back-up maken."},
{type:"mc",q:"Wat is een BIA (Business Impact Analysis)?",o:["Een type beveiligingsaudit","Een analyse die bepaalt welke bedrijfsprocessen kritisch zijn en wat de impact is als ze uitvallen","Een financiële analyse","Een risicoanalyse voor cybersecurity"],c:[1],h:"BIA = welke processen zijn levensbelangrijk? Bepaalt RTO en RPO per proces."},
{type:"mc",q:"Wat is een hot site in de context van Business Continuity?",o:["Een heet serverruimte","Een volledig uitgeruste en real-time gesynchroniseerde back-uplocatie die binnen minuten overneemt","Een externe cloud-backup","Een koude back-uplocatie"],c:[1],h:"Hot = warm, klaar, actief. Overschakeling in minuten. Meest duur maar laagste RTO."},
{type:"mc",q:"Wat is het verschil tussen een hot site, warm site en cold site?",o:["Er is geen verschil","Hot = volledig operationeel en gesynchroniseerd; Warm = infrastructuur aanwezig maar niet up-to-date; Cold = enkel ruimte en stroom, alles nog te installeren","Cold is de snelste hersteloptie","Warm site = cloud-backup"],c:[1],h:"Hot > Warm > Cold in termen van beschikbaarheid én kosten. Trade-off tussen geld en RTO."},
{type:"mc",q:"Wat is een SLA (Service Level Agreement)?",o:["Een type firewall-configuratie","Een formele overeenkomst die de minimaal gegarandeerde serviceniveaus vastlegt, inclusief beschikbaarheid, RTO en RPO","Een back-upstrategie","Een beveiligingsbeleid"],c:[1],h:"SLA = de belofte van beschikbaarheid. Bijv. 99,9% uptime = max 8,76 uur downtime per jaar."},
{type:"mc",q:"Wat is MTTR?",o:["Maximum Time To Restore","Mean Time To Repair — gemiddelde tijd om een storing te herstellen","Minimum Time To Recover","Monthly Time To Rebuild"],c:[1],h:"MTTR = hoe lang duurt herstel gemiddeld? Lager = beter. Beïnvloed door procedures en tooling."},
{type:"mc",q:"Wat is MTBF?",o:["Maximum Time Between Failures","Mean Time Between Failures — gemiddelde tijd tussen twee storingen","Minimum Time Before Failure","Monthly Time Between Fixes"],c:[1],h:"MTBF = hoe lang werkt het gemiddeld zonder storing? Hoger = betrouwbaarder."},
{type:"mc",q:"Wat is het verschil tussen een back-up en synchronisatie?",o:["Ze zijn identiek","Back-up = punt-in-tijd kopie; synchronisatie = real-time spiegeling — verwijdering op locatie A wordt gesynchroniseerd naar B","Synchronisatie is veiliger dan back-up","Back-up is altijd in de cloud"],c:[1],h:"Sync verwijdert ook. Als je per ongeluk een bestand verwijdert, is het op beide locaties weg."},
{type:"mc",q:"Wat is een volledige back-up (full backup)?",o:["Een back-up van alle gewijzigde bestanden","Een complete kopie van alle geselecteerde data","Een back-up enkel van systeem-configuraties","Een back-up van de database"],c:[1],h:"Full = alles. Langzaamste om te maken, snelste om te herstellen."},
{type:"mc",q:"Wat is een incrementele back-up?",o:["Kopie van alle data","Kopie van alle data gewijzigd SINCE de laatste back-up (volledig of incrementeel)","Kopie van data gewijzigd SINCE de laatste VOLLEDIGE back-up","Kopie van systeem-configuraties"],c:[1],h:"Incrementeel = enkel wat nieuw/gewijzigd is SINCE de vorige back-up (welk type ook). Snel maar herstel is complex."},
{type:"mc",q:"Wat is een differentiële back-up?",o:["Kopie van alle data","Kopie van alle data gewijzigd SINCE de laatste volledige back-up","Kopie van alle data gewijzigd SINCE de laatste back-up ongeacht type","Kopie van gewijzigde systeembestanden"],c:[1],h:"Differentieel = alles gewijzigd SINCE de laatste VOLLEDIGE back-up. Groeit elke dag. Herstel = full + één diff."},
{type:"mc",q:"Wat is de 3-2-1 back-up regel?",o:["Maak 3 back-ups per dag op 2 media met 1 offsite kopie","3 kopieën van data, op 2 verschillende media-types, waarvan 1 offsite (buiten het gebouw)","Bewaar back-ups 3 jaar, controleer ze 2x per jaar, test herstel 1x per jaar","3 servers, 2 back-ups per server, 1 offsite"],c:[1],h:"3-2-1 = de gouden regel voor back-ups. Één brand vernietigt niet alle kopieën."},
{type:"mc",q:"Wat is een air-gapped back-up?",o:["Een back-up in de cloud","Een back-up die volledig geïsoleerd is van het netwerk — niet bereikbaar voor ransomware","Een versleutelde back-up","Een back-up op SSD"],c:[1],h:"Air-gap = letterlijk een luchtspleet. Geen netwerkverbinding = ransomware kan er niet bij."},
{type:"mc",q:"Waarom is het testen van back-ups essentieel?",o:["Om de back-up-software te controleren","Omdat een back-up die niet succesvol kan worden hersteld waardeloos is — testen bewijst dat herstel werkt","Om de back-upsnelheid te meten","Om GDPR-compliance aan te tonen"],c:[1],h:"Een back-up die je nooit getest hebt, is een back-up die je niet vertrouwt."},
{type:"mc",q:"Wat is een back-up retentiebeleid?",o:["Het beleid voor back-up-encryptie","Het beleid dat bepaalt hoe lang back-ups worden bewaard en wanneer ze worden verwijderd","Het back-up-schema","Het type media voor back-ups"],c:[1],h:"Retentie = bewaarperiode. Compliance kan minimale bewaartermijnen opleggen (bijv. 7 jaar financieel)."},
{type:"mc",q:"Wat is Grandfather-Father-Son (GFS) back-up rotatie?",o:["Een type back-up-compressie","Een back-up rotatieschema: dagelijks (Son), wekelijks (Father), maandelijks (Grandfather) — behoudt data over verschillende tijdshorizonten","Een type incremetele back-up","Een cloud-back-upstrategie"],c:[1],h:"GFS = meerdere generaties bewaren. Son = dagelijks; Father = wekelijks; Grandfather = maandelijks."},
{type:"mc",q:"Wat is VSS (Volume Shadow Copy Service) op Windows?",o:["Een virusscanner","Een Windows-dienst die point-in-time snapshots van volumes maakt zodat back-ups gemaakt kunnen worden van open bestanden","Een type RAID","Een disk-encryptietool"],c:[1],h:"VSS = shadow copies. Maakt back-up van bestanden die in gebruik zijn zonder ze te sluiten."},
{type:"mc",q:"Wat is een back-up van de 'bare metal'?",o:["Een back-up enkel van de data","Een volledige back-up van het volledige systeem inclusief OS, applicaties en configuratie zodat een leeg systeem volledig hersteld kan worden","Een back-up van enkel het OS","Een type cloud-back-up"],c:[1],h:"Bare metal restore = herstel van nul. Leeg systeem → volledig werkend systeem uit back-up."},
{type:"mc",q:"Wat is deduplicatie bij back-ups?",o:["Het comprimeren van back-upbestanden","Het elimineren van identieke datablokken in de back-up om opslagruimte te besparen","Het versleutelen van back-ups","Het automatisch verwijderen van oude back-ups"],c:[1],h:"Deduplicatie = één exemplaar van identieke blokken. Dramatische reductie van opslagvereisten."},
{type:"mc",q:"Wat is Active Directory (AD)?",o:["Een type back-upoplossing","Een directoryservice van Microsoft voor het beheren van gebruikers, computers en resources in een Windows-netwerk","Een type DNS-server","Een bestandssysteem"],c:[1],h:"AD = het centrale beheerssysteem voor een Windows-domein. Gebruikers, computers, beleid — alles erin."},
{type:"mc",q:"Wat is een Domain Controller (DC)?",o:["Een beheerder met domeinrechten","Een server die de Active Directory-database beheert en authenticatie verzorgt voor het domein","Een type router","Een DNS-server"],c:[1],h:"DC = de server waarop AD draait. Authenticatie van gebruikers verloopt via de DC."},
{type:"mc",q:"Wat is Group Policy (GPO)?",o:["Een type gebruikersgroep","Een mechanisme in AD om instellingen, beveiliging en software centraal toe te passen op computers en gebruikers","Een type firewall-regel","Een back-upbeleid"],c:[1],h:"GPO = centrale beleidstoepassing. Één instelling beheren voor duizenden computers tegelijk."},
{type:"mc",q:"Wat is RAID en waarvoor dient het?",o:["Redundant Array of Independent Disks — combineert meerdere harde schijven voor hogere betrouwbaarheid en/of prestaties","Een type back-up","Een netwerk-opslagprotocol","Een type serverarchitectuur"],c:[0],h:"RAID = meerdere schijven als één logisch volume. RAID 1 = mirror; RAID 5 = pariteit."},
{type:"mc",q:"Wat is het verschil tussen RAID 1 en RAID 5?",o:["Ze zijn identiek","RAID 1 = volledige spiegel (2 schijven, 50% efficiëntie); RAID 5 = pariteitsblokken over minstens 3 schijven (kan 1 schijf verliezen)","RAID 5 is sneller in alle opzichten","RAID 1 beschermt tegen meer schijffouten"],c:[1],h:"RAID 1 = simpele mirror. RAID 5 = efficiënter (n-1 schijven bruikbaar) maar complexer herstel."},
{type:"mc",q:"Waarom is RAID GEEN back-up?",o:["RAID is duurder dan back-ups","RAID beschermt tegen schijffouten maar niet tegen data-corruptie, ransomware, accidentele verwijdering of brand","RAID en back-up zijn identiek","RAID is sneller dan back-ups"],c:[1],h:"RAID repliceert alles: ook fouten, corruptie en ransomware worden gespiegeld. Je hebt beiden nodig."},
{type:"mc",q:"Wat is een UPS (Uninterruptible Power Supply)?",o:["Een type server","Een noodstroomvoorziening die stroom levert bij stroomuitval om systemen gecontroleerd af te sluiten of te laten doorwerken","Een type netwerkapparaat","Een back-up-opslagmedium"],c:[1],h:"UPS = noodstroom. Beschermt tegen stroomuitval en spanningsproblemen."},
{type:"mc",q:"Wat is een SAN (Storage Area Network)?",o:["Een type VLAN","Een dedicated netwerk voor opslag dat block-level storage beschikbaar stelt aan servers — hogere prestaties dan NAS","Een type back-upsysteem","Een draadloos netwerk voor storage"],c:[1],h:"SAN = snel, block-level, voor productieomgevingen. NAS = file-level, makkelijker maar trager."},
{type:"mc",q:"Wat is een NAS (Network Attached Storage)?",o:["Een type server","Een opslagapparaat verbonden met het netwerk dat file-level storage (via SMB/NFS) beschikbaar stelt","Een type SAN","Een back-upserver"],c:[1],h:"NAS = eenvoudige netwerkopslag. Iedereen op het netwerk kan mappen mounten via SMB of NFS."},
{type:"mc",q:"Wat is Server Core in Windows Server?",o:["Een verouderde versie van Windows Server","Een minimale installatie zonder grafische interface — kleiner aanvalsoppervlak, lager resourceverbruik","Een type serverrol","Een type RAID-configuratie"],c:[1],h:"Server Core = command-line only. Minder software = minder kwetsbaarheden = veiliger."},
{type:"mc",q:"Wat is de rol van een WSUS-server (Windows Server Update Services)?",o:["Een DNS-server","Een server die Windows-updates centraal beheert en distribueert aan clients in het netwerk","Een back-upserver","Een monitoringserver"],c:[1],h:"WSUS = interne Microsoft Update-server. Controleer welke updates uitgerold worden en wanneer."},
{type:"mc",q:"Wat is de Sysvol-map in een Windows-domein?",o:["Een map voor gebruikersprofielen","Een gedeelde map op domain controllers die logon scripts, GPO-bestanden en andere domeinbrede data bevat — gerepliceerd tussen alle DCs","Een map voor back-ups","Een map voor DNS-zones"],c:[1],h:"SYSVOL = gedeeld op alle DCs. Bevat GPO-templates en logon scripts. Gerepliceerd via DFSR."},
{type:"open",q:"Welk Windows Server commando gebruik je om informatie te bekijken over DHCP-leases op de server?",ans:["get-dhcpserverv4lease","netsh dhcp server show clients","show clients"],h:"Het PowerShell commando begint met 'Get-DhcpServer'."},
{type:"mc",q:"Wat is PowerShell en waarom is het belangrijk voor serverbeheer?",o:["Een type database","Een krachtige shell en scripttaal voor Windows-automatisering — maakt herhaalde taken automatiseerbaar en reproduceerbaar","Een type GUI-tool","Een type beveiligingssoftware"],c:[1],h:"PowerShell = automatisering. Eén script kan duizenden servers configureren."},
{type:"mc",q:"Wat is het verschil tussen een workgroup en een domein op Windows?",o:["Ze zijn identiek","Workgroup = decentraal, elke PC beheert zijn eigen gebruikers; Domein = centraal, AD-server beheert alle gebruikers en beleid","Domein = kleiner; workgroup = groter","Workgroup vereist een server; domein niet"],c:[1],h:"Domein = centraal beheer via Active Directory. Workgroup = peer-to-peer, geen centrale server."},
{type:"mc",q:"Wat is een roaming profiel in Windows?",o:["Een profiel voor mobiele gebruikers","Een gebruikersprofiel dat opgeslagen is op een netwerkserver zodat de gebruiker zijn instellingen heeft op elke computer in het domein","Een profiel met beperkte rechten","Een back-up van een gebruikersprofiel"],c:[1],h:"Roaming = mee met de gebruiker. Log in op computer A of B — zelfde bureaublad, zelfde instellingen."},
{type:"mc",q:"Wat is een mandatory profiel in Windows?",o:["Een verplicht beveiligingsprofiel","Een read-only gebruikersprofiel — wijzigingen worden niet opgeslagen bij afmelden. Nuttig voor kiosk-systemen","Een profiel met administrator-rechten","Een profiel dat automatisch wordt aangemaakt"],c:[1],h:"Mandatory = verplicht, onveranderlijk. Elke keer inloggen = hetzelfde schone profiel."},
{type:"mc",q:"Een gebruiker kan 's morgens inloggen maar 's avonds niet meer. De DNS-server wijst een ander IP toe. Wat is het probleem?",o:["De gebruiker heeft het verkeerde wachtwoord","De DNS-TTL is verlopen en een gewijzigd A-record wijst nu naar een andere server — controleer DNS-records","De DHCP-lease is verlopen","De switch is geconfigureerd fout"],c:[1],h:"Wisselend IP via DNS = waarschijnlijk een gewijzigd A-record of laag TTL-waarde."},
{type:"mc",q:"Een back-up duurt te lang. Je wisselt van full naar incrementeel. Wat is het nadeel?",o:["Geen nadelen","Herstel is complexer: je hebt de laatste full backup + ALLE incrementele back-ups sindsdien nodig","Incrementeel gebruikt meer ruimte","Incrementeel is niet betrouwbaar"],c:[1],h:"Incrementeel = snel maken, traag herstellen. Je moet de volledige ketting rebuilden."},
{type:"mc",q:"Ransomware versleutelt alle bestanden inclusief de netwerkschijf. Welke back-upstrategie had dit voorkomen?",o:["Een dagelijkse full backup op de netwerkschijf","Een air-gapped of offsite back-up die niet via het netwerk bereikbaar is voor de ransomware","Een RAID 1-configuratie","Een hot site"],c:[1],h:"Ransomware versleutelt alles bereikbaar via het netwerk. Air-gap = niet bereikbaar = veilig."},
{type:"mc",q:"Een DHCP-server valt uit. Clients krijgen geen IP meer. Welke oplossing biedt hoge beschikbaarheid?",o:["Een tweede scope op dezelfde server","DHCP failover configureren tussen twee servers","Een statisch IP geven aan alle clients","Een superscope aanmaken"],c:[1],h:"DHCP failover = twee servers die elkaars scopes kennen en overnemen bij uitval."},
{type:"mc",q:"Je voegt een nieuwe DNS-zone toe maar clients kunnen de naam niet resolven. Wat controleer je als eerste?",o:["De firewall","Of de zone correct aangemaakt is, de A-records kloppen en de clients de juiste DNS-server gebruiken","Of DHCP correct geconfigureerd is","Of de router correct geconfigureerd is"],c:[1],h:"Troubleshoot DNS in volgorde: zone aangemaakt? Records correct? Client wijst naar juiste DNS-server?"},
{type:"mc",q:"Je wil dat alle gebruikers in het domein een beveiligde screensaver krijgen na 10 minuten. Wat gebruik je?",o:["Een manuele configuratie per PC","Een Group Policy Object (GPO) gekoppeld aan de domain-OU","Een logon script","Een registry-aanpassing op elke PC"],c:[1],h:"GPO = één keer instellen, automatisch toepassen op alle computers in scope."},
{type:"mc",q:"Een server heeft RAID 5 en één schijf is uitgevallen. Wat doe je als eerste?",o:["De server onmiddellijk uitzetten","De uitgevallen schijf vervangen — RAID 5 kan werken met één uitgevallen schijf maar is kwetsbaar tot de rebuild voltooid is","Een full backup maken","De server herstarten"],c:[1],h:"RAID 5 = one disk failure tolerance. Bij een tweede schijffout verlies je alles — vervang snel!"},
{type:"mc",q:"Een gebruiker kan bestanden op een share lezen maar niet schrijven, hoewel de share-permissie 'Full Control' is. Wat is het probleem?",o:["De share is corrupt","De NTFS-permissies geven de gebruiker alleen leesrechten — NTFS-permissies overschrijven share-permissies als ze restrictiever zijn","De server is uitgevallen","DNS is fout geconfigureerd"],c:[1],h:"Share-permissies + NTFS-permissies = het meest restrictieve niveau wint. Controleer de NTFS-laag."},
{type:"mc",q:"Je RTO is 2 uur maar de restore van de back-up duurt 4 uur. Wat doe je?",o:["De RTO verhogen","De back-upstrategie aanpassen (hot site, replicatie, snellere media) of de herstelprocedure optimaliseren","De back-upfrequentie verhogen","Een tweede back-up maken"],c:[1],h:"Als de restore de RTO overschrijdt, moet je architectuur veranderen — niet de RTO."},
{type:"mc",q:"Wat is het gevaar van het bewaren van alle back-ups op één locatie?",o:["Geen gevaar","Brand, overstroming of diefstal op die locatie vernietigt alle back-ups — gebruik de 3-2-1 regel met offsite opslag","Het vertraagt de restore","Het kost meer opslagruimte"],c:[1],h:"Één locatie = single point of failure voor back-ups. De 3-2-1 regel vereist minstens één offsite."},
{type:"mc",q:"Wat is een DNS Conditional Forwarder?",o:["Een algemene forwarder voor alle DNS","Een forwarder die queries voor een specifiek domein stuurt naar een aangewezen DNS-server — nuttig voor interne domeinen","Een type DNS-zone","Een type DNS-record"],c:[1],h:"Conditional forwarder = stuur queries voor intern.bedrijf.be naar de interne DNS-server, de rest naar ISP."},
{type:"mc",q:"Wat is een DNS stub zone?",o:["Een lege DNS-zone","Een zone die enkel de NS- en SOA-records bevat van een andere zone — voor efficiënte delegatie zonder volledige zone transfer","Een type primaire zone","Een type secundaire zone"],c:[1],h:"Stub zone = minimale info. Weet wie autoritatief is, vraagt die server rechtstreeks. Geen volledige kopie nodig."},
{type:"mc",q:"Wat is DNSSEC en welk probleem lost het op?",o:["Versleutelt DNS-verkeer","Voegt digitale handtekeningen toe aan DNS-records om te verifiëren dat ze authentiek zijn — beschermt tegen DNS cache poisoning","Een type DNS-forwarder","Een type DNS-record"],c:[1],h:"DNSSEC = digitale handtekeningen op DNS. Cache poisoning verstuurde valse records — DNSSEC maakt dit detecteerbaar."},
{type:"mc",q:"Wat is een TTL-waarde in DNS en welk effect heeft een lage TTL?",o:["Hoe lang de DNS-server actief is","Hoe lang een DNS-record gecached mag worden — lage TTL = vaker opvragen (meer DNS-verkeer) maar snellere propagatie van wijzigingen","Hoe lang een DNS-query duurt","De maximale recordgrootte"],c:[1],h:"Lage TTL = snel propageren maar meer DNS-load. Hoge TTL = minder load maar trage wijzigingen. Balans zoeken."},
{type:"mc",q:"Wat is een DNS delegation?",o:["Het doorgeven van DNS-verantwoordelijkheid","Het overdragen van de autoritaire verantwoordelijkheid voor een subdomein aan een andere set nameservers","Een type DNS-forwarder","Een type DNS-record"],c:[1],h:"Delegation via NS-records + glue records. ap.be delegeert leer.ap.be naar de interne DNS van AP."},
{type:"mc",q:"Hoe test je DNS-resolutie op Windows?",o:["Via de taakbeheerder","Via nslookup of Resolve-DnsName PowerShell commando","Via de event viewer","Via de netwerkconfiguratie"],c:[1],h:"nslookup = klassiek. Resolve-DnsName = PowerShell equivalent. Beide zijn nuttig voor DNS-troubleshooting."},
{type:"open",q:"Welk DNS-record gebruik je om een tekst-gebaseerde verificatie (bijv. domeinverificatie, SPF) op te slaan?",ans:["txt","txt record"],h:"Het recordtype dat tekst opslaat — één van de meest veelzijdige DNS-records."},
{type:"mc",q:"Wat is een SRV-record in DNS?",o:["Een type A-record","Een record dat de locatie (host + poort) van een specifieke dienst aangeeft — bijv. voor SIP, XMPP, SRV voor Active Directory","Een type MX-record","Een type CNAME"],c:[1],h:"SRV = Service Location Record. Active Directory gebruikt SRV-records om DC's en LDAP-servers te adverteren."},
{type:"mc",q:"Wat is een 'split DNS' of 'split-horizon DNS'?",o:["Een defecte DNS-configuratie","Twee DNS-views voor hetzelfde domein — intern retourneert private IPs, extern retourneert publieke IPs","Een type DNS-redundantie","Een type DNSSEC-configuratie"],c:[1],h:"Split DNS = intern en extern andere antwoorden. Intern gebruikers → private server. Extern gebruikers → load balancer."},
{type:"mc",q:"Wat is een DHCP lease renewal en wanneer begint het?",o:["Wanneer de lease verloopt","Een client begint automatisch te verlengen na 50% van de leaseduur (T1) en bij 87.5% probeert hij elke server","Na handmatige actie","Na elke herstart"],c:[1],h:"T1 = 50% → verlenging bij eigen server. T2 = 87.5% → verlenging bij elke DHCP-server (broadcast)."},
{type:"mc",q:"Wat is de DHCP Option 43?",o:["De standaard gateway-optie","Een vendor-specifieke optie die informatie doorstuurt die enkel bepaalde apparaten verstaan — bijv. WAP-configuratieserver","De DNS-server optie","De domeinnaam-optie"],c:[1],h:"Option 43 = vendor-specifiek. Cisco APs gebruiken het om hun WLC-adres te ontvangen via DHCP."},
{type:"mc",q:"Wat is DHCP Option 82 (Relay Agent Information)?",o:["De gateway-optie","Informatie toegevoegd door de relay agent die aangeeft van welk netwerksegment de DHCP-request komt — nuttig voor audit en beleidstoepassing","De DNS-server optie","De lease-duur optie"],c:[1],h:"Option 82 = identificeer de client-locatie. Welke switch, welke poort? Nuttig voor IP-adresbeleid per locatie."},
{type:"mc",q:"Wat is een Windows Server RRAS (Routing and Remote Access Service)?",o:["Een type back-up dienst","Een Windows Server-rol die routing, VPN en dial-up toegang biedt","Een type DNS-dienst","Een type DHCP-dienst"],c:[1],h:"RRAS = Windows router + VPN-server. Biedt site-to-site VPN, DirectAccess en SSTP-VPN."},
{type:"mc",q:"Wat is DirectAccess in Windows Server?",o:["Een type VPN","Een automatisch en transparant VPN-alternatief voor Windows-clients die altijd verbonden zijn met het bedrijfsnetwerk — geen manuele VPN-verbinding nodig","Een type remote desktop","Een type DNS-dienst"],c:[1],h:"DirectAccess = altijd-aan VPN. Client is verbonden met het domein, ook als medewerker thuis werkt."},
{type:"mc",q:"Wat is een Windows Server WSUS-server?",o:["Een type DNS-server","Windows Server Update Services — centraliseert en controleert de distributie van Microsoft updates","Een type back-up server","Een type DHCP-server"],c:[1],h:"WSUS = interne Windows Update. Keur updates goed voor uitrol, plan uitrolvensters, rapporteer compliance."},
{type:"mc",q:"Wat is een GPO (Group Policy Object)?",o:["Een type gebruikersaccount","Een beleidscontainer die instellingen definieert voor computers en gebruikers in een Active Directory-omgeving","Een type server-rol","Een type DNS-record"],c:[1],h:"GPO = centraal beleid. Screensaver na 5 min, geen USB, bepaalde software blokkeren — alles via GPO."},
{type:"mc",q:"Hoe koppel je een GPO aan een OU in Active Directory?",o:["Via de command line","Via Group Policy Management Console (GPMC) → rechtermuisklik op OU → Link an Existing GPO","Via het register","Via PowerShell enkel"],c:[1],h:"GPMC = de tool voor GPO-beheer. Link GPO aan site, domein of OU — vereffening van specifiek naar algemeen."},
{type:"mc",q:"Wat is 'GPO inheritance' in Active Directory?",o:["GPOs gelden enkel voor één OU","GPOs worden overgeërfd van bovenliggende containers — een GPO op het domein geldt voor alle OUs, tenzij geblokkeerd","GPOs worden niet gedeeld","GPOs overschrijven altijd lokale instellingen"],c:[1],h:"Inheritance = van boven naar beneden. Domain → OU → sub-OU. Meer specifieke GPO kan overschrijven."},
{type:"mc",q:"Wat is 'GPO enforcement' (No Override)?",o:["GPO kan niet gewijzigd worden","Een GPO-instelling die ervoor zorgt dat de GPO NIET kan worden geblokkeerd door lagere containers — zelfs niet door een 'Block Inheritance'","GPO wordt versneld verwerkt","GPO geldt enkel voor computers"],c:[1],h:"Enforce = forceer. Hogere GPO blijft gelden, ook als een sub-OU Block Inheritance heeft."},
{type:"mc",q:"Wat is 'Block Inheritance' in Active Directory GPO-beheer?",o:["Blokkeert de GPO-verwerking","Voorkomt dat GPOs van bovenliggende containers worden toegepast op een specifieke OU","Blokkeert wachtwoordbeleid","Blokkeert computer-GPOs"],c:[1],h:"Block Inheritance = stop GPOs van boven. Maar Enforced GPOs passeren zelfs Block Inheritance."},
{type:"mc",q:"Wat is een 'loopback processing' GPO-instelling?",o:["Een type netwerk-loopback","Een GPO-instelling die bepaalt dat computer-GPOs gebruikt worden voor de gebruikersinstellingen — nuttig voor kiosk/terminal-omgevingen","Een type DNS-instelling","Een type DHCP-instelling"],c:[1],h:"Loopback = de computer-context bepaalt de gebruikersinstellingen. Nuttig als je wil dat de locatie (computer) bepaalt wat de gebruiker kan."},
{type:"mc",q:"Wat is SYSVOL in Windows Server en waarom is het belangrijk?",o:["Een type volume","Een gedeelde map op elke DC die logon scripts, GPO-templates en domein-bestanden bevat — gerepliceerd via DFSR","Een type back-up","Een type DNS-zone"],c:[1],h:"SYSVOL = domein-gedeelde opslag voor GPOs en scripts. Gerepliceerd naar alle DCs via DFSR."},
{type:"mc",q:"Wat is DFSR (Distributed File System Replication)?",o:["Een type back-up","Een Windows-replicatietechnologie die SYSVOL en DFS-namespaces repliceert tussen servers","Een type DNS-replicatie","Een type DHCP-replicatie"],c:[1],h:"DFSR = repliceer SYSVOL efficiënt. Vervangt de verouderde FRS (File Replication Service)."},
{type:"mc",q:"Wat is een DFS Namespace?",o:["Een type DNS-namespace","Een virtuele mapstructuur die gedeelde mappen op meerdere servers combineert achter één UNC-pad","Een type Active Directory-namespace","Een type replicatienaamruimte"],c:[1],h:"DFS Namespace = \\\\domein\\data achter één naam, data verspreid over meerdere servers."},
{type:"mc",q:"Wat is een Active Directory OU (Organizational Unit)?",o:["Een type gebruikersgroep","Een container in Active Directory om objecten (gebruikers, computers) logisch te organiseren en er GPOs aan te koppelen","Een type domein","Een type forest"],c:[1],h:"OU = de mappen van Active Directory. Organiseer per afdeling, locatie of functie. Koppel GPOs aan OUs."},
{type:"mc",q:"Wat is het verschil tussen een AD-groep en een OU?",o:["Ze zijn identiek","OU = containerobject voor organisatie en GPO-koppeling; Groep = security-object voor toegangscontrole en e-maildistributie","Groepen zijn voor GPOs; OUs voor toegangscontrole","OUs zijn voor computers; groepen voor gebruikers"],c:[1],h:"OU = organiseer en beheer. Groep = sta toegang toe. Gebruiker in OU Verkoop, lid van groep VerkeerShareAccess."},
{type:"mc",q:"Wat is een Active Directory trust?",o:["Een type beveiliging","Een relatie tussen twee domeinen of forests die authenticatie tussen hen mogelijk maakt","Een type back-up","Een type replicatie"],c:[1],h:"Trust = vertrouw de gebruikers uit een ander domein. Bijv. twee bedrijven fuseren — forest trust creëren."},
{type:"mc",q:"Wat is een FSMO-rol (Flexible Single Master Operation)?",o:["Een type DNS-rol","Een speciale Active Directory-rol die slechts door één DC tegelijk uitgevoerd wordt — bijv. PDC Emulator, RID Master","Een type DHCP-rol","Een type groep"],c:[1],h:"FSMO-rollen = unieke taken die slechts één DC mag uitvoeren. Vijf rollen, verdeeld over DC's."},
{type:"mc",q:"Wat doet de PDC Emulator FSMO-rol?",o:["Dupliceert alle DCs","De primaire tijdsbron voor het domein, behandelt wachtwoordwijzigingen, account lockouts en is de bron voor GPO-bewerkingen","Verdeelt RID's","Beheert de forest-schema"],c:[1],h:"PDC Emulator = de baas-DC. Tijdsynchronisatie, wachtwoordwijzigingen, lockouts — allemaal naar de PDC."},
{type:"mc",q:"Wat is Windows Server Failover Clustering?",o:["Een type back-up","Een technologie waarbij meerdere servers samenwerken als cluster — bij uitval van één node neemt een andere automatisch over","Een type RAID","Een type replicatie"],c:[1],h:"Failover clustering = hoge beschikbaarheid voor kritieke diensten. SQL Server, Hyper-V, File Server — allemaal clusterbaar."},
{type:"mc",q:"Wat is Hyper-V en welke rol speelt het in Business Continuity?",o:["Een type database","Microsoft's hypervisor voor virtualisatie — VMs kunnen snel gemigreerd of gerepliceerd worden voor disaster recovery","Een type back-up","Een type netwerk"],c:[1],h:"Hyper-V + replicatie = VM's live migreren of repliceren naar een DR-site. RTO en RPO drastisch verlagen."},
